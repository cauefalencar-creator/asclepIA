  examefisico:{ name:"Exame Físico Geral — Casos Clínicos e Propedêutica", doc:"Porto 8ª ed. / Aula EFG (Diego & Lucas) / ChagasAI",
   summary:`## Exame Físico Geral — Casos Clínicos\n\nColeção de **16 casos clínicos** que integram prática semiológica com raciocínio fisiopatológico, baseados em Celmo Celeno Porto — Semiologia Médica 8ª ed.\n\nCada caso apresenta uma apresentação clínica e os achados do exame físico geral (estado geral, fácies, postura, biotipo, pele, mucosas, sinais vitais, linfonodos), seguidos de uma questão de múltipla escolha sobre o mecanismo fisiopatológico.\n\n### Diagnósticos abordados\n1. Insuficiência Cardíaca Congestiva\n2. Síndrome Nefrótica\n3. DPOC / Enfisema\n4. Cirrose Hepática\n5. Hipertireoidismo\n6. Hipotireoidismo / Mixedema\n7. Anemia Ferropriva\n8. Desidratação Severa\n9. Síndrome de Cushing\n10. Insuficiência Arterial Periférica\n11. Insuficiência Venosa Crônica\n12. Tuberculose (Síndrome Consumptiva)\n13. Acromegalia\n14. Doença de Addison\n15. Choque Séptico\n16. Traumatismo Cranioencefálico (Escala de Glasgow)`,
   tips:"São 48 questões: 16 casos clínicos fisiopatológicos + 32 de propedêutica do EFG (estado geral/consciência/Glasgow, marchas, IMC, hidratação, febre, pulsos, jugular, PA, pele, lesões elementares, linfonodos, tireoide, edema e circulação colateral). Decore os pontos de corte: febre moderada 37,6-38,5°C; desidratação grave >10% peso; edema 1+ a 4+; turgência jugular patológica >45°; hipotensão postural = queda 20 PAS/10 PAD ou +12 bpm; icterícia clínica >2 mg/dL.",
   questions:[
    {id:"efq1",d:"moderado",q:"Antônio, 62 anos, hipertenso há 15 anos, apresenta fadiga progressiva e edema bilateral em MMII há 4 semanas. Exame: estado geral acamado, fácies pálida e ansiosa, posição ortopneica, edema depressível que melhora com elevação, turgência jugular elevada (>4 cm H₂O), pele fria e úmida com enchimento capilar lentificado (>2 s), ganho de 3 kg em 2 semanas. Qual o mecanismo fisiopatológico principal do edema?",o:["Aumento da pressão oncótica plasmática levando à retenção renal de sódio e água","Aumento da pressão hidrostática capilar por elevação da pressão venosa central, associado à retenção neuro-hormonal de sódio e água","Diminuição da pressão oncótica plasmática por má absorção intestinal de proteínas","Obstrução linfática primária causando acúmulo de líquido intersticial","Inflamação aguda das paredes capilares aumentando a permeabilidade vascular"],a:1,e:"Na ICC, o coração não bombeia eficientemente, elevando a pressão venosa central e a pressão hidrostática capilar periférica. Simultaneamente, a redução do débito cardíaco ativa o sistema renina-angiotensina-aldosterona, promovendo retenção de sódio e água. O edema é bilateral, depressível e melhora com elevação porque reduz a pressão hidrostática."},
    {id:"efq2",d:"moderado",q:"Mariana, 35 anos, apresenta inchaço no rosto e nas pernas há 3 semanas e ganho de 4 kg. Exame: fácies edemaciada com edema periorbital bilateral, edema em MMII depressível que piora ao final do dia, turgência jugular normal, enchimento capilar normal, abdômen com macicez móvel (ascite). Qual mecanismo fisiopatológico explica melhor este padrão de edema?",o:["Aumento da pressão hidrostática capilar por insuficiência cardíaca direita com elevação da pressão venosa central","Diminuição da pressão oncótica plasmática por perda urinária de proteínas, com retenção secundária de sódio e água pelos rins","Inflamação sistêmica com aumento de permeabilidade vascular","Linfedema primário por anomalia congênita dos vasos linfáticos","Edema por desidratação com ativação de mecanismos de retenção de sal e água"],a:1,e:"Na síndrome nefrótica, a perda maciça de proteínas pela urina (>3,5 g/dia) reduz a pressão oncótica plasmática. Com menor pressão oncótica, o líquido sai para o interstício, causando edema generalizado. O edema periorbital é típico pois a pele facial é fina e complacente. A turgência jugular normal e enchimento capilar normal descartam ICC."},
    {id:"efq3",d:"facil",q:"Carlos, 68 anos, tabagista ativo (40 anos-maço), apresenta dispneia progressiva há 2 anos. Exame: fácies com lábios semi-cerrados na expiração, posição de trípode, tórax aumentado em diâmetro ântero-posterior (tórax em barril), FR 24 irpm com prolongamento da fase expiratória, pele pálida com cianose de extremidades, biotipo magro com perda muscular. Qual alteração fisiopatológica fundamental explica esses achados no enfisema?",o:["Inflamação aguda das vias aéreas causando broncoespasmo","Destruição do parênquima pulmonar com perda de elasticidade, levando ao aprisionamento de ar e aumento do volume residual","Obstrução das grandes vias aéreas por secreção mucosa","Inflamação pleural causando dor e limitação dos movimentos respiratórios","Insuficiência cardíaca direita com congestão pulmonar"],a:1,e:"O enfisema é caracterizado pela destruição dos alvéolos e estruturas elásticas. Com a perda de elasticidade pulmonar, o pulmão não retrai na expiração, causando aprisionamento de ar (air trapping) e aumento do volume residual. O pulmão hiperinsuflado empurra o diafragma para baixo e aumenta o diâmetro ântero-posterior, causando o tórax em barril. A posição de trípode e a expiração com lábios semi-cerrados são mecanismos compensatórios."},
    {id:"efq4",d:"moderado",q:"Fernanda, 55 anos, com hepatite C há 10 anos, apresenta inchaço abdominal progressivo. Exame: desnutrida com perda muscular, fácies pálida com icterícia leve, abdômen muito distendido com macicez móvel (ascite) e circulação colateral, edema bilateral em MMII depressível, pele amarelada com estrias atróficas e equimoses fáceis, turgência jugular elevada, hepatomegalia com borda dura e irregular. Qual mecanismo fisiopatológico melhor explica a ascite na cirrose?",o:["Aumento isolado da pressão hidrostática portal por fibrose hepática, causando transudação para a cavidade peritoneal","Combinação de aumento da pressão portal, diminuição da síntese hepática de albumina, vasodilatação esplâncnica e retenção renal de sódio e água","Obstrução da veia cava inferior causando congestão sistêmica","Inflamação peritoneal aguda com aumento de permeabilidade vascular","Desnutrição com diminuição da síntese proteica apenas"],a:1,e:"A ascite na cirrose é multifatorial: (1) fibrose hepática aumenta a resistência ao fluxo portal, elevando a pressão portal; (2) o fígado cirrótico sintetiza menos albumina, reduzindo a pressão oncótica; (3) vasodilatação esplâncnica reduz a pressão arterial efetiva, ativando o SRAA e o SNS, que promovem retenção renal de sódio e água. A opção A considera apenas um mecanismo, o que é insuficiente para explicar toda a fisiopatologia."},
    {id:"efq5",d:"moderado",q:"Roberto, 45 anos, queixa de palpitações, tremor nas mãos e perda de peso apesar de bom apetite. Exame: agitado, ansioso, fácies com exoftalmia leve e retração palpebral, olhar fixo e brilhante, pele quente e úmida com sudorese profusa, biotipo magro, tremor fino em repouso, FC 110 bpm, pulso cheio e amplo, taquipneia 22 irpm, reflexos osteotendinosos aumentados com fase de retorno rápida. Qual mecanismo fisiopatológico explica esses achados?",o:["Aumento da sensibilidade dos tecidos ao cálcio, causando hiperexcitabilidade neuromuscular","Aumento da concentração de hormônios tireoidianos (T3 e T4), levando a aumento do metabolismo basal, maior produção de calor, aumento da sensibilidade às catecolaminas e maior atividade simpática","Inflamação da glândula tireoide causando liberação de citocinas","Deficiência de iodo causando estimulação compensatória do eixo hipotálamo-hipófise-tireoide","Aumento de TSH causando hiperatividade do sistema nervoso central"],a:1,e:"O hipertireoidismo é caracterizado pelo excesso de T3 e T4, que aumentam o metabolismo basal de praticamente todas as células. Isso causa: aumento da termogênese (pele quente e sudorese), taquicardia e pulso amplo (sensibilidade cardíaca às catecolaminas), perda de peso apesar de bom apetite (hipermetabolismo), tremor fino (hiperatividade simpática) e hiperreflexia. A exoftalmia e a retração palpebral são causadas pelo aumento da sensibilidade dos músculos oculares às catecolaminas."},
    {id:"efq6",d:"moderado",q:"Joana, 60 anos, apresenta cansaço extremo, ganho de peso progressivo e intolerância ao frio. Exame: lentificada, apática, fácies inchada com edema periorbital bilateral NÃO-depressível (mixedema), pele seca e áspera, cabelos secos e quebradiços, voz rouca e profunda, FC 52 bpm (bradicardia), FR 14 irpm, reflexos osteotendinosos diminuídos com fase de retorno lentificada, marcha lenta e arrastada, temperatura 36,0°C. Qual mecanismo fisiopatológico explica esses achados?",o:["Aumento da concentração de hormônios tireoidianos causando redução paradoxal do metabolismo","Diminuição da concentração de hormônios tireoidianos (T3 e T4), causando redução do metabolismo basal, menor produção de calor, redução da sensibilidade às catecolaminas e acúmulo de proteoglicanos no espaço intersticial","Aumento do TSH causando retenção de sódio e água","Deficiência de vitamina B12 causando anemia e redução do metabolismo","Insuficiência adrenal causando hipotermia e bradicardia"],a:1,e:"O hipotireoidismo é caracterizado pela deficiência de T3 e T4. Isso causa: redução do metabolismo basal (ganho de peso, intolerância ao frio, hipotermia), bradicardia e hiporreflexia (redução da sensibilidade às catecolaminas), edema mixedematoso NÃO-depressível (acúmulo de proteoglicanos higroscópicos no interstício), pele seca e cabelos quebradiços (redução da proliferação celular) e voz rouca (edema das cordas vocais). A insuficiência adrenal (opção E) causaria hiperpigmentação e hipotensão, não presentes aqui."},
    {id:"efq7",d:"facil",q:"Pedro, 50 anos, queixa de cansaço progressivo há 3 meses, dispneia aos esforços, tontura e cefaleia. Tem histórico de úlcera péptica. Exame: cansado mas orientado, fácies pálida com mucosas descoloridas, pele fria, conjuntiva pálida, unhas com leuconíquia (unhas brancas), lábios pálidos, FC 98 bpm (taquicardia), FR 20 irpm (taquipneia), pulso rápido e filiforme, baço e fígado não palpáveis. Qual mecanismo fisiopatológico explica esses achados na anemia ferropriva?",o:["Redução da hemoglobina circulante, levando à menor capacidade de transporte de O₂, ativação de mecanismos compensatórios (taquicardia, taquipneia) e redução do fluxo sanguíneo cutâneo causando palidez","Inflamação aguda das mucosas causando vasodilatação e aumento de permeabilidade vascular","Trombocitopenia causando sangramento cutâneo e palidez","Deficiência de vitamina B12 causando neuropatia periférica e anemia megaloblástica","Aumento do volume plasmático causando hipervolemia e taquicardia"],a:0,e:"Na anemia ferropriva, a redução da hemoglobina circulante diminui a capacidade de transporte de oxigênio. O organismo ativa mecanismos compensatórios: taquicardia e taquipneia (para aumentar o débito cardíaco e a oxigenação), e vasoconstrição cutânea (para priorizar perfusão dos órgãos vitais, causando palidez). O pulso filiforme reflete a redução do volume sistólico causada pela taquicardia compensatória. A leuconíquia é característica de anemia ferropriva crônica."},
    {id:"efq8",d:"facil",q:"Luís, 72 anos, trazido após 3 dias de diarreia intensa com incapacidade de ingestão adequada de líquidos. Exame: acamado, letárgico, fácies enrugada com aparência de envelhecimento rápido, olhos encovados, boca muito seca com mucosa ressecada, pele seca com turgor reduzido (prega leva >2 s para retornar), FC 120 bpm, PA 90/50 mmHg, FR 26 irpm, temperatura 37,5°C, perda de 4 kg em 3 dias. Qual mecanismo fisiopatológico explica melhor esses achados?",o:["Aumento da pressão oncótica plasmática causando desidratação intracelular isolada","Redução do volume circulante efetivo por perda de água e eletrólitos, ativação de mecanismos compensatórios (taquicardia, taquipneia, vasoconstrição) e redução da pressão de perfusão tecidual","Inflamação sistêmica causando vasodilatação e aumento de permeabilidade vascular","Aumento da produção de ADH causando retenção de água","Insuficiência renal aguda causando retenção de sódio e água com hipotensão"],a:1,e:"A desidratação severa é caracterizada pela perda de água e eletrólitos, reduzindo o volume circulante efetivo. Isso causa: redução do volume intracelular (turgor diminuído, olhos encovados, mucosa seca) e extracelular (prega cutânea lentificada), ativação barorreceptora do sistema nervoso simpático (taquicardia, vasoconstrição e taquipneia compensatórias), e hipotensão quando os mecanismos compensatórios falham. A letargia reflete a hipoperfusão cerebral."},
    {id:"efq9",d:"dificil",q:"Beatriz, 45 anos, queixa de ganho de peso progressivo principalmente no rosto e costas, fraqueza muscular e estrias roxas. Exame: aspecto 'lunar', fácies redonda e avermelhada (face lunar), giba dorsal, pele com estrias violáceas (purpúreas) e equimoses fáceis, distribuição de gordura anormal (face, pescoço e tronco) com membros magros, PA 160/100 mmHg, força muscular reduzida em MMII, ganho de 12 kg em 6 meses. Qual mecanismo fisiopatológico explica esses achados?",o:["Aumento da insulina circulante causando resistência à insulina e redistribuição de gordura","Aumento do cortisol circulante, causando lipogênese central, proteólise muscular, fragilidade vascular, imunossupressão e hipertensão","Aumento do hormônio do crescimento causando acromegalia e redistribuição de gordura","Aumento da prolactina causando galactorreia e alterações metabólicas","Aumento do TSH causando hipotireoidismo com acúmulo de gordura"],a:1,e:"A síndrome de Cushing é caracterizada pelo excesso crônico de cortisol. O cortisol: (1) estimula a lipogênese central (face lunar, giba dorsal, obesidade de tronco); (2) é catabólico sobre o músculo, causando miopatia proximal e membros magros; (3) reduz a síntese de colágeno, causando fragilidade vascular (equimoses fáceis, estrias purpúreas por sangramento na derme); (4) aumenta a sensibilidade vascular às catecolaminas, causando hipertensão. As estrias purpúreas diferem das brancas da obesidade simples pelo componente hemorrágico."},
    {id:"efq10",d:"moderado",q:"Antônio, 68 anos, tabagista ativo, queixa de dor nas pernas ao caminhar que melhora com repouso (claudicação intermitente, limitada a 100 metros). Exame: pele das pernas pálida, fria e brilhante, pelos ausentes ou reduzidos, unhas espessas e opacas, pulsos femorais presentes mas poplíteos e dorsais do pé diminuídos ou ausentes, enchimento capilar lentificado (>3 s), sem úlceras ou edema. Qual mecanismo fisiopatológico explica esses achados?",o:["Obstrução das artérias periféricas por placa aterosclerótica, reduzindo o fluxo sanguíneo e a perfusão tissular","Inflamação das veias causando trombose venosa e redução do retorno venoso","Deficiência de vitaminas causando alterações tróficas de pele e unhas","Neuropatia periférica causando perda sensitiva e alterações autonômicas","Linfedema causando edema crônico e alterações de pele por estase linfática"],a:0,e:"A insuficiência arterial periférica é causada pela obstrução aterosclerótica das artérias periféricas. A redução do fluxo sanguíneo causa: palidez e frieza (menos hemoglobina e calor chegando), alopecia e unhas espessas (má nutrição dos anexos cutâneos), pulsos diminuídos ou ausentes distalmente à obstrução, enchimento capilar lentificado e claudicação intermitente (durante exercício, os músculos precisam de mais O₂; com fluxo reduzido, há isquemia muscular e dor que melhora com repouso). O tabagismo é o principal fator de risco para aterosclerose."},
    {id:"efq11",d:"moderado",q:"Marisa, 58 anos, queixa de inchaço nas pernas que piora ao final do dia e manchas escuras nas pernas. Exame: pele das pernas com hiperpigmentação (dermatite ocre), varizes presentes dilatadas e tortuosas, edema bilateral simétrico depressível que piora ao final do dia e melhora com elevação, úlcera na região medial do tornozelo, pulsos periféricos presentes e simétricos, enchimento capilar normal. Qual mecanismo fisiopatológico explica esses achados?",o:["Insuficiência das válvulas venosas, causando refluxo venoso, aumento da pressão venosa, extravasamento de líquido e hemoglobina para o interstício, causando edema, hiperpigmentação e úlceras","Obstrução arterial causando isquemia tissular e úlceras isquêmicas nas extremidades","Linfedema primário causando edema não-depressível por anomalia dos vasos linfáticos","Trombose venosa aguda causando edema unilateral e dor intensa","Inflamação sistêmica causando vasodilatação e extravasamento capilar generalizado"],a:0,e:"Na insuficiência venosa crônica, as válvulas venosas insuficientes permitem o refluxo de sangue, elevando a pressão venosa periférica. Isso causa: edema depressível que piora ao final do dia (posição ereta aumenta a pressão hidrostática venosa) e melhora com elevação; extravasamento crônico de hemoglobina para o interstício, que se converte em hemossiderina, causando hiperpigmentação (dermatite ocre); úlceras varicosas tipicamente na região medial do tornozelo; e varizes tortuosas por dilatação das veias superficiais. Os pulsos normais diferenciam de insuficiência arterial."},
    {id:"efq12",d:"dificil",q:"Fábio, 45 anos, queixa de febre vespertina há 2 meses, tosse seca e emagrecimento progressivo com sudoração noturna profusa. Tem histórico de contato com tuberculoso. Exame: magro, desnutrido com aparência de doença crônica, fácies apagada sem brilho, febre 38,5°C (vespertina), FC 102 bpm, FR 22 irpm, linfonodos cervicais e axilar esquerdo palpáveis (móveis, indolores), baço discretamente palpável (esplenomegalia leve), perda de 8 kg em 2 meses. Qual mecanismo fisiopatológico explica esses achados?",o:["Inflamação sistêmica crônica com ativação do sistema imune, aumento do metabolismo basal, termogênese (febre) e catabolismo proteico (emagrecimento)","Aumento de insulina causando hipoglicemia com febre compensatória e emagrecimento","Deficiência de vitaminas causando síndrome consumptiva e linfonodomegalia","Insuficiência renal crônica causando anemia, febre e emagrecimento progressivo","Insuficiência hepática causando desnutrição e esplenomegalia por hipertensão portal"],a:0,e:"A tuberculose crônica causa inflamação sistêmica com ativação do sistema imune. Isso provoca: (1) febre vespertina — citocinas inflamatórias (TNF-α, IL-1, IL-6) elevam o ponto de ajuste hipotalâmico; a febre vespertina é característica da TB; (2) sudoração noturna — consequência da febre vespertina; (3) emagrecimento — aumento do metabolismo basal e catabolismo proteico induzidos por citocinas; (4) linfonodomegalia — ativação imune com proliferação de linfócitos nas cadeias regionais; (5) esplenomegalia leve — envolvimento do baço na resposta imune."},
    {id:"efq13",d:"dificil",q:"Gustavo, 52 anos, queixa de aumento progressivo das mãos, pés e nariz. Não consegue mais usar seus anéis e sapatos antigos. Exame: bem disposto, fácies com prognatismo (mandíbula proeminente), nariz aumentado com alargamento da base, lábios aumentados e espessos, mãos e pés aumentados com dedos grossos, espaçamento dos dentes aumentado (diastema), voz profunda e rouca, FC 85 bpm, PA 145/90 mmHg. Qual mecanismo fisiopatológico explica esses achados?",o:["Aumento do hormônio do crescimento (GH), causando aumento do fator de crescimento semelhante à insulina (IGF-1), que estimula o crescimento de ossos, cartilagem e tecidos moles em indivíduos adultos","Aumento de insulina causando ganho de peso e espessamento dos tecidos moles periféricos","Aumento de cortisol causando lipogênese e redistribuição de gordura para extremidades","Aumento de hormônios tireoidianos causando aumento do metabolismo e crescimento tecidual","Aumento de prolactina causando galactorreia e alterações de tecidos moles"],a:0,e:"A acromegalia é causada pelo excesso crônico de GH (tipicamente por adenoma hipofisário). O GH estimula a produção de IGF-1 no fígado e tecidos periféricos. Como ocorre após o fechamento das cartilagens de crescimento, o crescimento é dos ossos já formados (acromegalia, não gigantismo). O IGF-1 estimula: (1) crescimento ósseo — prognatismo, diastema, alargamento nasal; (2) crescimento de cartilagem — aumento do nariz; (3) tecidos moles — aumento de lábios, mãos e pés; (4) cordas vocais — voz profunda e rouca. O GH também causa retenção de sódio, levando à hipertensão."},
    {id:"efq14",d:"dificil",q:"Roberto, 55 anos, queixa de cansaço progressivo, fraqueza e perda de peso. Refere que sua pele ficou mais escura. Exame: cansado, pálido, fácies com hiperpigmentação (bronzeamento) em áreas de atrito, pele hiperpigmentada especialmente nas palmas, solas, cicatrizes e áreas de atrito, biotipo magro com perda muscular, PA 100/60 mmHg (hipotensão), FC 88 bpm, perda de 6 kg em 3 meses, alerta mas com apatia. Qual mecanismo fisiopatológico explica esses achados?",o:["Aumento de cortisol causando hipertensão, ganho de peso e hiperpigmentação por excesso hormonal","Diminuição de cortisol e aldosterona, causando hipotensão, fraqueza, hiperpigmentação (por aumento compensatório de ACTH) e perda de peso","Aumento de insulina causando hipoglicemia crônica e hiperpigmentação reativa","Deficiência de vitamina B12 causando anemia, fraqueza e alterações de pele","Insuficiência renal crônica causando anemia, hipotensão e alterações de pigmentação"],a:1,e:"A doença de Addison é a insuficiência adrenal crônica, com redução de cortisol e aldosterona. A redução de cortisol remove o feedback negativo sobre o eixo hipotálamo-hipófise-adrenal, causando aumento de ACTH. Como o ACTH estimula a melanogênese (melanócitos), há hiperpigmentação, especialmente em áreas de atrito. A redução de aldosterona causa perda de sódio e água, levando à hipotensão. A redução de cortisol causa fraqueza, cansaço, perda de peso e apatia. A hiperpigmentação em áreas de atrito é sinal clássico que diferencia Addison de outras causas de hipotensão."},
    {id:"efq15",d:"dificil",q:"Marcelo, 60 anos, diabético, trazido ao PS com febre alta, confusão mental e dificuldade respiratória. Iniciou com tosse há 5 dias e piorou abruptamente. Exame: acamado, confuso e desorientado, fácies avermelhada, quente e úmida, pele quente inicialmente com extremidades distais frias, FC 128 bpm, PA 85/50 mmHg (hipotensão severa), FR 32 irpm (taquipneia severa), temperatura 39,8°C, enchimento capilar lentificado (>3 s), respiração de Kussmaul. Qual mecanismo fisiopatológico explica melhor esses achados?",o:["Inflamação sistêmica severa por infecção, com vasodilatação esplâncnica, redução da resistência vascular periférica, taquicardia compensatória, mas hipotensão e hipoperfusão tecidual por insuficiência da compensação","Insuficiência cardíaca aguda causando congestão pulmonar com estertores e elevação da PVC","Embolia pulmonar causando hipoxemia severa, taquicardia e taquipneia sem febre proporcional","Infarto do miocárdio causando choque cardiogênico com PVC elevada e extremidades frias predominantes","Desidratação severa causando hipovolemia, hipotensão e taquicardia sem febre de origem infecciosa"],a:0,e:"O choque séptico é uma inflamação sistêmica severa por infecção. As citocinas (TNF-α, IL-1, IL-6) causam vasodilatação esplâncnica, reduzindo a resistência vascular periférica. O coração tenta compensar aumentando a FC e o débito cardíaco (taquicardia, pele quente inicialmente). Quando a vasodilatação é tão intensa que a compensação falha, ocorre hipotensão e hipoperfusão tecidual. A vasoconstrição periférica compensatória causa extremidades frias. A respiração de Kussmaul reflete acidose metabólica por lactato (hipoperfusão tecidual). A confusão mental reflete hipoperfusão cerebral."},
    {id:"efq16",d:"dificil",q:"Jovem de 22 anos, vítima de acidente motociclístico sem capacete, com rebaixamento do nível de consciência. Exame neurológico: abertura ocular apenas ao estímulo doloroso (E2), resposta verbal com palavras inapropriadas e desconexas — não orientado (V3), resposta motora localizando o estímulo doloroso (M5), pupilas isocóricas e fotorreagentes. Qual a pontuação na Escala de Coma de Glasgow (ECG) e como classificar a gravidade do TCE?",o:["ECG = 8 pontos — TCE Grave (ECG 3–8): indicação de intubação orotraqueal imediata","ECG = 9 pontos — TCE Moderado (ECG 9–12): requer monitorização neurológica intensiva","ECG = 10 pontos — TCE Moderado (ECG 9–12): E2 + V3 + M5 = 2 + 3 + 5 = 10","ECG = 12 pontos — TCE Leve (ECG 13–15): observação ambulatorial suficiente","ECG = 15 pontos — TCE Leve (ECG 13–15): sem necessidade de internação"],a:2,e:"A Escala de Coma de Glasgow avalia 3 componentes: Abertura Ocular (E), Melhor Resposta Verbal (V) e Melhor Resposta Motora (M). Neste caso: E2 (ao estímulo doloroso) + V3 (palavras inapropriadas e desconexas, diferente de V4 = confuso mas com frases) + M5 (localiza a dor, tentando remover o estímulo) = 2 + 3 + 5 = 10 pontos. TCE Leve: ECG 13–15; TCE Moderado: ECG 9–12; TCE Grave: ECG 3–8. Pontuação 10 = TCE Moderado. As pupilas isocóricas e fotorreagentes indicam que não há comprometimento grave do tronco encefálico no momento."},
    {id:"efq17",d:"facil",q:"Na avaliação do estado geral, qual a classificação correta de um paciente que se apresenta acamado, com baixa reatividade aos estímulos e aparência gravemente comprometida?",o:["BEG — Bom Estado Geral","REG — Regular Estado Geral","MEG — Mau Estado Geral","Estado geral preservado"],a:2,e:"O estado geral é uma avaliação subjetiva baseada no conjunto de dados exibidos pelo paciente, interpretados conforme a experiência do examinador. Classifica-se em: BEG (Bom Estado Geral), REG (Regular Estado Geral) e MEG (Mau Estado Geral). O paciente acamado, pouco reativo e com aparência gravemente comprometida está em MEG."},
    {id:"efq18",d:"facil",q:"Um paciente responde de forma confusa, conversando mas desorientado no tempo e espaço, sem rebaixamento profundo. Como se classifica esse nível de consciência?",o:["Lúcido, Orientado e Coerente (LOC)","Torpor","Coma","Desorientado / Confusão mental"],a:3,e:"Os níveis de consciência incluem: Lúcido/Orientado/Coerente (LOC), Obnubilado, Torpor, Coma, Desorientado em tempo e/ou espaço, e Confusão Mental/Incoerente. Um paciente que conversa mas está desorientado e confuso enquadra-se em desorientação/confusão mental — diferente do torpor (sonolência profunda) e do coma (inconsciência inacordável)."},
    {id:"efq19",d:"moderado",q:"Sobre o estado de coma e a Escala de Coma de Glasgow (ECG), assinale a alternativa correta:",o:["O coma é um estado de inconsciência inacordável, e a ECG avalia três componentes: abertura ocular (1-4), resposta verbal (1-5) e resposta motora (1-6)","No coma, o drive respiratório e os reflexos de tronco estão sempre ausentes","A ECG avalia apenas a resposta motora e a abertura ocular","A pontuação máxima da ECG é 12 pontos"],a:0,e:"O coma é um estado de inconsciência inacordável, expressão de falência das funções encefálicas. A ECG avalia 3 componentes: abertura ocular (máx 4 — espontânea), resposta verbal (máx 5 — orientada) e resposta motora (máx 6 — obedece comandos), totalizando no máximo 15 pontos. No coma os reflexos de tronco e o drive respiratório podem estar preservados (diferenciando de morte encefálica)."},
    {id:"efq20",d:"moderado",q:"Paciente vítima de AVE caminha com o membro inferior em extensão, fazendo um semicírculo a partir do quadril (movimento de 'foice'), com o pé em inversão e o braço fletido e rígido. Qual o nome desta marcha?",o:["Marcha ceifante ou hemiplégica","Marcha cerebelar ou atáxica","Marcha em pequenos passos (parkinsoniana)","Marcha anserina ou de Trendelenburg"],a:0,e:"A marcha ceifante (ou hemiplégica) ocorre na lesão piramidal unilateral (ex.: AVE): o paciente adquire postura tônica em flexão do membro superior e extensão do membro inferior do lado acometido. Como não consegue fletir a coxa e dorsifletir o pé, caminha fazendo um semicírculo ('ceifa') a partir do quadril."},
    {id:"efq21",d:"moderado",q:"Paciente caminha com a base alargada, olhando para o solo, arremessando o pé para diante e batendo-o com força no chão, por perda da propriocepção dos membros inferiores. Esta marcha — descrita classicamente na tabes dorsalis (neurossífilis) — é a:",o:["Marcha talonante ou tabética","Marcha em tesoura","Marcha ceifante","Marcha anserina"],a:0,e:"A marcha talonante (ou tabética) ocorre por perda das informações sensoriais (propriocepção) dos MMII. O paciente caminha com base alargada, olhando para o solo e batendo o calcanhar com força (talonante). Foi descrita na tabes dorsalis (neurossífilis) — lesão do cordão posterior da medula ou neuropatia periférica sensorial."},
    {id:"efq22",d:"moderado",q:"Paciente caminha em postura de flexão generalizada (cabeça, tronco, cotovelos, joelhos), com passos curtos, lento, rígido e arrastado, sem o balanceio dos braços (marcha em bloco). Esta marcha é típica de:",o:["Doença de Parkinson","Lesão cerebelar","Distrofia muscular","Esclerose múltipla"],a:0,e:"A marcha em pequenos passos é típica da doença de Parkinson e síndromes parkinsonianas. Caracteriza-se por postura em flexão, passos curtos (sem ultrapassar o outro pé), lentidão, rigidez e perda do balanceio dos braços (marcha em bloco)."},
    {id:"efq23",d:"facil",q:"Um paciente tem 90 kg e 1,80 m de altura. Calculando o IMC (peso ÷ altura²), qual a classificação correta segundo a tabela apresentada?",o:["Peso ideal","Levemente acima do peso (sobrepeso)","Obesidade grau I","Obesidade grau II"],a:1,e:"IMC = 90 ÷ (1,80)² = 90 ÷ 3,24 = 27,8 kg/m². Pela classificação: abaixo de 18,5 (abaixo do peso); 18,6–24,9 (peso ideal); 25,0–29,9 (levemente acima do peso/sobrepeso); 30,0–34,9 (obesidade grau I); 35,0–39,9 (obesidade grau II); acima de 40 (obesidade III/mórbida). Logo, 27,8 = levemente acima do peso."},
    {id:"efq24",d:"moderado",q:"Na avaliação da circunferência abdominal, qual o valor a partir do qual há 'risco muito aumentado' de doenças cardiovasculares e síndrome metabólica, segundo o sexo?",o:["Mulheres >88 cm e homens >102 cm","Mulheres >80 cm e homens >94 cm","Mulheres >102 cm e homens >88 cm","Mulheres >70 cm e homens >85 cm"],a:0,e:"A circunferência abdominal é medida no ponto médio entre a última costela e a crista ilíaca. Risco muito aumentado: mulheres >88 cm e homens >102 cm. Faixa ideal: mulheres <80 cm e homens <94 cm. Risco aumentado (intermediário): mulheres 80-88 cm e homens 94-102 cm."},
    {id:"efq25",d:"moderado",q:"Paciente com 3 dias de diarreia intensa apresenta pele com turgor diminuído, mucosas secas, tônus ocular reduzido, taquicardia, pulso filiforme e veias jugulares colabadas mesmo em decúbito dorsal. Esses achados indicam:",o:["Hiper-hidratação","Desidratação","Edema generalizado","Insuficiência cardíaca direita"],a:1,e:"São sinais clássicos de desidratação: pele com umidade/elasticidade/turgor diminuídos, mucosas secas, tônus ocular reduzido (olhos encovados), hipotensão (e postural), taquicardia, pulso filiforme. A jugular colabada mesmo em decúbito dorsal é sinal importante de desidratação (hipovolemia) — o oposto da turgência jugular vista na ICC."},
    {id:"efq26",d:"moderado",q:"Quanto à classificação da intensidade da desidratação pela perda de peso corporal, assinale a correta:",o:["Leve (1º grau): até 5%; Moderada (2º grau): 5 a 10%; Grave (3º grau): acima de 10%","Leve: até 10%; Moderada: 10-25%; Grave: acima de 40%","Leve: até 2%; Moderada: 2-4%; Grave: acima de 4%","Leve: até 15%; Moderada: 15-30%; Grave: acima de 30%"],a:0,e:"A desidratação é classificada pela perda de peso: Leve ou 1º grau (até 5%), Moderada ou 2º grau (5 a 10%) e Grave ou 3º grau (acima de 10%). Atenção: a classificação por porcentagem (10/25/40%) refere-se à DESNUTRIÇÃO, não à desidratação."},
    {id:"efq27",d:"facil",q:"Segundo a classificação da intensidade da febre pela temperatura axilar, uma temperatura de 38,0°C corresponde a:",o:["Febrícula (febre leve)","Febre moderada","Febre alta","Temperatura normal"],a:1,e:"Classificação da febre pela temperatura axilar: Leve ou febrícula (até 37,5°C); Moderada (37,6°C a 38,5°C); Alta (acima de 38,6°C). Portanto 38,0°C é febre moderada. A temperatura axilar normal varia de 35,5 a 37°C (média 36-36,5°C)."},
    {id:"efq28",d:"moderado",q:"Sobre as alterações comuns dos pulsos, relacione corretamente o pulso 'em martelo d'água' (Corrigan), que aparece e some com rapidez, à sua causa:",o:["Insuficiência aórtica","Estenose aórtica","Choque hipovolêmico","Desidratação grave"],a:0,e:"O pulso em martelo d'água (Corrigan) aparece e some com rapidez, sendo típico da insuficiência aórtica e de estados hipercinéticos (anemias). Já o parvus et tardus (tensão e amplitude diminuídas, ascensão lenta) ocorre na estenose aórtica, ICC e hipovolemia. O pulso filiforme (pequena amplitude e tensão muito diminuída) ocorre na desidratação, hipotensão e choque."},
    {id:"efq29",d:"moderado",q:"Sobre a turgência jugular, assinale a alternativa correta:",o:["É considerada patológica quando a veia permanece túrgida acima de 45° de inclinação, podendo indicar insuficiência cardíaca direita ou compressão da cava superior","É sempre normal, independentemente da inclinação do paciente","A jugular colabada em decúbito dorsal indica insuficiência cardíaca","A turgência jugular é causada por hipotensão arterial"],a:0,e:"A turgência jugular é normal (túrgida visível) de 0 até 30°, no máximo 45° de inclinação. É patológica quando permanece túrgida acima de 45° até em pé/sentado. Causas: hipertensão venosa da cava superior (ex.: compressão por CA de pulmão) e insuficiência cardíaca direita (cor pulmonale, insuficiência tricúspide). A jugular colabada em decúbito indica DESIDRATAÇÃO (oposto)."},
    {id:"efq30",d:"dificil",q:"Sobre a aferição da pressão arterial pelo método auscultatório, qual a função da realização prévia do método palpatório?",o:["Estimar a PAS para não subestimá-la durante a ausculta devido ao hiato auscultatório","Determinar a pressão arterial diastólica (PAD)","Confirmar a frequência cardíaca","Verificar a permeabilidade da artéria braquial"],a:0,e:"No método palpatório, insufla-se o manguito até o desaparecimento do pulso radial e desinfla-se até voltar a senti-lo, marcando a estimativa da PAS. Isso é importante para NÃO subestimar a PAS (evitando erro pelo hiato auscultatório). Depois, no método auscultatório, insufla-se 20-30 mmHg acima da PAS estimada; o 1º batimento define a PAS e o desaparecimento dos sons define a PAD."},
    {id:"efq31",d:"moderado",q:"Define-se hipotensão postural (ortostática) quando, ao passar de deitado para em pé, ocorre:",o:["Queda de 20 mmHg na PAS, OU queda de 10 mmHg na PAD, OU aumento de 12 bpm na FC","Aumento de 20 mmHg na PAS","Queda de 5 mmHg na PAD apenas","Aumento de 40 mmHg na PAS e queda da FC"],a:0,e:"Para pesquisar hipotensão postural, mede-se a PA com o paciente deitado e, após 5 minutos em pé, mede-se novamente. Há hipotensão postural se houver queda de 20 mmHg na PAS OU queda de 10 mmHg na PAD OU aumento de 12 bpm na FC. Causas: desidratação, anemia, senilidade, doenças cardiovasculares e renais."},
    {id:"efq32",d:"facil",q:"A coloração azulada da pele e mucosas decorrente do aumento da hemoglobina reduzida (desoxihemoglobina) no sangue capilar, em valores superiores a 5 g/dL, é denominada:",o:["Cianose","Icterícia","Palidez","Eritrose"],a:0,e:"A cianose é a coloração azulada da pele e mucosas, em razão do aumento da hemoglobina reduzida (desoxihemoglobina) no sangue capilar com valores superiores a 5 g/dL. A icterícia é a coloração amarelada por aumento de bilirrubina; a palidez decorre da redução de hemácias na microcirculação; a eritrose é a vermelhidão por aumento de sangue na rede vascular cutânea."},
    {id:"efq33",d:"moderado",q:"A icterícia (coloração amarelada por aumento da bilirrubina) torna-se clinicamente perceptível a partir de qual valor, e onde é mais bem pesquisada?",o:["A partir de 2 a 2,5 mg/dL, sendo mais bem pesquisada nas mucosas (frênulo da língua e conjuntivas/esclera)","A partir de 0,5 mg/dL, pesquisada apenas na pele das palmas","A partir de 10 mg/dL, pesquisada nas unhas","A partir de 5 mg/dL, pesquisada no leito ungueal"],a:0,e:"A icterícia manifesta-se clinicamente a partir de 2 a 2,5 mg/dL de bilirrubina. É mais bem pesquisada nas mucosas — frênulo da língua e conjuntivas (esclera). Causas: hepatite, leptospirose, malária, lesões obstrutivas das vias biliares (litíase, CA de cabeça de pâncreas). Atenção: o consumo excessivo de carotenos causa pele amarelada SEM acometer mucosas (não é icterícia)."},
    {id:"efq34",d:"moderado",q:"O fenômeno de Raynaud, caracterizado pela sequência palidez → cianose → vermelhidão nas extremidades, é um fenômeno vasomotor associado a quais doenças?",o:["Lúpus eritematoso sistêmico (LES) e esclerodermia","Diabetes mellitus e hipertensão","Anemia ferropriva e leucemia","Hipotireoidismo e obesidade"],a:0,e:"O fenômeno de Raynaud é um fenômeno vasomotor caracterizado pela tríade sequencial de palidez (vasoconstrição/isquemia) → cianose (estase venosa) → vermelhidão (hiperemia reativa) nas extremidades. Associa-se a doenças do tecido conjuntivo como LES e esclerodermia."},
    {id:"efq35",d:"facil",q:"Sobre a avaliação da pele na desidratação e no envelhecimento, o turgor cutâneo diminuído (a prega leva mais de 2 segundos para retornar) — diferentemente da elasticidade — engloba qual estrutura?",o:["O tecido celular subcutâneo (TCSC)","Apenas a epiderme","Apenas a derme superficial","Somente os anexos cutâneos"],a:0,e:"O turgor engloba o tecido celular subcutâneo (TCSC) e é pesquisado em esterno, coxa, glabela e antebraço. Já a elasticidade avalia apenas a prega cutânea (epiderme). O turgor diminuído (prega que demora a retornar) indica desidratação. A espessura, por sua vez, NÃO pega o TCSC (só epiderme e derme)."},
    {id:"efq36",d:"moderado",q:"Na descrição das lesões elementares da pele, qual a diferença entre mancha e mácula?",o:["Mancha é maior que 5 mm e mácula é menor que 5 mm","Mancha é elevada e mácula é deprimida","Mancha tem conteúdo líquido e mácula é sólida","Não há diferença, são sinônimos absolutos"],a:0,e:"Tanto mancha quanto mácula são alterações de cor sem relevo (planas). A distinção apresentada é de tamanho: mancha (>5 mm) e mácula (<5 mm). Podem ser pigmentares (hipo/acrômicas/hipercrômicas), vasculares (telangiectasias, eritematosas) ou hemorrágicas (petéquias <1 cm, víbices em linha, equimoses >1 cm)."},
    {id:"efq37",d:"moderado",q:"Entre as lesões hemorrágicas da pele, qual a correta correspondência entre lesão e morfologia?",o:["Petéquias = pontos (até 1 cm); víbices = linhas; equimoses = placas (maiores que 1 cm)","Petéquias = placas grandes; equimoses = pontos pequenos","Víbices = pontos; petéquias = linhas","Todas têm o mesmo tamanho e formato"],a:0,e:"As lesões hemorrágicas (extravasamento de sangue, não desaparecem à digitopressão) classificam-se pela morfologia: petéquias são pontos (até 1 cm), víbices são lineares (em linha) e equimoses são placas maiores que 1 cm."},
    {id:"efq38",d:"moderado",q:"Quanto às formações sólidas da pele, qual a relação correta de profundidade e tamanho?",o:["Pápula é até 1 cm (mais superficial — derme); nódulo/nodosidade são mais profundos (hipoderme); goma é nodosidade amolecida ou ulcerada","Pápula é maior que 1 cm e mais profunda que o nódulo","Goma é uma lesão de conteúdo líquido","Vegetação é uma lesão plana sem relevo"],a:0,e:"Formações sólidas: pápula (até 1 cm) e tubérculo (>1 cm) são mais superficiais, pegando a derme. Nódulos (do tamanho de grão de ervilha) e nodosidades (maiores) são mais profundos, pegando a hipoderme. Goma é uma nodosidade que amoleceu/ulcerou. Vegetação tem aspecto de couve-flor."},
    {id:"efq39",d:"facil",q:"Sobre as coleções líquidas da pele, qual a correspondência correta entre conteúdo e lesão?",o:["Vesícula/bolha = conteúdo líquido seroso; pústula/abscesso = conteúdo purulento; hematoma = derrame sanguíneo","Pústula = conteúdo seroso claro; vesícula = pus","Hematoma = coleção purulenta; abscesso = sangue","Bolha = lesão sólida sem conteúdo"],a:0,e:"Coleções líquidas: conteúdo seroso → vesícula (até 1 cm) e bolha (>1 cm); conteúdo purulento → pústula (até 1 cm) e abscesso (maior); derrame sanguíneo → hematoma (elevado)."},
    {id:"efq40",d:"dificil",q:"Sobre a propedêutica dos linfonodos (gânglios), o achado de linfonodos indolores, de consistência pétrea, sem sinais flogísticos, superfície irregular e aderidos a planos profundos sugere:",o:["Gânglios metastáticos (neoplásicos)","Gânglios inflamatórios (infecciosos)","Linfonodos normais","Reação alérgica aguda"],a:0,e:"Gânglios metastáticos: indolores, consistência pétrea (endurecida), sem sinais flogísticos, superfície irregular, aderidos a planos profundos e normalmente coalescentes. Gânglios inflamatórios: dolorosos, fibroelásticos, com sinais flogísticos, móveis e sem coalescência. A avaliação inclui localização, sensibilidade, número, tamanho, aspecto da pele, consistência e fixação."},
    {id:"efq41",d:"dificil",q:"O aumento do linfonodo supraclavicular esquerdo (linfonodo de Virchow) está classicamente associado a:",o:["Câncer abdominal, principalmente gástrico, indicando metástase","Infecção de garganta (amigdalite)","Picada de inseto no membro superior esquerdo","Doença reumatológica autoimune"],a:0,e:"O linfonodo de Virchow é o supraclavicular esquerdo; seu aumento ocorre em casos de câncer abdominal (normalmente gástrico) e geralmente indica metástase. Já o linfonodo de Maria José (Sister Mary Joseph) é periumbilical e indica tumores intra-abdominais (metástases)."},
    {id:"efq42",d:"moderado",q:"Na palpação da tireoide, uma glândula de consistência endurecida sugere Hashimoto ou neoplasia, enquanto a consistência fibroelástica sugere qual doença? E qual achado de ausculta é típico dela?",o:["Doença de Graves; sopro contínuo por hipervascularização local","Tireoidite de Hashimoto; ausência de sopro","Bócio coloide simples; sopro sistólico isolado","Carcinoma medular; estridor"],a:0,e:"Na palpação avalia-se simetria, superfície, volume, consistência, dor e mobilidade. Consistência endurecida sugere Hashimoto ou neoplasias; consistência fibroelástica sugere doença de Graves. Na ausculta da tireoide pesquisam-se sopros: na doença de Graves (e de Plummer) há hipervascularização local que gera sopros — em Graves são contínuos."},
    {id:"efq43",d:"moderado",q:"Comparando hiper e hipotireoidismo no exame físico geral, qual conjunto de achados é característico do HIPOtireoidismo?",o:["Bradicardia, pele seca/fria/pálida ('pele de papiro'), edema periorbital não-depressível (mixedema) e fácies mixedematosa","Pele fina/úmida/quente, taquicardia, perda de peso e pressão diferencial aumentada","Exoftalmia, tremor fino e sudorese profusa","Taquisfigmia (100-160) e ritmo irregular"],a:0,e:"No hipotireoidismo: bradicardia, pele seca/fria/pálida ('pele de papiro'), edema em MMII e periorbital NÃO-depressível (mixedema, por acúmulo de proteoglicanos), fácies mixedematosa, obesidade e mucosas descoradas. No hipertireoidismo: pele fina/úmida/quente, perda de peso, taquicardia, taquisfigmia (100-160), pressão diferencial aumentada, ritmo irregular e ausência de bolas de Bichat."},
    {id:"efq44",d:"facil",q:"Na pesquisa do sinal do cacifo (fóvea), a compressão da polpa digital contra uma estrutura óssea por pelo menos 5 segundos avalia qual característica do edema?",o:["A intensidade (classificada de 1+ a 4+ conforme a profundidade da fóvea)","A coloração da pele","A temperatura do edema","O horário de predomínio"],a:0,e:"A pesquisa do sinal da fóvea/cacifo avalia a INTENSIDADE do edema: comprime-se a polpa digital contra estrutura óssea por ≥5 segundos; havendo edema, forma-se uma depressão (fóvea). Classificação: 1+ (2 mm/até tornozelo), 2+ (4 mm/metade da tíbia), 3+ (6 mm/até o joelho) e 4+ (8 mm/todo o membro inferior)."},
    {id:"efq45",d:"moderado",q:"Quanto ao horário de predomínio do edema (anamnese), qual a correlação correta?",o:["Edema de causa renal predomina no período matutino; edema da insuficiência cardíaca predomina no período vespertino","Edema renal predomina à noite; edema cardíaco pela manhã","Ambos predominam sempre à noite","O horário não tem relação com a causa"],a:0,e:"O horário ajuda no diagnóstico diferencial: o edema de causa renal predomina no período matutino (ao acordar, com edema periorbital/facial), enquanto o edema da insuficiência cardíaca predomina no período vespertino (final do dia, em MMII, por efeito gravitacional ao longo do dia em posição ereta)."},
    {id:"efq46",d:"dificil",q:"Quanto à consistência do edema, a presença de edema DURO (maior resistência à formação da fóvea) traduz:",o:["Proliferação de fibroblastos, típica de edemas de longa duração ou com repetidos surtos inflamatórios","Retenção hídrica de curta duração","Edema agudo recente","Desidratação do tecido subcutâneo"],a:0,e:"Edema mole (facilmente depressível) significa retenção hídrica de duração não muito longa, com TCSC infiltrado de água. Edema duro (maior resistência para formar a fóvea) traduz proliferação de fibroblastos, que ocorre nos edemas de longa duração ou que tiveram repetidos surtos inflamatórios."},
    {id:"efq47",d:"dificil",q:"Na avaliação da circulação colateral, identifica-se o 'tipo cava superior' quando a rede venosa se distribui na metade superior do tórax e o fluxo é tórax→abdome. Qual a principal causa?",o:["Compressão extrínseca da veia cava superior por neoplasias ou alterações mediastinais","Cirrose hepática com hipertensão portal","Trombose da veia femoral","Desidratação grave"],a:0,e:"Circulação colateral é um circuito venoso anormal visível, que surge quando há obstáculo nos troncos venosos principais e o sangue desvia por colaterais. No tipo cava superior, a rede distribui-se na metade superior do tórax (e braços/pescoço) com fluxo tórax→abdome; causa: compressão extrínseca da cava superior por neoplasias/alterações mediastinais. No tipo porta, a rede é periumbilical/epigástrica com fluxo abdome→tórax (causas: cirrose, trombose porta, Budd-Chiari)."},
    {id:"efq48",d:"moderado",q:"Na avaliação da pele de um paciente, encontra-se uma área localizada mais fria que as regiões homólogas adjacentes. O que esse achado sugere?",o:["Comprometimento da irrigação arterial (isquemia) daquela área","Processo inflamatório local","Febre sistêmica","Edema generalizado recente"],a:0,e:"A temperatura da pele é avaliada com o dorso dos dedos/mão, comparando lados homólogos. Discrepâncias acima de 2°C são percebidas à palpação. Uma área localizada mais fria indica comprometimento da irrigação arterial (isquemia). O aumento universal da temperatura indica febre; o aumento localizado indica inflamação (quente)."}
   ]},
  glasgow:{ name:"Escala de Coma de Glasgow", doc:"Aula EFG — tabela ECG",
   summary:`## Escala de Coma de Glasgow (ECG)\n\nAvalia o nível de consciência por 3 parâmetros. Treino de memorização das pontuações e classificação do trauma.\n\n### Abertura Ocular (1-4)\n- Espontânea = 4\n- Ao estímulo sonoro = 3\n- Ao estímulo de pressão = 2\n- Nenhuma = 1\n\n### Resposta Verbal (1-5)\n- Orientada = 5\n- Confusa = 4\n- Verbaliza palavras soltas = 3\n- Verbaliza sons = 2\n- Nenhuma = 1\n\n### Resposta Motora (1-6)\n- Obedece comandos = 6\n- Localiza o estímulo = 5\n- Flexão normal = 4\n- Flexão anormal = 3\n- Extensão anormal = 2\n- Nenhuma = 1\n\n### Classificação do trauma (total = O + V + M)\n- **Leve:** 13-15\n- **Moderado:** 9-12\n- **Grave:** 3-8\n\nTotal máximo = 15 · Total mínimo = 3`,
   tips:"Decore os MÁXIMOS de cada parâmetro: Ocular 4, Verbal 5, Motora 6 (somam 15). Mnemônico da motora (6→1): Obedece, Localiza, Flexão Normal, Flexão Anormal (decorticação), Extensão Anormal (descerebração), Nenhuma. Trauma: Leve 13-15 · Moderado 9-12 · Grave 3-8. Mínimo possível = 3 (nunca 0).",

    {id:"gl57",d:"moderado",q:"Paciente com abertura ocular \"Ao estímulo sonoro\", resposta verbal \"Confusa\" e resposta motora \"Localiza o estímulo\". Qual a pontuação total e a classificação?",o:["11 pontos — Trauma moderado","12 pontos — Trauma moderado","13 pontos — Trauma leve","14 pontos — Trauma leve"],a:1,e:"Ocular 3 + Verbal 4 + Motora 5 = 12 pontos. Faixa moderado → Trauma moderado (leve 13-15, moderado 9-12, grave 3-8)."},
    {id:"gl58",d:"moderado",q:"Paciente com abertura ocular \"Ao estímulo de pressão\", resposta verbal \"Nenhuma\" e resposta motora \"Flexão anormal\". Qual a pontuação total e a classificação?",o:["5 pontos — Trauma grave","6 pontos — Trauma grave","7 pontos — Trauma grave","8 pontos — Trauma grave"],a:1,e:"Ocular 2 + Verbal 1 + Motora 3 = 6 pontos. Faixa grave → Trauma grave (leve 13-15, moderado 9-12, grave 3-8)."},
    {id:"gl59",d:"moderado",q:"Some os pontos: abertura ocular \"Espontânea\" (4), resposta verbal \"Orientada\" (5) e resposta motora \"Localiza o estímulo\" (5). Qual o total na ECG?",o:["3","13","14","15"],a:2,e:"4 + 5 + 5 = 14 pontos."},
    {id:"gl60",d:"moderado",q:"Some os pontos: abertura ocular \"Ao estímulo sonoro\" (3), resposta verbal \"Verbaliza palavras soltas\" (3) e resposta motora \"Flexão normal\" (4). Qual o total na ECG?",o:["9","10","11","12"],a:1,e:"3 + 3 + 4 = 10 pontos."},
    {id:"gl61",d:"moderado",q:"Some os pontos: abertura ocular \"Nenhuma\" (1), resposta verbal \"Confusa\" (4) e resposta motora \"Obedece comandos\" (6). Qual o total na ECG?",o:["10","11","12","13"],a:1,e:"1 + 4 + 6 = 11 pontos."},
    {id:"gl62",d:"moderado",q:"Some os pontos: abertura ocular \"Espontânea\" (4), resposta verbal \"Verbaliza sons\" (2) e resposta motora \"Flexão anormal\" (3). Qual o total na ECG?",o:["8","9","10","11"],a:1,e:"4 + 2 + 3 = 9 pontos."},
    {id:"gl63",d:"moderado",q:"Some os pontos: abertura ocular \"Ao estímulo de pressão\" (2), resposta verbal \"Orientada\" (5) e resposta motora \"Localiza o estímulo\" (5). Qual o total na ECG?",o:["11","12","13","14"],a:1,e:"2 + 5 + 5 = 12 pontos."},
    {id:"gl64",d:"dificil",q:"Paciente que abre os olhos apenas à pressão dolorosa, emite apenas sons incompreensíveis e faz extensão anormal (descerebração) à dor. Qual a classificação de gravidade do trauma?",o:["Trauma leve","Trauma moderado","Trauma grave"],a:2,e:"Pontos: ocular 2 + verbal 2 + motora 2 = 6. Classificação: Trauma grave (leve 13-15, moderado 9-12, grave 3-8)."},
    {id:"gl65",d:"dificil",q:"Paciente que abre os olhos ao ser chamado, está confuso mas conversa, e localiza o estímulo doloroso. Qual a classificação de gravidade do trauma?",o:["Trauma leve","Trauma moderado","Trauma grave"],a:1,e:"Pontos: ocular 3 + verbal 4 + motora 5 = 12. Classificação: Trauma moderado (leve 13-15, moderado 9-12, grave 3-8)."},
    {id:"gl66",d:"dificil",q:"Paciente que não abre os olhos, não emite sons e faz flexão anormal (decorticação). Qual a classificação de gravidade do trauma?",o:["Trauma leve","Trauma moderado","Trauma grave"],a:2,e:"Pontos: ocular 1 + verbal 1 + motora 3 = 5. Classificação: Trauma grave (leve 13-15, moderado 9-12, grave 3-8)."},
    {id:"gl67",d:"dificil",q:"Paciente que abre os olhos espontaneamente, responde orientado e obedece a comandos. Qual a classificação de gravidade do trauma?",o:["Trauma leve","Trauma moderado","Trauma grave"],a:0,e:"Pontos: ocular 4 + verbal 5 + motora 6 = 15. Classificação: Trauma leve (leve 13-15, moderado 9-12, grave 3-8)."}

  aip:{ name:"AIP", topics:{
  aula15:{name:"Aula 15 - Diagnostico das Doencas Infecciosas",doc:"AIP 2025 - Prof. Daniela Ramos",
summary:`## Aula 15 - Diagnostico das Doencas Infecciosas

### Diagnostico microbiologico
- Conjunto de procedimentos e tecnicas complementares para estabelecer a ETIOLOGIA DO AGENTE RESPONSAVEL de uma doenca infecciosa.
- Postulados de Koch: 1) Patogeno suspeito deve ser isolado em cultura pura; 2) Inoculado em animal saudavel deve reproduzir a doenca; 3) Re-isolado em cultura pura; 4) Estabelecimento como causa especifica da doenca.

### Quando e por que fazer o diagnostico
- Deteccao de agente infeccioso; Prognostico; Condutas; Controle; Monitoramento; Fatores de risco.
- Principio: O teste certo para o paciente certo na hora certa no ambiente certo.

### Os 5 elementos do teste ideal
- TESTE CERTO: O cuidado clinico do paciente sera afetado pelo resultado?
- PACIENTE CERTO: O teste esta sendo aplicado ao paciente adequado?
- MOMENTO CERTO: O teste esta sendo utilizado no estagio correto da doenca?
- INTERPRETACAO CORRETA: O profissional de saude entendara o resultado?
- TRATAMENTO CERTO: O profissional prescrevera o tratamento correto?

### Fases no curso de uma doenca infecciosa
- Periodo de incubacao (ausencia de sinais) → Periodo prodromico (sinais moderados) → Periodo de doenca (sinais mais graves) → Periodo de declinio → Periodo de convalescenca.

### Os 4 tipos de resultados possiveis (Epictetus, II d.C.)
- POSITIVO VERDADEIRO (VP): doente e teste positivo.
- FALSO NEGATIVO (FN): doente mas teste negativo = evitar com SENSIBILIDADE.
- FALSO POSITIVO (FP): saudavel mas teste positivo = evitar com ESPECIFICIDADE.
- NEGATIVO VERDADEIRO (VN): saudavel e teste negativo.

### Parametros de validacao
- SENSIBILIDADE: detectar corretamente os COM a doenca (evitar FALSO NEGATIVO).
- ESPECIFICIDADE: excluir corretamente os SEM a doenca (evitar FALSO POSITIVO).
- ACURACIA: proporcao de todos os testes corretos (VP+VN) sobre todos os resultados.
- VALOR PREDITIVO POSITIVO: probabilidade de teste positivo realmente ter a doenca (DEPENDE DA PREVALENCIA).
- VALOR PREDITIVO NEGATIVO: probabilidade de teste negativo realmente nao ter a doenca (DEPENDE DA PREVALENCIA).

### Caracteristicas desejaveis e diagnostico rapido
- Alta sensibilidade; Alta especificidade; Baixo custo; Resultados rapidos (<2 horas); Baixa complexidade (point-of-care); Identificar perfil de sensibilidade aos ATB.
- DIAGNOSTICO RAPIDO (≤2h): antibioticos selecionados, melhor terapia, menor internacao.
- DIAGNOSTICO LENTO (>48h): uso excessivo de antibiotico, resistencia, maior internacao.

### Fases dos exames de laboratorio
- PRE-ANALITICA (60-70% dos erros): requisicao medica, coleta, transporte.
- ANALITICA (20-30% dos erros): realizacao das analises.
- POS-ANALITICA (10% dos erros): emissao do laudo para interpretacao.

### Fase pre-analitica
- Hipotese diagnostica; Dados epidemiologicos; Dados clinicos; Surto/Infeccao hospitalar; Uso de antibioticos; Comprometimento imunologico; Procedimento invasivo; Material a ser coletado; Data, hora e nome de quem colheu.`,
tips:"Diagnostico microbiologico: estabelecer a ETIOLOGIA do agente responsavel. Postulados de Koch: 1-isolamento puro; 2-inoculacao animal; 3-re-isolamento; 4-estabelecimento especifico. The right test for the right patient at the right time in the right setting. Sensibilidade: evita FALSO NEGATIVO. Especificidade: evita FALSO POSITIVO. VPP e VPN: dependem da PREVALENCIA da doenca. Pre-analitica = 60-70% dos erros (fase com mais erros). Analitica = 20-30%. Pos-analitica = 10%. Diagnostico rapido ≤2h = menor internacao + antibioticos corretos. Diagnostico lento >48h = uso excessivo ATB + resistencia + maior internacao.",
questions:[{id:"a15q1",d:"facil",q:"Segundo o slide da aula, como o diagnostico microbiologico e definido?",o:["Conjunto de procedimentos e tecnicas complementares para estabelecer a etiologia do AGENTE RESPONSAVEL de uma doenca infecciosa; investigacao para identificacao correta de determinada especie ou linhagem bacteriana","Apenas o resultado da hemocultura que identifica o agente causador","O conjunto de sintomas clinicos que permitem presumir o agente infeccioso","Exclusivamente a coloracao de Gram e a sorologia para identificar bacterias"],a:0,e:"O slide define: \"O diagnostico microbiologico e o conjunto de procedimentos e tecnicas complementares empregadas para estabelecer a etiologia do agente responsavel de uma doenca infecciosa. A investigacao baseia-se na construcao de um estudo extremamente cuidadoso para a identificacao correta de determinada especie ou linhagem bacteriana.\""},
{id:"a15q2",d:"moderado",q:"De acordo com o slide da aula, quais sao os 4 postulados de Koch?",o:["1) Patogeno suspeito isolado em cultura pura; 2) Inoculado em animal saudavel reproduz a doenca; 3) Re-isolado em cultura pura; 4) Estabelecimento como causa especifica da doenca","1) Coloracao de Gram; 2) Cultura; 3) PCR; 4) Sorologia","1) Identificar o agente; 2) Tratar com penicilina; 3) Confirmar cura; 4) Publicar resultado","Os postulados de Koch sao obsoletos; so servem para doencas bacterianas simples"],a:0,e:"O slide \"Diagnostico Microbiologico\" mostra diagrama dos Postulados de Koch: 1) O patogeno suspeito deve ser isolado em cultura pura; 2) Celulas do patogeno inoculadas em animal saudavel devem reproduzir a doenca inicial; 3) O patogeno deve ser re-isolado em cultura pura; 4) Estabelecimento de um patogeno especifico como a causa de uma determinada doenca."},
{id:"a15q3",d:"facil",q:"Segundo o slide da aula, qual e o principio fundamental para a utilizacao racional de testes diagnosticos?",o:["\"The right test for the right patient at the right time in the right setting\" = O teste certo para o paciente certo na hora certa no ambiente certo","\"Test everything, discard nothing\" = testar todos os pacientes com todos os testes disponiveis","\"Treat empirically, never test\" = tratar sempre sem resultado de exame","\"First do no harm\" = nunca pedir exames sem necessidade absoluta"],a:0,e:"O slide mostra em destaque: \"The right test for the right patient at the right time in the right setting\" com traducao: \"O teste certo para o paciente certo na hora certa no ambiente certo.\" Esse e o principio orientador do uso racional de diagnosticos em doencas infecciosas."},
{id:"a15q4",d:"moderado",q:"De acordo com o slide da aula, quais sao os 5 elementos do teste ideal?",o:["TESTE CERTO (cuidado clinico sera afetado?); PACIENTE CERTO (teste aplicado ao paciente adequado?); MOMENTO CERTO (estagio correto da doenca?); INTERPRETACAO CORRETA (profissional entende o resultado?); TRATAMENTO CERTO (prescricao correta baseada no resultado?)","Apenas sensibilidade e especificidade; os outros fatores sao irrelevantes","Custo, velocidade, praticidade, disponibilidade e acuracia - unicamente fatores tecnicos","Prescricao medica, coleta, transporte, analise e laudo - as fases laboratoriais"],a:0,e:"O slide descreve: \"Teste certo: O cuidado clinico do paciente sera afetado pelo resultado do teste? Paciente certo: O teste esta sendo aplicado ao paciente adequado? Momento certo: O teste esta sendo utilizado no estagio correto da doenca? Interpretacao correta: O profissional de saude entendara o resultado? Tratamento certo: O profissional prescrevera o tratamento correto?\""},
{id:"a15q5",d:"moderado",q:"Segundo o slide da aula, quais sao as fases no curso de uma doenca infecciosa em ordem cronologica?",o:["Periodo de incubacao (ausencia de sinais) → Periodo prodromico (sinais moderados) → Periodo de doenca (sinais mais graves) → Periodo de declinio → Periodo de convalescenca","Periodo de doenca → periodo de incubacao → periodo de recuperacao","Apenas 3 fases: infeccao → doenca → cura","Exposicao → sintomas → morte; curva unimodal sem periodos distintos"],a:0,e:"O slide \"Fases no curso de uma doenca infecciosa\" mostra grafico com eixo Y (numero de microbios) e eixo X (tempo). Fases sequenciais: Periodo de incubacao (ausencia de sinais ou sintomas) → Periodo prodromico (sinais ou sintomas moderados) → Periodo de doenca (sinais e sintomas mais graves) → Periodo de declinio → Periodo de convalescenca. O teste deve ser aplicado no momento certo da curva."},
{id:"a15q6",d:"moderado",q:"De acordo com o slide da aula, quais sao os 4 tipos de resultados possiveis de um teste diagnostico?",o:["POSITIVO VERDADEIRO (VP): doente + teste positivo; FALSO NEGATIVO (FN): doente + teste negativo; FALSO POSITIVO (FP): saudavel + teste positivo; NEGATIVO VERDADEIRO (VN): saudavel + teste negativo","Apenas 2 resultados: positivo (doente) e negativo (saudavel)","Critico, alterado, dentro do limite e referencia","Confirmado, provavel, possivel e descartado"],a:0,e:"O slide (baseado em Epictetus II d.C.) mostra: \"As coisas sao o que parecem ser (POSITIVO VERDADEIRO); Ou sao, e nao parecem ser (FALSO NEGATIVO); Ou nao sao, mas parecem ser (FALSO POSITIVO); Ou nao sao nem parecem ser (NEGATIVO VERDADEIRO).\" A tabela mostra a matriz 2x2: DOENTE vs SAUDAVEL por TESTE POSITIVO vs NEGATIVO."},
{id:"a15q7",d:"facil",q:"Segundo o slide da aula, qual parametro de validacao evita FALSOS NEGATIVOS?",o:["SENSIBILIDADE: capacidade de detectar corretamente as pessoas COM a doenca; alta sensibilidade minimiza falsos negativos","ESPECIFICIDADE: capacidade de excluir corretamente pessoas sem a doenca","VALOR PREDITIVO POSITIVO: probabilidade de teste positivo realmente ter doenca","ACURACIA: proporcao de todos os testes corretos"],a:0,e:"O slide \"Parametros Gerais de Validacao\" define: \"SENSIBILIDADE: capacidade de um teste detectar corretamente as pessoas com a doenca (evitar falso negativo).\" O grafico confirma: \"ALTA SENSIBILIDADE (MINIMIZAR FALSO NEGATIVOS).\" Um teste muito sensivel garante que poucos doentes sejam classificados como saudaveis."},
{id:"a15q8",d:"facil",q:"De acordo com o slide da aula, qual parametro de validacao evita FALSOS POSITIVOS?",o:["ESPECIFICIDADE: capacidade de excluir corretamente as pessoas SEM a doenca; alta especificidade minimiza falsos positivos","SENSIBILIDADE: detecta os doentes e assim evita falsos positivos","VALOR PREDITIVO NEGATIVO: probabilidade de teste negativo nao ter a doenca","ACURACIA: proporcao de todos os resultados corretos"],a:0,e:"O slide define: \"ESPECIFICIDADE: capacidade de um teste excluir corretamente as pessoas sem a doenca/condicao (evitar falso positivo).\" O grafico confirma: \"ALTA ESPECIFICIDADE (MINIMIZAR FALSO POSITIVOS).\" Um teste muito especifico garante que poucos saudaveis sejam classificados como doentes."},
{id:"a15q9",d:"moderado",q:"Segundo o slide da aula, do que dependem o Valor Preditivo Positivo e o Valor Preditivo Negativo?",o:["Ambos DEPENDEM DA PREVALENCIA DA DOENCA na populacao testada; VPP = probabilidade de teste positivo realmente TER a doenca; VPN = probabilidade de teste negativo realmente NAO TER a doenca","VPP e VPN dependem apenas da sensibilidade e especificidade; nunca da prevalencia","VPP e VPN sao sinonimos; ambos medem a mesma coisa","VPP = proporcao de falsos positivos; VPN = proporcao de falsos negativos"],a:0,e:"O slide define: \"VALOR PREDITIVO POSITIVO: probabilidade de uma pessoa com teste positivo realmente tenha a doenca (depende da prevalencia da doenca). VALOR PREDITIVO NEGATIVO: probabilidade de uma pessoa com teste negativo realmente nao tenha a doenca (depende da prevalencia da doenca).\" A dependencia da prevalencia e crucial: em populacoes de baixa prevalencia, mesmo teste especifico tera VPP baixo."},
{id:"a15q10",d:"moderado",q:"De acordo com o slide da aula, quais sao as caracteristicas desejaveis de um teste diagnostico para doencas infecciosas?",o:["Alta sensibilidade (minimizar falso negativos); Alta especificidade (minimizar falso positivos); Baixo custo (acessibilidade); Resultados rapidos (<2 horas); Baixa complexidade (point-of-care); Identificar perfil de sensibilidade aos ATB","Apenas alta sensibilidade; os outros parametros nao sao relevantes","Alta especificidade e baixo custo apenas","Apenas testes de cultura bacteriana sao aceitaveis; testes moleculares nao sao desejaveis"],a:0,e:"O slide \"Caracteristicas Desejaveis de um Teste Diagnostico para Doencas Infecciosas\" lista: ALTA SENSIBILIDADE (MINIMIZAR FALSO NEGATIVOS); ALTA ESPECIFICIDADE (MINIMIZAR FALSO POSITIVOS); BAIXO CUSTO (ACESSIBILIDADE E UNIVERSALIZACAO); RESULTADOS RAPIDOS (<DUAS HORAS); BAIXA COMPLEXIDADE (POINT-OF-CARE); IDENTIFICAR PERFIL DE SENSIBILIDADE AOS ATB."},
{id:"a15q11",d:"moderado",q:"Segundo o slide da aula, qual e o impacto de um diagnostico rapido versus um diagnostico lento?",o:["Diagnostico rapido (≤2h): alto valor medico = antibioticos selecionados, melhor terapia, menor internacao; Diagnostico lento (>48h): baixo valor medico = uso excessivo de antibiotico, resistencia, maior internacao","Diagnostico rapido e menos preciso; preferencia pelo diagnostico lento mais completo","Diagnostico rapido e lento tem o mesmo impacto clinico","Diagnostico lento e mais eficaz pois permite mais testes antes da decisao"],a:0,e:"O slide mostra: DIAGNOSTICO RAPIDO (≤2h) = ALTO VALOR MEDICO: \"Antibioticos selecionados, Decisao da melhor terapia, Duracao da estadia reduzida.\" DIAGNOSTICO LENTO (>48h) = BAIXO VALOR MEDICO: \"Uso excessivo de antibiotico, resistencia, Admissao desnecessaria no hospital, Maior internacao hospitalar.\""},
{id:"a15q12",d:"moderado",q:"De acordo com o slide da aula, em qual fase dos exames de laboratorio ocorre a MAIORIA dos erros?",o:["Fase PRE-ANALITICA: 60-70% dos erros (requisicao medica, coleta de amostras, transporte); Fase Analitica: 20-30%; Fase Pos-Analitica: 10%","Fase analitica (dentro do laboratorio): 80% dos erros; fase pre-analitica: 10%","Fase pos-analitica (emissao do laudo): 70% dos erros","Os erros sao distribuidos igualmente (33%) em cada fase"],a:0,e:"O slide \"Fases dos Exames de Laboratorio\" mostra: FASE PRE ANALITICA 60-70% dos erros (requisicao, recepcao do paciente, coleta, preparacao das amostras, transporte); FASE ANALITICA 20-30% dos erros; FASE POS-ANALITICA 10% dos erros. Fonte: doi.org/10.1515/cclm-2017-0277. A fase pre-analitica concentra a maioria dos erros laboratoriais."},
{id:"a15q13",d:"moderado",q:"Segundo o slide da aula, quais informacoes sao relevantes na fase pre-analitica para o diagnostico do processo infeccioso?",o:["Hipotese diagnostica; Dados epidemiologicos; Dados clinicos (lesoes, local e caracteristicas do sitio); Surto/Infeccao hospitalar; Dados laboratoriais previos; Uso de antibioticos; Comprometimento imunologico; Procedimento invasivo; Colonizacao por MDR; Material a ser coletado; Data, hora e nome de quem colheu","Apenas o nome do paciente e a data de nascimento","Apenas o resultado de hemogramas previos","Apenas o medico solicitante e o diagnostico definitivo"],a:0,e:"O slide \"Fase Pre-Analitica\" mostra: Hipotese Diagnostica, Dados Epidemiologicos, Doenca ocupacional, Acidentes, Dados Clinicos (lesoes cutaneas ou de mucosa, local e caracteristicas do sitio de infeccao), Surto/Infeccao Hospitalar (Procedimento invasivo?), Dados laboratoriais previos, Colonizacao ou portador de MDR, Uso de antibioticos, Comprometimento imunologico, Material a ser coletado, Data/hora da coleta e nome de quem colheu."},
{id:"a15q14",d:"moderado",q:"De acordo com o slide da aula, qual e a relacao entre o Diagnostic Stewardship e o Antimicrobial Stewardship?",o:["Diagnostic Stewardship (teste certo, paciente certo, momento certo) → laboratorio realiza teste rapido → Antimicrobial Stewardship (interpretacao correta, antimicrobiano certo, momento certo) → diagnostico e tratamento → paciente; os dois sistemas se complementam em ciclo","Sao sistemas independentes; o diagnostico e o tratamento nao se influenciam","Diagnostic Stewardship substitui completamente o Antimicrobial Stewardship","Apenas o Antimicrobial Stewardship e relevante; o diagnostico pode ser empirico sempre"],a:0,e:"O slide mostra fluxo ciclico: Patient → Clinical evaluation → DIAGNOSTIC STEWARDSHIP (Right test, Right patient, Right time) → teste rapido pedido → Microbiology laboratory → resultado reportado → ANTIMICROBIAL STEWARDSHIP (Right interpretation, Right antimicrobial, Right time) → Diagnosis & treatment → Patient. Os dois sistemas se complementam: o diagnostico correto guia o tratamento correto."},
{id:"a15q15",d:"facil",q:"Segundo o slide da aula, o que e a fase pos-analitica dos exames laboratoriais?",o:["Fase que se inicia apos a obtencao de resultados validos das analises e finda com a emissao do laudo para interpretacao pelo solicitante; corresponde a 10% dos erros laboratoriais","Fase de coleta e transporte das amostras ao laboratorio; 70% dos erros","Fase de realizacao das analises no laboratorio; maior fonte de erros","Fase de prescricao do tratamento pelo medico apos receber o resultado"],a:0,e:"O slide \"Fases dos Exames de Laboratorio\" define: FASE POS-ANALITICA 10% dos erros = \"Fase que se inicia apos a obtencao de resultados validos das analises e finda com a emissao do laudo, para a interpretacao pelo solicitante.\" O diagrama ciclico do slide mostra: Interpretation → Diagnosis + treatment → Patient (fase pos-analitica culmina na tomada de decisao clinica)."},
{id:"a15e1",d:"moderado",q:"Segundo o slide da aula, por que o diagnostico rapido (≤2h) e considerado de alto valor medico?",o:["Diagnostico rapido ≤2h = antibioticos selecionados corretamente, decisao da melhor terapia e duracao da estadia reduzida; valor medico diminui progressivamente com o tempo - apos 48h, o diagnostico tem baixo valor medico com risco de uso excessivo de antibioticos","Diagnostico rapido e mais barato que o lento; por isso tem maior valor medico","Diagnostico rapido e considerado de baixo valor por ter menor acuracia","O tempo de diagnostico nao influencia o valor medico; apenas a precisao importa"],a:0,e:"O slide \"Diagnostico Rapido - Diagnostico Lento\" mostra dois circulos: em 2 horas = ALTO VALOR MEDICO (grande circulo azul) = \"Antibioticos selecionados, Decisao da melhor terapia, Duracao da estadia reduzida.\" Em 48-78 horas = BAIXO VALOR MEDICO (grande circulo verde) = \"Uso excessivo de antibiotico, resistencia, Admissao desnecessaria no hospital, Maior internacao hospitalar.\" A curva decresce ao longo do tempo."},
{id:"a15e2",d:"moderado",q:"De acordo com o slide da aula, quais sao os parametros gerais de validacao de um teste diagnostico?",o:["Acuracia (quanto o resultado indica a verdade); Caracteristicas desejaveis (point-of-care, rapido, alta acuracia, execucao simples, baixo custo); Impacto do teste (reducao de morbimortalidade, tratamento correto, reducao de custos)","Apenas sensibilidade e especificidade; os outros parametros nao sao reconhecidos oficialmente","Apenas o custo do teste; a acuracia e secundaria em contextos de recursos limitados","Apenas a rapidez do resultado; acuracia e sacrificada em favor da velocidade"],a:0,e:"O slide \"Caracteristicas Gerais de um Teste\" lista: \"PARAMETROS GERAIS DE VALIDACAO: (ACURACIA: Quanto o resultado do teste indica a verdade?); CARACTERISTICAS DESEJAVEIS DE UM TESTE (Point-of-care; rapido, alta acuracia, execucao simples, baixo custo); IMPACTO DO TESTE (Utilidade na pratica: Reducao de morbimortalidade, tratamento correto, reducao de custos).\""},
{id:"a15e3",d:"moderado",q:"Segundo o slide da aula, para alem do paciente individual, qual e o valor dos diagnosticos em nivel populacional?",o:["Identificacao da causa de surtos de doencas infecciosas; fornecimento de alertas precoces de surtos de doencas; informacao de estrategias e medidas de saude publica para impedir a propagacao da infeccao","Em nivel populacional, diagnosticos so servem para estatisticas; nao mudam condutas","Diagnosticos populacionais so sao uteis para doencas endemicas; nao se aplicam a surtos","O diagnostico so tem valor para o paciente individual; o nivel populacional e irrelevante"],a:0,e:"O slide afirma: \"Para um paciente, os diagnosticos sao usados para auxiliar na tomada de decisoes clinicas, rastreando infeccoes, confirmando um diagnostico clinico e orientando as opcoes de tratamento e o melhor curso de atendimento. Em nivel POPULACIONAL, os diagnosticos sao usados para permitir o controle e a prevencao de doencas: identificando a causa de surtos de doencas infecciosas; fornecendo alertas precoces de surtos de doencas; Informando estrategias e medidas de saude publica para impedir a propagacao da infeccao.\""},
{id:"a15e4",d:"moderado",q:"De acordo com o slide da aula, quais sao as 6 situacoes em que o diagnostico microbiologico deve ser realizado?",o:["Deteccao de agente infeccioso (doenca); Prognostico; Condutas; Controle; Monitoramento; Fatores de risco","Apenas para triagem de admissao hospitalar e alta; outras situacoes nao requerem diagnostico","Apenas quando ha suspeita de doenca grave; casos leves nao precisam de diagnostico","Apenas para doencas de notificacao compulsoria; outras infeccoes nao requerem diagnostico formal"],a:0,e:"O slide \"Quando?\" mostra seis circulos com imagens: DETECCAO DE AGENTE INFECCIOSO - DOENCA; PROGNOSTICO; CONDUTAS; CONTROLE; MONITORAMENTO; FATORES DE RISCO. Cada situacao representa um cenario em que o diagnostico microbiologico correto muda a conduta clinica ou epidemiologica."},
{id:"a15e5",d:"moderado",q:"Segundo o slide da aula, qual e a diferenca entre Diagnostic Stewardship e Antimicrobial Stewardship?",o:["Diagnostic Stewardship = gestao do diagnostico (teste certo, paciente certo, momento certo); Antimicrobial Stewardship = gestao do tratamento (interpretacao correta, antimicrobiano certo, momento certo); os dois se complementam no ciclo de cuidado ao paciente","Sao a mesma coisa; Diagnostic Stewardship e apenas o termo mais moderno para Antimicrobial Stewardship","Diagnostic Stewardship foca exclusivamente na resistencia bacteriana; Antimicrobial Stewardship na prevencao de infeccoes","Antimicrobial Stewardship e mais importante; Diagnostic Stewardship e secundario"],a:0,e:"O slide mostra o fluxo: DIAGNOSTIC STEWARDSHIP = \"Right test, Right patient, Right time\" (gestao do diagnostico). ANTIMICROBIAL STEWARDSHIP = \"Right interpretation, Right antimicrobial, Right time\" (gestao do tratamento). O fluxo completo: Patient → Clinical evaluation → Diagnostic Stewardship → laboratorio → resultado → Antimicrobial Stewardship → Diagnosis & treatment → Patient. Os dois sistemas se retroalimentam."},
{id:"a15e6",d:"facil",q:"De acordo com o slide da aula, o que e acuracia de um teste diagnostico?",o:["Acuracia e a proporcao de todos os testes CORRETOS (verdadeiros positivos + verdadeiros negativos) sobre todos os resultados obtidos; representa o quanto o resultado do teste indica a verdade","Acuracia e sinonimo de sensibilidade; ambos medem a capacidade de detectar doentes","Acuracia e o tempo medio necessario para obter o resultado do teste","Acuracia e a proporcao de falsos positivos sobre o total de resultados"],a:0,e:"O slide \"Parametros Gerais de Validacao\" define: \"ACURACIA: proporcao de todos os testes corretos (verdadeiros positivos e verdadeiros negativos), sobre todos os resultados obtidos (sensibilidade + especificidade).\" E no slide de caracteristicas gerais: \"PARAMETROS GERAIS DE VALIDACAO: (ACURACIA: Quanto o resultado do teste indica a verdade?).\" Acuracia = (VP + VN) / (VP + VN + FP + FN)."},
{id:"a15e7",d:"moderado",q:"Segundo o slide da aula, quais sao as etapas da fase pre-analitica que contribuem para os 60-70% dos erros laboratoriais?",o:["Requisicao Medica, Recepcao do Paciente, Preparacao do Paciente, Recebimento de Amostras, Coleta de Amostras, Preparacao das Amostras, Carregamento nos Equipamentos e Transporte","Apenas a coleta de amostras; as outras etapas nao contribuem para erros","Apenas a transcricao dos resultados pelo medico apos receber o laudo","Apenas o transporte das amostras ao laboratorio; as demais etapas sao automatizadas e seguras"],a:0,e:"O slide \"Fases dos Exames de Laboratorio\" mostra a FASE PRE-ANALITICA (60-70% dos erros) dividida em etapas especificas: Requisicao Medica → Recepcao do Paciente → Preparacao do Paciente → Recebimento de Amostras → Coleta de Amostras → Preparacao das Amostras → Carregamento nos Equipamentos → Transporte. O diagrama ciclico do slide mostra: \"Collection\" (coleta) e \"Transportation\" (transporte) como fases pre-analiticas criticas."}]},
  aula14:{name:"Aula 14 - Infeccao do Trato Urinario (ITU)",doc:"AIP 2025 - Prof. Dra. Ana Julia Reis",
summary:`## Aula 14 - Infeccao do Trato Urinario (ITU)

### Definicao e sintomas
- ITU: presenca de microrganismos que se multiplicam e invadem tecidos das vias urinarias, gerando resposta inflamatoria.
- Sintomas: Disuria (dor ou ardor ao urinar); Poliaciuria (urgencia em miccao); Poliuria (miccao excessiva); Urina escura com odor desagradavel.

### Epidemiologia
- Faixa etaria reprodutiva (feminino): 50% das mulheres vs 0,1% dos homens - fatores anatomicos, flutuacoes hormonais, vida sexual ativa.
- Acima de 65 anos: 20% feminino vs 10% masculino (reducao imunidade natural, flutuacoes hormonais, aumento da prostata).
- Tabela Idade x Genero (homem:mulher): Neonatal 1,5:1; Pre-escolar 1:10; Escolar 1:30; Fertil 1:50; Geriatrica 1:1,5.

### Influencia do genero
- FEMININO (maior incidencia): uretra MAIS CURTA; maior proximidade do anus com a uretra e o vestibulo vaginal = ENTEROBACTERIAS.
- MASCULINO (menor incidencia): uretra MAIS LONGA; distancia do anus; atividade bactericida do fluido prostatico.

### Fatores predisponentes para ITU
- Gravidez (progesterona → relaxamento da bexiga → estase urinaria); Climaterio; Diabetes (neuropatia → sensibilidade vesical reduzida); Habitos de higiene inadequados; ISTs; Obstrucao urinaria (prostata, calculos, tumores, defeitos congenitos); Corpos estranhos/sondas; Doencas neurologicas (mecanismos de esvaziamento da bexiga).

### Classificacao das ITUs
- ANATOMICA: BAIXA (cistite e uretrite); ALTA (pielonefrite e nefrite intersticial bacteriana - inflamacao dos tubulos e tecido intersticial do rim).
- QUANTO A GRAVIDADE: NAO COMPLICADA (sexo feminino, nao gravida, sem alteracoes TU, sem cateter, sem alteracoes de imunidade, adquirida na comunidade); COMPLICADA (sexo masculino, obstrucao urinaria, alteracoes anatomicas/funcionais TU, microrganismo multirresistente, corpo estranho/cateter, imunossupressao, calculos urinarios/nefrocalcinose).
- QUANTO A ORIGEM: COMUNITARIA; HOSPITALAR.
- 30% das ITU baixas apresentam comprometimento alto oculto → tratar como ITU alta.

### ITU baixa - Cistite
- Agente mais frequente: E. coli (75-95%); S. saprophyticus (coagulase-negativo).
- Sintomas: disuria, polaciuria, possivel hematuria, tenesmo vesical, dor hipogastrica.
- 25% dos nao tratados progridem para PIELONEFRITE.
- Tratamento: antibiotico de amplo espectro, cefalosporina 2a ou 3a geracao; duracao 3-5 dias.

### ITU alta - Pielonefrite
- MAIS GRAVE; pode evoluir para SEPSE; bacteremia; pielonefrite cronica → cicatrizes nos rins.
- Sintomas: dor em flanco, sensibilidade lombar (sinal de Giordano positivo), febre, calafrios, nauseas, vomitos.
- Tratamento: cefalosporina 2a ou 3a geracao; pode exigir hospitalizacao e ATB intravenoso; duracao 7-14 dias ou mais.

### Etiologia das ITUs
- Bacterias intestinais (enterobacterias) PREDOMINAM: E. coli 80-85%; Klebsiella sp 5%; Enterobacter sp 1%; Proteus mirabilis 3%; Enterococcus faecalis 4%; S. saprophyticus 5-10%.
- Etiologia comunitaria vs hospitalar: comunitaria = E. coli, S. saprophyticus, Klebsiella, E. faecalis; hospitalar (complicada) = E. coli, Klebsiella, Enterobacter cloacae, Serratia marcescens, Proteus mirabilis, P. aeruginosa, E. faecalis, Strep grupo B.

### Fatores de virulencia da E. coli uropatogenica
- Fimbrias/adesinas (estruturas responsaveis pela aderencia - Fimbrias P ou pelos de tipo 1); Flagelo = antigeno H (motilidade); Capsula = antigeno K (resistencia a fagocitose); LPS = antigeno O (determinante antigenico); Hemolisina (liberacao de Fe dos eritrocitos, evita fagocito, toxico para tecidos hospedeiros); Sistema Aerobactina (captacao de Fe).

### Patogenese da E. coli uropatogenica
- FIXACAO (adesinas/fimbrias P ou pelos tipo 1 se ligam a receptores no uroteliol) → INVASAO (toxinas/hemolisinas) → REPLICACAO → EXFOLIACAO (celulas epiteliais sofrem apoptose e exfoliacao, carregando E. coli para a urina) + RESISTENCIA BACTERIANA (celulas intracelulares escapam dos antibioticos).`,
