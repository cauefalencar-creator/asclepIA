    {id:"m2q9",d:"dificil",q:"O MIXEDEMA difere dos demais edemas porque:",o:["É causado por aumento da pressão hidrostática","Resulta de depósito de mucopolissacarídeos no interstício, não de retenção hídrica primária","É localizado e doloroso, com sinal de cacifo intenso","É flutuante, diminuindo pela manhã"],a:1,e:"Mixedema não é retenção hídrica, mas depósito de glicoproteínas (mucopolissacarídeos) no interstício. É pouco depressível e inelástico."},
    {id:"m2q10",d:"facil",q:"A febre REMITENTE (variação > 1°C sem normalizar) é típica de:",o:["Malária","Doença de Hodgkin","Septicemia irregular","Pneumonia e tuberculose"],a:3,e:"Febre remitente: típica de pneumonia e tuberculose. Intermitente (normaliza entre picos): malária. Recorrente: Doença de Hodgkin. Contínua: pneumonia lobar."},
    {id:"m2q11",d:"moderado",q:"O sinal de PEMBERTON é observado em:",o:["Pericardite constritiva com turgência jugular bilateral","Bócio multinodular: pletora facial, dispneia ou estridor à elevação dos braços","Insuficiência venosa com úlcera de tornozelo","Mixedema com sinal de cacifo persistente"],a:1,e:"Sinal de Pemberton: ao elevar os braços sobre a cabeça, surgem pletora facial, dispneia ou estridor. Ocorre no bócio multinodular por compressão da entrada torácica."},
    {id:"m2q12",d:"moderado",q:"O pulso PARADOXAL é encontrado em:",o:["Insuficiência aórtica e anemia grave","Estenose aórtica e ICC","Pericardite constritiva e derrame pericárdico volumoso","Colapso circulatório periférico"],a:2,e:"Pulso paradoxal (acentuada redução da amplitude na inspiração) é encontrado na pericardite constritiva e no derrame pericárdico volumoso."},
    {id:"m2q13",d:"moderado",q:"O pulso CÉLERE (em martelo d'água) é encontrado em:",o:["Estenose aórtica e ICC","Insuficiência aórtica, anemias graves e hipertireoidismo","Colapso circulatório periférico","Pericardite constritiva"],a:1,e:"Pulso célere (aparece e some rapidamente) ocorre na insuficiência aórtica, anemias graves e hipertireoidismo — condições que aumentam a pressão diferencial."},
    {id:"m2q14",d:"dificil",q:"Na circulação colateral TIPO PORTA, o fluxo sanguíneo segue qual direção?",o:["De dentro para fora, na metade superior do tórax","Tóraco-abdominal, em busca da veia cava inferior","De baixo para cima (abdome ao tórax), podendo formar a cabeça de medusa periumbilical","De fora para dentro, nos dois lados da parte superior do tórax"],a:2,e:"Circulação colateral tipo porta: localiza-se na face anterior do tronco (regiões periumbilical e epigástrica). Fluxo de baixo para cima. Quando intensa, forma a 'cabeça de medusa' periumbilical."},
    {id:"m2q15",d:"moderado",q:"A ERISIPELA difere da CELULITE porque:",o:["A erisipela acomete tecido subcutâneo profundo, sem limite claro","A celulite é causada por Streptococcus e tem limite claro","A erisipela tem limite nítido entre área acometida e sã, acomete derme e linfáticos superficiais","A celulite apresenta febre alta, bolhas e eritema demarcado"],a:2,e:"Erisipela: limite NÍTIDO, acomete derme e linfáticos superficiais, causada por Streptococcus beta-hemolítico. Celulite: acomete tecido subcutâneo, limite NÃO nítido."},
    {id:"m2q16",d:"facil",q:"O gânglio de Virchow (sinal de Troisier) indica:",o:["Carcinoma pulmonar","Carcinoma gástrico","Tuberculose ganglionar","Linfoma de Hodgkin"],a:1,e:"Sinal de Troisier: linfonodo supraclavicular esquerdo aumentado, duro e estrelado = indicativo de carcinoma gástrico."},
    {id:"m2q17",d:"facil",q:"O sinal de Irmã Maria José consiste em:",o:["Linfonodo supraclavicular esquerdo aumentado","Nódulo palpável em região umbilical por metástase de CA pélvico ou abdominal","Equimose periumbilical por hemorragia retroperitoneal","Circulação colateral com cabeça de medusa"],a:1,e:"Sinal de Irmã Maria José: nódulo umbilical palpável = metástase de carcinoma pélvico ou abdominal."},
    {id:"m2q18",d:"moderado",q:"Na insuficiência ARTERIAL dos membros, espera-se:",o:["Edema acentuado, dermatite ocre e úlcera no tornozelo","Dor que alivia ao elevar os membros, pulso presente","Claudicação intermitente evoluindo para dor em repouso, pele pálida e fria, pulso reduzido ou ausente","Veias varicosas, pele cianótica com membros pendentes"],a:2,e:"Insuficiência arterial: claudicação → dor em repouso, pele pálida e fria, pulso reduzido/ausente, sem edema significativo. A venosa tem edema, dermatite ocre e úlcera no tornozelo."},
    {id:"m2q19",d:"facil",q:"A ICTERÍCIA é definida como:",o:["Coloração acastanhada da pele por depósito de hemossiderina","Coloração amarelada de pele e mucosas com bilirrubina > 2 mg/100 mL","Palidez generalizada com bilirrubina indireta elevada","Coloração alaranjada por betacarotenemia, inclusive em conjuntivas"],a:1,e:"Icterícia: coloração amarelada de pele e mucosas com bilirrubina total > 2 mg/100 mL. A betacarotenemia NÃO acomete conjuntivas."},
    {id:"m2q20",d:"moderado",q:"A bilirrubina NÃO CONJUGADA (indireta) é:",o:["Hidrossolúvel, filtrada pelos rins, causa colúria","Lipossolúvel, transportada pela albumina, NÃO filtrada pelos rins","Produzida nos hepatócitos pela conjugação com ácido glicurônico","Excretada diretamente na urina"],a:1,e:"Bilirrubina indireta: lipossolúvel, conjugada à albumina no sangue, NÃO filtrada pelos rins (sem colúria). A direta é hidrossolúvel e pode ser excretada na urina."},
    {id:"m2q21",d:"facil",q:"O sinal de MURPHY é positivo em:",o:["Pancreatite aguda","Colecistite aguda","Apendicite","Peritonite difusa"],a:1,e:"Sinal de Murphy: parada brusca da inspiração à compressão do ponto cístico (hipocôndrio D). Indica colecistite aguda."},
    {id:"m2q22",d:"moderado",q:"O sinal de COURVOISIER-TERRIER consiste em:",o:["Dor em hipocôndrio D + febre + icterícia","Vesícula biliar palpável em paciente ictérico, indolor, indicando neoplasia de cabeça de pâncreas","Icterícia flutuante com cólica biliar recorrente","Dor localizada à percussão hepática indicando abcesso"],a:1,e:"Courvoisier-Terrier: vesícula biliar palpável + icterícia + SEM dor = obstrução extrínseca (neoplasia de cabeça de pâncreas)."},
    {id:"m2q23",d:"facil",q:"A TRÍADE DE CHARCOT, associada à colangite, é composta por:",o:["Hipertensão + taquicardia + febre","Icterícia + dor em hipocôndrio D + febre com calafrios","Icterícia + ascite + circulação colateral","Febre + vômitos + dor epigástrica em faixa"],a:1,e:"Tríade de Charcot (colangite): Icterícia + dor em hipocôndrio D + febre com calafrios. A Pêntade de Reynolds acrescenta hipotensão e alteração do SNC."},
    {id:"m2q24",d:"moderado",q:"O FETOR HEPATICUS é:",o:["Hálito ácido por refluxo gastroesofágico","Hálito adocicado e bolorento (maçã podre) por subprodutos de bactérias intestinais não detoxificados na insuficiência hepática","Hálito amoniacal por síndrome urêmica","Hálito fétido por infecção pulmonar"],a:1,e:"Fetor hepaticus: hálito adocicado e bolorento (maçã podre) por subprodutos metabólicos de bactérias intestinais não detoxificados pelo fígado insuficiente."},
    {id:"m2q25",d:"moderado",q:"A icterícia FLUTUANTE (intensidade variável) pode ser causada por:",o:["Hepatite viral aguda e cirrose","Coledocolitíase (cálculo que impacta e é eliminado) e tumor de papila de Vater","Síndrome de Gilbert e Crigler-Najjar","Insuficiência hepática grave e ascite"],a:1,e:"Icterícia flutuante: coledocolitíase (cálculo impacta temporariamente e é eliminado) ou tumor de papila de Vater (cresce obstruindo, depois necrotiza e libera o fluxo)."},
    {id:"m2q26",d:"moderado",q:"A CABEÇA DE MEDUSA representa:",o:["Varizes esofágicas visíveis à endoscopia","Dilatação das veias periumbilicais por recanalização da veia umbilical na hipertensão portal","Hepatomegalia congestiva com fluxo retrógrado","Esplenomegalia por estase na veia esplênica"],a:1,e:"Cabeça de medusa: dilatação das veias periumbilicais em padrão radiado, por recanalização da veia umbilical fetal na hipertensão portal."},
    {id:"m2q27",d:"moderado",q:"A anemia HEMOLÍTICA apresenta como sinais característicos:",o:["Edema facial, oligúria e hipertensão","Icterícia, dor abdominal severa, oligúria e anúria","Febre alta, tosse produtiva e dispneia","Claudicação intermitente e úlceras em MMII"],a:1,e:"Anemia hemolítica: icterícia (bilirrubina indireta elevada), dor abdominal severa, oligúria e anúria (hemoglobina livre lesiona os rins)."},
    {id:"m2q28",d:"moderado",q:"A respiração de CHEYNE-STOKES consiste em:",o:["Amplas e rápidas inspirações interrompidas por apneia, indicando acidose","Ciclos crescentes-decrescentes com possível apneia, por alteração do centro bulbar; ocorre na ICC e AVCs","Inspirações profundas regulares com expiração ruidosa — cetoacidose","Períodos de apneia com amplitude variável, indicando lesão grave do SNC"],a:1,e:"Cheyne-Stokes: incursões crescentes-decrescentes com possível apneia, ciclicamente. Ocorre na ICC, TCE, intoxicação por opioides/barbitúricos — alteração do centro respiratório bulbar."},
    {id:"m2q29",d:"moderado",q:"A respiração de KUSSMAUL é caracterizada por:",o:["Ciclos crescentes-decrescentes com apneia","Períodos de apneia irregulares com amplitude variável","Amplas e rápidas inspirações + apneia + expirações profundas e ruidosas; indica acidose metabólica grave","Dificuldade respiratória em ortostase, alivia ao deitar"],a:2,e:"Kussmaul: amplas e rápidas inspirações + apneia + expirações profundas e ruidosas + apneia. Indica cetoacidose diabética, uremia e acidoses graves."},
    {id:"m2q30",d:"moderado",q:"O DPOC tipo Pink Puffer (enfisema) apresenta:",o:["Tosse com expectoração, obesidade, cianose e exacerbações frequentes","Magro, idoso, longilíneo, dispneia intensa, expiração prolongada e pontos de ancoragem","Tórax em barril, cianose, edema de MMII e insuficiência cardíaca direita","Febre recorrente, bronquiectasia e expectoração purulenta"],a:1,e:"Pink Puffer (enfisema): magro, idoso, longilíneo, dispneia intensa, expiração prolongada, pontos de ancoragem (trípode). Blue Bloater (bronquite crônica): obeso, cianótico, tosse com expectoração, exacerbações frequentes."},
    {id:"m2q31",d:"moderado",q:"O baqueteamento digital (hipocratismo) está associado a:",o:["Hipertensão arterial sistêmica","Diabetes mellitus tipo 2","Doenças pulmonares e cardíacas crônicas","Insuficiência renal crônica"],a:2,e:"Baqueteamento digital (hipertrofia das falanges distais e unhas) está associado a doenças pulmonares (neoplasias, bronquiectasia, fibrose) e cardíacas crônicas."},
    {id:"m2q32",d:"moderado",q:"O ictus PROPULSIVO (hipertrofia do VE) difere do impulsivo (dilatação do VE) porque:",o:["É muito desviado para baixo e fora, com extensão aumentada e duração curta","É de localização normal ou levemente desviada, extensão normal ou levemente aumentada e duração PROLONGADA","É não palpável, associado a derrame pericárdico","É detectado apenas à ausculta"],a:1,e:"HVE (propulsivo): local normal ou levemente desviado, duração PROLONGADA (sístole vigorosa). DVE (impulsivo): muito desviado para baixo e fora, extensão aumentada, duração CURTA."},
    {id:"m2q33",d:"moderado",q:"O desdobramento FIXO de B2 (não se modifica com respiração) é patognomônico de:",o:["Bloqueio de ramo direito","Comunicação interatrial (CIA)","Bloqueio de ramo esquerdo","Insuficiência mitral"],a:1,e:"Desdobramento fixo de B2 = CIA. Variável (acentua na inspiração) = BRD, estenose pulmonar, insuficiência mitral. Paradoxal (na expiração) = BRE."},
    {id:"m2q34",d:"moderado",q:"A manobra de RIVERO-CARVALHO diferencia sopros mitral e tricúspide. O sopro TRICÚSPIDE, na inspiração profunda:",o:["Diminui ou não se altera","Aumenta (maior retorno venoso ao coração direito)","Desaparece completamente","Desloca-se para o foco aórtico"],a:1,e:"Rivero-Carvalho: inspiração profunda aumenta o retorno venoso ao coração D → sopro tricúspide AUMENTA; sopro mitral não se altera ou diminui."},
    {id:"m2q35",d:"facil",q:"A hipotensão POSTURAL é diagnosticada quando:",o:["A PA sistólica cai 10 mmHg ao passar de sentado para em pé","A PA sistólica cai ≥ 20 mmHg e/ou diastólica ≥ 10 mmHg ao passar de sentado para em pé","A PA diastólica cai 20 mmHg em decúbito","A FC aumenta mais que 20 bpm ao levantar"],a:1,e:"Hipotensão postural: queda de ≥ 20 mmHg na PA sistólica e/ou ≥ 10 mmHg na diastólica ao passar de sentado para em pé."},
    {id:"m2q36",d:"facil",q:"A turgência jugular BILATERAL é causada principalmente por:",o:["Tumor comprimindo o tronco braquiocefálico unilateral","Insuficiência ventricular direita, pericardite constritiva e tamponamento cardíaco","Trombose venosa profunda unilateral","Hipertensão arterial sistêmica grave"],a:1,e:"Turgência jugular bilateral: ICD, pericardite constritiva, tamponamento cardíaco (tríade de Beck) e compressão bilateral da cava superior. A unilateral ocorre por tumor obstruindo o tronco braquiocefálico homolateral."},
    {id:"m2q37",d:"facil",q:"A ordem correta do exame físico do ABDOME é:",o:["Inspeção → palpação → percussão → ausculta","Inspeção → ausculta → palpação → percussão","Ausculta → inspeção → percussão → palpação","Palpação → inspeção → ausculta → percussão"],a:1,e:"Abdome: Inspeção → Ausculta → Palpação → Percussão. A ausculta é feita ANTES da palpação para não alterar os ruídos hidroaéreos."},
    {id:"m2q38",d:"moderado",q:"O sinal de BLUMBERG consiste em:",o:["Dor na FID à compressão da FIE","Dor difusa à descompressão de qualquer parte do abdome","Dor à descompressão brusca do ponto de McBurney — indica irritação peritoneal (apendicite)","Parada brusca da inspiração à compressão do ponto cístico"],a:2,e:"Blumberg: dor à descompressão brusca do ponto de McBurney = irritação peritoneal localizada (apendicite). Rovsing: FID dói à compressão da FIE. Guineau de Mussy: qualquer região."},
    {id:"m2q39",d:"moderado",q:"O sinal de JOBERT (timpanismo na loja hepática) indica:",o:["Esplenomegalia com macicez no espaço de Traube","Pneumoperitônio (ar livre onde deveria haver macicez hepática)","Ascite de pequeno volume","Transposição de alça intestinal entre diafragma e fígado"],a:1,e:"Sinal de Jobert: timpanismo na região hepática (linha hemiclavicular D) = pneumoperitônio. Chilaiditi: transposição radiográfica de alça intestinal entre diafragma e fígado."},
    {id:"m2q40",d:"facil",q:"Para pesquisa de ASCITE de grande volume (> 1500 mL), a manobra de eleição é:",o:["Macicez móvel","Semi-círculos de Skoda","Piparote","Manobra de Valsalva"],a:2,e:"Piparote: grande volume (> 1500 mL). Macicez móvel / semi-círculos de Skoda: médio volume (500-1500 mL)."},
    {id:"m2q41",d:"moderado",q:"A DISFAGIA DA ACALASIA difere do carcinoma de esôfago porque:",o:["A acalasia tem instalação rápida, para sólidos evoluindo para líquidos","O CA tem instalação lenta e é predominantemente para líquidos","A acalasia tem instalação LENTA, predominantemente para LÍQUIDOS","O CA de esôfago instala-se lentamente, sempre para líquidos inicialmente"],a:2,e:"Acalasia: instalação LENTA, predominantemente para LÍQUIDOS (déficit no relaxamento do EEI). CA de esôfago: instalação RÁPIDA, progressão de sólidos → pastosos → líquidos."},
    {id:"m2q42",d:"moderado",q:"A hemorragia digestiva ALTA apresenta como manifestações:",o:["Hematoquezia e enterorragia, abaixo do ângulo de Treitz","Hematêmese e melena, acima do ângulo de Treitz (flexura duodeno-jejunal)","Sangue vivo pelo ânus sem relação com fezes","Sangue nas fezes formadas oriundo do reto"],a:1,e:"HDA (acima do ângulo de Treitz): hematêmese e melena. HDB: hematoquezia e enterorragia."},
    {id:"m2q43",d:"moderado",q:"Na úlcera DUODENAL, a sequência correta da dor é:",o:["Tem dor → come → tem dor → passa","Não tem dor → come → tem dor → passa","Tem dor → come → PASSA (alimento neutraliza o ácido)","Come → tem dor → passa"],a:2,e:"Duodenal (3 tempos): TEM dor → come → PASSA. Gástrica (4 tempos): NÃO tem dor → come → TEM dor → passa."},
    {id:"m2q44",d:"moderado",q:"Os sinais de CULLEN e GREY-TURNER indicam:",o:["Apendicite perfurada com peritonite","Equimose periumbilical (Cullen) e em flancos (Grey-Turner) por hemorragia retroperitoneal","Icterícia obstrutiva com acolia","Obstrução intestinal com distensão"],a:1,e:"Cullen: equimose periumbilical. Grey-Turner: equimose em flancos. Ambos indicam hemorragia retroperitoneal (pancreatite hemorrágica, gravidez ectópica, hemoperitônio)."},
    {id:"m2q45",d:"moderado",q:"A síndrome NEFRÍTICA difere da NEFRÓTICA porque:",o:["Nefrótica: hematúria, HAS e edema; nefrítica: proteinúria maciça","Nefrítica: hematúria, HAS e edema moderado; nefrótica: proteinúria maciça (> 3,5g/24h), hipoalbuminemia e anasarca","Nefrótica: processo inflamatório com imunocomplexos","A nefrótica é mais grave por causar hematúria macroscópica"],a:1,e:"Nefrítica: hematúria + HAS + edema moderado. Nefrótica: proteinúria maciça > 3,5g/24h + hipoalbuminemia + anasarca + hiperlipidemia."},
    {id:"m2q46",d:"moderado",q:"O sinal de GIORDANO (punho-percussão lombar) é positivo em:",o:["Cólica renal por litíase sem infecção","Pielonefrite aguda, abcesso renal e dor muscular lombar","Síndrome nefrótica com edema grave","Insuficiência renal crônica assintomática"],a:1,e:"Giordano: piora da dor à punho-percussão do ângulo costovertebral. Positivo na pielonefrite aguda, abcesso renal e dor muscular lombar."},
    {id:"m2q47",d:"moderado",q:"O tremor de REPOUSO que desaparece com o movimento é típico de:",o:["Lesão cerebelar","Parkinsonismo","Hipertireoidismo","Encefalopatia hepática (flapping)"],a:1,e:"Tremor de repouso: surge em repouso, desaparece com movimento e durante o sono. Típico do parkinsonismo. Cerebelar: piora com movimento. Flapping: atitude/postura."},
    {id:"m2q48",d:"moderado",q:"A prova de ROMBERG positiva com queda para o MESMO LADO e COM latência indica:",o:["Lesão de via proprioceptiva","Lesão cerebelar","Lesão de via vestibular","Hemiplegia espástica"],a:2,e:"Romberg+ com queda para o MESMO LADO e COM latência = lesão vestibular. Romberg+ com queda para qualquer lado sem latência = lesão proprioceptiva. Romberg- com base alargada = cerebelar."},
    {id:"m2q49",d:"moderado",q:"A marcha CEIFANTE (hemiplégica) apresenta:",o:["Passos pequenos e rápidos sem movimento dos braços","Membro superior fletido em 90° em pronação; membro inferior ipsilateral descreve semicírculo ao caminhar","Base alargada e zigue-zague ao caminhar","Inclinação alternada do tronco com lordose acentuada"],a:1,e:"Marcha ceifante: MS fletido em 90°, mão em pronação; MI não flexiona, descreve semicírculo. Sequela de AVC."},
    {id:"m2q50",d:"moderado",q:"A hipertonia PIRAMIDAL (espasticidade) apresenta:",o:["Rigidez plástica, não eletiva, sinal da roda denteada","Hipertonia elástica, eletiva (extensores MI e flexores MS), sinal do canivete","Hipotonia com reflexos pendulares","Bradicinesia e tremor de repouso"],a:1,e:"Piramidal (espasticidade): elástica, eletiva (extensores MI e flexores MS), sinal do CANIVETE. Extrapiramidal (rigidez): plástica, não eletiva, sinal da RODA DENTEADA."},
    {id:"m2q51",d:"moderado",q:"O sinal de BABINSKI consiste em:",o:["Flexão dos dedos e hálux à estimulação plantar, normal em adultos","Extensão do hálux e abertura em leque dos artelhos à estimulação plantar lateral, indicando lesão do SNC","Contratura abdominal à estimulação cutânea","Elevação testicular à estimulação da coxa"],a:1,e:"Babinski: extensão do hálux + abertura em leque dos artelhos à estimulação plantar lateral (posterior para anterior). Indica lesão da via piramidal (SNC)."},
    {id:"m2q52",d:"moderado",q:"Os sinais de irritação MENÍNGEA incluem:",o:["Babinski, clônus e sinal da roda denteada","Rigidez de nuca, Brudzinski e Kernig","Romberg, disdiadococinesia e tremor de intenção","Marcha ebriosa, dismetria e hipotonia"],a:1,e:"Irritação meníngea: rigidez de nuca, sinal de Brudzinski (flexão dos MMII ao fletir a cabeça) e sinal de Kernig (dor/resistência à extensão da perna com coxa fletida). Meningite e hemorragia subaracnóidea."},
    {id:"m2q53",d:"moderado",q:"A paralisia facial PERIFÉRICA difere da CENTRAL porque:",o:["A central acomete toda a hemiface ipsilateral inclusive a testa","A periférica acomete toda a hemiface ipsilateral (inclusive testa/lagoftalmia); a central poupa a metade superior (testa preservada)","As duas são clinicamente idênticas","A periférica acomete apenas a metade inferior contralateral"],a:1,e:"Periférica (nervo facial): TODA hemiface ipsilateral, inclusive testa → lagoftalmia, epífora. Central (via corticonuclear): apenas metade INFERIOR da hemiface CONTRALATERAL (testa preservada)."},
    {id:"m2q54",d:"moderado",q:"O Rinne NEGATIVO indica:",o:["Condução aérea melhor que óssea (normal)","Condução óssea mais prolongada que aérea — deficiência auditiva de CONDUÇÃO","Neurossensorial por lesão coclear","Ausência de zumbido e hipoacusia"],a:1,e:"Rinne normal (positivo): aérea > óssea. Rinne NEGATIVO: óssea > aérea = deficiência auditiva de CONDUÇÃO (otosclerose, cerume). Na neurossensorial, Rinne é positivo mas Weber lateraliza para o lado são."},
    {id:"m2q55",d:"moderado",q:"A síndrome CEREBELAR apresenta:",o:["Babinski, hiperreflexia, espasticidade e sinal do canivete","Romberg positivo com queda para o mesmo lado, rigidez plástica","Romberg negativo com BASE ALARGADA, disdiadococinesia, dismetria, marcha ebriosa e hipotonia","Déficit motor ipsilateral com clônus"],a:2,e:"Cerebelar: Romberg- (base alargada), disdiadococinesia/adiadococinesia, dismetria, marcha ebriosa, tremor de ação, hipotonia, reflexos pendulares e disartria. NÃO há Babinski nem hiperreflexia."},
    {id:"m2q56",d:"dificil",q:"A tríade de BECK indica:",o:["Hipertensão portal: ascite + esplenomegalia + circulação colateral","Tamponamento cardíaco: turgência jugular + hipotensão arterial + hipofonese de bulhas","Meningite: rigidez de nuca + febre + cefaleia","Colangite: icterícia + dor HD + febre"],a:1,e:"Tríade de Beck (tamponamento cardíaco): turgência jugular + hipotensão arterial + hipofonese de bulhas cardíacas."},
    {id:"m2q57",d:"moderado",q:"O HIPERESPLENISMO, frequentemente causado por esplenomegalia, resulta em:",o:["Policitemia, leucocitose e trombocitose","Anemia, leucopenia e plaquetopenia (pancitopenia) por remoção acelerada no baço aumentado","Aumento isolado das hemácias por sequestro esplênico","Hipercoagulabilidade com trombose venosa"],a:1,e:"Hiperesplenismo: o baço aumentado remove prematuramente todos os elementos sanguíneos → pancitopenia (anemia + leucopenia + plaquetopenia)."},
    {id:"m2q58",d:"moderado",q:"A diferença entre a diarreia ALTA e BAIXA é que a diarreia baixa apresenta:",o:["Grande volume, sem tenesmo, sem sangue, até 10 evacuações por dia","Pequeno volume, mais de 10 evacuações por dia, com muco/pus/sangue, tenesmo e puxo","Esteatorreia com restos alimentares e grande volume","Menos de 10 evacuações com alto volume e sem muco"],a:1,e:"Diarreia baixa (intestino grosso): > 10 evacuações, pequeno volume, muco/pus/sangue, tenesmo e puxo. Diarreia alta (intestino delgado): < 10 evacuações, grande volume, sem sangue/tenesmo, pode ter esteatorreia."},
    {id:"m2q59",d:"moderado",q:"Na síndrome URÊMICA (DRC terminal), é esperado:",o:["Poliúria, polidipsia e hiperglicemia","Adinamia, anorexia, prurido, náuseas, hipercalemia, acidose metabólica e edema","Febre alta com bacteriúria e dor lombar","Hematúria macroscópica com HAS e edema facial"],a:1,e:"Síndrome urêmica: adinamia, anorexia, prurido urêmico, náuseas, vômitos, hipercalemia, acidose metabólica, edema, HAS e alterações cognitivas."},
    {id:"m2q60",d:"dificil",q:"No exame do 7° par craniano (facial), a paralisia periférica apresenta:",o:["Preservação da musculatura da testa, desvio da boca contralateral","Lagoftalmia, epífora, desvio da boca para o lado normal, com alterações possíveis da gustação — toda a hemiface ipsilateral afetada","Comprometimento apenas da musculatura inferior da face do lado contralateral","Ausência de reflexo de acomodação com midríase"],a:1,e:"Paralisia facial periférica (nervo VII): toda a hemiface ipsilateral afetada incluindo testa → lagoftalmia (olho não fecha), epífora, desvio da boca para o lado normal. Pode haver alteração gustativa. Causa mais comum: Bell's palsy (a frigore)."}
   ]},

  semGeral:{ name:"Semiologia Geral — Aulas Teóricas", doc:"Semiologia Geral",
   summary:`## Semiologia Geral — Resumo Teórico\nConteúdo das aulas teóricas de Semiologia (FAMED/FURG): **anemias** (classificação, investigação, tipos especiais), **icterícia** (metabolismo das bilirrubinas), **febre vs hipertermia**, **síndromes abdominais**, **endocrinologia** (DM, hipo/hipertireoidismo, Cushing, Acromegalia, Feocromocitoma), **dermatologia**, **dor torácica**, **síndromes cardiológicas** (DAC, IC, HAS, choque) e **síndromes nefrológicas, neurológicas e respiratórias**.`,
   tips:"Domine a classificação morfológica das anemias pelo VCM. Diferencie febre de hipertermia. Memorize os tipos de choque e as síndromes endócrinas. Na IC, lembre dos mecanismos compensatórios (SNS, SRAA, ADH).",
   questions:[
    {id:"sgq1",d:"facil",q:"Considera-se anemia no adulto quando a hemoglobina é inferior a:",o:["15 g/dL no homem e 14 g/dL na mulher","13 g/dL no homem e 12 g/dL na mulher","11 g/dL em ambos os sexos","10 g/dL no homem e 9 g/dL na mulher"],a:1,e:"Anemia: Hb < 13 g/dL no homem e < 12 g/dL na mulher (OMS)."},
    {id:"sgq2",d:"facil",q:"O VCM (Volume Corpuscular Médio) representa:",o:["A concentração de hemoglobina por hemácia (CHCM)","O tamanho médio das hemácias","A variabilidade do tamanho das hemácias (RDW)","A concentração total de hemoglobina no sangue (HCM)"],a:1,e:"VCM = tamanho médio das hemácias. Microcítica: VCM < 80 fL; Normocítica: 80-100 fL; Macrocítica: > 100 fL."},
    {id:"sgq3",d:"moderado",q:"A anemia FERROPRIVA apresenta morfologia de:",o:["Macrocitose com megaloblastos na medula","Microcitose, hipocromia e anisocitose","Normocitose com reticulocitose","Eritrócitos em alvo e drepanócitos"],a:1,e:"Ferropriva (microcítica, VCM < 80 fL): microcitose, hipocromia (CHCM reduzido) e anisocitose (RDW elevado). Resulta da redução da síntese de Hb por falta de ferro."},
    {id:"sgq4",d:"moderado",q:"A anemia MEGALOBLÁSTICA é causada por deficiência de B12/folato, resultando em:",o:["Microcitose e hipocromia","Macrocitose por defeito na maturação — a célula não perde o núcleo e fica maior","Normocitose com hemólise","Sideroblastos em anel na medula"],a:1,e:"Deficiência de B12/folato → defeito na síntese de DNA → hemácia não perde o núcleo → MACROCITOSE. Neutrófilos hipersegmentados são achado clássico."},
    {id:"sgq5",d:"moderado",q:"O perfil laboratorial da anemia FERROPRIVA é:",o:["Ferritina elevada e transferrina reduzida","Ferritina BAIXA, transferrina ALTA, ferro sérico BAIXO e saturação de transferrina BAIXA","Ferritina elevada, ferro sérico elevado com saturação normal","Reticulocitose com VCM normal e Coombs direto positivo"],a:1,e:"Ferropriva: ferritina BAIXA (estoque depletado), transferrina ALTA (aumenta para compensar), ferro sérico BAIXO, saturação de transferrina BAIXA."},
    {id:"sgq6",d:"moderado",q:"A ANEMIA DE DOENÇA CRÔNICA difere da ferropriva porque:",o:["Tem ferritina baixa e transferrina elevada","Tem ferritina ELEVADA (proteína de fase aguda) e transferrina REDUZIDA","Apresenta sempre macrocitose","Cursa com hemólise e bilirrubina indireta elevada"],a:1,e:"Doença crônica: ferritina ALTA (proteína de fase aguda), transferrina BAIXA. Ferropriva: ferritina BAIXA, transferrina ALTA. O ferro está 'preso' nos macrófagos na anemia de doença crônica."},
    {id:"sgq7",d:"moderado",q:"Na anemia SIDEROBLÁSTICA, o defeito central é:",o:["Destruição precoce das hemácias no baço","Deficiência de ferro sérico","Incapacidade de incorporar ferro à protoporfirina IX, formando sideroblastos em anel na medula","Déficit de EPO por insuficiência renal"],a:2,e:"Sideroblástica: mitocôndria não incorpora ferro ao grupo heme → ferro acumula ao redor do núcleo → sideroblastos em anel. Ferro sérico e ferritina podem estar ELEVADOS (ferro mal utilizado)."},
    {id:"sgq8",d:"moderado",q:"A anemia APLÁSICA caracteriza-se por:",o:["Hemólise com esplenomegalia e icterícia","Falência das células-tronco hematopoiéticas: hipoplasia medular e citopenia de 2 ou mais linhagens","Macrocitose isolada com megaloblastos e B12 baixa","Microcitose com ferritina elevada"],a:1,e:"Aplásica: falência das células-tronco → hipoplasia medular → pancitopenia (anemia + trombocitopenia + leucopenia). Sintomas: anemia + petéquias/sangramento + infecções."},
    {id:"sgq9",d:"moderado",q:"A TALASSEMIA é uma anemia hereditária causada por:",o:["Defeito na membrana eritrocitária","Produção excessiva de eritropoetina","Desequilíbrio na produção das cadeias alfa ou beta da hemoglobina","Deficiência de G6PD com hemólise oxidativa"],a:2,e:"Talassemia (anemia do Mediterrâneo): desequilíbrio na produção das cadeias alfa ou beta da hemoglobina → hemácias menores e frágeis → anemia hemolítica hereditária."},
    {id:"sgq10",d:"facil",q:"A icterícia deve ser pesquisada preferencialmente em:",o:["Palmas das mãos e solas dos pés","Escleras e frênulo da língua, em ambiente bem iluminado","Mucosa labial e unhas","Regiões de dobras cutâneas"],a:1,e:"A icterícia é mais facilmente detectada nas ESCLERAS e no FRÊNULO lingual (acúmulo de bilirrubina). Sempre examinar em ambiente bem iluminado."},
    {id:"sgq11",d:"moderado",q:"A bilirrubina CONJUGADA (direta) é hidrossolúvel. Isso implica que:",o:["Não pode ser excretada pelos rins","Pode ser filtrada pelos rins (colúria); nas obstruções biliares totais, não chega ao intestino → acolia fecal","Deposita-se em tecidos nervosos causando kernicterus","É transportada pela albumina"],a:1,e:"BD hidrossolúvel → filtrada pelos rins → COLÚRIA (urina escura). Nas obstruções totais: sem BD no intestino → sem estercobilina → ACOLIA (fezes claras)."},
    {id:"sgq12",d:"moderado",q:"A icterícia PRÉ-HEPÁTICA (hemolítica) apresenta aumento de:",o:["Bilirrubina direta com colúria e acolia","Bilirrubina INDIRETA SEM colúria (BI lipossolúvel não é filtrada pelos rins)","Fosfatase alcalina e GGT predominantemente","Transaminases (TGO e TGP)"],a:1,e:"Pré-hepática: hemólise → aumento de BI (indireta/lipossolúvel) → SEM colúria, SEM acolia. Hepatocelular: TGO e TGP elevadas. Pós-hepática (obstrutiva): FA e GGT elevadas, colúria e acolia."},
    {id:"sgq13",d:"moderado",q:"A síndrome de GILBERT é uma hiperbilirrubinemia não conjugada por:",o:["Hemólise crônica","Déficit PARCIAL da UDP-glicuronil-transferase — benigna, sem doença hepática","Obstrução biliar extra-hepática","Defeito na excreção de BD pelos canalículos"],a:1,e:"Gilbert: déficit parcial da UDP-glicuronil-transferase → BI elevada isoladamente, benigna. Crigler-Najjar tipo 1: ausência total da enzima (grave, letal). Tipo 2: déficit severo."},
    {id:"sgq14",d:"moderado",q:"A FEBRE difere da HIPERTERMIA porque:",o:["Na febre não há alteração do hipotálamo; na hipertermia o set point está elevado","Na hipertermia não há alteração do set point hipotalâmico; na febre o set point está elevado por pirógenos endógenos","Ambas têm o mesmo mecanismo, diferenciadas pela temperatura absoluta","A hipertermia sempre responde a antitérmicos; a febre não"],a:1,e:"FEBRE: pirógenos elevam o SET POINT hipotalâmico → corpo produz calor até atingi-lo (tremores, vasoconstrição). HIPERTERMIA: produção excessiva de calor SEM alteração do set point → não responde a antitérmicos → mais perigosa."},
    {id:"sgq15",d:"moderado",q:"Na HIPERTERMIA, diferentemente da febre, o paciente apresenta:",o:["Vasoconstrição periférica e tremores","Mãos e pés QUENTES, sudorese aumentada e ausência de tremores","Resposta a AINEs e paracetamol","Set point hipotalâmico elevado por pirógenos"],a:1,e:"Hipertermia: sem vasoconstrição compensatória → mãos e pés QUENTES, sudorese aumentada, SEM tremores. A febre cursa com vasoconstrição e tremores (calafrios) na fase de elevação."},
    {id:"sgq16",d:"moderado",q:"A DOR VISCERAL difere da DOR PARIETAL porque:",o:["A visceral é bem localizada e intensa; a parietal é difusa e profunda","A visceral é mal localizada, difusa, conduzida pelo SNAS; a parietal é bem localizada, intensa, com contratura muscular","A visceral causa contratura abdominal em tábua","A parietal é mal localizada e não causa contratura"],a:1,e:"Visceral: mal localizada, difusa, conduzida pelo SNAS (simpático). Parietal: bem localizada, o paciente aponta o local, conduzida pelos nervos toracoabdominais → frequentemente causa CONTRATURA muscular."},
    {id:"sgq17",d:"moderado",q:"No diabetes mellitus, a NEUROPATIA PERIFÉRICA manifesta-se por:",o:["Edema de papila e retinopatia proliferativa","Proteinúria maciça","Parestesias em luvas e botas, dor em queimação que piora à noite, redução de sensibilidade e propriocepção","Claudicação intermitente por macroangiopatia proximal"],a:2,e:"Neuropatia diabética: parestesias em luvas/botas (extremidades), dor em queimação (piora à noite), redução de sensibilidade e propriocepção. Testa-se com monofilamento de Semmes-Weinstein e reflexos."},
    {id:"sgq18",d:"moderado",q:"A DISAUTONOMIA CARDIOVASCULAR do diabetes manifesta-se por:",o:["Taquicardia em repouso, hipotensão postural e risco aumentado de síncope","Bradicardia com BAV","Varizes de MMII e edema venoso","Palpitações paroxísticas sem hipotensão"],a:0,e:"Disautonomia cardiovascular (DM1 principalmente): denervação vagal → taquicardia em repouso; denervação simpática → hipotensão postural; risco de morte prematura e síncope."},
    {id:"sgq19",d:"moderado",q:"O sinal de ACANTOSE NIGRICANS é causado por:",o:["Hipotireoidismo","Excesso de corticoide exógeno","Resistência insulínica","Deficiência de vitamina D"],a:2,e:"Acantose nigricans (hiperpigmentação aveludada em dobras cutâneas) e acrocórdons são sinais de RESISTÊNCIA INSULÍNICA e excesso de açúcar."},
    {id:"sgq20",d:"moderado",q:"A síndrome de CUSHING apresenta qual distribuição de gordura?",o:["Gordura periférica em MMII com atrofia do tronco","Obesidade centrípeta (tronco), deposição cervical dorsal (giba de búfalo) e face em lua cheia","Perda de peso generalizada com atrofia muscular","Obesidade difusa e simétrica"],a:1,e:"Cushing: obesidade centrípeta progressiva, giba de búfalo (deposição cervical dorsal), face em lua cheia (bochechas avermelhadas), estrias violáceas > 1 cm, fraqueza muscular proximal."},
    {id:"sgq21",d:"moderado",q:"A ACROMEGALIA é causada por:",o:["Deficiência de GH na infância","Produção excessiva de GH e IGF-1, geralmente por adenoma hipofisário","Excesso de ACTH com hipercortisolismo","Deficiência de TSH"],a:1,e:"Acromegalia: adenoma hipofisário produtor de GH → crescimento de mãos, pés e nariz, fácies acromegálica (prognatismo, malares proeminentes), HAS, DM, ICC, hiperidrose."},
    {id:"sgq22",d:"moderado",q:"O FEOCROMOCITOMA apresenta como tríade clínica:",o:["Edema, hiponatremia e hipotensão postural","Cefaleia + sudorese profusa + palpitações, com HAS de difícil controle","Poliúria, polidipsia e perda de peso","Fadiga, hiperpigmentação e hipotensão"],a:1,e:"Feocromocitoma: tríade = cefaleia + sudorese profusa + palpitações, com HAS de difícil controle. Os episódios são paroxísticos. Pode haver flushing cutâneo."},
    {id:"sgq23",d:"moderado",q:"A doença de ADDISON (insuficiência adrenal) apresenta:",o:["HAS difícil controle, hiperglicemia e obesidade central","Fraqueza, fadiga, hipotensão ortostática e hiperpigmentação em gengivas e dobras","Hirsutismo, acne e infertilidade","Cefaleia, sudorese e palpitações paroxísticas"],a:1,e:"Addison (insuficiência adrenal primária): fraqueza, fadiga, hipotensão ortostática, anorexia, náuseas, hiperpigmentação (ACTH/MSH elevados) em gengivas, dobras e cicatrizes."},
    {id:"sgq24",d:"facil",q:"A lesão de pele com alteração de COR, SEM elevação (não palpável), é chamada:",o:["Pápula","Mácula","Vesícula","Placa"],a:1,e:"Mácula: área com cor alterada, SEM elevação. Pápula: elevada, sólida < 0,5 cm. Placa: > 1 cm em platô. Vesícula: cavidade com líquido < 0,5 cm."},
    {id:"sgq25",d:"moderado",q:"A EROSÃO difere da ÚLCERA porque:",o:["A erosão atinge derme e hipoderme, cicatrizando com cicatriz","A erosão é falha da EPIDERME apenas → cicatriza SEM cicatriz; a úlcera atinge derme/hipoderme → cicatriza COM cicatriz","Ambas cicatrizam sem cicatriz","A úlcera é superficial e não forma cicatriz"],a:1,e:"Erosão: falha restrita à epiderme → cicatriza SEM cicatriz. Úlcera: falha que atinge derme ou hipoderme → cicatriza COM cicatriz."},
    {id:"sgq26",d:"moderado",q:"O sinal de AUSPITZ (pontos de sangramento à fricção de lesão descamante) sugere:",o:["Mastocitose","Psoríase","Pênfigo e distúrbios bolhosos","Dermatite atópica"],a:1,e:"Auspitz (orvalho sangrante) → PSORÍASE. Sinal de Darier (lesão vira urticada à fricção) → mastocitose. Nikolsky (descolamento à pressão) → pênfigo."},
    {id:"sgq27",d:"moderado",q:"A dor torácica da ANGINA ESTÁVEL tem duração de:",o:["Mais de 30 minutos com náusea e sudorese intensa","3 a 5 minutos, desencadeada por esforço, aliviada pelo repouso ou nitrato sublingual","10 a 20 minutos sem relação com esforço","Dias a semanas com fator psicogênico"],a:1,e:"Angina estável: 3-5 min, esforço, alivia com repouso/nitrato. AI: 10-20 min, sem esforço, alívio mais demorado. IAM: > 20 min, sem alívio com nitrato, com náusea, sudorese."},
    {id:"sgq28",d:"moderado",q:"A DISSECÇÃO AÓRTICA apresenta como característica principal:",o:["Dor em aperto retroesternal com irradiação para o braço esquerdo, aliviada por nitrato","Dor LANCINANTE de início súbito, irradiando para o dorso, com assimetria de pulsos e paciente agitado","Dor ventilatório-dependente com atrito pericárdico","Dor epigástrica em queimação relacionada à alimentação"],a:1,e:"Dissecção aórtica: dor lancinante SÚBITA, irradia para o dorso, assimetria de pulsos, paciente AGITADO (diferente do infartado quieto). Causa: crise hipertensiva. Tipo A (ascendente) = cirúrgico. Tipo B = clínico."},
    {id:"sgq29",d:"moderado",q:"A PERICARDITE apresenta dor que:",o:["Piora com esforço físico e alivia com nitrato","Melhora ao inclinar para frente e PIORA ao deitar e na respiração","É ventilatório-dependente, bem localizada, com febre (pleurite)","É súbita, lancinante, irradia para o dorso com assimetria de pulsos"],a:1,e:"Pericardite: dor MELHORA ao inclinar para frente, PIORA ao deitar em decúbito dorsal e na respiração. Ausculta: atrito pericárdico. NÃO relacionada a esforço."},
    {id:"sgq30",d:"moderado",q:"O CHOQUE DISTRIBUTIVO tem como característica hemodinâmica:",o:["Pré-carga aumentada, DC reduzido e RVP aumentada","Pré-carga reduzida por perda de volume sanguíneo","Vasodilatação periférica global (RVP reduzida) com DC inicialmente aumentado","DC reduzido com pré-carga aumentada por falha da bomba"],a:2,e:"Distributivo (séptico, anafilático, neurogênico): VASODILATAÇÃO → RVP REDUZIDA, DC inicialmente aumentado. O 'volume' está mal distribuído → hipoperfusão tecidual apesar do DC inicial elevado."},
    {id:"sgq31",d:"moderado",q:"O choque CARDIOGÊNICO apresenta:",o:["Pré-carga reduzida, DC aumentado e RVP normal","Pré-carga AUMENTADA (congestão), DC REDUZIDO (falha da bomba) e RVP AUMENTADA (compensatória)","Vasodilatação generalizada com DC elevado","Pré-carga reduzida por hemorragia"],a:1,e:"Cardiogênico: falha miocárdica → DC BAIXO → congestão (pré-carga ALTA) + vasoconstrição compensatória (RVP ALTA). Causas: IAM, ICC grave, valvulopatia, arritmia."},
    {id:"sgq32",d:"moderado",q:"Na insuficiência cardíaca com fração de ejeção REDUZIDA (ICFER):",o:["FE > 50%, câmaras normais, déficit de relaxamento","FE < 40%, câmaras DILATADAS, redução da contratilidade","FE entre 40-50%, padrão intermediário","FE > 60%, câmaras hipertrofiadas"],a:1,e:"ICFER (antiga IC sistólica): FE < 40%, câmaras DILATADAS, contratilidade REDUZIDA. ICFEP (diastólica): FE > 50%, câmaras NORMAIS, déficit de RELAXAMENTO."},
    {id:"sgq33",d:"moderado",q:"O primeiro mecanismo compensatório ativado na IC é:",o:["Sistema renina-angiotensina-aldosterona (SRAA)","Sistema nervoso simpático (SNS) — aumenta noradrenalina, FC, contratilidade e RVP","Hormônio antidiurético (ADH)","Peptídeo natriurético atrial (BNP/ANP)"],a:1,e:"Na IC, a queda do DC ativa PRIMEIRO o SNS: noradrenalina aumenta FC, contratilidade e RVP, e ativa o SRAA. A longo prazo, são deletérios → toxicidade miocárdica e remodelamento."},
    {id:"sgq34",d:"moderado",q:"A injúria renal AGUDA (IRA) pré-renal é causada por:",o:["Doenças glomerulares e isquemia tubular","Hiperplasia prostática e nefrolitíase","Desidratação, choque séptico e hemorragias — hipoperfusão renal","Nefrotoxicidade por aminoglicosídeos"],a:2,e:"IRA pré-renal: HIPOPERFUSÃO renal (desidratação, hemorragia, choque). Intrínseca: doenças tubulares/glomerulares/vasculares. Pós-renal: obstrução (HPB, nefrolitíase, tumor)."},
    {id:"sgq35",d:"moderado",q:"A síndrome URÊMICA (DRC terminal) apresenta:",o:["Poliúria, polidipsia e hiperglicemia","Adinamia, anorexia, prurido urêmico, náuseas, hipercalemia, acidose metabólica e edema","Febre alta com bacteriúria e dor lombar","Hematúria macroscópica com HAS e edema facial"],a:1,e:"Uremia: adinamia, anorexia, prurido, náuseas, vômitos, hipercalemia, acidose metabólica, edema, HAS, alterações cognitivas."},
    {id:"sgq36",d:"moderado",q:"As síndromes PIRAMIDAIS apresentam:",o:["Hipotonia, arreflexia e atrofia muscular","Hipertonia espástica, hiperreflexia, Babinski positivo, clônus e marcha hemiplégica","Hipotonia, disdiadococinesia e Romberg negativo","Tremor de repouso, rigidez plástica e bradicinesia"],a:1,e:"Piramidal: hipertonia ESPÁSTICA (canivete), HIPERreflexia, Babinski+, clônus, marcha ceifante. NÃO há atrofia significativa. Lesões piramidais causam déficit na EXECUÇÃO do movimento."},
    {id:"sgq37",d:"moderado",q:"A síndrome EXTRAPIRAMIDAL NIGROPALIDAL (parkinsonismo) apresenta:",o:["Hipercinesia e hipotonia com movimentos coreicos","Bradicinesia, rigidez plástica (roda denteada) e tremor de repouso","Ataxia axial e disdiadococinesia","Marcha ceifante e Babinski positivo"],a:1,e:"Parkinsonismo (nigropalidal): tríade = BRADICINESIA + RIGIDEZ PLÁSTICA (roda denteada) + TREMOR DE REPOUSO. Marcha parkinsoniana (passos curtos, sem balanço dos braços), face hipomímica."},
    {id:"sgq38",d:"moderado",q:"O estertor FINO (crepitante) é caracterizado por:",o:["Ocorrer no início da inspiração e na expiração, modificar com tosse, ouvido em qualquer região","Ocorrer no FINAL da inspiração, agudo, breve, não se modifica com tosse, ouvido nas bases","Ser grave e audível na inspiração e expiração, desaparecer com tosse","Ser contínuo agudo por broncoespasmo"],a:1,e:"Estertor fino: fim da inspiração, agudo, breve, NÃO muda com tosse, NÃO muda com posição (exceto fibrose). Relacionado a líquido alveolar, fibrose intersticial. Grosso: início, muda com tosse, por secreções brônquicas."},
    {id:"sgq39",d:"moderado",q:"Na síndrome de CONSOLIDAÇÃO pulmonar (pneumonia), o exame físico evidencia:",o:["FTV reduzido, som timpânico e MV abolido","FTV AUMENTADO, macicez, estertores finos, egofonia e broncofonia","FTV reduzido, macicez e desvio traqueal contralateral","FTV reduzido, hipertimpanismo e MV abolido"],a:1,e:"Consolidação: expansibilidade reduzida, FTV AUMENTADO (sólido conduz melhor), macicez, estertores finos, broncofonia e egofonia. A traqueia desvia para o lado IPSILATERAL (atelectasia)."},
    {id:"sgq40",d:"moderado",q:"No PNEUMOTÓRAX, o exame físico revela:",o:["FTV aumentado, macicez, estertores e broncofonia","Expansibilidade reduzida, FTV REDUZIDO, som TIMPÂNICO, MV abolido","FTV reduzido, macicez, MV abolido e desvio traqueal contralateral (derrame)","FTV reduzido, hipersonoridade difusa e tórax em barril"],a:1,e:"Pneumotórax: expansibilidade reduzida, FTV REDUZIDO (ar não conduz), TIMPANISMO, MV abolido. Desvio traqueal: se pneumotórax hipertensivo, para o lado contralateral (sinal de gravidade)."},
    {id:"sgq41",d:"moderado",q:"A ACALASIA é uma disfagia esofágica que se manifesta por:",o:["Disfagia para sólidos → pastosos → líquidos, com instalação rápida","Déficit no relaxamento do EEI com disfagia predominantemente para LÍQUIDOS e instalação LENTA","Refluxo gastroesofágico com pirose e regurgitação ácida","Disfagia com entalo súbito de carne por malformação esofágica"],a:1,e:"Acalasia: falha no relaxamento do EEI → disfagia para LÍQUIDOS, instalação LENTA, com regurgitação, perda de peso. CA esôfago: disfagia para sólidos, instalação RÁPIDA."},
    {id:"sgq42",d:"moderado",q:"Na DIARREIA ALTA (intestino delgado), espera-se:",o:["Mais de 10 evacuações, pequeno volume, muco/pus/sangue, tenesmo e puxo","Até 10 evacuações, grande volume, sem pus/sangue, sem tenesmo; pode haver esteatorreia","Dor em cólica em FID com febre e sangue nas fezes","Fezes endurecidas com sensação de esvaziamento incompleto"],a:1,e:"Diarreia alta (ID): < 10x/dia, grande volume, sem pus/sangue, SEM tenesmo/puxo; pode ter esteatorreia. Baixa (IG): > 10x/dia, pequeno volume, muco/pus/sangue, tenesmo e puxo."},
    {id:"sgq43",d:"moderado",q:"A HIPERTENSÃO PORTAL é definida como:",o:["HAS sistêmica com complicações renais","Pressão da veia porta > 10 mmHg, causando varizes esofágicas, ascite e esplenomegalia","Hipertensão na artéria pulmonar por cor pulmonale","HAS acelerada com lesão de órgão-alvo"],a:1,e:"Hipertensão portal: pressão da veia porta > 10 mmHg (normal 5-10 mmHg). Consequências: varizes esofágicas, ascite, esplenomegalia, circulação colateral e encefalopatia hepática."},
    {id:"sgq44",d:"moderado",q:"A DOENÇA DE CROHN difere da RETOCOLITE ULCERATIVA porque:",o:["Na Crohn o acometimento é apenas da mucosa; na RCU é transmural","Na Crohn é TRANSMURAL, qualquer parte do TGI, com skip lesions; na RCU é da MUCOSA, reto-cólon, de forma contínua","Na RCU há fístulas e granulomas; na Crohn o acometimento é superficial","Ambas acometem apenas o intestino grosso de forma contínua"],a:1,e:"Crohn: TRANSMURAL, QUALQUER PARTE do TGI, skip lesions (alternância com áreas sãs). RCU: apenas MUCOSA, RETO-CÓLON, acometimento CONTÍNUO, retrogrado."},
    {id:"sgq45",d:"moderado",q:"As principais causas de HDA são:",o:["Hemorroidas, fissura anal e CA de cólon","Úlcera péptica, varizes esofágicas, lesão de Mallory-Weiss e AINES","Doença diverticular e retocolite ulcerativa","Isquemia mesentérica e CA de cólon"],a:1,e:"HDA (acima do ângulo de Treitz): úlcera péptica (gástrica e duodenal), varizes esofágicas, lesão de Mallory-Weiss, lesão aguda da mucosa (AINES, corticoides, estresse)."},
    {id:"sgq46",d:"moderado",q:"A SÍNDROME PILÓRICA DESCOMPENSADA apresenta:",o:["Ondas de Kussmaul e RHA aumentados","Vômitos de estase, halitose, sinal do vascolejo e distúrbios hidroeletrolíticos","Dor em 4 tempos com piora pós-prandial","Disfagia para sólidos com instalação rápida"],a:1,e:"Pilórica descompensada (obstrução total + atonia gástrica): vômitos de estase (alimento antigo), halitose, emagrecimento, sinal do vascolejo (líquido no estômago distendido), distúrbios hidroeletrolíticos (alcalose hipoclorêmica)."},
    {id:"sgq47",d:"moderado",q:"Na IC, o sistema RENINA-ANGIOTENSINA-ALDOSTERONA (SRAA) é ativado para:",o:["Promover vasodilatação e natriurese","Reter Na e água (aldosterona) aumentando a pré-carga, e vasoconstrição (angiotensina II) aumentando a pós-carga","Inibir a noradrenalina e reduzir a FC","Secretar BNP e promover diurese"],a:1,e:"SRAA na IC: aldosterona → retém Na e água → aumenta pré-carga → aumenta DC. Angiotensina II → vasoconstrição → aumenta pós-carga. A longo prazo, são deletérios (daí o uso de IECAs e espironolactona no tratamento)."},
    {id:"sgq48",d:"moderado",q:"A GLOMERULONEFRITE PÓS-INFECCIOSA é uma causa clássica de:",o:["Síndrome nefrótica com anasarca","Síndrome NEFRÍTICA com hematúria dismórfica, HAS e edema","IRA pré-renal","DRC por hiperfiltração"],a:1,e:"GN pós-infecciosa (geralmente por Streptococcus beta-hemolítico): síndrome NEFRÍTICA = hematúria (dismórfica), HAS, edema moderado, redução da TFG. Ocorre 1-3 semanas após infecção."},
    {id:"sgq49",d:"moderado",q:"A DISPEPSIA HIPERESTÊNICA (aumento da secreção gástrica) é caracterizada por:",o:["Plenitude pós-prandial, eructação e náuseas por redução da motilidade","Dor em 3 tempos que acorda à noite, alivia com alimentação, piora com café e álcool","Disfagia alta com engasgo e regurgitação nasal","Constipação com fezes em síbalos"],a:1,e:"Hiperestênica: dor em 3 tempos, acorda à noite, alivia com alimentação (neutraliza o ácido), piora com café/álcool/fumo. Associa-se a úlcera péptica duodenal e H. pylori. Hipoestênica: plenitude, náuseas, eructação."},
    {id:"sgq50",d:"moderado",q:"O DERRAME PLEURAL no exame físico apresenta:",o:["FTV aumentado, timpanismo e desvio traqueal ipsilateral","Expansibilidade reduzida, sinal de Lemos-Torres, FTV REDUZIDO, macicez, MV abolido e desvio traqueal CONTRALATERAL","Expansibilidade aumentada, FTV aumentado e som broncovesicular","FTV aumentado, macicez e broncofonia sem desvio"],a:1,e:"Derrame pleural: expansibilidade reduzida, sinal de Lemos-Torres, FTV REDUZIDO, MACICEZ, MV abolido, desvio traqueal para o lado OPOSTO ao derrame."},
    {id:"sgq51",d:"moderado",q:"O índice TORNOZELO-BRAQUIAL (ITB) < 0,9 indica:",o:["Insuficiência venosa crônica","Doença arterial obstrutiva periférica (DAOP)","Síndrome nefrótica com edema de MMII","Trombose venosa profunda"],a:1,e:"ITB = PA tornozelo ÷ PA braço. Normal: 1,0-1,4. < 0,9 = DAOP. Pulsos podem estar filiformes ou ausentes. Pé de Charcot (microlesões ósseas por falta de sensibilidade) ocorre em diabéticos com neuropatia."},
    {id:"sgq52",d:"moderado",q:"A CISTITE baixa manifesta-se com:",o:["Febre alta, calafrios, náuseas, vômitos e sinal de Giordano positivo","Disúria, polaciúria, urgência miccional, dor suprapúbica, sem febre significativa","Hematúria macroscópica com síndrome nefrótica","Oligúria com aumento de creatinina e ureia"],a:1,e:"ITU baixa (cistite): disúria, polaciúria, urgência miccional, dor suprapúbica, sem febre significativa. ITU alta (pielonefrite): febre alta, calafrios, náuseas, vômitos, dor lombar e Giordano+."},
    {id:"sgq53",d:"moderado",q:"No HIPOTIREOIDISMO, os achados do exame físico incluem:",o:["Taquicardia, sudorese, perda de peso e tremores","Bradicardia, pele seca, fria e áspera, mixedema, reflexos lentos e fácies mixedematosa","Exoftalmia, tremor e hiperdefecação","Taquicardia, pele quente e úmida, e insônia"],a:1,e:"Hipotireoidismo: bradicardia, pele seca/fria/áspera, mixedema, reflexos aquileus lentos (fase de relaxamento prolongada), fácies mixedematosa, sonolência, constipação, ganho de peso e intolerância ao frio."},
    {id:"sgq54",d:"moderado",q:"No HIPERTIREOIDISMO, os achados do exame físico incluem:",o:["Bradicardia, pele seca, ganho de peso e constipação","Taquicardia/FA, exoftalmia, tremor, pele quente e úmida, perda de peso e intolerância ao calor","Hipotensão postural e hiperpigmentação","Fácies mixedematosa e voz grave"],a:1,e:"Hipertireoidismo: taquicardia/FA, exoftalmia (Graves), tremor, pele quente e úmida, perda de peso, intolerância ao calor, diarreia, HAS sistólica, fácies basedowiana."},
    {id:"sgq55",d:"dificil",q:"No exame físico da IC CONGESTIVA, qual achado NÃO é esperado?",o:["Turgência de jugulares e refluxo hepatojugular","B3 (galope) e estertores nas bases pulmonares","Edema de MMII com sinal de cacifo","Hipertimpanismo bilateral com tórax em barril"],a:3,e:"IC congestiva: turgência jugular, B3 (galope = sofrimento miocárdico), estertores nas bases, edema de MMII. O HIPERTIMPANISMO com tórax em barril é achado do ENFISEMA (DPOC), não da IC."}
   ]},

  aulateste:{ name:"Aula Teste — Divisão da Superfície Corporal", doc:"Porto 8ª ed. Cap. 5",
   summary:`## Aula Teste — Divisão da Superfície Corporal\n\n> Esta aula é um **teste** para validar o formato de questões com imagem SVG. Pode ser excluída após validação.\n\n### Figura 5.9 — Porto & Porto\nDivisão da superfície corporal em regiões: pescoço, tórax, abdome, membros superiores e inferiores (vista anterior), adaptada de Wolf-Heidegger – Atlas de Anatomia, 6ª ed., 2006.\n\n### Regiões principais (vista anterior)\n- **Cervicais:** 14 cervical anterior, 15 esternocleidomastóidea, 16 cervical lateral\n- **Torácicas:** 18 infraclavicular, 19 mamária, 20 axilar, 21 esternal\n- **Abdominais:** 22 hipocôndrio, 23 epigástrio, 24 lateral (flanco), 25 umbilical, 26 inguinal, 27 púbica/hipogástrio\n- **MMSS:** 37 deltóidea, 38 braquial anterior, 40 cubital anterior, 42 antebraquial anterior, 45 palma da mão\n- **MMII:** 47 femoral anterior, 49 genicular anterior, 51 crural anterior, 54 dorso do pé`,
