- TB surgiu na Africa e COEVOLUIU COM A MIGRACAO DOS HUMANOS - 7 linhagens geneticamente distintas.`,
tips:"BAAR = Mycobacterium (bacilo vermelho Ziehl-Neelsen). TB existe desde o Neolitico; mumia egipcia com TB coluna. Koch: 24/03/1882 isolou M. tuberculosis. BCG = M. bovis atenuado (Calmette e Guerin, 230 passagens). 1944 = Estreptomicina (cura TB). 1948 = resistencia a estreptomicina. RIPE: Rifampicina + Isoniazida + Pirazinamida + Etambutol. M. tuberculosis: BAAR, 18h de geracao, intracelular (macrofagos), tratamento 6 meses. Infeccao TB: 5% primaria, 95% latencia; reativacao 50% no HIV/TB. M. leprae: nao cresce em meio artificial; zoonose (tatu); India+Brasil+Indonesia = 79,3% casos.",
questions:[{id:"a11q1",d:"facil",q:"Segundo o slide da aula, qual e a principal caracteristica tintorial que define o genero Mycobacterium e por que eles tem essa propriedade?",o:["BAAR (Bacilos Alcool-Acido Resistentes): aparecem vermelhos na coloracao de Ziehl-Neelsen sobre fundo azul, devido ao alto teor de acido micolico na parede celular que resiste a descoramento com alcool-acido","Sao Gram-positivos que formam cachos ao microscopio","Sao Gram-negativos com capsula polissacaridica e LPS","Sao positivos no Gram e negativos no Ziehl-Neelsen"],a:0,e:"O slide \"Micobacterias\" mostra foto de bacilos vermelhos sobre fundo azul e destaca: \"Bacilos Alcool-Acido resistencia.\" O acido micolico na parede celular das micobacterias e extremamente hidrofobico e impermeavel, mantendo o corante carbol-fucsina mesmo apos descoramento com alcool-acido. Resultado: bacilos vermelhos sobre fundo azul."},
{id:"a11q2",d:"facil",q:"De acordo com o slide da aula, quais sao as doencas causadas pelas principais especies de Mycobacterium?",o:["M. leprae/M. lepromatosis: Lepra; M. ulcerans: Ulcera de Buruli; Mycobacterium spp ambientais: Micobacterioses (MNT); M. tuberculosis: Tuberculose pulmonar e extra-pulmonar","Apenas tuberculose pulmonar e meningite tuberculosa","Tuberculose, hanseniase, HIV e hepatite B","Malaria, leishmaniose, hanseniase e tuberculose"],a:0,e:"O slide \"Micobacterias\" lista explicitamente: M. leprae e M. lepromatosis = Lepra; M. ulcerans = Ulcera de Buruli; Mycobacterium spp (micobacterias ambientais) = Micobacterioses; M. tuberculosis = Tuberculose (pulmonar e extra-pulmonar)."},
{id:"a11q3",d:"moderado",q:"Segundo os dados epidemiologicos do slide da aula, qual e a situacao global da hanseniase em 2023 e quais paises lideram em casos?",o:["182.815 novos casos em 2023 (aumento de ~5% em relacao a 2022); India, Brasil e Indonesia respondem por ~79,3% dos casos globais; maioria dos casos em paises de baixa e media renda","Hanseniase foi eliminada globalmente em 2020","Brasil e o unico pais endemico no mundo","182.815 casos; distribuicao exclusivamente na Africa e Asia"],a:0,e:"O slide \"Hanseniase\" afirma: \"Em 2023, 182.815 novos casos foram documentados pela OMS em 184 dos 221 (83%) paises e territorios, o que representa um aumento de ~5% em comparacao com 2022. A maioria dos casos foi encontrada em paises de baixa e media renda, com India, Brasil e Indonesia respondendo por ~79,3% dos casos globais.\""},
{id:"a11q4",d:"moderado",q:"De acordo com o slide da aula, quais caracteristicas biologicas do M. leprae dificultam seu estudo e controle?",o:["Duplicacao a cada 2-3 dias; NAO cresce em meio artificial; possivel ZOONOSE com reservatorios em tatus (rodovias brasileiras) e esquilos vermelhos nas Ilhas Britanicas (M. lepromatosis)","Cresce rapidamente em agar sangue; sem reservatorio animal","Duplica a cada 20 minutos; cresce em qualquer meio de cultura","Nao tem reservatorio animal; cresce em Lowenstein-Jensen; duplica a cada 18h"],a:0,e:"O slide \"Mycobacterium leprae\" afirma: \"Duplicacao a cada 2-3 dias. Nao cresce em meio artificial. Possivel Zoonose.\" O slide mostra dois artigos: 1) Science 2016 - esquilos vermelhos nas Ilhas Britanicas infectados com M. leprae e M. lepromatosis; 2) Monsalve-Lara et al. 2024 - tatus em rodovias brasileiras (2 de 5 positivos para M. leprae)."},
{id:"a11q5",d:"moderado",q:"Segundo o slide da aula, quais sao os dois complexos principais de MNT e sua importancia clinica?",o:["Complexo MAC (M. avium e M. intracelulare) e Complexo MAB (M. abscessus, M. malmoense, M. bolletti); dificil diagnostico e tratamento; maior incidencia em IMUNODEPRIMIDOS","Complexo M. tuberculosis e Complexo M. leprae; causam apenas TB e hanseniase","Complexo MAC e Complexo M. bovis; causam principalmente TB bovina","MNT e um unico complexo com 3 especies; de baixa importancia clinica"],a:0,e:"O slide \"MNT/MOTT\" lista 190 especies: Complexo MAC (M. avium e M. intracelulare) e Complexo MAB (M. abscessus, M. malmoense, M. bolletti), alem de M. fortuitum, M. szulgai, M. chelonae e M. kansasii. O slide \"Importancia do diagnostico de MNT\" afirma: dificil diagnostico e tratamento; MAIOR INCIDENCIA EM IMUNODEPRIMIDOS."},
{id:"a11q6",d:"facil",q:"De acordo com o slide da aula, quais sao as principais caracteristicas do M. tuberculosis?",o:["BAAR; rico em G+C; envoltorio lipidico (acido micolico, arabinogalactana, LAM); tempo de geracao de 18 HORAS; localiza-se no interior dos macrofagos","Bacilo Gram-positivo; sem lipideos na parede; tempo de geracao de 20 minutos; extracelular","BAAR; pobre em G+C; sem envoltorio lipidico; tempo de geracao de 24 horas; extracelular","Gram-negativo; encapsulado; tempo de geracao de 1 hora; localiza-se nos neutrofilos"],a:0,e:"O slide \"Caracteristicas principais\" lista: BAAR (Bacilo alcool-acido resistente); Rico em G+C; Envoltorio Lipidico (acido micolico, arabinogalactana, LAM); Tempo de geracao de 18 horas; Localiza-se no interior dos macrofagos."},
{id:"a11q7",d:"moderado",q:"Segundo o slide da aula, por que a parede celular lipidica do M. tuberculosis e tao importante clinicamente?",o:["RESISTENCIA A ANTIMICROBIANOS E BIOCIDAS (acido micolico forma barreira impermeable); EVOLUCAO LENTA DA DOENCA (tempo de geracao 18h); TRATAMENTO LONGO de 6 MESES COM CEPAS SENSIVEIS","A parede lipidica facilita a absorcao de antibioticos, por isso o tratamento e mais curto","A parede celular nao influencia no tratamento; o tratamento longo e devido a resistencia adquirida","A parede lipidica e responsavel apenas pela virulencia, sem impacto no tratamento"],a:0,e:"O slide \"Importancia da parede celular no controle e tratamento da TB\" afirma em maiusculas: RESISTENCIA A ANTIMICROBIANOS E BIOCIDAS; EVOLUCAO LENTA DA DOENCA; TRATAMENTO LONGO (6 meses COM CEPAS SENSIVEIS). O acido micolico dificulta a penetracao de antibioticos e desinfetantes."},
{id:"a11q8",d:"moderado",q:"De acordo com o slide da aula, qual evidencia historica mostrou pela primeira vez que a TB era transmissivel entre individuos?",o:["Jean Villemin (1865): observou que soldados saudaveis vindos do campo se tornavam tuberculosos nos quarteeis; inoculou liquido purulento de uma cavidade tuberculosa em coelhos e gerou TB = evidencia em modelo animal","Robert Koch (1882) demonstrou transmissao por goticulass em experiencias com humanos voluntarios","Mumia peruana (1000 EC) com lesoes vertebrais demonstrou transmissao antiga","Streptomicina em 1944 demonstrou que a doenca era infecciosa por sua resposta ao tratamento"],a:0,e:"O slide \"Historia\" mostra Jean Villemin (1827-1892): \"Observou que a TB era mais frequente entre os soldados que permaneciam por muito tempo nos quarteeis do que entre os que estavam no campo. Destacou que os recrutas saudaveis vindos do campo frequentemente se tornavam tuberculosos alguns meses apos o inicio do servico. Inoculou em coelhos, liquido purulento de uma cavidade tuberculosa removido na autopsia de um individuo que morreu de tuberculose e gerou TB. Evidencia em modelo animal.\""},
{id:"a11q9",d:"facil",q:"Segundo o slide da aula, qual e a importancia historica do 24 de marco de 1882 para a tuberculose?",o:["Robert Koch identificou e isolou o M. tuberculosis em 24 de marco de 1882; Paul Ehrlich e Rudolph Virchow estavam presentes; Ehrlich descreveu como \"o evento cientifico mais impressionante que ja assisti\"","Em 24 de marco de 1882 foi descoberta a estreptomicina, o primeiro antibiotico para TB","Em 24 de marco de 1882 foi aplicada a primeira vacina BCG em humanos","Em 24 de marco de 1882 foi fundada a OMS para combater a TB"],a:0,e:"O slide \"24 Marco de 1882\" mostra Robert Koch (esquerda), M. tuberculosis (centro), e Rudolph Virchow (direita). O destaque: \"This evening remains imprinted on my memory as the most awe-inspiring scientific event I have ever attended (Paul Ehrlich).\" Koch apresentou a descoberta do M. tuberculosis na Sociedade de Fisiologia de Berlin em 24/03/1882."},
{id:"a11q10",d:"moderado",q:"De acordo com o slide da aula, como a vacina BCG foi desenvolvida e quais sao suas caracteristicas?",o:["Albert Calmette e Camille Guerin; a partir de M. bovis 1908-1921; 13 anos e 230 passagens (subcultivos) resultaram em ATENUACAO DA BACTERIA COM PERDA DE CAPACIDADE IMUNOGENICA; existem diversas cepas BCG (Russia, Japan, Danish, Merieux, Pasteur, etc.)","BCG foi desenvolvida a partir de M. tuberculosis humano irradiado; foi aprovada em 1944","BCG e uma vacina de subunidades proteicas do M. tuberculosis; foi desenvolvida em 2000","BCG e identica ao M. tuberculosis virulento, apenas com dose reduzida para provocar imunidade"],a:0,e:"O slide \"Vacina BCG\" mostra: \"Albert CALMETTE e Camille GUERIN. Mycobacterium bovis 1908-1921. 13 anos e 230 passagens (subcultivos).\" E destaca: \"ATENUACAO DA BACTERIA COM PERDA DE CAPACIDADE IMUNOGENICA.\" O diagrama mostra as diversas cepas BCG derivadas: Russia, Moreau, Japan, Sweden, Birkhaug, Prague, Glaxo, Danish, Merieux, Tice, Frappier, Connaught, Phipps, Pasteur."},
{id:"a11q11",d:"facil",q:"Segundo o slide da aula, quando foi descoberta a cura da tuberculose e o que aconteceu logo depois?",o:["1944: Estreptomicina = A CURA DA TB; 1948: ja havia sido detectada resistencia a estreptomicina em TB pulmonar","1882: Koch descobriu a cura junto com o agente etiologico","1921: BCG curou a TB em todos os pacientes vacinados","1944: Penicilina curou a TB; resistencia surgiu apenas em 2000"],a:0,e:"O slide \"1944 ESTREPTOMICINA\" destaca em amarelo: \"A CURA DA TB.\" O slide seguinte mostra o artigo de 1948 (British Medical Journal, Dec. 11, 1948): \"STREPTOMYCIN RESISTANCE IN PULMONARY TUBERCULOSIS - A RESISTENCIA.\" Em apenas 4 anos apos a descoberta da estreptomicina, ja havia sido publicada resistencia bacteriana."},
{id:"a11q12",d:"moderado",q:"De acordo com o slide da aula, qual e o esquema de tratamento atual para tuberculose com cepas sensiveis?",o:["Rifampicina + Isoniazida + Pirazinamida + Etambutol (esquema RIPE); tratamento de 6 meses em cepas sensiveis","Apenas penicilina; a TB ainda nao tem esquema definido de tratamento","Estreptomicina isolada por 3 meses; foi o primeiro e unico tratamento eficaz","Vancomicina + ciprofloxacino + metronidazol; tratamento de 1 mes"],a:0,e:"O slide \"Tratamento - do Desconhecido ao Conhecimento\" mostra os quatro farmacos: RIFAMPICINA; ISONIAZIDA; PIRAZINAMIDA; ETAMBUTOL. O slide \"Importancia da parede celular\" afirma: \"TRATAMENTO LONGO (6 meses COM CEPAS SENSIVEIS).\" Para MDR-TB e XDR-TB o tratamento e ainda mais longo e complexo."},
{id:"a11q13",d:"moderado",q:"Segundo o diagrama \"Infeccao e Doenca\" do slide da aula, qual e o risco de reativacao da TB latente em pacientes com HIV?",o:["50% de risco de reativacao (HIV/TB) - muito maior do que os 5% de reativacao espontanea em individuos imunocompetentes","1% de risco de reativacao em HIV; igual ao da populacao geral","100% dos pacientes HIV com TB latente desenvolvem TB ativa","5% de reativacao em HIV, igual ao risco em imunocompetentes"],a:0,e:"O slide \"Infeccao e Doenca\" mostra o diagrama: Latent infection → (5%) reactivation espontanea → Active infection; e tambem: Latent infection → (50% HIV/TB) Reactivation → Active infection. Portanto, o HIV aumenta drasticamente o risco de reativacao de 5% (imunocompetentes) para 50% (coinfeccao HIV/TB)."},
{id:"a11q14",d:"moderado",q:"De acordo com o slide da aula, quais fatores influenciam se uma exposicao ao M. tuberculosis resultara em infeccao ativa ou latencia?",o:["Hospedeiro (imunogenetica, comorbidades como diabetes e cancer, extremos de idade <5 e >60 anos); Patogeno (carga infecciosa e virulencia); Imunidade adquirida (infeccao previa, TB ativa anterior, TB latente, infeccoes com MNT, vacina BCG)","Apenas a virulencia da cepa bacteriana determina o resultado; fatores do hospedeiro nao influenciam","Apenas a dose de baciloscopia positiva determina o desenvolvimento da doenca","So depende do status vacinal do individuo; fatores geneticos nao tem papel"],a:0,e:"O slide \"Infeccao/Doenca Depende:\" lista tres grupos de fatores: 1) HOSPEDEIRO: Imunogenetica (variabilidade genetica individual), Comorbidades (diabetes, cancer e outras morbidades imunossupressoras), Idade (extremos <5 anos e >60 anos). 2) PATOGENO: Carga infecciosa (quantidade de bacterias transmitidas), Virulencia (variavel bacteriana). 3) IMUNIDADE ADQUIRIDA: Infeccao previa, TB ativa anterior, TB latente, Infeccoes com MNT, Vacina."},
{id:"a11q15",d:"facil",q:"Segundo o slide da aula, qual era a magnitude da tuberculose nos seculos XVII a XIX e como a urbanizacao influenciou sua disseminacao?",o:["Do seculo XVII ao XIX, a TB causou 20% de todas as mortes no mundo ocidental; a TB avancou com as grandes cidades - superlotacao, ma ventilacao e pouca luz favorecem a transmissao por aerossol","A TB causou apenas 1-2% das mortes no mundo ocidental no seculo XIX","A TB era restrita a zonas rurais e diminuiu com o crescimento das cidades","A TB causou 20% das mortes apenas na Asia; na Europa era rara nesse periodo"],a:0,e:"Os slides mostram: \"Do seculo XVII ate o seculo XIX, a Tuberculose causou 20% de todas as mortes no mundo ocidental\" (com imagens da Revolucao Industrial e favelas). Outro slide afirma: \"A TB avanca com as grandes cidades\" - porque a superlotacao, ma ventilacao e pouca luz facilitam a transmissao por aerossol de particulas infectantes."},
{id:"a11q16",d:"facil",q:"De acordo com o slide da aula, qual e a origem geografica e temporal do M. tuberculosis e como ele se disseminou globalmente?",o:["O genero Mycobacterium pode ter se originado ha mais de 150 milhoes de anos (Periodo Jurassico); o ancestral comum das cepas modernas surgiu ha 70.000 anos (Paleolitico); a TB surgiu na Africa e coevoluiu com a migracao dos humanos - hoje com 7 linhagens geneticamente distintas","M. tuberculosis surgiu na Europa medieval ha cerca de 1.000 anos e se espalhou pelas Cruzadas","TB surgiu na China ha 5.000 anos e se espalhou pela Rota da Seda","TB surgiu nas Americas pre-colombianas e foi trazida para a Europa pelos conquistadores"],a:0,e:"O slide \"Como e quando o M. tuberculosis se disseminou pelo mundo\" afirma: o genero Mycobacterium pode ter se originado ha mais de 150 milhoes de anos (Periodo Jurassico) e o ancestral comum das cepas modernas ha 70.000 anos (Periodo Paleolitico). O slide \"Coevolucao com a migracao dos humanos\" mostra que TB surgiu na Africa e se dispersou com as migracoes humanas - 7 linhagens geneticamente distintas."},
{id:"a11q17",d:"moderado",q:"Segundo o slide da aula, como se distinguem os tres estadios: exposicao ao M. tuberculosis, infeccao latente e doenca tuberculosa?",o:["Exposicao: sem sintomas, nao contagioso, testes negativos; TB infeccao latente: sem sintomas, nao contagioso, sem patologia macroscopica, testes de infeccao geralmente positivos; TB doenca: com ou sem sintomas, pode ser contagioso, patologia pulmonar ou em outros orgaos, testes positivos ou negativos","Os tres estadios sao clinicamente identicos; apenas a baciloscopia diferencia","Na infeccao latente o individuo e contagioso; na doenca ativa nao e contagioso","A exposicao sempre resulta em doenca ativa em individuos imunocompetentes"],a:0,e:"O slide \"Exposure - Tuberculosis infection - Tuberculosis disease\" (Lancet) descreve: Exposicao = sem sintomas, nao contagioso, patologia nao, testes microbiologicos negativos; TB Infeccao = sem sintomas, nao contagioso, sem patologia macroscopica, testes de infeccao tuberculosa geralmente POSITIVOS; TB Doenca = sintomas sim ou nao, contagioso sim ou nao, patologia pulmonar ou em outros locais, testes positivos ou negativos."},
{id:"a11e1",d:"moderado",q:"Segundo o slide da aula, o que o poeta brasileiro Manuel Bandeira descreveu em seu poema que reflete a realidade da tuberculose no Brasil?",o:["Tosse cronica, o diagnostico de \"escavacao no pulmao esquerdo e pulmao direito infiltrado\", a discussao sobre pneumotorax como tratamento e a limitacao das opcoes terapeuticas da epoca","A descoberta da vacina BCG que curou sua tuberculose","A hospitalizacao bem-sucedida em sanatorio com recuperacao completa","A recusa do tratamento com estreptomicina por medo dos efeitos colaterais"],a:0,e:"O slide mostra foto de Manuel Bandeira com o poema: \"Tosse, tosse, tosse. Mandou chamar o medico: Diga trinta e tres... O senhor tem uma escavacao no pulmao esquerdo e o pulmao direito infiltrado. Entao, doutor, nao e possivel tentar o pneumotorax? Nao. A unica coisa a fazer e tocar um tango argentino.\" Reflete o desespero dos pacientes com TB antes dos antibioticos eficazes (1944)."},
{id:"a11e2",d:"moderado",q:"De acordo com o slide da aula, como os sanatorios eram utilizados no tratamento da tuberculose antes da era dos antibioticos?",o:["Hermann Brehmer criou o primeiro sanatorio em 1854; pacientes eram internados em locais com ar puro, repouso e boa alimentacao (Nova Friburgo no Brasil, Sondalo na Italia, Genebra na Suica)","Sanatorios eram hospitais de isolamento apenas para evitar transmissao; nao tinham funcao terapeutica","Sanatorios usavam apenas ventilacao mecanica para tratar a TB pulmonar","Sanatorios foram criados apenas apos a descoberta da estreptomicina em 1944"],a:0,e:"O slide \"Sanatorios\" mostra: Hermann Brehmer (1854) criou o primeiro sanatorio em Gobersdorf (Sokolowsko). As fotos mostram sanatorios em Genebra, Sondalo (Italia) e Nova Friburgo (Brasil). O tratamento baseava-se em ar fresco de altitude, repouso, sol e boa alimentacao - antes da era dos antibioticos era a unica intervencao disponivel."},
{id:"a11e3",d:"dificil",q:"Segundo o slide da aula, a tuberculina (Koch Remedy) desenvolvida por Robert Koch em 1891 era considerada como possivel cura para TB. Qual foi o resultado dessa tentativa?",o:["A tuberculina nao curou a TB; Rudolph Virchow publicou artigo criticando os efeitos nos orgaos internos dos pacientes tuberculosos (BMJ 1891, vol. 1, n. 1568); foi um fracasso terapeutico, mas a tuberculina e usada hoje como teste diagnostico (PPD)","A tuberculina foi aprovada como cura eficaz e substituiu os sanatorios em 1892","A tuberculina curou 95% dos pacientes no ensaio de Koch de 1891","A tuberculina nunca foi testada em humanos; Koch so realizou experimentos em animais"],a:0,e:"O slide mostra o artigo \"Professor Kochs Remedy For Tuberculosis\" (BMJ, Vol. 1, No. 1568, Jan. 17, 1891) e o artigo de Rudolph Virchow \"Remarks on the effect of Kochs remedy on the internal organs of tuberculous patients\" (Berlin Medical Society, Jan. 7, 1891). Virchow criticou os efeitos da tuberculina. Foi um fracasso terapeutico - mas o derivado purificado (PPD) e usado ate hoje como teste de infeccao latente por TB."},
{id:"a11e4",d:"moderado",q:"De acordo com o slide da aula, por que a tuberculose avancou com o crescimento das grandes cidades nos seculos XVII a XIX?",o:["Superlotacao, ma ventilacao e pouca luz nas habitacoes urbanas favoreceram a transmissao por aerossol do M. tuberculosis; imigrantes saudaveis das areas rurais frequentemente adoeciam ao chegar nas cidades","As cidades tinham menos acesso a alimentos, causando desnutricao que predispoe TB","A poluicao industrial (fumaca de fabricas) era a causa direta da TB, sem relacao com transmissao bacteriana","As cidades tinham hospitais com pacientes TB que contaminavam o resto da populacao por contato direto"],a:0,e:"O slide \"A TB avanca com as grandes cidades\" mostra imagens da Revolucao Industrial com fabrica, cidade superlotada e favela ao lado de predio moderno. O slide anterior afirma: \"Do seculo XVII ate o seculo XIX, a TB causou 20% de todas as mortes no mundo ocidental.\" A urbanizacao criou as condicoes ideais para transmissao: superlotacao, ma ventilacao, pouca luz - favorecendo a disseminacao de baciloscopia positiva por aerossol."},
{id:"a11e5",d:"moderado",q:"Segundo o slide da aula, qual evidencia historica prova que a tuberculose e uma doenca pre-colombiana nas Americas?",o:["Mumia peruana (1.000 anos EC) com lesoes vertebrais caracteristicas de TB espinal (Mal de Pott) comprova que a TB existia nas Americas antes da chegada dos europeus","Documentos historicos dos Incas descrevem uma doenca chamada \"tosse da morte\" compativel com TB","Genes de resistencia ao M. tuberculosis foram encontrados em populacoes indigenas americanas, comprovando exposicao pre-colombiana","Nao ha evidencia de TB pre-colombiana nas Americas; a doenca foi trazida pelos europeus"],a:0,e:"O slide \"A TB E PRE-COLOMBIANA\" mostra: \"Mumia peruana (1.000 anos EC)\" com foto da mumia e das vertebras com lesoes. As vertebras mostradas apresentam colapso e deformidade caracteristicos da TB espinal (Mal de Pott). Combinado com a mumia egipcia (1077-943 AEC), fica claro que a TB existia em multiplos continentes muito antes de qualquer contato intercontinental moderno."}]},
  aula10:{name:"Aula 10 - Streptococcus e Enterococcus",doc:"AIP 2025 - Prof. Daniela Ramos",
summary:`## Aula 10 - Streptococcus e Enterococcus

### Caracteristicas gerais do genero Streptococcus
- Cocos Gram POSITIVOS em CADEIAS (pares ou cadeias). CATALASE NEGATIVOS (diferenca fundamental de Staphylococcus).
- Estrutura: capsula de acido hialuronico, parede celular com proteina M, grupo de carbohidrato (Lancefield), mucopeptideo, membrana protoplastica.

### Fluxograma de identificacao (slide)
- Gram+ cocos + Catalase+ = Staphylococcus (clusters) → coagulase+: S. aureus; coagulase-: novobiocina+ = S. epidermidis; novobiocina- = S. saprophyticus.
- Gram+ cocos + Catalase- = Streptococcus (pairs/chains): alfa-hemolise → optoquina/solubilidade biliar+ = S. pneumoniae (encapsulado); optoquina- = Viridans (S. mutans, S. mitis). Beta-hemolise → bacitracina/PYR+ = Grupo A (S. pyogenes); bacitracina- = Grupo B (S. agalactiae). Gama → crescimento NaCl 6,5%- = S. bovis; NaCl 6,5%+ = Enterococcus (E. faecalis, E. faecium).

### Padroes de hemolise
- Beta-hemolise (hemolise total): Estreptolisina - enzima que interage com colesterol na membrana celular → deterioracao da estrutura = zona clara no agar sangue. S. pyogenes = sensivel a bacitracina.
- Alfa-hemolise (hemolise parcial): oxidacao da hemoglobina em meta-hemoglobina pelo H2O2 secretado pela bacteria = zona verde. S. pneumoniae = sensivel a optoquina.
- Gama (nao hemolit ico): sem hemolise. Enterococcus.

### Classificacao de Lancefield
- Rebecca Lancefield classificou pelo carbohidrato C (antigeno de grupo) na parede celular. So beta-hemolit icos possuem Ag grupo-especifico.
- S. pneumoniae e S. viridans = NAO agrupav eis (nao possuem Ag grupo-especifico).
- Tabela: S. pyogenes = A, beta; S. agalactiae = B, beta/gama; S. dysgalactiae = C/G, beta (respiratory, SSTI); S. pneumoniae = None, alfa; S. bovis = D, alfa/gama (associado a cancer de colon e endocardite); S. mutans = viridans, caries; S. mitis = viridans, IE oportunista; S. anginosus = A/C/F/G, infeccoes purulentas.

### Streptococcus pyogenes (Grupo A - GAS)
- Extremamente contagioso: apenas 12h apos ter sido infectado, o individuo ja e capaz de transmitir mesmo sem sintomas.
- Surto Londres (2018-2019): 10/22 criancas (45,5%) com esfregaco de garganta positivo.
- Patogenese: 1) Adesao e multiplicacao (Proteina M + capsula facilitam ligacao as celulas epiteliais); 2) Invasao tecidual (SpeB protease + SLS desestabiliza proteinas juncionais); 3) Citotoxicidade (SLO - estreptolisina O); 4) Evasao imune.
- Mecanismos de virulencia: M-protein (replicacao no sangue), capsula HA (disfarce), SLO (internalizacao), SLS (suprime neutrofilos, dor via TRPV1), SpyCEP/CXCL8 (evade fagocitos), SpeB (necrose derme), IdeS/IgG (compromete resposta B-cell), SIC (inativa complemento), peptidase C5a.
- Doencas supurativas: faringite/amigdalite (15-30% das faringites), impetigo, febre escarlatina, fasciite necrosante, doencas invasivas.
- Doencas mediadas por toxinas: exotoxinas pirogenicas (SpeA, SpeB, SpeC) = superantigenos; SpA e SpC = Sindrome do Choque Toxico Estreptococico; escarlatina = faringite + erupcao cutanea + lingua em morango; reacao tardia 2-7 dias apos faringite.
- Fasciite necrosante: porta de entrada definida → SAG entra → exotoxinas → dano local + oclusao capilar → eritema + sensibilidade → bolhas + equimoses → infeccao tecidos profundos + oclusao venulas → necrose generalizada.
- Sequelas NAO-SUPURATIVAS: Febre reumatica aguda (mimetismo molecular: proteina M vs miosina/queratina cardiaca → anticorpos → cardite); Glomerulonefrite aguda pos-estreptococica (RIM).

### Streptococcus agalactiae (Grupo B - GBS)
- Coloniza ~40% dos adultos sadios (trato intestinal inferior e genitourinario feminino).
- Principal causador de sepse puerperal, pneumonia e meningite em recem-nascidos.
- Anticorpos anti-antigeno capsular sao protetores em neonatos.
- Rastreio recomendado pelo MS: 34a a 37a semana de gravidez.
- Quimioprofilaxia: 2g Ampicilina (dose de ataque) + 1g a cada 6h ate o parto (pelo menos 4 horas antes).
- Estudo FURG (2016): 31/110 gestantes GBS+; 20% infeccao neonatal; 3% morte neonatal quando nao diagnosticado; quimioprofilaxia reduz 5x a prematuridade e infeccao.
- Fatores de virulencia GBS: FbsA/B/C (fibronectina, celulas vaginais), PbsP (colonizar/invadir tecidos), Plasminogeno, Srr1/Srr2 (celulas epiteliais vaginais/cervicais), HvgA (epithelios intestinal e cerebral), Hemolytic pigment (penetra placenta, mata plaquetas, resiste mastocitos/macrofagos), Capsula (evasao de neutrofilos/macrofagos/plaquetas).
- S. agalactiae tem preferencia por faixas etarias extremas: neonatos ate a 1a semana, idosos > 65 anos, gestantes durante o parto, e debilitados cronicos.`,
tips:"Streptococcus: cadeias, Gram+, catalase-. Staphylococcus: cachos, Gram+, catalase+. Beta-hemolise: Estreptolisina (colesterol). Alfa-hemolise: H2O2 + meta-hemoglobina (verde). S. pyogenes: Grupo A, beta, bacitracina sensivel. S. agalactiae: Grupo B, beta. S. pneumoniae: alfa, optoquina sensivel, NAO agrupavel (sem Ag Lancefield). S. bovis (Grupo D): associado a cancer de colon - cancer de colon + endocardite = pesquisar S. bovis. GAS transmite em 12h mesmo sem sintomas. Sequelas: febre reumatica (coracao) + glomerulonefrite (rim). Febre reumatica: mimetismo molecular, proteina M vs miosina cardiaca. GBS: 40% adultos colonizados, sepse/meningite em RN; rastreio 34-37a semana; quimioprofilaxia ampicilina.",
questions:[{id:"a10q1",d:"facil",q:"Segundo o slide da aula, qual e a principal diferenca entre Streptococcus e Staphylococcus no arranjo celular e no teste da catalase?",o:["Streptococcus: cadeias (pairs or chains), catalase NEGATIVO; Staphylococcus: clusters (cachos), catalase POSITIVO","Streptococcus: clusters, catalase positivo; Staphylococcus: cadeias, catalase negativo","Ambos formam cadeias; a diferenca e apenas no teste da coagulase","Streptococcus e Gram negativo; Staphylococcus e Gram positivo"],a:0,e:"O slide mostra o fluxograma de identificacao: Gram+ cocos → Catalase → positivo = Staphylococcus (clusters/cachos); negativo = Streptococcus (pairs or chains/cadeias). Alem disso, o slide do Streptococcus confirma: \"Arranjo = Streptococcus (cadeias); GRAM = Gram positivo; catalase negativo.\""},
{id:"a10q2",d:"facil",q:"De acordo com o fluxograma de identificacao apresentado no slide da aula, como se diferencia S. pneumoniae dos estreptococos do grupo Viridans?",o:["S. pneumoniae: alfa-hemolitico + sensivel a optoquina + solubilidade biliar positiva + encapsulado (Quellung+); Viridans: alfa-hemolitico + resistente a optoquina + nao solubilidade biliar + sem capsula","S. pneumoniae: beta-hemolitico + sensivel a bacitracina; Viridans: gamma-hemolitico","S. pneumoniae e resistente a optoquina; Viridans e sensi vel","Ambos sao identicos; a distincao e feita apenas por sorologia"],a:0,e:"O fluxograma do slide: Streptococcus catalase- → alfa-hemolise → Optochin sensitivity and bile solubility → positivo = S. pneumoniae (encapsulated); negativo = Viridans streptococci (S. mutans, S. mitis - no capsule). Tambem no slide de hemolise: \"alfa-hemolise - sugestivo de S. pneumoniae → SENSIVEL A OPTOQUINA.\""},
{id:"a10q3",d:"moderado",q:"Segundo o slide da aula, qual e o mecanismo da beta-hemolise produzida pelos estreptococos, como a estreptolisina?",o:["A Estreptolisina e uma enzima produzida pela bacteria que interage com o colesterol na membrana celular das hemacias, resultando na deterioracao dessa estrutura - formando zona clara (hemolise total) no agar sangue","A beta-hemolise ocorre pela oxidacao da hemoglobina em meta-hemoglobina pelo H2O2","A beta-hemolise resulta da digestao das hemacias por enzimas proteoliticas extracelulares","A beta-hemolise e causada pelo LPS da membrana externa bacteriana"],a:0,e:"O slide \"Padrao de Hemolise\" afirma: \"Beta-hemolitico (hemolise total): enzima produzida pela bacteria (Estreptolisina). Essa enzima interage com o colesterol na membrana celular, resultando na deterioracao desta estrutura celular de protecao.\" Resultado: zona clara ao redor da colonia no agar sangue. Diferente da alfa-hemolise, que e parcial (verde) por oxidacao com H2O2."},
{id:"a10q4",d:"moderado",q:"De acordo com o slide da aula, como a Rebecca Lancefield classificou os estreptococos e quais grupos NAO podem ser classificados por esse sistema?",o:["Lancefield classificou pelos carboidratos C (antigenos de grupo) na parede celular; S. pneumoniae e S. viridans NAO possuem Ag grupo-especifico e sao nao-agrupav eis","Lancefield classificou pela coloracao de Gram; todos os estreptococos podem ser agrupados","Lancefield classificou pelo padrao de hemolise; todos os grupos tem antigeno especifico","Lancefield classificou pelos genes de resistencia; apenas beta-hemolit icos tem antigeno"],a:0,e:"O slide sobre Lancefield afirma: \"Rebecca Lancefield → Caracteristicas antigenicas (Carboidrato C).\" E: \"alfa-hemolit icos e nao hemolit icos - nao possui Ag grupo-especifico na parede celular. S. pneumoniae e S. viridans - Nao Agrupav eis.\" Portanto, apenas beta-hemolit icos possuem o carboidrato C de Lancefield."},
{id:"a10q5",d:"facil",q:"Segundo a tabela de classificacao dos estreptococos apresentada no slide da aula, qual e a associacao clinica UNICA do S. bovis (grupo D)?",o:["S. bovis: Lancefield D, alfa/gama-hemolit ico; associado a CANCER DE COLON e endocardite infecciosa","S. bovis: Lancefield A, beta-hemolit ico; associado a febre reumatica","S. bovis: nao agrupavel, alfa-hemolit ico; associado a caries dentarias","S. bovis: Lancefield B, beta/gama-hemolit ico; causa sepse neonatal"],a:0,e:"A tabela \"Classification of Strep from Humans\" no slide lista S. bovis species group: Lancefield D, alfa/gama, \"Viridans; associated with colon cancer; IE (infective endocarditis).\" Essa associacao clinica e unica: bacteremia por S. bovis deve levar a investigacao de cancer colorretal."},
{id:"a10q6",d:"moderado",q:"De acordo com o slide da aula, qual e a estrutura da parede do S. pyogenes (Grupo A) que permite sua classificacao por Lancefield e tambem causa sequelas imunologicas?",o:["Proteina M na parede celular e o antigeno de grupo-especifico (Carboidrato C de Lancefield); a proteina M tambem causa mimetismo molecular com proteinas cardiacas (miosina) levando a febre reumatica","A capsula de acido hialuronico e o antigeno de Lancefield e causa as sequelas","Os pili sao o alvo dos anticorpos de Lancefield e causam as sequelas autoimunes","O LPS da membrana externa e o responsavel pela classificacao e pelas sequelas"],a:0,e:"O slide sobre estrutura de S. pyogenes mostra: Lancefield carbohydrate (carbohidrato C na parede celular para classificacao); M protein (fator de virulencia principal). O slide sobre sequelas nao-supurativas mostra: \"Reacao cruzada entre a proteina M do S. pyogenes e as proteinas miosina, queratina e outras do tecido cardiaco → anticorpos → cardite.\" A proteina M e central tanto para classificacao quanto para as sequelas."},
{id:"a10q7",d:"facil",q:"Segundo o slide da aula, qual e a importancia epidemiologica da transmissibilidade do S. pyogenes?",o:["A bacteria e extremamente contagiosa: apenas 12 horas apos ter sido infectado, o individuo ja e capaz de transmitir para outras pessoas, mesmo que ainda nao tenha desenvolvido qualquer sintoma","S. pyogenes so e transmitido apos 7 dias de sintomas intensos","A transmissao ocorre exclusivamente por contato fecal-oral com material contaminado","O individuo infectado so transmite durante a fase de convalescenca"],a:0,e:"O slide \"S. pyogenes Grupo A\" mostra em destaque: \"A bacteria Streptococcus pyogenes e extremamente contagiosa. Apenas 12 horas apos ter sido infectado, o individuo ja e capaz de transmiti-la para outras pessoas, mesmo que ainda nao tenha desenvolvido qualquer sintoma.\" Isso foi demonstrado no surto de Londres 2018-2019 onde 45,5% das criancas de uma escola tiveram esfregaco de garganta positivo."},
{id:"a10q8",d:"moderado",q:"De acordo com o slide da aula, quais sao os 4 estadios da patogenese do S. pyogenes (GAS) na infeccao tecidual?",o:["1) Adesao e multiplicacao tecidual (proteina M + capsula ligam-se as celulas epiteliais); 2) Invasao tecidual (SpeB protease + SLS desestabilizam proteinas juncionais); 3) Citotoxicidade (SLO); 4) Controle da resposta imune","1) Bacteremia; 2) Endocardite; 3) Meningite; 4) Sepse","1) Formacao de esporos; 2) Germinacao; 3) Proliferacao; 4) Esporulacao","1) Fagocitose pelo neutrofilo; 2) Destruicao lisossomal; 3) Apresentacao de antigeno; 4) Resposta adaptativa"],a:0,e:"O slide sobre patogenese do GAS mostra 5 paineis numerados: 1 = Adhesion & Tissue-induced multiplication (Proteina M expressa na superficie + capsula facilitam ligacao as celulas epiteliais); 2-3 = Tissue invasion (SpeB protease + estreptolisina S (SLS) desestabiliza proteinas juncionais); 4 = Cytotoxicity (SLO); 5 = Control of the immune response."},
{id:"a10q9",d:"moderado",q:"Segundo o slide da aula, a SLS (estreptolisina S) e a SLO (estreptolisina O) tem papeis distintos na patogenese do GAS. Qual e o papel da SLS?",o:["SLS suprime o recrutamento de neutrofilos e a atividade bactericida; tambem causa dor via neuronios TRPV1; SLO causa internalizacao nas celulas hospedeiras","SLS e SLO tem a mesma funcao: destruicao de hemacias por hemolise","SLS ativa o complemento; SLO inibe a resposta de celulas T","SLS causa febre atraves de ativacao de citocinas; SLO forma poros nas hemacias"],a:0,e:"O slide de virulencia do GAS (diagrama com crianca) afirma: \"SLS: Suprimindo o recrutamento de neutrofilos e a atividade bactericida.\" Tambem mostra que SLS causa dor via neuronios TRPV1. Ja SLO e responsavel pela internalizacao da bacteria nas celulas hospedeiras. A Morte celular induzida por estreptolisina (SLS e SLO) e mencionada explicitamente."},
{id:"a10q10",d:"facil",q:"De acordo com o slide da aula, o S. pyogenes causa 15 a 30% dos casos de faringite. Quais outras doencas supurativas e sequelas ele pode causar?",o:["Faringite/amigdalite (15-30%), impetigo, febre escarlatina, fasciite necrosante, doencas invasivas; sequelas autoimunes como febre reumatica (coracao) e glomerulonefrite (rim)","Apenas faringite; nao causa outras doencas de pele ou sequelas","Apenas pneumonia e meningite em adultos acima de 65 anos","Apenas otite media em criancas; sem sequelas autoimunes documentadas"],a:0,e:"O slide \"Doencas supurativas\" afirma: \"Habita na garganta em forma septica, mas tambem e causador da febre escarlatina, faringite, impetigo, sequelas autoimunes, doencas invasivas. Ingressam atraves das narinas causando febre puerperal, febre reumatica e glomerulonefrite aguda.\" A tabela de faringites confirma S. pyogenes = 15-30% dos casos."},
{id:"a10q11",d:"moderado",q:"Segundo o slide da aula, quais sao as exotoxinas pirogenicas do S. pyogenes (Spe) e qual e o seu mecanismo como superantigenos?",o:["SpeA e SpeC = Sindrome do Choque Toxico Estreptococico (superantigenos que ativam massivamente celulas T via MHC classe II sem processamento antigenico normal, gerando tempestade de citocinas)","SpeB = unica toxina; inibe o sistema complemento","Spe sao toxinas que destroem diretamente as hemacias por formacao de poros","Spe sao endotoxinas da membrana externa que causam choque por LPS"],a:0,e:"O slide \"Doencas mediadas por toxinas\" mostra: \"Exotoxina eritrogenica estreptococica - Spe\" e \"SpA e SpC = Sind Choque Tox (superantigenos).\" O mecanismo mostrado no diagrama: SpeA → APC + TCR (sem processamento normal) → Th1 cytokines disturb Ab response → IL-6, IL-8, MIP-3 → Vascular leakage, Fever, Toxic shock. A erupcao cutanea e causada pelas citocinas inflamatorias."},
{id:"a10q12",d:"moderado",q:"De acordo com o slide da aula, quais sao os 6 estadios da fasciite necrosante estreptococica?",o:["1) Dano local pelas exotoxinas; 2) Oclusao capilar por plaquetas/leucocitos (dano vascular); 3) Eritema e sensibilidade se espalham; 4) Desenvolvimento de bolhas e equimoses; 5) Infeccao dos tecidos mais profundos + oclusao venulas/arteriolass; 6) Necrose atinge todos os tecidos","1) Bacteremia; 2) Endocardite; 3) Abscesso; 4) Fasciite; 5) Sepse; 6) Morte","1) Adesao; 2) Invasao; 3) Citotoxicidade; 4) Evasao; 5) Bacteremia; 6) Resolucao","1) Febre; 2) Edema; 3) Eritema; 4) Bolhas; 5) Cianose; 6) Recuperacao espontanea"],a:0,e:"O slide \"Mecanismo de desenvolvimento da fasciite necrosante estreptococica\" mostra 6 estadios numerados: 1) Dano local causado pelas exotoxinas; 2) Oclusao dos capilares pela agregacao de plaquetas e leucocitos = dano vascular; 3) Eritema e sensibilidade se espalham; 4) Desenvolvimento de bolhas e equimoses; 5) Infeccao dos tecidos mais profundos, oclusao de venulas e arteriolas; 6) Necrose afeta todos os tecidos."},
{id:"a10q13",d:"dificil",q:"Segundo o slide da aula, qual e o mecanismo pelo qual o S. pyogenes causa febre reumatica aguda como uma sequela nao-supurativa?",o:["Mimetismo molecular: anticorpos contra proteina M do S. pyogenes tem reacao cruzada com proteinas do tecido cardiaco (miosina, queratina) - os anticorpos atacam o coracao causando cardite; e uma resposta imune tardia a infeccao","O S. pyogenes invade diretamente o tecido cardiaco durante a faringite causando inflamacao","As toxinas SpeA e SpeB destroem diretamente o tecido cardiaco durante a bacteremia","A Estreptolisina O (SLO) lisa diretamente os cardiomiocitos causando inflamacao"],a:0,e:"O slide \"Sequelas nao-supurativas\" mostra diagrama de mimetismo molecular: Proteina M → ativacao do Sistema Imunologico → ativacao de linfocitos T especificos + producao de anticorpos especificos → MIMETISMO MOLECULAR → os anticorpos contra proteina M tem reacao cruzada com miosina cardiaca → CARDITE. O slide afirma: \"Reacao cruzada entre a proteina M do S. pyogenes e as proteinas miosina, queratina e outras do tecido cardiaco - a formacao de anticorpos que atuam contra a cartilagem das articulacoes.\" E uma resposta imune TARDIA a infeccao."},
{id:"a10q14",d:"facil",q:"De acordo com o slide da aula, qual e a importancia clinica do Streptococcus agalactiae (Grupo B) em recem-nascidos?",o:["Principal causador de sepse puerperal, pneumonia e meningite em recem-nascidos; coloniza ~40% dos adultos sadios no trato intestinal inferior e genitourinario feminino","S. agalactiae causa apenas faringite leve em recem-nascidos; nao e agente de meningite","S. agalactiae so e relevante em adultos acima de 65 anos; nao causa doenca neonatal","S. agalactiae causa principalmente infeccoes de pele em recem-nascidos; sepse e rara"],a:0,e:"O slide \"Streptococcus agalactiae (Grupo B)\" afirma: \"Principal causador de sepse puerperal, pneumonia e meningite em recem-nascidos.\" Tambem: \"40% dos individuos sadios sao colonizados (trato intestinal inferior e genitourinario feminino).\" A bacteria passa da mae colonizada para o recem-nascido durante o parto."},
{id:"a10q15",d:"moderado",q:"Segundo o slide da aula, quando deve ser realizado o rastreio de GBS em gestantes segundo o Ministerio da Saude, e qual e o esquema de quimioprofilaxia?",o:["Rastreio entre a 34a e a 37a semana de gravidez; quimioprofilaxia: 2g Ampicilina (dose de ataque) + 1g a cada 6 horas ate o parto (pelo menos 4 horas antes)","Rastreio no 1o trimestre; tratamento com vancomicina IV em dose unica","Rastreio apenas no parto; amoxicilina oral por 7 dias","Rastreio nao e recomendado; quimioprofilaxia e feita apenas se a mae tiver sintomas"],a:0,e:"O slide afirma: \"Recomendado pelo Ministerio da Saude, teste deve ser realizado durante a 34a e a 37a semana de gravidez.\" A quimioprofilaxia e: \"2g Ampicilina (dose de ataque) no momento do diagnostico seguida de 1g a cada 6h ate ou durante 48 horas (pelo menos 4 horas).\" O estudo FURG mostrou que quimioprofilaxia reduz 5x a prematuridade e infeccao."},
{id:"a10q16",d:"moderado",q:"De acordo com os dados do estudo da FURG apresentado no slide da aula, qual foi a prevalencia de GBS em gestantes de alto risco e quais foram os desfechos neonatais adversos quando nao tratadas?",o:["31/110 gestantes (28%) com GBS positivo; sem quimioprofilaxia: 66,6% de baixo peso ao nascer, 66,6% de infeccao neonatal e 3% de morte neonatal; com quimioprofilaxia: reducao drastica desses desfechos","5/110 gestantes (5%) com GBS; sem tratamento, 0% de mortalidade neonatal","90/110 gestantes (82%) com GBS; 50% de mortalidade neonatal sem tratamento","31/110 gestantes com GBS; sem quimioprofilaxia, apenas 10% tinham alguma complicacao"],a:0,e:"O slide do estudo FURG (S. agalactiae colonization in high-risk pregnant women, southern Brazil): \"31/110 GBS positivas; 20% infeccao neonatal; Nao diagnosticados: 3% morte neonatal.\" A tabela mostra: sem quimioprofilaxia (n=6) - 66,6% low birth weight, 66,6% neonatal infection. Com quimioprofilaxia (n=24) - 4,2% prematuridade vs 33,3% sem. Quimioprofilaxia reduz 5X prematuridade e infeccao."},
{id:"a10q17",d:"dificil",q:"Segundo o slide da aula, qual fator de virulencia do GBS (S. agalactiae) tem a capacidade de penetrar a placenta humana e matar plaquetas?",o:["O pigmento hemolitico (Hemolytic pigment): resistencia a mastocitos, macrofagos e neutrofilos; penetracao da placenta humana; invasao da cavidade amniotica; morte de plaquetas","A capsula polissacaridica: responsavel pela penetracao placentaria e morte plaquetaria","HvgA: unica proteina responsavel pela travessia placentaria","Pili: adesao a placenta e morte de plaquetas por acao mecanica"],a:0,e:"O slide sobre fatores de virulencia do GBS mostra: \"Hemolytic pigment: resistance of mast cells, macrophages and neutrophils; Penetration of the human placenta; Invasion of the amniotic cavity; Kill of platelets.\" O pigmento hemolitico e portanto o fator responsavel por essas funcoes criticas na patogenese da infeccao neonatal."},
{id:"a10q18",d:"facil",q:"De acordo com o slide da aula, em quais faixas etarias o S. agalactiae tem preferencia de causar infeccoes?",o:["Neonatos ate a primeira semana de vida, idosos acima de 65 anos, gestantes durante o parto, e debilitados cronicamente (como diabeticos e portadores de neoplasias malignas)","Apenas adultos jovens de 18-35 anos saudaveis","Exclusivamente em criancas de 2-12 anos","Apenas em imunossuprimidos por HIV/AIDS independente da faixa etaria"],a:0,e:"O slide \"caso clinico S. agalactiae (2011)\" afirma: \"infeccoes de pele e tecidos moles, e possui preferencia por faixas etarias extremas (neonatos ate a primeira semana de vida, e idosos acima de 65 anos), gestantes durante o parto, e debilitados cronicamente (como diabeticos e portadores de neoplasias malignas).\" O S. agalactiae e um patogeno oportunista."},
{id:"a10q19",d:"moderado",q:"Segundo a tabela do slide da aula, qual Streptococcus esta classicamente associado a cancer de colon e endocardite infecciosa?",o:["S. bovis (grupo D): bacteremia por S. bovis em adultos deve alertar para investigacao de cancer colorretal alem de endocardite infecciosa","S. mutans: conhecido por caries dentarias e tambem associado a cancer colorretal","S. pyogenes (grupo A): alem de faringite, e a principal causa de cancer de colon","S. mitis: patogeno oportunista associado exclusivamente a cancer de colon"],a:0,e:"A tabela \"Classification of Strep from Humans\" no slide lista S. bovis species group com o comentario: \"Viridans; associated with colon cancer; IE (infective endocarditis).\" Esta associacao clinica e importante: bacteremia por S. bovis sem fonte aparente deve motivar colonoscopia para investigar neoplasia coloretal."},
{id:"a10q20",d:"moderado",q:"De acordo com o slide da aula, como a colonizacao do trato respiratorio superior por Streptococcus muda com a faixa etaria da crianca?",o:["Infants (0-6 meses): Staphylococcus, Streptococcus, Corynebacterium; young children (6-12m): Prevotella, Gemella, Enterococcus, Streptococcus; children (2-12 anos): Dolosigranulum, Moraxella, Haemophilus, Neisseria, Rothia; adults: beta-Proteobacteria, Flavobacteriales, Cutibacterium","A microbiota do trato respiratorio superior e identica em todas as faixas etarias","Apenas P. aeruginosa coloniza o trato respiratorio em todas as faixas etarias","Streptococcus aparece apenas em adultos; criancas tem apenas virus respiratorios"],a:0,e:"O slide \"Genero Streptococcus\" (Schneider et al., 2019) mostra a colonizacao por faixa etaria: Infants 0-6m = Staphylococcus, Streptococcus, Corynebacterium; Young children 6m-1y = Prevotella, Gemella, Cutibacterium, Enterococcus, Streptococcus, Staphylococcus, Corynebacterium; Children 2-12y = Streptococcus, Dolosigranulum, Gemella, Granulicatella, Moraxella, Haemophilus, Neisseria, Rothia; Adults 14-59y = beta-Proteobacteria, Corynebacteria, Flavobacteriales, Cutibacterium."},
{id:"a10q21",d:"moderado",q:"Segundo o caso clinico apresentado no slide da aula (Rev. paul. pediatr. 2025), quais foram as principais manifestacoes das infeccoes invasivas por GAS em criancas no Brasil?",o:["Pneumonia (33%), sindrome do choque toxico (33%), artrite septica (33%), osteomielite (11%), meningite (22%), celulite (22%); 75% necessitaram UTI; 1 paciente faleceu","Apenas faringite e otite media; nenhum caso de UTI","Exclusivamente pneumonia em 100% dos casos; nenhum caso de choque toxico","Apenas infeccoes de pele (impetigo e celulite); sem casos de meningite ou choque"],a:0,e:"O slide cita artigo de 2025: \"Invasive infections by group A Streptococcus infections in Brazil: a pediatric case series.\" Nove pacientes: tres (33%) pneumonia, tres (33%) TSS, tres (33%) artrite septica, um (11%) osteomielite, dois (22%) meningite, dois (22%) celulite. \"A maioria dos pacientes (5) experimentou complicacoes incluindo efusao pleural, choque septico, vasculite cerebral e amputacoes de membros. No total, 7 (75%) foram admitidos na UTI e um paciente morreu.\""},
{id:"a10q22",d:"facil",q:"De acordo com o slide da aula sobre hemolise, em qual agar e por qual teste o S. pyogenes e diferenciado do S. agalactiae?",o:["Agar sangue: ambos sao beta-hemoliticos; S. pyogenes (Grupo A) e sensivel a bacitracina e PYR positivo; S. agalactiae (Grupo B) e resistente a bacitracina","S. pyogenes e alfa-hemolitico; S. agalactiae e gama-hemolitico; diferenciados pelo teste da optoquina","Ambos sao identificados pelo teste da coagulase; S. pyogenes e coagulase+","S. pyogenes e beta-hemolitico; S. agalactiae e alfa-hemolitico; diferenciados pelo NaCl 6,5%"],a:0,e:"O fluxograma no slide: Streptococcus catalase- → beta-hemolise → Bacitracin sensitivity and PYR status → positivo (sensivel a bacitracina) = Group A: S. pyogenes; negativo (resistente a bacitracina) = Group B: S. agalactiae. O slide de Streptococcus SPP confirma: \"beta-hemolise - sugestivo de S. pyogenes → SENSIVEL A BACITRACINA.\""}]},
  aula9:{name:"Aula 9 - Infeccoes do Trato Respiratorio",doc:"AIP 2025 - Prof. Pedro E. Almeida da Silva",
summary:`## Aula 9 - Infeccoes do Trato Respiratorio

### Agentes por regiao anatomica
- Trato superior: Sinusite (S. pneumoniae, H. influenzae, M. catarrhalis); Faringite (S. pyogenes, Rhinovirus, Coronavirus, Adenovirus, Influenza, Parainfluenza, HMPV, RSV, Coxsackie); Tonsilite (S. pyogenes, S. pneumoniae, H. influenzae, S. aureus); Laringite (Parainfluenza 1-2, H. influenzae, M. catarrhalis, S. aureus, estreptococos grupos A/G, C. pneumoniae, M. pneumoniae); Nasofaringite (Rhinovirus, Coronavirus, Adenovirus, Influenza, Parainfluenza).
- Trato inferior: Bronquite (Influenza, Parainfluenza, RSV, HMPV, C. pneumoniae, M. pneumoniae, B. pertussis); Bronquiolite (RSV, Parainfluenza 1-3); Pneumonia (RSV, Influenza, Adenovirus, SARS-CoV-2, S. pneumoniae, S. aureus, H. influenzae tipo b, K. pneumoniae, P. aeruginosa, C. pneumoniae, M. pneumoniae, L. pneumophyla).

### Desafio diagnostico das ITR
- Diversos agentes (bacterias, virus, fungos); sintomas, sinais e resultados laboratoriais similares; tratamentos e prognosticos distintos; potencial epidemico diferente.

### Epidemiologia global das LRI (2021)
- Distribuicao etiologica por faixa etaria: S. pneumoniae e RSV sao os mais prevalentes em criancas < 5 anos; em idosos >= 70 anos, S. pneumoniae, Klebsiella e outros bacterianos ganham importancia.
- Em mortes: a faixa < 5 anos tem o maior numero absoluto de mortes por LRI; S. pneumoniae e RSV lideram.

### Mycoplasma pneumoniae
- Bactéria SEM PAREDE CELULAR. Um dos menores organismos autonomos (0,1-0,3 micrometros).
- Membrana rica em esterois (adquiridos do hospedeiro). Morfologia pleoморfica com estrutura de adesao terminal.
- Vive extracelularmente mas permanece na superficie da mucosa, causando danos diretos as celulas epiteliais.
- Importancia: agente de PAC em criancas e adultos jovens; causa ate 40% dos casos de PAC em adolescentes; transmissao por aerossois (surtos em escolas e quarteis).
- Sintomas subagudos: tosse seca, febre moderada, cefaleia; pode causar manifestacoes extrapulmonares (cutaneas, neurologicas, cardiacas).
- Diagnostico: cultivo dificil (crescimento lento, pouco usado); sorologia IgM/IgG para infeccoes tardias/retrospectivas; qPCR = metodo de escolha (alta sensibilidade e especificidade); amostras: swab nasofaringeo ou aspirado de vias aereas inferiores.
- Vacinas inativadas: eficacia de 54%; em alguns casos, vacinacao associada a curso mais grave apos infeccao subsequente. NAO HA VACINAS DISPONIVEIS atualmente.
- Ausencia de parede celular impacta tratamento (beta-lactamicos ineficazes) e diagnostico.

### Bordetella pertussis (Coqueluche)
- Coco bacilo Gram NEGATIVO; localiza-se nas celulas ciliadas da traqueia, impedindo sua acao.
- Toxinas: Toxina Pertussis (PT) - inibe resposta imune, causa disfuncao celular, contribui para tosse paroxistica; Toxina Adenilato Ciclase (CyaA) - inibe resposta imune e danifica celulas; Citotoxina Traqueal (TCT) - destroi cilios do trato respiratorio, causando obstrucao e inflamacao.
- Brasil 2024: aumento de mais de 1.000% nos casos; Parana (1.229), Sao Paulo (831), Minas Gerais (384), Rio de Janeiro (259).
- Fase catarral: comeca como resfriado comum, evolui para crises de tosse mais intensa.
- Fase paroxistica: geralmente afebril; tosse forte e incontrolavel com crises subitas; pode causar vomitos, cianose, rosto vermelho, guincho ao inspirar; DURA DE 2 A 6 SEMANAS.
- Fase convalescente: tosse diminui em frequencia e intensidade; pode persistir 2-6 semanas ou ate 3 meses; outras infeccoes respiratorias podem reativar paroxismos.
- Diagnostico laboratorial (grafico por fase): cultura (verde) = maxima sensibilidade na fase catarral; PCR (azul) = maxima sensibilidade na fase catarral; sorologia (vermelho) = aparece na fase paroxistica/convalescente; diagnostico clinico (laranja) = fase paroxistica/convalescente.`,
tips:"Mycoplasma: sem parede celular = beta-lactamicos ineficazes = tratar com macrolideos/tetraciclinas. qPCR = metodo de escolha para Mycoplasma. Causa ate 40% PAC em adolescentes. B. pertussis = Gram NEGATIVO (coco bacilo). TCT destroi cilios. PT = tosse paroxistica. Coqueluche: catarral (resfriado) > paroxistica (2-6 semanas, guincho, cianose) > convalescente (ate 3 meses). Diagnostico: cultura e PCR na fase catarral; sorologia na fase convalescente. Sinusite: S. pneumoniae, H. influenzae, M. catarrhalis. Faringite bacteriana: S. pyogenes (15-30% dos casos). Bronquiolite: RSV e Parainfluenza 1-3.",
questions:[{id:"a9q1",d:"facil",q:"Segundo o slide da aula, quais sao os principais agentes causadores de SINUSITE?",o:["S. pneumoniae, H. influenzae e M. catarrhalis","S. pyogenes, Rhinovirus e Adenovirus","RSV, Parainfluenza e Influenza","S. aureus, P. aeruginosa e K. pneumoniae"],a:0,e:"O slide \"Upper respiratory tract\" mostra: Sinusitis = S. pneumoniae, H. influenzae e M. catarrhalis. Esses tres sao os agentes bacterianos classicos de sinusite bacteriana aguda."},
{id:"a9q2",d:"facil",q:"De acordo com o slide da aula, qual e o principal agente bacteriano causador de FARINGITE entre os listados?",o:["S. pyogenes (Streptococcus do grupo A) encabeca a lista de faringite ao lado de varios virus","S. pneumoniae e o unico agente bacteriano listado","H. influenzae e M. catarrhalis sao os agentes bacterianos de faringite","Apenas virus causam faringite segundo o slide"],a:0,e:"No slide \"Upper respiratory tract\": Pharyngitis = S. pyogenes (listado primeiro), seguido de Rhinovirus, Coronavirus, Adenovirus, Influenza, Parainfluenza, HMPV, RSV, Coxsackie e bocavirus. S. pyogenes e o unico agente bacteriano listado para faringite no slide."},
{id:"a9q3",d:"facil",q:"Segundo o slide da aula, quais sao os dois agentes causadores de BRONQUIOLITE?",o:["Respiratory syncytial virus (RSV) e Parainfluenza virus 1-3","Influenza virus e Adenovirus","S. pneumoniae e M. pneumoniae","B. pertussis e C. pneumoniae"],a:0,e:"O slide \"Lower respiratory tract\" lista especificamente para Bronchiolitis: Respiratory syncytial virus e Parainfluenza virus 1-3. Bronquiolite e tipicamente uma doenca de criancas pequenas causada por esses virus."},
{id:"a9q4",d:"moderado",q:"O slide da aula mostra 4 razoes que tornam as infeccoes do trato respiratorio um desafio diagnostico. Quais sao?",o:["Diversos agentes (bacterias, virus, fungos); sintomas/sinais/laboratorio similares; tratamentos e prognosticos distintos; potencial epidemico diferente","Resistencia antimicrobiana universal; ausencia de vacinas; transmissao exclusivamente aerea; alta mortalidade","Apenas bacterias causam ITR; diagnostico por cultura e lento; antibioticos sao inefficazes; sem dados epidemiologicos","Alta transmissibilidade; curso sempre grave; ausencia de diagnostico rapido; imunidade cruzada ausente"],a:0,e:"O slide com os quatro boxes azuis afirma: 1) Diversos agentes (bacterias, virus e fungos); 2) Sintomas, sinais e resultados laboratoriais que podem ser similares; 3) Tratamentos e prognosticos distintos; 4) Potencial epidemico diferente. Isso justifica a necessidade do diagnostico etiologico correto."},
{id:"a9q5",d:"moderado",q:"Segundo os dados globais de LRI (2021) apresentados no slide da aula, qual patogeno domina os CASOS em criancas menores de 5 anos e idosos acima de 70?",o:["S. pneumoniae e RSV sao os mais prevalentes em < 5 anos; em >= 70 anos, S. pneumoniae, Klebsiella e outros bacterianos ganham relevancia","Apenas influenza domina todas as faixas etarias","Mycoplasma spp. e o mais comum em todas as faixas etarias","P. aeruginosa e Acinetobacter dominam todas as faixas etarias"],a:0,e:"O grafico \"Distribuicao etiologica dos CASOS globais de LRI por faixa etaria, 2021\" mostra que S. pneumoniae (roxo) e RSV (verde) sao os agentes mais prevalentes nas faixas extremas de idade (< 5 anos e >= 70 anos). Mycoplasma (azul claro) e tambem destacado no slide."},
{id:"a9q6",d:"facil",q:"De acordo com o slide da aula, qual e a principal caracteristica estrutural do Mycoplasma pneumoniae que o diferencia da maioria das bacterias?",o:["Bactéria SEM PAREDE CELULAR; membrana rica em esterois adquiridos do hospedeiro","Possui capsula polissacaridica espessa como protecao","Possui endosporos que aumentam sua resistencia ambiental","E um bacilo Gram-negativo com membrana externa de LPS"],a:0,e:"O slide \"Mycoplasma pneumoniae\" afirma explicitamente: \"Bacteria sem parede celular.\" Sua membrana e rica em esterois, que sao adquiridos do hospedeiro (nao sintetizados pela bacteria). Isso tem implicacao direta no tratamento: beta-lactamicos (que atuam na parede celular) sao INEFICAZES."},
{id:"a9q7",d:"facil",q:"Segundo o slide da aula, como o Mycoplasma pneumoniae causa dano no hospedeiro?",o:["As bacterias vivem extracelularmente mas permanecem na superficie da mucosa, causando danos diretos as celulas epiteliais; morfologia pleoморfica com estrutura de adesao terminal","Invadem as celulas epiteliais e se replicam intracelularmente destruindo-as","Liberam endotoxinas que causam febre e sepse sistemica","Formam biofilmes na arvore bronquica bloqueando fisicamente o fluxo de ar"],a:0,e:"O slide \"Mycoplasma pneumoniae\" afirma: \"As bacterias vivem extracelularmente, mas permanecem na superficie da mucosa, causando danos diretos as celulas epiteliais.\" Possui morfologia pleoморfica com estrutura de adesao terminal que facilita a fixacao na mucosa respiratoria."},
{id:"a9q8",d:"moderado",q:"Qual a importancia clinica e epidemiologica do Mycoplasma pneumoniae segundo o slide da aula?",o:["Agente de PAC em criancas e adultos jovens; causa ate 40% dos casos de PAC em adolescentes; transmissao por aerossois (surtos em escolas/quarteis); sintomas subagudos (tosse seca, febre moderada, cefaleia); pode causar manifestacoes extrapulmonares","Causa apenas infeccoes graves em idosos imunossuprimidos hospitalizados","Principal causa de bronquiolite em lactentes abaixo de 1 ano","Exclusivamente encontrado em pacientes com AIDS; prevalencia < 1% na populacao geral"],a:0,e:"O slide \"Importancia\" do Mycoplasma pneumoniae lista: agente de PAC especialmente em criancas e adultos jovens; transmissao por aerossois (surtos em ambientes fechados como escolas e quarteis); causa ate 40% dos casos de PAC em adolescentes; sintomas subagudos (tosse seca, febre moderada, cefaleia); pode causar manifestacoes extrapulmonares (cutaneas, neurologicas, cardiacas)."},
{id:"a9q9",d:"moderado",q:"De acordo com o slide da aula, qual e o metodo de escolha para o diagnostico laboratorial do Mycoplasma pneumoniae e por que o cultivo e pouco utilizado?",o:["qPCR (PCR em tempo real) = metodo de escolha por alta sensibilidade e especificidade; cultivo e pouco usado porque o crescimento e lento e exigente","Hemocultura = padrao ouro; qPCR so e util em casos graves","Sorologia IgM = unico metodo confiavel em todas as fases; qPCR nao tem papel","Antigenio urinario = metodo de escolha; sorologia e inutil para Mycoplasma"],a:0,e:"O slide \"Diagnostico Laboratorial\" afirma: \"Dificuldade de cultivo (crescimento lento e exigente) - pouco usado na pratica clinica. Sorologia (IgM/IgG): util em infeccoes tardias ou retrospectivas. PCR em tempo real (qPCR): metodo de escolha - alta sensibilidade e especificidade. Amostras ideais: swab nasofaringeo ou aspirado de vias aereas inferiores.\""},
{id:"a9q10",d:"dificil",q:"O slide da aula apresenta uma advertencia sobre a vacinacao contra Mycoplasma pneumoniae. Qual e essa advertencia?",o:["Em alguns casos, a vacinacao tem sido associada a um curso mais grave da doenca apos uma infeccao subsequente; eficacia das vacinas inativadas foi de apenas 54%","A vacina e altamente eficaz (>90%) e nao tem nenhum efeito adverso conhecido","A vacina contra M. pneumoniae esta amplamente disponivel no SUS desde 2020","A vacinacao e contraindicada em criancas menores de 5 anos por risco de encefalite"],a:0,e:"O slide \"Vacinas inativadas contra Mycoplasma pneumoniae em ensaios em humanos\" afirma: eficacia de 54% contra pneumonia. E destaca em amarelo: \"Em alguns casos, a vacinacao tem sido associada a um curso mais grave da doenca apos uma infeccao subsequente.\" As consideracoes finais tambem afirmam \"Nao ha vacinas disponiveis.\""},
{id:"a9q11",d:"moderado",q:"Segundo o slide da aula, por que a ausencia de parede celular no Mycoplasma pneumoniae impacta o tratamento?",o:["Beta-lactamicos (penicilinas, cefalosporinas) sao ineficazes porque seu mecanismo de acao e justamente inibir a sintese da parede celular, que nao existe no Mycoplasma; devem ser usados macrolideos ou tetraciclinas","Isso nao impacta o tratamento pois todos os antibioticos atuam na membrana","A ausencia de parede celular torna o Mycoplasma mais sensiveis a penicilina","O tratamento especifico e vancomicina que atua na membrana plasm atica"],a:0,e:"O slide \"Consideracoes\" afirma: \"A ausencia de parede celular impacta no tratamento e diagnostico.\" Beta-lactamicos (penicilinas, cefalosporinas) inibem a sintese de peptideoglicano da parede celular - mas Mycoplasma nao tem parede celular. Portanto, esses antibioticos sao ineficazes. Macrolideos (azitromicina) e tetraciclinas sao as classes indicadas."},
{id:"a9q12",d:"facil",q:"De acordo com o slide da aula, qual e a morfologia e a coloracao de Gram da Bordetella pertussis?",o:["Coco bacilo Gram NEGATIVO; localiza-se nas celulas ciliadas da traqueia impedindo sua acao","Bacilo Gram positivo formador de esporos","Coco Gram positivo catalase negativo em cadeias","Bacilo Gram negativo encapsulado produtor de endotoxinas lipopolissacaridicas"],a:0,e:"O slide \"Bordetella pertussis (Coqueluche)\" afirma: \"Coco bacilo Gram negativo, que localiza-se nas celulas ciliadas da traqueia impedindo sua acao.\" Essa localizacao especifica explica a destruicao do mecanismo mucociliar de defesa respiratoria."},
{id:"a9q13",d:"moderado",q:"Quais sao as tres toxinas principais da Bordetella pertussis e suas funcoes, segundo o slide da aula?",o:["Toxina Pertussis (PT): inibe resposta imune, disfuncao celular, tosse paroxistica; Toxina Adenilato Ciclase (CyaA): inibe resposta imune; Citotoxina Traqueal (TCT): destroi cilios, causando obstrucao e inflamacao","Endotoxina (LPS): choque; Exotoxina A: necrose; Proteases: dano tecidual","Hemolisina: destroi eritrocitos; Leucotoxina: mata neutrofilos; Capsula: evasao imune","Toxina botulinica: paralisia; TCT: dano mucosa; CyaA: vasodilatacao"],a:0,e:"O slide \"Bordetella pertussis\" lista: Toxina Pertussis (PT) - inibe resposta imune, causa disfuncao celular e contribui para a tosse paroxistica; Toxina Adenilato Ciclase (CyaA) - tambem inibe a resposta imune e danifica as celulas; Citotoxina Traqueal (TCT) - destroi os cilios do trato respiratorio, causando obstrucao e inflamacao."},
{id:"a9q14",d:"facil",q:"Segundo o slide da aula, qual foi a magnitude do aumento de casos de coqueluche no Brasil em 2024 e quais estados tiveram mais notificacoes?",o:["Aumento de mais de 1.000%; Parana (1.229 casos), Sao Paulo (831), Minas Gerais (384), Rio de Janeiro (259)","Aumento de 50%; Rio de Janeiro e Sao Paulo com maior numero de casos","Reducao de 30% em relacao a 2023; apenas Sao Paulo teve surto significativo","Aumento de 200%; apenas estados do Norte foram afetados"],a:0,e:"O slide \"Importancia\" da coqueluche mostra infografico: \"Aumento de mais de 1.000% nos casos de coqueluche no Brasil em 2024.\" Estados com mais notificacoes (Ministerio da Saude): Parana = 1.229; Sao Paulo = 831; Minas Gerais = 384; Rio de Janeiro = 259."},
{id:"a9q15",d:"facil",q:"De acordo com o slide da aula, como se inicia a coqueluche na fase catarral e o que a diferencia de um resfriado comum?",o:["Comeca como um resfriado comum; gradualmente o quadro evolui para crises de tosse mais intensa - nao ha diferenciacao clinica na fase inicial","Inicia com febre alta e calafrios, diferenciando-se do resfriado desde o inicio","Comeca diretamente com tosse paroxistica grave sem fase prodromial","Inicia com erupcan cutanea caracteristica e linfadenopatia cervical"],a:0,e:"O slide \"Fase inicial (catarral)\" afirma literalmente: \"Comeca como um resfriado comum. Gradualmente, o quadro vai evoluindo para crises de tosse mais intensa.\" Isso e um ponto critico: na fase catarral, a coqueluche e clinicamente indistinguivel de um resfriado, o que dificulta o diagnostico precoce e favorece a transmissao."},
{id:"a9q16",d:"moderado",q:"Segundo o slide da aula, quais sao as caracteristicas clinicas da fase paroxistica da coqueluche e quanto tempo ela dura?",o:["Tosse forte e incontrolavel com crises subitas e rapidas que podem causar vomitos; dificuldade para inspirar com cianose ou rosto vermelho; guincho ao inspirar; fase pode durar de 2 a 6 semanas","Febre alta persistente com delirio e convulsoes; dura de 1 a 3 dias","Apenas coriza intensa; a fase paroxistica e sempre afebril e dura menos de 1 semana","Pneumonia com consolidacao bilateral; dura 2 a 3 semanas com tratamento"],a:0,e:"O slide \"Fase de tosse intensa (paroxistica)\" afirma: geralmente afebril ou com febre baixa; tosse muito forte e incontrolavel, crises subitas e rapidas podendo causar vomitos; dificuldade para inspirar com rosto vermelho (congestao facial) ou azulado (cianose); som agudo ao inspirar (guincho). Destaque em amarelo: \"Essa fase pode durar de duas a seis semanas.\""},
{id:"a9q17",d:"moderado",q:"De acordo com o slide da aula, o que pode ocorrer durante a fase de convalescenca da coqueluche?",o:["A tosse diminui em frequencia e intensidade mas pode persistir de 2 semanas a 3 meses; outras infeccoes respiratorias durante essa fase podem fazer os paroxismos voltarem temporariamente","O paciente fica completamente assintomatico e nao pode mais transmitir a doenca","A fase de convalescenca dura apenas 3 dias e nao ha risco de complicacoes","Nessa fase surge febre alta e exantema cutaneo generalizado"],a:0,e:"O slide \"Fase de recuperacao (convalescenca)\" diz: \"A tosse comeca a diminuir em frequencia e intensidade, mas pode persistir por duas a seis semanas ou por ate tres meses.\" E tambem: \"Infeccoes respiratorias de outra natureza, durante essa fase, podem fazer a tosse intensa (paroxismos) voltar temporariamente.\""},
{id:"a9q18",d:"dificil",q:"Segundo o grafico do slide da aula sobre diagnostico laboratorial da coqueluche, qual metodo tem MAIOR sensibilidade na fase catarral (1-2 semanas)?",o:["Cultura bacteriana (curva verde) e PCR (curva azul) tem maxima sensibilidade na fase catarral; sorologia (vermelho) so aparece na fase paroxistica/convalescente","Sorologia IgM/IgG tem maxima sensibilidade na fase catarral","O diagnostico clinico (laranja) e mais sensivel do que PCR na fase catarral","Todos os metodos tem igual sensibilidade em todas as fases"],a:0,e:"O grafico \"Diagnostico Laboratorial Coqueluche\" mostra: cultura (verde) = pico de sensibilidade na fase catarral (1-2 semanas); PCR (azul) = tambem com alta sensibilidade na fase catarral; sorologia (vermelho) = sensibilidade so aumenta na fase paroxistica e convalescente (3-8 semanas); diagnostico clinico (laranja) = surge na fase paroxistica. Logo, o diagnostico deve ser feito por cultura/PCR na fase catarral."},
{id:"a9q19",d:"moderado",q:"De acordo com o slide da aula, qual agente bacteriano causa faringite em 15 a 30% dos casos conforme a tabela de agentes etiologicos?",o:["Streptococcus pyogenes - causa faringite, amigdalite e escarlatina em 15-30% dos casos de faringite","Rhinovirus causa 15-30% e e o principal agente bacteriano","Coronavirus causa 15-30% dos casos de faringite bacteriana","Adenovirus causa 15-30% dos casos de faringite"],a:0,e:"A tabela \"Principais agentes etiologicos de faringites\" mostrada no slide da aula indica: Streptococcus pyogenes = Faringite, amigdalite e escarlatina = 15-30% dos casos. Rhinovirus causa 20% (resfriado). Coronavirus 5%. S. pyogenes e o principal agente BACTERIANO de faringite."},
{id:"a9q20",d:"facil",q:"Segundo o slide da aula, quais agentes causam BRONQUITE e quais causam PNEUMONIA no trato respiratorio inferior?",o:["Bronquite: Influenza, Parainfluenza, RSV, HMPV, C. pneumoniae, M. pneumoniae, B. pertussis; Pneumonia: adiciona SARS-CoV-2, S. pneumoniae, S. aureus, H. influenzae tipo b, K. pneumoniae, P. aeruginosa, L. pneumophyla","Bronquite: apenas bacterias; Pneumonia: apenas virus","Os mesmos agentes causam tanto bronquite quanto pneumonia sem distincao","Bronquite: RSV e Parainfluenza 1-3 apenas; Pneumonia: somente S. pneumoniae"],a:0,e:"O slide \"Lower respiratory tract\" lista para Bronchitis: Influenza virus, Parainfluenza virus, RSV, HMPV, C. pneumoniae, M. pneumoniae, B. pertussis. Para Pneumonia: RSV, Influenza, Adenovirus, SARS-CoV-2, S. pneumoniae, S. aureus, H. influenzae tipo b, K. pneumoniae, P. aeruginosa, C. pneumoniae, M. pneumoniae, L. pneumophyla."},
{id:"a9q21",d:"moderado",q:"Segundo o slide da aula, a pneumonia ocorre quando os alveolares ficam preenchidos com fluido. Qual a diferenca entre o alveolo normal e o alveolo na pneumonia?",o:["Alveolo normal: cavidade aerada com surfactante; pneumonia: alveolo preenchido por fluido (exsudato inflamatorio, bacterias, leucocitos), impedindo a troca gasosa","Alveolo normal: preenchido por fluido; pneumonia: alveolo vazio sem surfactante","Na pneumonia os alveolos colapsam completamente sem nenhum fluido","Nao ha diferenca macroscopica entre alveolo normal e pneumonico"],a:0,e:"O slide \"Pneumonia\" mostra diagrama comparativo: Normal = bronquiolos e alveolos aerados normalmente. Pneumonia = \"Fluid in alveoli\" (fluido nos alveolares). O acumulo de fluido (exsudato inflamatorio) impede a troca gasosa entre o ar e o sangue, causando hipoxemia."},
{id:"a9q22",d:"moderado",q:"De acordo com o slide da aula, quais agentes causam LARINGITE alem dos virus?",o:["Parainfluenza virus 1-2, H. influenzae, M. catarrhalis, S. aureus, estreptococos dos grupos A e G, C. pneumoniae e M. pneumoniae","Apenas virus causam laringite segundo o slide","Somente S. pyogenes e Rhinovirus causam laringite","Apenas P. aeruginosa e K. pneumoniae causam laringite bacteriana"],a:0,e:"O slide \"Upper respiratory tract\" lista para Laryngitis: Parainfluenza virus 1-2, H. influenzae, M. catarrhalis, S. aureus, Group A and G streptococci, C. pneumoniae e M. pneumoniae. Portanto, varios bacterias alem de virus podem causar laringite."}]},
  aula8:{name:"Aula 8 — Staphylococcus",doc:"AIP 2025 - Prof. Daniela Ramos",
summary:`## Aula 8 — Staphylococcus

### Epidemiologia
- S. aureus: maior carga infecciosa no Brasil (1.020.000 DALYs em 2019) — supera HIV, E. coli, K. pneumoniae, S. pneumoniae.
- Infecções hospitalares mais comuns: S. aureus, E. coli, Enterococci, Candida.

### Características gerais
- Cocos Gram+ em cachos, sem endosporos, anaeróbios facultativos.
- **Catalase positivos** (Staphylococcus) vs catalase negativos (Streptococcus/Enterococcus).
- S. aureus: coagulase+, beta-hemolítico, Proteína A. Tabela: S. epidermidis (coagulase-, sensível novobiocina, válvulas/próteses); S. saprophyticus (coagulase-, resistente novobiocina, ITU).

### Patogênese — infecções piogênicas de pele
- Abscesso: 0-2h (invasão, recrutamento PMN); 2-24h (resposta inflamatória, Langerhans, necrose PMN); 2-6 dias (formação cápsula fibrosa); 6-14 dias (abscesso maduro com fibrina).
- **Foliculite**: inflamação do folículo piloso. **Furúnculo**: infecção do folículo + glândulas sebáceas (terçol). **Carbúnculo**: furúnculo com vários tipos de drenagem (nuca ou parte superior das costas).

### Osteomielite
- Suspeita: ferida sobre sítio ósseo, osso exposto/palpável, febre sem causa evidente, dispositivos metálicos no osso.
- Hematogênica (semeadura hematogênica → medula → extensão córtex → abscesso subperióstico) vs Foco Contíguo (extensão tecido mole → osso exposto).

### Pneumonia
- PVL (Leucocidina de Panton-Valentine): formadora de poros, presente no CA-MRSA, **ausente na maioria das cepas HA-MRSA**.
- Mecanismo PVL: poros → necrose PMN + macrófagos → inflamação → edema rico em proteínas → lesão pulmonar aguda.
- Muitos pacientes com pneumonia estafilocócica têm histórico de infecções cutâneas prévias.

### Gastroenterite estafilocócica
- Intoxicação por enterotoxinas pré-formadas (não infecção). Enterotoxina entra por células caliciformes/epiteliais.
- Mecanismo: SE → mastócitos submucosos → libera 5-HT → 5-HT3 receptor nervo vago no estômago → centro do vômito (medula oblonga) → resposta emética.
- S. aureus: multiplica com até 20% de sal; tolera pH 4 a 9,8; mesofilos (7-45°C); enterotoxina produzida entre 10 e 45°C; estabilidade e resistência a enzimas.
- Surto real (restaurante): sintomas 1h30-12h após ingestão; duração 24-36h.

### SSSS (Síndrome da pele escaldada estafilocócica)
- Proteínas de serina destroem desmossomos → perda da camada superior da pele = esfoliação.
- Toxina esfoliativa cliva **desmoglina-1 (Dsg-1)** no stratum granulosum → separação intraepidermal.

### Síndrome do choque tóxico (TSS)
- TSST-1 e enterotoxinas = **superantígenos**.
- Facilidade de replicação: tampões menstruais (especialmente cotton-rayon) durante a menstruação; toxina na vagina ou ferida → sangue.
- Cotton-rayon produz mais TSST-1 do que algodão puro; copos menstruais produzem menos.

### Endocardite
- Infecção no coração após bacteremia. Mortalidade ~50%; febre, dores no tórax.
- Etiologia: estreptococos + estafilococos = 80% dos casos; maior incidência 70-79 anos.
- CA-MRSA endocardite (caso Brasil 2008): PVL+, tratado com vancomicina.

### Susceptibilidade e MRSA
- Linha do tempo: penicilina (1940) → resistência → meticilina (1960) → MRSA → vancomicina → VRSA.
- MRSA e VRSA: proteínas ligadoras de penicilina (PBPs) alteradas.
- Bactérias Gram+ geralmente mais resistentes ao dessecamento que Gram-.

### S. epidermidis e microbioma
- S. epidermidis: 2ª espécie mais importante do gênero; função **probiótica** ao prevenir colonização por S. aureus.
- Pele saudável: pH ácido, Actinobacteria + Staphylococcus + Propionibacterium + Corynebacterium.
- Dermatite atópica: pH alcalino, disbiose com predomínio de S. aureus + S. epidermidis.
- Pé diabético: disbiose persistente, colonização polimicrobiana com prevalência de S. aureus.`,
tips:"Catalase+: Staphylococcus. Catalase-: Streptococcus/Enterococcus. Coagulase+: S. aureus (abscesso, intox alimentar, TSS). Furúnculo = folículo + sebácea (terçol). Carbúnculo = vários orifícios de drenagem, nuca/costas. Abscesso: 0-2h PMN, 2-24h inflamação, 2-6 dias cápsula fibrosa, 6-14 dias maduro. Gastroenterite: INTOXICAÇÃO (não infecção), pré-formada, SE → mastócito → 5-HT → vago → vômito. SSSS: esfoliativa destrói Dsg-1 no stratum granulosum. TSS: TSST-1 superantígeno, tampão cotton-rayon produz mais TSST-1. PVL: CA-MRSA sim, HA-MRSA ausente na maioria. Endocardite: mortalidade 50%, strep+staph=80% dos casos. S. epidermidis: função probiótica, previne S. aureus. MRSA: penicilina→resistência→meticilina→MRSA→vancomicina→VRSA.",
questions:[{id:"a8q1",d:"facil",q:"Uma universitária de 18 anos faleceu por infecção sistêmica por S. aureus, cuja porta de entrada teria sido acne. Qual propriedade da pele SAUDÁVEL normalmente impede a invasão por S. aureus?",o:["pH ácido, peptídeos antimicrobianos e microbiota com Actinobacteria, Propionibacterium e Corynebacterium competindo com S. aureus","pH alcalino que inibe a aderência das proteínas de superfície do S. aureus","Presença exclusiva de S. epidermidis na pele saudável que produz toxinas anti-estafilocócicas","Alta concentração de IgA secretora na superfície cutânea"],a:0,e:"Conforme o slide sobre barreiras cutâneas da Prof. Daniela Ramos: pele saudável = pH ácido, peptídeos antimicrobianos, junção célula-célula intacta e microbioma com Actinobacteria, Staphylococcus, Propionibacterium e Corynebacterium. Essas bactérias competem com S. aureus. Na dermatite atópica (como acne com pH alterado e disbiose), essa barreira é comprometida."},
{id:"a8q2",d:"facil",q:"Na formação de um abscesso estafilocócico, qual é a sequência correta dos estágios segundo o slide da aula?",o:["0-2h: invasão e recrutamento de PMN → 2-24h: resposta inflamatória e necrose → 2-6 dias: formação de cápsula fibrosa → 6-14 dias: abscesso maduro","0-2h: abscesso maduro → 2-24h: cápsula fibrosa → 2-6 dias: necrose → 6-14 dias: resolução","0-2h: formação de cápsula fibrosa → 2-24h: invasão bacteriana → 2-6 dias: PMN recrutados → 6-14 dias: coagulação","0-2h: necrose tecidual → 2-24h: abscesso maduro → 2-6 dias: recrutamento PMN → 6-14 dias: resolução espontânea"],a:0,e:"Slide \"Infecções Piogênicas\" (Kobayashi et al., 2015): Fase 0-2h = infecção, células de Langerhans residentes, recrutamento de PMNs. Fase 2-24h = necrose de PMNs, resposta inflamatória, edema. Fase 2-6 dias = recrutamento contínuo de leucócitos + formação da cápsula fibrosa. Fase 6-14 dias = abscesso maduro com PMNs viáveis, pus e DNA extracelular."},
{id:"a8q3",d:"facil",q:"De acordo com o slide da aula, qual a diferença entre foliculite, furúnculo e carbúnculo?",o:["Foliculite = inflamação do folículo piloso; furúnculo = infecção do folículo + glândulas sebáceas (terçol); carbúnculo = furúnculo com vários tipos de drenagem, tipicamente em nuca ou parte superior das costas","Foliculite = carbúnculo superficial; furúnculo = infecção óssea; carbúnculo = infecção sistêmica","Foliculite = infecção do subcutâneo; furúnculo = celulite profunda; carbúnculo = fasciíte necrotizante","Foliculite = infecção fúngica do folículo; furúnculo = infecção bacteriana superficial; carbúnculo = infecção viral"],a:0,e:"Do slide \"Infecções Piogênicas\" da aula: Foliculite = inflamação do folículo piloso. Furúnculo = infecção do folículo E das glândulas sebáceas (terçol). Carbúnculo = furúnculo com vários tipos de drenagem, ocorre tipicamente na nuca ou parte superior das costas."},
{id:"a8q4",d:"moderado",q:"Segundo o slide sobre osteomielite da aula, qual achado NÃO está listado como base para suspeita diagnóstica?",o:["Crepitação articular sem dor associada","Febre ou dor em paciente com dispositivos metálicos no osso","Ferida profunda ou crônica sobre um sítio ósseo","Exames de imagem óssea anormais solicitados por outro motivo"],a:0,e:"O slide da aula lista como bases para suspeita de osteomielite: ferida profunda/crônica sobre osso, osso exposto/palpável em ferida, dor localizada sobre sítio ósseo, ferida que falha em cicatrizar, sinais sistêmicos de infecção sem causa evidente, febre/dor em paciente com dispositivos metálicos no osso, e exames de imagem ósseos anormais. Crepitação articular sem dor NÃO é citada."},
{id:"a8q5",d:"moderado",q:"O slide da aula distingue dois mecanismos na osteomielite secundária: hematogênica e por foco contíguo. Qual é a característica da osteomielite HEMATOGÊNICA?",o:["Semeadura inicial na medula óssea via bacteremia, com extensão posterior ao córtex formando abscesso subperióstico; envolvimento tardio do tecido mole","Extensão direta do tecido mole contaminado para dentro do osso; infecção óssea tardia","Ocorre exclusivamente em crianças com bacteremia por S. aureus","Começa como úlcera cutânea com osso exposto, depois dissemina hematogenicamente"],a:0,e:"Slide \"Osteomielite\" da aula: Hematogênica = infecção óssea INICIAL via bacteremia, semeadura na medula, extensão pelo córtex → abscesso subperióstico, envolvimento tardio do tecido mole. Foco Contíguo = infecção óssea TARDIA, extensão inicial do tecido mole para dentro do osso, envolvimento inicial dos tecidos moles (ex.: pé diabético)."},
