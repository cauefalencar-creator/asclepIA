{id:"a8q6",d:"moderado",q:"De acordo com o slide sobre gastroenterite estafilocócica, qual é o mecanismo pelo qual as enterotoxinas causam vômito?",o:["SE liga a mastócitos submucosos → libera 5-HT (serotonina) → 5-HT ativa receptor 5-HT3 no nervo vago → estimulação do centro do vômito na medula oblonga → resposta emética","SE destrói diretamente as células intestinais causando inflamação e vômito","SE ativa diretamente o centro do vômito no cerebelo pela corrente sanguínea","SE causa gastroparesia ao bloquear receptores dopaminérgicos na junção gastresofágica"],a:0,e:"Slide \"Gastroenterite estafilocócica\" da aula: enterotoxina (SE) entra por células caliciformes/epiteliais → SE liga a mastócitos submucosos → libera serotonina (5-HT) → 5-HT3 no nervo vago do estômago → estimula centro do vômito (medula oblonga) → resposta emética. Mecanismo: INTOXICAÇÃO por toxina pré-formada, não infecção."},
{id:"a8q7",d:"facil",q:"Segundo o slide da aula, a intoxicação alimentar estafilocócica é considerada uma INTOXICAÇÃO, não uma infecção. O que isso significa do ponto de vista prático?",o:["A toxina já está pré-formada no alimento antes da ingestão; mesmo que o alimento seja reaquecido e as bactérias morram, a enterotoxina (termoestável) permanece ativa e causa doença","Não existe tratamento para intoxicação estafilocócica","A bactéria precisa colonizar o intestino para produzir a toxina in vivo","Apenas crianças menores de 5 anos são suscetíveis à intoxicação"],a:0,e:"O slide destaca \"Ingestão de toxinas pré-formadas produzidas por bactérias no alimento = INTOXICAÇÃO\". A enterotoxina é produzida enquanto S. aureus cresce no alimento. Mesmo com reaquecimento (bactérias morrem), a toxina persiste porque é termoestável e resistente a enzimas digestivas."},
{id:"a8q8",d:"moderado",q:"No slide sobre intoxicação estafilocócica, quais condições permitem que S. aureus cresça e produza enterotoxina nos alimentos?",o:["Multiplica com até 20% de sal; tolera pH entre 4 e 9,8; mesofilos (7-45°C); enterotoxina produzida entre 10 e 45°C; estabilidade e resistência a enzimas","Cresce apenas em alimentos crus não processados; não tolera sal acima de 5%","Cresce somente em pH neutro (6,5-7,5) e temperatura de refrigeração (2-8°C)","Requer atmosfera anaeróbia estrita para produção de enterotoxina"],a:0,e:"O slide da aula lista as características que tornam S. aureus perigoso em alimentos: tolera até 20% de sal (carne salgada!), pH amplo de 4 a 9,8, temperatura entre 7 e 45°C (mesofilos), e enterotoxina produzida entre 10 e 45°C. Além disso, a toxina tem estabilidade e resistência a enzimas digestivas."},
{id:"a8q9",d:"moderado",q:"No surto de intoxicação estafilocócica em restaurante descrito no slide da aula, qual foi o intervalo entre a ingestão do alimento e o aparecimento dos sintomas?",o:["Entre 1 hora e meia e 12 horas após a ingestão da refeição","Entre 24 e 72 horas após a ingestão","Imediatamente após a ingestão (menos de 30 minutos)","Entre 3 e 5 dias após a ingestão"],a:0,e:"O slide cita o artigo \"Intoxicação estafilocócica em restaurante institucional\" (Ciência Rural, 2004): \"Os sintomas apareceram entre uma hora e meia e 12 horas após a ingestão da refeição e duraram 24 a 36 horas.\" Isso é consistente com intoxicação pré-formada — mais rápida que infecções bacterianas."},
{id:"a8q10",d:"moderado",q:"De acordo com o slide da aula, qual proteína da pele é clivada pela toxina esfoliativa de S. aureus na SSSS?",o:["Desmoglina-1 (Dsg-1) no stratum granulosum, causando separação intraepidermal, bolhas e esfoliação","Colágeno tipo IV na membrana basal, causando descolamento dérmico-epidérmico","Queratina do stratum corneum, causando descamação superficial apenas","Fibronectina da derme, causando ruptura da junção derme-epiderme"],a:0,e:"O slide \"Síndrome de pele escaldada estafilocócica\" mostra: proteínas de serina destroem desmossomos → perda da camada superior. Especificamente, a toxina esfoliativa cliva Dsg-1 (desmoglina-1) no stratum granulosum → separação intraepidermal → bolhas e descamação (slide: Normal skin → Staphylococcal scalded skin syndrome)."},
{id:"a8q11",d:"moderado",q:"O slide da aula mostra que na SSSS as proteínas de serina da toxina esfoliativa de S. aureus destroem desmossomos. Em qual camada da pele ocorre essa clivagem?",o:["Stratum granulosum — onde Dsg-1 é expressa; o stratum corneum se separa e descola","Stratum basale — onde as células-tronco epidérmicas são destruídas","Derme papilar — causando sangramento subcutâneo","Stratum spinosum — onde as tonofilamentos de queratina são cortados"],a:0,e:"O diagrama do slide mostra que a toxina esfoliativa age no stratum granulosum, clivando Dsg-1 entre o stratum granulosum e o stratum corneum. Isso separa o stratum corneum, que descola — sem ruptura até a derme, por isso não há cicatriz."},
{id:"a8q12",d:"moderado",q:"Segundo o slide da aula, por que tampões menstruais (especialmente cotton-rayon) aumentam o risco da Síndrome do Choque Tóxico?",o:["Tampões de cotton-rayon favorecem a replicação de S. aureus e produzem mais TSST-1 do que algodão puro; o tampão retido na vagina durante a menstruação facilita a absorção da toxina para a corrente sanguínea","O material do tampão contém substâncias que ativam diretamente o TSST-1","Tampões menstruais bloqueiam os anticorpos anti-TSST-1 impedindo a neutralização","O cotton-rayon libera ácidos graxos que aumentam a permeabilidade vaginal a qualquer toxina"],a:0,e:"O slide \"Síndrome do choque tóxico\" mostra o artigo (AEM, 2018): tampões de cotton-rayon produzem maior crescimento de S. aureus e maior produção de TSST-1 comparados ao algodão puro ou copos menstruais. O mecanismo: S. aureus replica no tampão → produz TSST-1 → toxina absorvida para o sangue → superantígeno → tempestade de citocinas."},
{id:"a8q13",d:"facil",q:"De acordo com o slide da aula, qual é a mortalidade da endocardite infecciosa por S. aureus e quais são os sintomas típicos apresentados?",o:["Mortalidade ~50%; febre e dores no tórax; infecção ocorre após bacteremia com adesão à superfície valvar lesada ou inflamada","Mortalidade <5%; evolução benigna com febre baixa","Mortalidade 100% sem tratamento cirúrgico imediato","Mortalidade 20%; sintomas predominantes: diarreia e vômitos"],a:0,e:"O slide \"Endocardite\" afirma: \"Infecção no coração após circulação pelo sangue (bacteremia). Mortalidade de 50%; Febre, dores no tórax.\" O mecanismo ilustrado: bactéria acessa corrente sanguínea → adere à valva lesada/inflamada → persiste → prolifera → dissemina."},
{id:"a8q14",d:"moderado",q:"O slide da aula apresenta dados epidemiológicos de endocardite infecciosa. Qual grupo de microrganismos responde por 80% dos casos?",o:["Estreptococos e estafilococos juntos respondem por 80% dos casos; a proporção varia de acordo com tipo de valva (nativa vs. prostética), fonte de infecção, idade e condições coexistentes","Enterococos e bacilos Gram-negativos","Staphylococcus aureus isoladamente representa 80% dos casos em todas as faixas etárias","Fungos (Candida) e Enterobacteriaceae"],a:0,e:"O slide cita: \"Estreptococos e estafilococos respondem por 80% dos casos de endocardite infecciosa, com proporções que variam de acordo à válvula (nativa vs. protética), fonte de infecção, idade do paciente e condições coexistentes.\" (Nature Reviews Disease Primers, 10.1038/nrdp.2016.59)"},
{id:"a8q15",d:"moderado",q:"No caso clínico descrito no slide da aula (2008, Brasil), qual foi a importância do CA-MRSA na endocardite infecciosa?",o:["Foi o primeiro caso registrado de endocardite por CA-MRSA sem contato hospitalar no Brasil; o isolado era PVL positivo; tratamento com vancomicina resultou em cura completa em 3 meses","O CA-MRSA foi resistente à vancomicina, exigindo linezolida","O caso demonstrou que CA-MRSA só causa endocardite em usuários de drogas intravenosas","O CA-MRSA causou endocardite fúngica por coinfecção com Candida"],a:0,e:"O slide apresenta o artigo de 2008 (Scielo): \"First Reported Case of Infective Endocarditis Caused by CA-MRSA Not Associated With Healthcare Contact in Brazil.\" Paciente hígido com infecção de ferida traumática prévia, hemoculturas positivas em 72h, cassete SCC mec tipo IV, PVL positivo. Tratado com vancomicina — recuperação completa em 3 meses."},
{id:"a8q16",d:"facil",q:"Segundo o slide da aula, qual é a diferença fundamental entre a Leucocidina de Panton-Valentine (PVL) no CA-MRSA e no HA-MRSA?",o:["PVL está presente nas cepas de CA-MRSA (MRSA comunitário), mas está AUSENTE na maioria das cepas de HA-MRSA (MRSA hospitalar)","PVL está presente apenas no HA-MRSA hospitalar, sendo rara no CA-MRSA","PVL está presente em todos os MRSA, independente da origem","PVL é encontrada em MSSA, mas não em MRSA"],a:0,e:"O slide \"Pneumonia\" da aula afirma explicitamente: PVL está \"Ausente na maioria das cepas HA-MRSA.\" Isso é uma distinção clínica importante: CA-MRSA (comunitário) com PVL causa pneumonia necrotizante grave em jovens saudáveis, enquanto HA-MRSA (hospitalar) raramente tem PVL."},
{id:"a8q17",d:"moderado",q:"O slide da aula mostra o mecanismo pelo qual a PVL causa lesão pulmonar aguda na pneumonia. Qual é esse mecanismo?",o:["PVL forma poros nos PMNs e macrófagos → necrose dessas células → inflamação + edema rico em proteínas no alvéolo → lesão pulmonar aguda; colapso da via aérea e redução do O2","PVL inibe a produção de surfactante pelas células alveolares tipo II","PVL ativa diretamente a cascata do complemento causando edema pulmonar osmótico","PVL destrói o endotélio capilar pulmonar através de toxinas proteolíticas"],a:0,e:"O slide \"Pneumonia\" mostra diagrama: PVL-producing S. aureus no alvéolo → PVL cria poros em PMNs e macrófagos ativados → necrose/apoptose dessas células → liberação de proteases e oxidantes → widened/edematous interstitium + protein-rich edema fluid → lesão pulmonar aguda (PVL-INDUCED ACUTE LUNG INJURY)."},
{id:"a8q18",d:"moderado",q:"No slide da aula sobre S. aureus e fibrose cística (FC), qual é o padrão de prevalência de S. aureus ao longo da vida dos pacientes com FC?",o:["S. aureus tem alta prevalência em crianças com FC (≥60% antes dos 10 anos), mas declina em adultos enquanto P. aeruginosa aumenta progressivamente e domina em pacientes mais velhos","S. aureus é incomum em crianças com FC, sendo patógeno tardio que surge após os 25 anos","S. aureus mantém prevalência constante de ~30% em todas as faixas etárias em pacientes com FC","S. aureus é eliminado naturalmente em pacientes com FC após os 5 anos de idade"],a:0,e:"O slide sobre FC mostra gráfico (Pathogens, 2021): S. aureus (incluindo MRSA) atinge ~60-80% dos pacientes com FC antes dos 10 anos. Com o envelhecimento, a prevalência de S. aureus cai e P. aeruginosa aumenta progressivamente, dominando em adultos. Além disso, isolados de FC têm maior plasticidade genômica que isolados de narinas de saudáveis."},
{id:"a8q19",d:"moderado",q:"Segundo o slide da aula, quais são as adesinas de S. aureus envolvidas na aderência às células alveolares e quais são seus ligantes?",o:["ClfA: receptor fibrinogen γ-chain; ClfB: receptor fibrinogen α-chain e cytokeratin 10; FnBPA e FnBPB: receptores de fibrinogen, elastin e fibronectin","Proteína A: liga-se à IgG; coagulase: liga-se ao fibrinogênio; hemolisina: liga-se à membrana lipídica","PVL: liga-se a receptores de serotonina; TSST-1: liga-se ao MHC classe II; toxina esfoliativa: liga-se à desmoglina","ClfA: liga-se à queratina; FnBPA: liga-se ao colágeno IV; IsdA: liga-se à elastina pulmonar"],a:0,e:"O slide \"S. aureus mechanisms of adherence to alveolar cells\" (doi:10.1089/mdr.2020.0352) mostra: ClfA → receptor fibrinogen γ-chain; ClfB → receptors fibrinogen α-chain e cytokeratin 10; FnBPA → receptors fibrinogen, elastin, fibronectin; FnBPB → receptors fibrinogen, elastin, fibronectin. Essas adesinas permitem colonização pulmonar."},
{id:"a8q20",d:"moderado",q:"De acordo com o slide da aula, por que o S. epidermidis é descrito como tendo \"função probiótica\"?",o:["S. epidermidis pode prevenir a colonização do hospedeiro por patógenos mais graves, como S. aureus, sendo assim benéfico ao microbioma cutâneo normal","S. epidermidis produz vitaminas do complexo B que nutrem as células epiteliais","S. epidermidis estimula a produção de anticorpos IgA que protegem contra todos os patógenos respiratórios","S. epidermidis forma biofilmes benéficos que impermeabilizam a pele contra alérgenos"],a:0,e:"O slide \"Staphylococcus epidermidis\" afirma: \"S. epidermidis pode ter uma função probiótica ao prevenir a colonização do hospedeiro por patógenos mais graves, como S. aureus.\" Isso é consistente com o artigo \"S. epidermidis — the accidental pathogen\" (Michael Otto). Na aula anterior, vimos que S. epidermidis produz serina-protease e H2O2 que inibem S. aureus."},
{id:"a8q21",d:"moderado",q:"Segundo o slide sobre susceptibilidade e resistência, qual é a linha do tempo histórica do surgimento da resistência do S. aureus às principais classes de antibióticos?",o:["1940: introdução da penicilina → surgimento da resistência; 1960: introdução da vancomicina e meticilina → surgimento do MRSA; após 2000: surgimento do VRSA (resistência à vancomicina)","1950: introdução da vancomicina → resistência imediata; 1970: MRSA surge do nada; 2010: VRSA erradicado","A resistência à penicilina surgiu antes mesmo da introdução do antibiótico em 1940","1980: MRSA surgiu pela primeira vez após introdução do imipenem; 2000: VRSA surgiu após introdução do linezolida"],a:0,e:"O slide \"Susceptibilidade\" mostra linha do tempo: 1940 = introdução da penicilina → surgimento de resistência à penicilina; 1960 = introdução da vancomicina e meticilina → surgimento da resistência à meticilina (MRSA); após 2000 = introdução de linezolida, daptomicina, tigeciclina após surgimento de resistência à vancomicina (VRSA). Bactérias Gram+ são mais resistentes ao dessecamento que Gram-."},
{id:"a8q22",d:"moderado",q:"No slide sobre barreiras cutâneas, quais são as alterações observadas na pele com dermatite atópica que favorecem a colonização por S. aureus em comparação com pele saudável?",o:["pH alcalino, diminuição de peptídeos antimicrobianos e ácidos graxos, redução da homeostase da junção célula-célula (facilitando invasão) e disbiose microbiana com predomínio de S. aureus e S. epidermidis","pH ácido aumentado, excesso de Actinobacteria e ausência de Corynebacterium","Ausência completa de microbiota cutânea criando vácuo ecológico para S. aureus","Hiperativação da barreira imunológica que paradoxalmente favorece S. aureus"],a:0,e:"Slide das barreiras cutâneas da aula: Dermatite atópica = \"pH alcalino, diminuição peptídeos antimicrobianos, ácidos graxos, junção célula-célula (invasão), reduzida homeostase + Microbial dysbiosis with predominance of S. aureus and S. epidermidis.\" Diferente da pele saudável (pH ácido, barreira intacta, microbioma equilibrado com Actinobacteria/Propionibacterium/Corynebacterium)."}]},
  aula7:{ name:"Aula 7 — Influenza (Gripe)", doc:"AIP 2025 - Prof. Pedro Almeida da Silva",
   summary:`## Aula 7 — Influenza (Gripe)\n\n### Pandemias históricas\n- **1918 Gripe Espanhola (H1N1):** 1/3 da população mundial infectada; 20-50 milhões de mortes; expectativa de vida nos EUA caiu 12 anos. Cidades com distanciamento social precoce tiveram menor mortalidade.\n- **1933:** Vírus influenza A isolado em Londres → vacinas inativadas.\n- **2009 (H1N1 suíno):** rearranjo genético entre vírus de patos migratórios → aves → suínos → humanos. Casos graves em jovens saudáveis.\n\n### Epidemiologia sazonal\n5-10% da população infectada anualmente; ~1 bilhão de casos; 3-5M graves; 290.000-650.000 mortes/ano.\n\n### Virologia\n- Família **Orthomyxoviridae**. Tipos: A, B, C.\n- Nomenclatura: **A/Brazil/2/78(H3N2)** = tipo/local/n°/ano/(subtipo HA e NA).\n- Estrutura: envelopado, nucleocapsídeo **helicoidal**, genoma **segmentado** (RNA fita simples, polaridade **negativa**).\n- Influenza A: **8 segmentos**, **16 HA** (H1-H16) e **9 NA** (N1-N9).\n\n### Variação antigênica\n- **Antigen Drift:** mutações pontuais graduais → **epidemias sazonais** (vacina anual).\n- **Antigen Shift:** rearranjo genético entre espécies → vírus com nova HA/NA → **risco de PANDEMIA**.\n\n### Clínica e complicações\n- Destruição do epitélio ciliado respiratório (3-7 dias).\n- Pneumonia viral primária nos casos graves.\n- Superinfecção bacteriana em ~30% dos fatais: *S. pneumoniae* e *S. aureus*.\n\n### Tratamento\n- **Oseltamivir** (Tamiflu): oral, 2x/dia, 5 dias. ≥14 dias de vida.\n- **Zanamivir** (Relenza): inalação, ≥7 anos. **Contraindicado em asma/DPOC**.\n\n### Vacinação\n- Atualizada anualmente pela OMS. Trivalente ou quadrivalente.\n- Brasil: campanha abril-agosto; 80M doses/ano; 100% do SUS produzido pelo **Butantan**.\n- **HD4V (Efluelda):** 4x mais antígenos; indicada para **≥60 anos**.`,
   tips:"Antigen Drift = mutações pontuais = epidemias sazonais. Antigen Shift = rearranjo genético = PANDEMIA. 8 segmentos, 16 HA, 9 NA. Nomenclatura: tipo/local/nº/ano/(HA+NA). Gripe Espanhola 1918 = H1N1, 20-50M mortes, expectativa de vida -12 anos nos EUA. Oseltamivir: oral. Zanamivir: inalação, cuidado asma/DPOC. Superinfecção bacteriana em 30% dos fatais. Vacina anual; Butantan = 100% SUS. HD4V (alta dose) para ≥60 anos.",
   questions:[
    {id:"a7q1",d:"facil",q:"A pandemia de gripe de 1918 (Gripe Espanhola) foi causada por qual subtipo de influenza e qual foi seu impacto?",o:["Influenza A H1N1; infectou ~1/3 da população mundial e matou 20-50 milhões de pessoas","Influenza B; infectou 10% da população mundial e matou 1 milhão","Influenza A H3N2; causou 500 mil mortes","Influenza C H1N1; pandemia de baixa mortalidade"],a:0,e:"A Gripe Espanhola (1918-1919) foi causada por Influenza A H1N1, infectou ~1/3 da população mundial, matou entre 20-50 milhões de pessoas e reduziu a expectativa de vida nos EUA em 12 anos."},
    {id:"a7q2",d:"moderado",q:"Qual lição da Gripe Espanhola de 1918 é aplicada até hoje em pandemias?",o:["Cidades que implementaram distanciamento social precocemente tiveram menores taxas de mortalidade","Antibióticos controlaram rapidamente a pandemia","Vacinas foram a principal medida de controle na época","O vírus se tornou menos virulento espontaneamente"],a:0,e:"Estudos históricos mostram que cidades americanas que adotaram distanciamento social precocemente tiveram menores picos de mortalidade — princípio aplicado em epidemias subsequentes incluindo COVID-19."},
    {id:"a7q3",d:"facil",q:"Em qual ano e local o vírus influenza A foi isolado pela primeira vez?",o:["1933, Instituto Nacional de Pesquisa Médica de Londres","1918, Nova York","1892, Berlim (Bacilo de Pfeiffer)","1945, após a WWII"],a:0,e:"Em 1933, pesquisadores do Instituto Nacional de Pesquisa Médica de Londres isolaram o vírus influenza A de secreções nasais. Essa descoberta levou ao desenvolvimento das primeiras vacinas inativadas no final dos anos 1930."},
    {id:"a7q4",d:"facil",q:"A qual família pertence o vírus influenza e qual é sua estrutura genômica?",o:["Família Orthomyxoviridae; genoma segmentado de RNA fita simples com polaridade negativa","Família Paramyxoviridae; RNA não segmentado","Família Flaviviridae; RNA fita dupla","Família Coronaviridae; RNA fita simples positivo"],a:0,e:"Orthomyxoviridae. O genoma é segmentado (8 segmentos no Influenza A), RNA fita simples, polaridade negativa. O genoma segmentado é a base do Antigen Shift."},
    {id:"a7q5",d:"moderado",q:"Na nomenclatura A/Brazil/2/78(H3N2), o que representa cada elemento?",o:["Tipo viral / origem da amostra / número da amostra / ano de isolamento / subtipo de HA e NA","Tipo de antígeno / país produtor da vacina / número de mutações / ano de vacinação / subtipo","Autoridade sanitária / local de surto / número de casos / ano de erradicação / subtipo","Tipo de transmissão / local do laboratório / número de proteínas / ano de descoberta / subtipo"],a:0,e:"Padrão OMS: Tipo(A/B/C)/Local de isolamento/Número da amostra/Ano/(Subtipo HA e NA). A=Influenza A; Brazil=local; 2=número; 78=1978; H3N2=hemaglutinina 3 + neuraminidase 2."},
    {id:"a7q6",d:"facil",q:"O genoma do Influenza A é composto por quantos segmentos de RNA?",o:["8 segmentos codificando ≥10 proteínas","4 segmentos","1 segmento único","16 segmentos"],a:0,e:"Influenza A: 8 segmentos de RNA que codificam pelo menos 10 proteínas (HA, NA, NP, PA, PB1, PB2, M1, M2, NS1, NEP). O número de segmentos é fundamental para entender o Antigen Shift (reassortment)."},
    {id:"a7q7",d:"moderado",q:"Quantos subtipos de Hemaglutinina (HA) e Neuraminidase (NA) existem no Influenza A?",o:["16 subtipos de HA (H1-H16) e 9 subtipos de NA (N1-N9)","4 de HA e 4 de NA","3 de HA e 3 de NA","10 de HA e 10 de NA"],a:0,e:"Influenza A: 16 HA (H1-H16) e 9 NA (N1-N9). As combinações geram enorme diversidade. Pandemias humanas históricas envolveram H1N1, H2N2 e H3N2."},
    {id:"a7q8",d:"moderado",q:"O ANTIGEN DRIFT da influenza é responsável pelas epidemias sazonais porque:",o:["Acumula gradualmente mutações pontuais na HA/NA, permitindo ao vírus evadir anticorpos gerados por infecções ou vacinas anteriores","Promove rearranjo genético com vírus de animais","Gera um vírus completamente novo sem imunidade prévia na população","Causa aumento súbito da transmissibilidade do vírus"],a:0,e:"Antigen Drift = deriva antigênica: pequenas mutações acumulam-se nos epítopos da HA e NA. Os anticorpos anteriores reconhecem menos o vírus — por isso precisamos vacinar anualmente."},
    {id:"a7q9",d:"dificil",q:"O ANTIGEN SHIFT é o mecanismo responsável pelo risco de pandemias porque:",o:["Rearranjo genético entre segmentos de vírus de espécies diferentes gera vírus com HA completamente nova, sem imunidade prévia na população humana","Acúmulo rápido de mutações pontuais em todos os segmentos","Transferência de plasmídios entre bactérias e vírus","Integração do RNA viral ao genoma humano"],a:0,e:"Antigen Shift = reassortment: quando dois vírus de espécies diferentes coinfectam a mesma célula (ex.: suíno), os 8 segmentos podem se misturar, criando vírus com HA totalmente nova. A população não tem imunidade → pandemia. Exemplo: 2009 H1N1 (patos + suínos + humanos)."},
    {id:"a7q10",d:"moderado",q:"Qual foi a característica epidemiológica inusual da pandemia de influenza de 2009 (H1N1 suíno)?",o:["Muitos casos graves em adultos jovens previamente saudáveis (diferente da gripe sazonal, que afeta mais idosos)","Mortalidade concentrada em idosos acima de 80 anos","Transmissão exclusivamente por contato fecal-oral","Afetou apenas crianças abaixo de 5 anos"],a:0,e:"A pandemia 2009 (H1N1 suíno) causou muitos casos graves em adultos jovens saudáveis — padrão incomum. Idosos podem ter tido imunidade residual de exposições anteriores a H1N1 similares (anos 1950s)."},
    {id:"a7q11",d:"moderado",q:"Qual complicação bacteriana ocorre em ~30% dos casos fatais de influenza?",o:["Superinfecção por S. pneumoniae e S. aureus causando pneumonia bacteriana secundária","Meningite bacteriana por N. meningitidis","Endocardite por Streptococcus viridans","Sepse por E. coli"],a:0,e:"A influenza destrói o epitélio ciliado, criando porta de entrada para bactérias. S. pneumoniae e S. aureus causam pneumonia bacteriana secundária em ~30% dos casos fatais — frequentemente a causa imediata de morte, não o vírus em si."},
    {id:"a7q12",d:"facil",q:"Qual é o antiviral de primeira escolha para influenza e qual seu mecanismo de ação?",o:["Oseltamivir (Tamiflu): inibidor de neuraminidase — impede a liberação dos novos vírions das células infectadas","Zanamivir: inibe a hemaglutinina impedindo a adesão viral","Amantadina: bloqueia a proteína M2, impedindo a desnudação","Remdesivir: análogo de nucleotídeo que bloqueia a replicação"],a:0,e:"Oseltamivir inibe a neuraminidase (NA) — enzima que cliva o ácido siálico e permite a liberação de novos vírus das células infectadas. Sem NA funcional, os vírus ficam presos na célula. Administrado oralmente, 2x/dia, 5 dias."},
    {id:"a7q13",d:"moderado",q:"Por que o Zanamivir (Relenza) é contraindicado em pacientes com asma ou DPOC?",o:["É administrado por inalação e pode precipitar broncoespasmo em pacientes com hiper-reatividade brônquica","Tem interação medicamentosa com broncodilatadores","Não tem eficácia em pacientes com doenças pulmonares","Causa toxicidade pulmonar cumulativa"],a:0,e:"Zanamivir é inalado como pó seco — a formulação pode irritar as vias aéreas e desencadear broncoespasmo em pacientes com asma ou DPOC. Nesses casos, oseltamivir oral é a alternativa segura."},
    {id:"a7q14",d:"facil",q:"Por que a vacina contra influenza precisa ser atualizada ANUALMENTE?",o:["Por causa do Antigen Drift: mutações pontuais acumuladas nas proteínas HA/NA mudam os epítopos, reduzindo a eficácia das vacinas anteriores","Porque as vacinas expiram em 1 ano","Porque o vírus da influenza é completamente erradicado todo ano","Por causa do Antigen Shift que ocorre todo inverno"],a:0,e:"O Antigen Drift gera novas variantes antigênicas anualmente. A OMS monitora globalmente as cepas e recomenda as 3-4 para incluir na vacina do próximo ano. Por isso a vacinação anual é necessária."},
    {id:"a7q15",d:"moderado",q:"No Brasil, quem produz 100% das vacinas contra influenza do SUS e quando ocorre a campanha?",o:["Instituto Butantan; campanha de abril a agosto — 80 milhões de doses por ano","Fiocruz; campanha de julho a dezembro","Sanofi Pasteur; campanha em março","Bio-Manguinhos; campanha de outubro a fevereiro"],a:0,e:"O Instituto Butantan produz 100% das vacinas contra gripe do SUS, distribuindo ~80 milhões de doses por ano. A campanha ocorre de abril a agosto, alinhada ao período pré-inverno do Hemisfério Sul."},
    {id:"a7q16",d:"moderado",q:"A vacina de alta dose (HD4V/Efluelda) é indicada para qual grupo e por quê?",o:["≥60 anos: idosos têm resposta imune diminuída (imunosenescência) e precisam de 4x mais antígenos para resposta adequada","Crianças < 2 anos: sistema imune imaturo","Imunossuprimidos de qualquer idade","Profissionais de saúde em contato com H5N1"],a:0,e:"HD4V (High Dose quadrivalent) = 4x a quantidade de antígenos da dose padrão. Idosos têm imunosenescência — respondem menos às vacinas convencionais. A dose maior gera resposta protetora adequada. Indicada para ≥60 anos pela SBIm."},
    {id:"a7q17",d:"moderado",q:"O 'Bacilo de Pfeiffer' (H. influenzae) foi erroneamente apontado como causa da influenza em 1892 porque:",o:["Era encontrado no escarro de pacientes com gripe — mas era coinfecção bacteriana secundária, não o agente primário","O vírus influenza foi confundido com uma bactéria","H. influenzae causa quadro clínico idêntico ao da influenza viral","Pfeiffer realizou experimentos de inoculação que provaram causalidade"],a:0,e:"Pfeiffer isolou H. influenzae de escarro de pacientes gripados e concluiu erroneamente ser o agente etiológico. Na realidade eram coinfecções bacterianas secundárias muito comuns na gripe. O verdadeiro agente (vírus) só foi isolado em 1933."}
   ]},
  aula6:{ name:"Aula 6 — SARS-CoV-2 e COVID-19", doc:"AIP 2025 - Prof. Pedro Almeida da Silva",
   summary:`## Aula 6 — SARS-CoV-2 e COVID-19\n\n### Linha do tempo da pandemia\n- **17/11/2019:** primeiro caso detectável.\n- **31/12/2019:** China informa a OMS sobre 41 casos de síndrome respiratória aguda (maioria associada ao Mercado Huanan de Wuhan).\n- **30/12/2019:** Dr. Li Wenliang alerta sobre novo coronavírus — forçado a retratar-se; morre de COVID-19 em 07/02/2020.\n- **07/01/2020:** identificado novo coronavírus (nCoV). **11/01/2020:** primeira morte e sequenciamento.\n- **21/02/2020:** casos na Itália (início da dispersão europeia/mundial).\n\n### Brasil na pandemia\nCom 3% da população mundial, o Brasil concentrou **~10% dos casos** e **~11% das mortes acumuladas** globais por COVID-19.\n\n### Origem do SARS-CoV-2\n- **Transmissão zoonótica direta** (morcegos → humanos): provável.\n- **Via hospedeiro intermediário + spillover**: muito provável (padrão visto em SARS-CoV 2003 via civetas, MERS-CoV 2013 via camelos).\n- **Acidente laboratorial**: improvável (OMS; ligação da Spike ao ACE2 é resultado de seleção natural, não engenharia).\n\n### Variantes de preocupação (VOC — Variants of Concern)\nNomenclatura OMS (letras gregas): Alpha (Reino Unido / B.1.1.7), Beta (África do Sul / B.1.351), Gamma (Brasil / P.1), Delta (Índia / B.1.617.2).\nMutação **D614G** presente em todas as variantes. Variantes surgem onde a **incidência é maior** (mais vírus → mais mutações → seleção de mutantes).\n**Evolução convergente**: linhagens independentes desenvolvem mutações semelhantes.\n\n### Plataformas vacinais\n| Plataforma | Exemplos | Mecanismo |\n|---|---|---|\n| Vírus inativado | Coronavac (Sinovac/Butantan) | Vírus inativado (β-propiolactona) + hidróxido de Al |\n| Vetor viral | AstraZeneca (ChAdOx1), Janssen (Ad26), Sputnik V | Gene Spike em adenovírus vetor |\n| mRNA | Pfizer/BioNTech, Moderna | RNAm Spike em nanocarreadores lipídicos |\n| Proteína | Novavax | Proteína Spike recombinante + saponina adjuvante |\n\n### Eficácia das vacinas (estudos controlados)\nPfizer 95% | Moderna 94,5% | Sputnik V 91,6% | Novavax 89,3% | AstraZeneca 70% | Janssen 66% | Coronavac 50,4%.\n**Eficácia** = estudos controlados. **Efetividade** = impacto no mundo real (ex.: Coronavac Chile: 65% casos leves, 87% hospitalizações, 90% UTI, 87% óbitos).\n\n### Diagnóstico laboratorial\n- **RT-PCR:** detecta RNA viral — positivo antes dos sintomas; padrão ouro.\n- **Teste rápido antígeno:** detecta proteínas virais — positivo no pico da infectividade.\n- **Sorologia:** IgM+ = infecção recente; IgG+ = infecção prévia ou vacinado; IgM+/IgG+ = infecção recente.\n\n### Antivirais\nDesafios: poucas estruturas-alvo; usa maquinaria do hospedeiro (toxicidade); deve ser iniciado precocemente.\n- **Remdesivir:** intravenoso (Gilead).\n- **Nirmatrelvir (Paxlovid):** oral, bloqueia replicação.\n- **Bamlanivimab-etesevimab:** anticorpos monoclonais (IV).\nAntivirais são eficazes na **fase inicial** da infecção; ineficazes na fase tardia (resposta imune exacerbada).\n\n### Sequelas da COVID-19\nDiretas: fadiga, falta de ar, trombose, AVC, miocardite, insuficiência renal, síndrome inflamatória multisistêmica.\nIndiretas: adiamento de cirurgias, piora do controle de TB, depressão, falta de recursos para outros agravos.`,
   tips:"COVID-19: 3% população brasileira = 10% casos + 11% mortes globais. Origem mais provável: zoonose + hospedeiro intermediário (como SARS/civetas e MERS/camelos). Acidente laboratorial = improvável (OMS). VOC: Alpha-UK, Beta-África do Sul, Gamma-Brasil, Delta-Índia; mutação D614G em todas. Mais vírus circulando → mais variantes (vacinar reduz variantes). Plataformas: inativado (Coronavac), vetor viral (AstraZeneca), mRNA (Pfizer/Moderna), proteína (Novavax). Eficácia ≠ Efetividade: eficácia em estudos; efetividade no mundo real. RT-PCR = melhor diagnóstico precoce; sorologia IgG+ = exposição prévia ou vacinado. Antiviral funciona MELHOR no início da infecção (fase viral).",
   questions:[
    {id:"a6q1",d:"facil",q:"O SARS-CoV-2 pertence a qual família e possui qual tipo de material genético?",o:["Família Coronaviridae, vírus RNA envelopado","Família Flaviviridae, vírus RNA não envelopado","Família Togaviridae, vírus DNA","Família Adenoviridae, vírus DNA sem envelope"],a:0,e:"SARS-CoV-2 pertence à família Coronaviridae — coronavírus de RNA fita simples positiva, envelopado, com espículas (proteína Spike) que interagem com o receptor ACE2 das células humanas."},
    {id:"a6q2",d:"moderado",q:"O Dr. Li Wenliang, médico chinês que alertou sobre o novo coronavírus em dezembro de 2019, foi forçado a retratar-se por 'disseminar fake news'. Qual foi seu desfecho?",o:["Morreu de COVID-19 em 07 de fevereiro de 2020","Sobreviveu e tornou-se porta-voz da OMS","Foi descoberto ter razão apenas após a pandemia terminar","Emigrou para os EUA para continuar suas pesquisas"],a:0,e:"Li Wenliang alertou colegas em 30/12/2019 sobre um provável novo coronavírus. Foi forçado pela polícia chinesa a assinar documento negando as informações. Contraiu COVID-19 de um paciente e faleceu em 07/02/2020, tornando-se símbolo da resposta inicial falha."},
    {id:"a6q3",d:"moderado",q:"Em qual data a China informou a OMS sobre os primeiros casos de síndrome respiratória aguda relacionados ao Mercado Huanan de Wuhan?",o:["31 de dezembro de 2019","17 de novembro de 2019","7 de janeiro de 2020","21 de fevereiro de 2020"],a:0,e:"Em 31/12/2019 a China notificou a OMS sobre 41 casos de SRA, a maioria relacionada ao Mercado Atacadista de Frutos do Mar Huanan. O mercado foi fechado em 1/1/2020 e o novo coronavírus foi identificado em 7/1/2020."},
    {id:"a6q4",d:"facil",q:"Qual a participação do Brasil, com ~3% da população mundial, nos casos e mortes acumulados por COVID-19?",o:["~10% dos casos e ~11% das mortes globais","~1% dos casos e ~1% das mortes globais","~30% dos casos e ~30% das mortes globais","~3% dos casos e ~3% das mortes globais"],a:0,e:"Apesar de representar apenas 3% da população mundial, o Brasil concentrou ~10% dos casos e ~11% das mortes acumuladas por COVID-19 no mundo — uma das maiores proporções por habitante no período."},
    {id:"a6q5",d:"moderado",q:"Segundo a OMS, qual hipótese sobre a origem do SARS-CoV-2 é considerada MAIS provável?",o:["Transmissão zoonótica via hospedeiro intermediário (spillover animal-humano)","Criação em laboratório e acidente de contenção","Mutação espontânea em humanos sem envolvimento animal","Introdução por cadeia fria de alimentos importados"],a:0,e:"A OMS classifica a introdução via hospedeiro intermediário (morcego → animal intermediário → humano, como no SARS-CoV-2003/civetas e MERS/camelos) como 'muito provável'. O acidente laboratorial é classificado como 'improvável'."},
    {id:"a6q6",d:"moderado",q:"O SARS-CoV (2003) e o MERS-CoV (2013) são coronavírus zoonóticos anteriores ao SARS-CoV-2. Quais foram os hospedeiros intermediários em cada caso?",o:["SARS-CoV: civetas (Ásia); MERS-CoV: dromedários/camelos (Oriente Médio)","SARS-CoV: camelos; MERS-CoV: morcegos diretamente","SARS-CoV: macacos; MERS-CoV: aves","SARS-CoV: roedores; MERS-CoV: suínos"],a:0,e:"SARS-CoV (2003): morcegos → civetas (mercados de animais vivos) → humanos. MERS-CoV (2013): morcegos → dromedários (camelos) → humanos (exposição contínua, não pandêmica)."},
    {id:"a6q7",d:"facil",q:"Qual variante de preocupação (VOC) do SARS-CoV-2 foi identificada no BRASIL e recebeu o nome grego 'Gamma'?",o:["Gamma (Brasil/P.1)","Alpha (Reino Unido/B.1.1.7)","Beta (África do Sul/B.1.351)","Delta (Índia/B.1.617.2)"],a:0,e:"A variante Gamma (P.1) foi identificada no Brasil em Manaus e causou uma segunda onda devastadora no país. Compartilha mutações com Alpha e Beta (como E484K) mas tem origem independente — exemplo de evolução convergente."},
    {id:"a6q8",d:"moderado",q:"A mutação D614G da proteína Spike do SARS-CoV-2 é importante porque:",o:["Está presente em TODAS as variantes de preocupação (VOC), indicando que confere vantagem seletiva ao vírus","É exclusiva da variante Omicron","Reduz a capacidade do vírus de se ligar ao receptor ACE2","Torna o vírus resistente a todos os antivirais"],a:0,e:"D614G aparece em todas as variantes de preocupação (Alpha, Beta, Gamma, Delta, Omicron), sugerindo vantagem evolutiva na transmissão. É um exemplo de evolução convergente — diferentes linhagens independentes adquiriram a mesma mutação benéfica."},
    {id:"a6q9",d:"moderado",q:"A evolução CONVERGENTE observada nas variantes do SARS-CoV-2 significa que:",o:["Linhagens virais independentes desenvolveram mutações semelhantes por pressões seletivas parecidas","As variantes derivam umas das outras em cadeia linear","A vacina provocou o surgimento das variantes","Todas as variantes têm o mesmo ancestral próximo e recente"],a:0,e:"Evolução convergente = características semelhantes surgem em linhagens independentes. Alpha (UK), Beta (África do Sul) e Gamma (Brasil) desenvolveram E484K de forma independente — todas sob pressão seletiva para escapar de anticorpos."},
    {id:"a6q10",d:"facil",q:"Vacinas com qual plataforma foram utilizadas pela Pfizer/BioNTech e Moderna contra COVID-19?",o:["mRNA (RNAm da proteína Spike encapsulado em nanopartículas lipídicas)","Vírus inativado","Vetor viral (adenovírus)","Proteína recombinante"],a:0,e:"Pfizer/BioNTech e Moderna usam a plataforma de mRNA: o RNAm que codifica a proteína Spike do SARS-CoV-2 é encapsulado em nanopartículas lipídicas, entra nas células humanas e instrui a produção da Spike, gerando resposta imune."},
    {id:"a6q11",d:"moderado",q:"A Coronavac (Sinovac/Instituto Butantan) é um exemplo de vacina de vírus INATIVADO. O que isso significa?",o:["O SARS-CoV-2 é cultivado em células Vero, depois inativado com β-propiolactona, tornando-o incapaz de replicar","O vírus é modificado geneticamente para se tornar inofensivo","Contém apenas o gene da proteína Spike sem vírus completo","Usa um vírus diferente (adenovírus) para transportar o gene do SARS-CoV-2"],a:0,e:"Coronavac: SARS-CoV-2 (cepa N2) é cultivado em células de rim de macaco (Vero), inativado com β-propiolactona (destrói capacidade replicativa sem alterar antígenos), adsorvido em hidróxido de alumínio como adjuvante."},
    {id:"a6q12",d:"moderado",q:"As vacinas AstraZeneca, Janssen e Sputnik V utilizam qual plataforma vacinal?",o:["Vetor viral (adenovírus modificado com gene da Spike do SARS-CoV-2)","mRNA em nanopartículas lipídicas","Vírus inativado com adjuvante","Proteína Spike recombinante"],a:0,e:"Essas vacinas usam adenovírus como vetor: ChAdOx1 (AstraZeneca), Ad26 (Janssen), Ad5+Ad26 (Sputnik V). O adenovírus foi modificado para carregar o gene da Spike do SARS-CoV-2, sendo incapaz de se replicar no humano."},
    {id:"a6q13",d:"facil",q:"Qual é a diferença entre EFICÁCIA e EFETIVIDADE vacinal?",o:["Eficácia = medida em estudos controlados (condições ideais); Efetividade = impacto no mundo real (redução de casos, mortes, hospitalizações)","Eficácia = medida no mundo real; Efetividade = estudos controlados","São termos sinônimos","Eficácia só se aplica a antibióticos; efetividade a vacinas"],a:0,e:"Eficácia vacinal: mensurada em Fase 3 com voluntários randomizados (experimental controlado). Efetividade vacinal: impacto real na população vacinada (observacional — ex.: Coronavac Chile mostrou 65% efetividade para casos leves mas 87% para redução de hospitalizações)."},
    {id:"a6q14",d:"moderado",q:"Em estudos controlados, qual vacina anti-COVID-19 apresentou a maior taxa de eficácia?",o:["Pfizer/BioNTech (95%)","Moderna (94,5%)","AstraZeneca (70%)","Coronavac (50,4%)"],a:0,e:"Pfizer/BioNTech: 95% de eficácia em estudos controlados (Fase 3). Moderna: 94,5%. Sputnik V: 91,6%. Novavax: 89,3%. AstraZeneca: 70%. Janssen: 66%. Coronavac: 50,4% nos estudos iniciais."},
    {id:"a6q15",d:"moderado",q:"O estudo chileno com Coronavac (NEJM 2021), com 1,2 milhão de vacinados, mostrou qual efetividade no MUNDO REAL?",o:["65% casos leves sintomáticos, 87% redução de hospitalizações, 90% redução UTI, 87% redução de óbitos","50% redução de casos leves; sem efeito na mortalidade","95% em todos os desfechos","30% nos casos leves; 50% nas hospitalizações"],a:0,e:"Estudo Chile (NEJM Jul/2021): 1,2M vacinados com Coronavac → 65% prevenção de casos leves, 87% redução de hospitalizações, 90% de internação em UTI, 87% de óbitos. Efetividade real supera a eficácia do estudo inicial de 50,4%."},
    {id:"a6q16",d:"facil",q:"Para diagnóstico precoce de COVID-19 (dias 1-5 dos sintomas), qual teste é considerado o PADRÃO-OURO?",o:["RT-PCR (detecção do RNA viral)","Teste rápido de antígeno","Sorologia IgM","Sorologia IgG"],a:0,e:"RT-PCR detecta material genético viral (RNA) — é altamente sensível, pode positivar até 2 dias antes dos sintomas e permanecer positivo após a cessação da infectividade. É o padrão ouro para diagnóstico de COVID-19."},
    {id:"a6q17",d:"moderado",q:"Um paciente apresenta sorologia IgM NEGATIVO e IgG POSITIVO para SARS-CoV-2. Qual a interpretação mais provável?",o:["Infecção PRÉVIA por SARS-CoV-2 (ou vacinação prévia)","Infecção RECENTE (últimas 2 semanas)","Ausência de qualquer contato com o vírus","Resultados inconclusivos sempre, sem interpretação possível"],a:0,e:"IgM+ = infecção recente (primeiras 2-3 semanas). IgG+ = exposição anterior (infecção passada ou vacinação). IgM-/IgG+ indica que a fase aguda já passou — o paciente desenvolveu imunidade duradoura."},
    {id:"a6q18",d:"moderado",q:"Por que os antivirais para COVID-19 são mais eficazes quando administrados NO INÍCIO da infecção?",o:["Na fase inicial predomina a replicação viral (fase viral) — o antiviral reduz o vírus antes de a resposta imune exacerbada causar dano tissular","Porque o vírus é mais sensível na fase tardia quando está replicando mais","Porque na fase grave o paciente está mais receptivo ao medicamento","Porque o sistema imune bloqueia a ação do antiviral nas fases tardias"],a:0,e:"COVID-19 tem duas fases: (1) VIRAL — domina o início; antiviral aqui age como 'extintor de incêndio pequeno'. (2) IMUNE (tardia) — resposta inflamatória exacerbada causa dano. Usar antiviral na fase tardia é como usar extintor em incêndio florestal: ineficaz."},
    {id:"a6q19",d:"moderado",q:"O Remdesivir, um dos principais antivirais para COVID-19, é administrado por qual via?",o:["Intravenosa (IV)","Oral","Inalatória","Intramuscular"],a:0,e:"Remdesivir (Gilead Sciences) é administrado via intravenosa — indicado em casos graves hospitalizados. O nirmatrelvir (Paxlovid) é oral, mais conveniente para uso ambulatorial precoce."},
    {id:"a6q20",d:"moderado",q:"Nas sequelas DIRETAS da COVID-19 (Long COVID), qual das seguintes NÃO é uma complicação descrita?",o:["Catarata","Fadiga prolongada","Trombose","Miocardite"],a:0,e:"Sequelas diretas da COVID-19: fadiga, falta de ar, trombose, AVC, miocardite, insuficiência renal, confusão mental, síndrome inflamatória multisistêmica. Catarata não é uma sequela documentada da COVID-19."},
    {id:"a6q21",d:"dificil",q:"Por que reduzir a transmissão do SARS-CoV-2 (com vacinas e medidas de barreira) contribui para DIMINUIR o surgimento de novas variantes?",o:["Menos vírus circulando → menos replicações → menos mutações → menos seleção de variantes mais transmissíveis","As vacinas alteram o genoma viral, impedindo mutações","O vírus perde sua capacidade de mutação quando encontra anticorpos","As medidas de barreira destroem fisicamente o material genético viral"],a:0,e:"Variantes surgem onde há MAIOR incidência (mais vírus replicando → mais erros na cópia do RNA → mais mutações → maior chance de selecionar mutantes com vantagem). Reduzir a transmissão = reduzir a 'fábrica de variantes'."},
    {id:"a6q22",d:"moderado",q:"D614G é uma mutação presente em todas as variantes de preocupação do SARS-CoV-2. Esse padrão de mutações semelhantes surgindo em linhagens independentes é chamado de:",o:["Evolução convergente","Evolução divergente","Deriva genética neutra","Transferência horizontal de genes"],a:0,e:"Evolução convergente: linhagens independentes desenvolvem características/mutações semelhantes por pressão seletiva parecida. No SARS-CoV-2, diferentes variantes desenvolveram mutações na Spike (D614G, E484K, etc.) independentemente, pois essas mutações conferem vantagem adaptativa."}
   ]},
  aula5:{ name:"Aula 5 — Arboviroses (Dengue, Zika, Chikungunya, Oropouche, Febre Amarela)", doc:"AIP 2025 - Prof. Pedro Almeida da Silva",
   summary:`## Aula 5 — Arboviroses (Dengue, Zika, Chikungunya, Oropouche, Febre Amarela)\n\n**Arbovírus = Arthropod Borne virus:** vírus mantidos na natureza pela transmissão entre vertebrados suscetíveis e artrópodes hematófagos ou por transmissão transovariana.\n\n### DENGUE (DENV)\n- **4 sorotipos:** DENV-1 a DENV-4. Família *Flaviviridae*, gênero *Flavivirus*. RNA fita simples sentido positivo. Envelopado esférico.\n- **Vetor:** *Aedes aegypti*. **Incubação:** 3-15 dias (média 5-6 dias). Transmissibilidade: 1 dia antes da febre até o 6° dia.\n- **Dengue clássica:** febre alta súbita (>40°C), dor retroorbitária (piora com movimento ocular), mialgia/artralgia, manchas vermelhas, náuseas.\n- **Dengue hemorrágica:** sangramento mucosas/gengivas, pulso fraco, abdomen doloroso, choque. EVITAR AAS e AINEs.\n- **Febre Hemorrágica da Dengue (FHD):** Teoria de Halstead — 2ª infecção por sorotipo DIFERENTE (3m-5 anos) → resposta imune exacerbada.\n- **Diagnóstico:** NS1 (dias 1-5); PCR (dias 1-5); IgM (a partir do 6° dia); IgG (infecção secundária elevada).\n- **Vacinas:** Dengvaxia (exige soropositividade prévia; 3 doses: 0, 6, 12m); Qdenga (pode usar sem sorologia; 2 doses: 0 e 3m; ≥4 anos).\n- **Tratamento:** sintomático + hidratação intensiva. Sem antiviral específico.\n\n### ZIKA (ZIKV)\n- *Flaviviridae*, *Flavivirus*. Duas linhagens: africana e asiática.\n- **Transmissão:** *Aedes aegypti* (principal), sexual, vertical (todos os trimestres), transfusão sanguínea.\n- **Sintomas:** afebril ou subfebril, manchas intensas (90-100%), conjuntivite (50-90%), dor articular e muscular moderada/leve.\n- **Síndrome Congênita do Zika (SCZ):** microcefalia, Guillain-Barré, anomalias neurológicas. Risco maior no 1° trimestre. ~26% das mães transmitem ao feto.\n- **Tratamento:** sintomático. Sem antiviral específico. Monitoramento em gestantes.\n\n### CHIKUNGUNYA (CHIKV)\n- Alphavirus, Togaviridae. RNA ss sentido positivo. Envelopado.\n- **Vetores:** *Aedes aegypti* e *Aedes albopictus*.\n- **Sintomas marcantes:** febre alta >38°C (2-3 dias), **dor articular INTENSA** (90% dos casos), manchas (50%, primeiras 48h), dor muscular intensa. Conjuntivite em 30%.\n- Pode causar artralgia crônica persistente por meses/anos.\n- **Tratamento:** paracetamol/dipirona; fisioterapia para artralgia crônica. Sem antiviral específico.\n\n### OROPOUCHE (OROV)\n- *Orthobunyavirus oropoucheense*, família *Peribunyaviridae*. Isolado no Brasil em 1960 (bicho-preguiça).\n- **Vetor:** *Culicoides paraensis* (maruim ou mosquito-pólvora). Ciclo silvestre (primatas/preguiças) e urbano (humanos).\n- **Sintomas:** febre alta, cefaleia, mialgia, fotossensibilidade, diarréia, vômito, dor retroocular, manifestações neurológicas.\n- **Atenção a gestantes:** pode causar danos neurológicos ao feto.\n\n### FEBRE AMARELA\n- *Flavivirus*, *Flaviviridae*. Ciclo silvestre (macacos + Haemagogus/Sabethes) e ciclo urbano (Aedes aegypti — sem registro no Brasil desde 1942).\n- **Sintomas graves:** icterícia, hemorragia, insuficiência de múltiplos órgãos.\n- **Vacina:** vírus vivo atenuado; 1ª dose aos 9 meses + reforço aos 4 anos; via subcutânea.\n- **Tratamento:** suporte clínico. Sem antiviral específico.\n\n### Tabela comparativa\n| Sintoma | Dengue | Chikungunya | Zika |\n|---|---|---|---|\n| Febre | Alta, sempre | Alta, quase sempre | Baixa/subfebril |\n| Dor articular | Moderada | Intensa (90%) | Leve |\n| Coceira | Leve | Leve (50-80%) | Leve a intensa |\n| Olhos vermelhos | Não | Pode | Pode (50-90%) |\n\n**Prevenção geral:** eliminar água parada (criadouros do Aedes aegypti).`,
   tips:"Arbovírus = vetor artrópode (mosquito, maruim). Dengue: 4 sorotipos; Aedes aegypti; FHD = Teoria Halstead (2ª infecção sorotipo diferente). Não usar AAS! Dengvaxia: exige soropositivo prévio; Qdenga: sem requisito sorológico. Zika: conjuntivite 50-90%; transmissão vertical em todos os trimestres; SCZ = microcefalia. Chikungunya: dor articular INTENSA (marca registrada); artralgia pode cronificar. Oropouche: vetor = maruim (Culicoides paraensis), não Aedes. Febre amarela: vacina vivo atenuado; sem antiviral; ciclo urbano ausente no Brasil desde 1942. TODAS as arboviroses listadas: sem antiviral específico = tratamento sintomático.",
   questions:[
    {id:"a5q1",d:"facil",q:"O que significa a sigla ARBOVÍRUS?",o:["Arthropod Borne Virus — vírus transmitidos por artrópodes (mosquitos, flebótomos, carrapatos etc.)","Arbovírus Respiratórios Borrelia Veiculados","Agente RNA Bacteriano Oportunista Viral","Vírus de Alta Replicação e Baixa Oxidação"],a:0,e:"Arbovírus = Arthropod Borne Virus: vírus mantidos na natureza pela transmissão entre hospedeiros vertebrados suscetíveis e artrópodes hematófagos (mosquitos, maruins, etc.) ou por transmissão transovariana."},
    {id:"a5q2",d:"facil",q:"Qual é o principal vetor do dengue e do Zika no Brasil?",o:["Aedes aegypti","Anopheles gambiae","Culicoides paraensis","Culex quinquefasciatus"],a:0,e:"O Aedes aegypti (pernilongo rajado) é o principal vetor do dengue (DENV-1 a 4), Zika e Chikungunya no Brasil. O Culicoides paraensis (maruim) é o principal vetor do Oropouche."},
    {id:"a5q3",d:"facil",q:"Quantos sorotipos do vírus da dengue circulam nas Américas?",o:["4 sorotipos (DENV-1, 2, 3 e 4)","2 sorotipos","1 sorotipo","6 sorotipos"],a:0,e:"O vírus da dengue (DENV) possui 4 sorotipos circulantes nas Américas: DENV-1, DENV-2, DENV-3 e DENV-4, com linhagens e genótipos distintos."},
    {id:"a5q4",d:"moderado",q:"A qual família e gênero pertence o vírus da dengue?",o:["Família Flaviviridae, gênero Flavivirus","Família Togaviridae, gênero Alphavirus","Família Peribunyaviridae, gênero Orthobunyavirus","Família Coronaviridae, gênero Betacoronavirus"],a:0,e:"O vírus da dengue pertence à família Flaviviridae e ao gênero Flavivirus. O mesmo gênero inclui o Zika e a febre amarela. O Chikungunya é da família Togaviridae/Alphavirus."},
    {id:"a5q5",d:"facil",q:"Qual o período de incubação médio da dengue após a picada infecciosa?",o:["5 a 6 dias (variando de 3 a 15 dias)","24-48 horas","2 a 4 semanas","3 meses"],a:0,e:"O período de incubação da dengue varia de 3 a 15 dias, sendo em média de 5 a 6 dias."},
    {id:"a5q6",d:"moderado",q:"Por quanto tempo o paciente com dengue transmite o vírus ao mosquito Aedes aegypti?",o:["Do dia anterior ao surgimento da febre até o 6° dia da doença (período de viremia)","Apenas durante o pico da febre (1-2 dias)","Durante toda a vida, pois o vírus fica latente","Somente nos primeiros 24h da infecção"],a:0,e:"A transmissibilidade ocorre enquanto há viremia: começa 1 dia antes da febre e vai até o 6° dia da doença. Por isso coletas de PCR/NS1 devem ser feitas nos primeiros 5 dias."},
    {id:"a5q7",d:"moderado",q:"Na dengue hemorrágica, qual medicamento está CONTRAINDICADO pelo risco de aumentar o sangramento?",o:["Ácido acetilsalicílico (AAS) e AINEs","Paracetamol","Dipirona","Amoxicilina"],a:0,e:"AAS e AINEs (ibuprofeno, etc.) têm efeito antiagregante plaquetário e aumentam o risco de sangramento — contraindicados na dengue. O paracetamol é a analgésico/antipirético de escolha."},
    {id:"a5q8",d:"dificil",q:"A Teoria de Halstead explica a Febre Hemorrágica da Dengue como:",o:["Uma 2ª infecção por sorotipo DIFERENTE (3 meses a 5 anos após a 1ª) que desencadeia resposta imune exacerbada pela amplificação dependente de anticorpos","Uma infecção primária por cepas altamente virulentas","Uma coinfecção simultânea por dois sorotipos","Uma mutação do vírus que o torna capaz de causar hemorragia"],a:0,e:"Teoria de Halstead: anticorpos da 1ª infecção (sorotipo X) não neutralizam o sorotipo Y da 2ª infecção, mas facilitam a entrada do vírus nos macrófagos (ADE — Antibody Dependent Enhancement), causando doença mais grave."},
    {id:"a5q9",d:"moderado",q:"Para o diagnóstico laboratorial da dengue, qual marcador é detectável nos primeiros 5 dias da doença, antes do surgimento de anticorpos IgM?",o:["Proteína NS1 (antígeno não-estrutural 1)","IgG específico anti-DENV","IgM específico anti-DENV","Anticorpo neutralizante"],a:0,e:"A proteína NS1 é produzida em grande quantidade durante a replicação viral e pode ser detectada nos primeiros dias (antes dos anticorpos). IgM aparece a partir do 6° dia; IgG indica infecção secundária."},
    {id:"a5q10",d:"moderado",q:"Qual das vacinas para dengue PODE ser usada independentemente de sorologia prévia de infecção?",o:["Qdenga (TAK-003)","Dengvaxia (CYD-TDV)","Ambas exigem soropositividade","Nenhuma vacina está disponível para dengue"],a:0,e:"Qdenga (vírus vivo atenuado tetravalente backbone DENV-2): pode ser usada independentemente da sorologia prévia, ≥4 anos, 2 doses (0 e 3 meses). Dengvaxia EXIGE confirmação laboratorial de infecção prévia — sem isso, aumenta o risco de dengue grave em soronagativos."},
    {id:"a5q11",d:"facil",q:"Qual é a característica clínica MAIS marcante que diferencia o CHIKUNGUNYA do dengue e do Zika?",o:["Dor articular INTENSA (artralgia intensa presente em ~90% dos casos, podendo cronificar)","Febre altíssima acima de 42°C","Hemorragia das mucosas","Microcefalia congênita"],a:0,e:"A dor articular intensa é a marca registrada do chikungunya (do swahili 'aquele que se dobra de dor'). Pode cronificar por meses ou anos. No dengue, a artralgia é moderada; no Zika é leve."},
    {id:"a5q12",d:"moderado",q:"O Zika pode ser transmitido de mãe para filho durante a gestação (transmissão vertical). Em qual período gestacional o risco de malformações graves (microcefalia) é MAIOR?",o:["Primeiro trimestre","Segundo trimestre","Terceiro trimestre","O risco é igual nos três trimestres"],a:0,e:"A transmissão vertical pode ocorrer em todos os trimestres, porém o risco de desenvolver defeitos congênitos graves (microcefalia, anomalias do SNC) é significativamente maior nas infecções no 1° trimestre."},
    {id:"a5q13",d:"facil",q:"Qual é o principal sintoma ocular do Zika que aparece em 50 a 90% dos casos?",o:["Conjuntivite (hiperemia conjuntival)","Catarata","Perda permanente da visão","Hemorragia retiniana"],a:0,e:"Conjuntivite (olhos vermelhos) aparece em 50-90% dos casos de Zika — útil para diferenciar do dengue (onde não está presente) e do chikungunya (30% dos casos)."},
    {id:"a5q14",d:"moderado",q:"A Síndrome Congênita do Zika (SCZ) inclui qual manifestação neurológica característica?",o:["Microcefalia e outras anomalias do SNC (incluindo Síndrome de Guillain-Barré)","Surdez bilateral congênita","Catarata congênita","Cardiopatia congênita cianótica"],a:0,e:"A SCZ se caracteriza por microcefalia congênita, calcificações cerebrais, anomalias do desenvolvimento cortical, Síndrome de Guillain-Barré e outras complicações neurológicas que tendem a ser permanentes."},
    {id:"a5q15",d:"moderado",q:"Qual é o principal vetor do vírus Oropouche (OROV), diferenciando-o das outras arboviroses tropicais?",o:["Culicoides paraensis (maruim ou mosquito-pólvora)","Aedes aegypti","Anopheles darlingi","Culex quinquefasciatus"],a:0,e:"O OROV é transmitido principalmente pelo Culicoides paraensis (maruim/mosquito-pólvora), um inseto muito menor que o mosquito Aedes. Por isso medidas de controle de Aedes não são suficientes para prevenir o Oropouche."},
    {id:"a5q16",d:"moderado",q:"O vírus Oropouche (OROV) foi isolado pela primeira vez no Brasil em 1960 a partir de qual hospedeiro animal?",o:["Bicho-preguiça","Macaco-prego","Morcego-vampiro","Rato silvestre"],a:0,e:"O Orthobunyavirus oropoucheense (OROV) foi isolado pela primeira vez em 1960 no Brasil, a partir de amostra de sangue de um bicho-preguiça. Bichos-preguiça e primatas não-humanos são os principais reservatórios do ciclo silvestre."},
    {id:"a5q17",d:"moderado",q:"Na febre amarela, qual é o ciclo de transmissão que NÃO ocorre no Brasil desde 1942?",o:["Ciclo urbano (Aedes aegypti → humano → Aedes aegypti)","Ciclo silvestre (macacos ↔ Haemagogus/Sabethes)","Transmissão por transfusão sanguínea","Ciclo peridoméstico (Aedes albopictus)"],a:0,e:"O ciclo urbano da febre amarela (Aedes aegypti como vetor entre humanos) não ocorre no Brasil desde 1942. Atualmente, apenas o ciclo silvestre (macacos + mosquitos silvestres Haemagogus e Sabethes) é registrado — humanos são hospedeiros acidentais."},
    {id:"a5q18",d:"facil",q:"A vacina contra febre amarela é produzida com qual tipo de vírus?",o:["Vírus vivo atenuado (cepa 17D)","Vírus inativado (morto)","Proteína recombinante (subunidade)","mRNA"],a:0,e:"A vacina da febre amarela é produzida com vírus vivo atenuado (cepa 17D), administrada via subcutânea. 1ª dose aos 9 meses + reforço aos 4 anos. Altamente eficaz e com proteção por toda a vida."},
    {id:"a5q19",d:"facil",q:"Qual das arboviroses abaixo possui antiviral ESPECÍFICO disponível para tratamento?",o:["Nenhuma das arboviroses listadas (dengue, Zika, chikungunya, oropouche, febre amarela)","Dengue","Chikungunya","Febre Amarela"],a:0,e:"Todas as principais arboviroses (dengue, Zika, chikungunya, oropouche, febre amarela) NÃO possuem antiviral específico. O tratamento é sintomático: hidratação, analgésicos/antipiréticos (evitar AAS e AINEs no dengue), fisioterapia (artralgia chikungunya)."},
    {id:"a5q20",d:"moderado",q:"Na comparação clínica das arboviroses, qual apresenta a MAIOR intensidade de dor articular?",o:["Chikungunya (dor articular intensa em 90% dos casos, frequentemente incapacitante)","Dengue","Febre Amarela","Oropouche"],a:0,e:"Chikungunya = 'aquele que se dobra de dor' em swahili — a artralgia é intensa, presente em ~90% dos casos, bilateralmente simétrica, e pode cronificar por meses ou anos. No dengue é moderada; no Zika é leve."},
    {id:"a5q21",d:"moderado",q:"Na dengue, por que a infecção secundária por um sorotipo diferente é considerada de MAIOR RISCO para dengue hemorrágica?",o:["Anticorpos da 1ª infecção facilitam a entrada do sorotipo diferente nos macrófagos (ADE), amplificando a replicação viral e a resposta inflamatória","O segundo sorotipo é sempre mais virulento que o primeiro","Os anticorpos da 1ª infecção destroem os anticorpos da 2ª infecção","O vírus se combina com a bactéria intestinal para ficar mais perigoso"],a:0,e:"ADE (Antibody-Dependent Enhancement / Amplificação Dependente de Anticorpos): os anticorpos não neutralizantes da 1ª infecção se ligam ao sorotipo diferente da 2ª infecção e facilitam sua entrada nos monócitos/macrófagos → maior carga viral → resposta imune exacerbada → dengue hemorrágica."},
    {id:"a5q22",d:"facil",q:"Qual arbovirose tem vacina que exige comprovação laboratorial de infecção prévia ANTES de ser administrada?",o:["Dengvaxia (vacina da dengue)","Qdenga (vacina da dengue)","Vacina da febre amarela","Vacina do chikungunya (Ixchiq)"],a:0,e:"Dengvaxia (CYD-TDV) EXIGE sorologia positiva prévia. Em soropositivos, reduz dengue grave; em soronegativos, AUMENTA o risco de dengue grave na próxima infecção natural. Qdenga pode ser usada independentemente da sorologia."},
    {id:"a5q23",d:"moderado",q:"Qual dos sintomas abaixo é mais CARACTERÍSTICO do Zika comparado com dengue e chikungunya?",o:["Conjuntivite intensa (50-90% dos casos) com febre baixa ou ausente","Dor óssea intensa","Sangramento das mucosas","Dor articular intensa bilateral"],a:0,e:"Conjuntivite muito frequente (50-90%) + febre baixa/ausente + manchas pruriginosas é a tríade típica do Zika, diferenciando-o do dengue (febre alta, sem conjuntivite) e do chikungunya (febre alta, dor articular intensa)."},
    {id:"a5q24",d:"dificil",q:"Os fatores que subjazem à emergência de arboviroses incluem, EXCETO:",o:["Uso de antibióticos profiláticos que eliminam os vetores","Mudanças evolutivas nos vírus (virulência, transmissibilidade)","Mudanças na suscetibilidade da população (imunodeficiência, redução vacinal)","Mudanças ecológicas que aumentam a exposição a reservatórios e vetores"],a:0,e:"Os três fatores principais da emergência viral são: mudanças evolutivas nos vírus, mudanças na suscetibilidade da população hospedeira (HIV, desnutrição, vacinação inadequada) e mudanças ecológicas (urbanização, desmatamento, clima). O uso de antibióticos não elimina vírus nem vetores."}
   ]},
  aula4:{ name:"Aula 4 — Introdução à Virologia", doc:"AIP 2025 - Profa. Dra. Ana Júlia Reis",
   summary:`## Aula 4 — Introdução à Virologia\n\n### Histórico\n- **Jenner (1756):** inoculou cowpox numa criança → primeira vacina (contra varíola).\n- **Chamberland (1884):** filtro com poros menores que bactéria → organismos filtráveis.\n- **Ivanovsky (1892):** extrato de tabaco infectado passou pelo filtro e manteve infectividade.\n- **Beijerinck (1898):** nomeou o agente *contagium vivum fluidum* → cunhou o termo **vírus** → marco inicial da virologia.\n- **Loeffler e Frosch (1898):** primeiro vírus animal — febre aftosa (*Aphtovirus*).\n- **Walter Reed (1901):** primeiro vírus humano — febre amarela (*Flavivirus*).\n- **Peyton Rous (1911):** tumor maligno transmitido por vírus entre galinhas — vírus oncogênico.\n- **Félix d'Herelle (1917):** bacteriófago (colônias bacterianas atacadas por vírus).\n- **Max Theiler (1937):** vacina contra febre amarela (ovos de galinha).\n- **Enders, Weller e Robbins (1949):** cultivaram poliovírus em células embrionárias humanas — 1º vírus sem tecido animal ou ovo → vacina contra polio.\n- **Blumberg (1963):** vírus da hepatite B.\n- **Temin (1965):** transcriptase reversa → primeiro retrovírus.\n- **Montagnier (1983):** isolou o HIV (retrovírus) no Instituto Pasteur.\n\n### Conceitos básicos\n**Vírus:** do latim *vīrus* = veneno/toxina. Partícula infecciosa muito pequena (20-1.000 nm), **parasito intracelular obrigatório**.\n**Vírion:** partícula viral infecciosa completa.\n**São vivos?** Inertes fora das células → não são organismos vivos. Dentro da célula hospedeira → multiplicam-se com a maquinaria celular.\n\n### Propriedades da partícula viral\n- Genoma: **DNA ou RNA** (nunca os dois).\n- **Capsídeo:** cobertura proteica que protege o material genético e facilita a infecção.\n- **Envelope lipídico** (alguns vírus): facilita entrada na célula e evita reconhecimento imune.\n- Não possuem ribossomos, membrana plasmática nem metabolismo próprio de ATP.\n- Não podem ser cultivados em meio artificial (exceto bacteriófagos em culturas bacterianas).\n- São **sensíveis ao interferon** (bactérias não são).\n\n### Envelopados vs Não envelopados\n| Característica | Não envelopados | Envelopados |\n|---|---|---|\n| Resistência | Mais resistentes | Sensíveis a álcool, calor, dessecamento |\n| Transmissão | Fecal-oral | Por fluidos |\n| Exemplos | Adenovírus, Papilomavírus | SARS-CoV-2, HIV, Dengue, Herpes |\n\n### Morfologia\n- **Helicoidal:** longos bastonetes (rígidos ou flexíveis). Ex.: raiva, Ebola, influenza.\n- **Poliédrico (icosaédrico):** múltiplas faces. Ex.: adenovírus, herpes, papilomavírus.\n- **Complexo:** bacteriófagos — capsídeo poliédrico (cabeça) + bainha helicoidal.\n\n### Multiplicação viral\nEtapas: **Adsorção → Penetração → (Desnudamento - só animais) → Biossíntese → Maturação → Liberação**.\n- **Ciclo lítico:** lise e morte da célula hospedeira.\n- **Ciclo lisogênico:** DNA viral integrado ao cromossomo (prófago); célula sobrevive e continua produzindo vírus.\n- **Biossíntese DNA:** ocorre no núcleo (herpes, papilomavírus).\n- **Biossíntese RNA:** ocorre no citoplasma (vírus da raiva).\n- **Retrovírus:** RNA → DNA (via **transcriptase reversa**) → integra como **provírus** (HIV).\n- Liberação: lise (não envelopados) ou **brotamento** (envelopados, ex.: HIV).\n\n### Diagnóstico viral\n1. Isolamento em cultivo celular, ovos embrionados ou animais.\n2. Microscopia eletrônica.\n3. Efeitos citopáticos.\n4. Testes rápidos.\n5. **Sorológico (ELISA):** detecta antígenos ou anticorpos específicos.\n6. **Molecular (PCR):** amplifica ácido nucleico viral — qualitativo ou quantitativo.\n\n### Tratamento antiviral\n- Influenza: **oseltamivir** (Tamiflu).\n- HIV: TARV — tenofovir/lamivudina + dolutegravir.\n- Hepatites B/C: sofosbuvir, elbasvir.\n- Herpes: **aciclovir**.\n- COVID-19: **nirmatrelvir**.\n\n### Vírus e câncer (~10% dos casos)\n- DNA oncogênicos: **HPV** (câncer cervical/anal), **HBV** (câncer de fígado).\n- RNA oncogênicos: vírus leucemia células T; FeLV (leucemia felina).\n- Cânceres causados por vírus **NÃO são contagiosos**.\n\n### Infecções latentes x persistentes\n- **Persistente:** equilíbrio com o hospedeiro por anos sem doença (ex.: Herpes).\n- **Progressiva/latente:** desenvolvimento gradual, geralmente fatal (ex.: HIV).`,
   tips:"Vírus = parasito intracelular obrigatório; genoma = DNA OU RNA (nunca ambos). Não envelopado = mais resistente = fecal-oral; Envelopado = sensível a álcool = fluidos. Biossíntese DNA no núcleo (herpes, HPV); RNA no citoplasma (raiva). Retrovírus: RNA→DNA via transcriptase reversa → provírus (HIV). Ciclo lítico = lise da célula; lisogênico = integra-se ao cromossomo. ELISA = sorológico; PCR = molecular. ~10% dos cânceres por vírus; HPV = cervical/anal; HBV = fígado. Beijerinck (1898) = cunhou 'vírus'; Reed (1901) = 1º vírus humano (febre amarela). Tratamento: oseltamivir (gripe), TARV (HIV), aciclovir (herpes), nirmatrelvir (COVID).",
   questions:[
    {id:"a4q1",d:"facil",q:"Edward Jenner (1756) criou a primeira vacina do mundo ao inocular material de lesões de cowpox (varíola bovina) em uma criança. Qual doença a vacina protegia?",o:["Varíola humana (smallpox)","Poliomielite","Raiva","Febre amarela"],a:0,e:"Jenner observou que ordenhadores que contraíam cowpox não adoeciam de varíola. Ao inocular cowpox e depois varíola na criança, ela não desenvolveu a doença — criando a primeira vacina da história."},
    {id:"a4q2",d:"moderado",q:"Em 1892, Dmitry Ivanovsky demonstrou que extratos de folhas de tabaco infectadas continuavam infecciosos após filtragem por filtro Chamberland. O que isso significou para a virologia?",o:["Que o agente causador era menor que bactérias ('filtrável') — conceito que viria a definir os vírus","Que as bactérias podiam passar por qualquer filtro","Que os vírus tinham o mesmo tamanho que bactérias","Que a doença do tabaco era causada por toxinas, não por microrganismos"],a:0,e:"O filtro Chamberland (1884) retinha todas as bactérias conhecidas. Como o agente passou pelo filtro, deduziu-se que era um 'organismo filtrável' menor que as bactérias — o conceito precursor de vírus."},
    {id:"a4q3",d:"moderado",q:"Martinus Beijerinck (1898) cunhou o termo VÍRUS e chamou o agente infeccioso do mosaico do tabaco de:",o:["Contagium vivum fluidum (fluido vivo contagioso)","Seminaria morbi (semente da doença)","Animalculum (pequeno animal)","Miasma filtrável"],a:0,e:"Beijerinck nomeou o agente 'contagium vivum fluidum' (fluido vivo contagioso), introduziu o termo vírus e demonstrou que não era bacteriano — marco inicial da virologia como ciência."},
    {id:"a4q4",d:"facil",q:"Qual cientista identificou o PRIMEIRO vírus humano, o vírus da febre amarela (Flavivirus)?",o:["Walter Reed (1901)","Max Theiler (1937)","Peyton Rous (1911)","Luc Montagnier (1983)"],a:0,e:"Walter Reed (1901) identificou o vírus da febre amarela como primeiro agente viral humano. Max Theiler desenvolveu a vacina contra febre amarela em 1937. Montagnier isolou o HIV em 1983."},
    {id:"a4q5",d:"moderado",q:"Em 1949, Enders, Weller e Robbins cultivaram o vírus da poliomielite em culturas de células embrionárias humanas. Por que isso foi um marco?",o:["Foi o primeiro vírus cultivado sem uso de tecido animal ou ovos — permitindo desenvolver a vacina da polio","Foi o primeiro vírus isolado no mundo","Foi o primeiro retrovírus descoberto","Foi a primeira demonstração de vírus oncogênico"],a:0,e:"Até então, vírus só podiam ser cultivados em animais vivos ou ovos embrionados. A cultura celular abriu caminho para produção em escala da vacina da poliomielite e para toda a virologia moderna."},
    {id:"a4q6",d:"facil",q:"Qual cientista isolou pela primeira vez o HIV em 1983, no Instituto Pasteur?",o:["Luc Montagnier","Howard Temin","Baruch Blumberg","Félix d'Herelle"],a:0,e:"A equipe de Luc Montagnier (Instituto Pasteur, França) isolou em 1983 o retrovírus que hoje conhecemos como HIV. Temin descreveu os retrovírus (transcriptase reversa) em 1965. Blumberg descobriu o HBV em 1963."},
    {id:"a4q7",d:"facil",q:"Por que os vírus NÃO são considerados organismos vivos quando estão FORA das células hospedeiras?",o:["São inertes fora de células vivas — não realizam metabolismo, não se reproduzem sem a maquinaria celular","Porque não possuem ácido nucleico","Porque são menores que as células","Porque não causam doenças fora das células"],a:0,e:"Fora das células, os vírus são partículas inertes — não respiram, não se alimentam, não se reproduzem. Dentro da célula hospedeira, assumem o controle da maquinaria celular e se multiplicam, comportando-se como 'vivos'."},
    {id:"a4q8",d:"moderado",q:"Qual das características abaixo é EXCLUSIVA dos vírus e NÃO é compartilhada com bactérias?",o:["Possuir apenas um tipo de ácido nucleico (DNA OU RNA, nunca ambos) e não ter ribossomos próprios","Ser parasito intracelular obrigatório","Possuir membrana plasmática","Ser sensível a antibióticos"],a:0,e:"Bactérias possuem DNA E RNA + ribossomos. Vírus têm apenas um tipo (DNA ou RNA), sem ribossomos nem metabolismo próprio. Bactérias são sensíveis a antibióticos; vírus são sensíveis ao interferon."},
    {id:"a4q9",d:"moderado",q:"O CAPSÍDEO viral tem como funções principais:",o:["Proteger o material genético viral e facilitar o processo de infecção da célula hospedeira","Produzir ATP para o metabolismo viral","Secretar toxinas que danificam o hospedeiro","Funcionar como ribossomo para síntese proteica do vírus"],a:0,e:"O capsídeo é a cobertura proteica que: (1) protege o genoma viral no ambiente externo, e (2) facilita a adsorção e penetração na célula hospedeira via interação com receptores celulares específicos."},
    {id:"a4q10",d:"moderado",q:"Qual é a função principal do ENVELOPE LIPÍDICO em vírus envelopados?",o:["Proteger o material genético, facilitar a entrada na célula hospedeira e evitar o reconhecimento pelo sistema imune","Produzir enzimas para replicação viral","Funcionar como o capsídeo em substituição às proteínas","Aumentar a resistência do vírus ao álcool e calor"],a:0,e:"O envelope (bicamada lipídica derivada da membrana do hospedeiro + proteínas virais): protege o genoma, contém espículas que se ligam a receptores celulares, e ajuda o vírus a evitar o reconhecimento imune."},
    {id:"a4q11",d:"facil",q:"Por que vírus envelopados (como HIV, SARS-CoV-2, Herpes) são mais FÁCEIS de eliminar com álcool do que vírus não envelopados?",o:["O envelope é uma bicamada lipídica sensível a álcool, calor e dessecamento — sua destruição inativa o vírus","Porque têm genoma de RNA mais frágil","Porque são maiores e ficam mais expostos","Porque não possuem capsídeo protetor"],a:0,e:"O envelope lipídico é destruído por álcool, detergentes e calor — desintegrando o vírus. Vírus sem envelope (adenovírus, poliovírus) são mais resistentes, pois o capsídeo proteico suporta melhor essas condições."},
    {id:"a4q12",d:"moderado",q:"Vírus NÃO envelopados (como adenovírus e papilomavírus) tendem a ser transmitidos por qual via?",o:["Fecal-oral (mais resistentes ao ambiente)","Apenas por fluidos corporais","Somente por contato sexual","Exclusivamente por vetores artrópodes"],a:0,e:"Vírus não envelopados são mais resistentes no ambiente (tolerem temperatura, dessecamento, pH variável) → sobrevivem no trato gastrointestinal → transmissão fecal-oral é comum."},
    {id:"a4q13",d:"moderado",q:"Qual é a MORFOLOGIA do vírus influenza?",o:["Helicoidal envelopado","Icosaédrico não envelopado","Complexo (cabeça+cauda)","Icosaédrico envelopado"],a:0,e:"O vírus influenza é helicoidal envelopado — o RNA helicoidal está revestido por capsídeo e envolvido por envelope lipídico com espículas de hemaglutinina (H) e neuraminidase (N)."},
    {id:"a4q14",d:"facil",q:"No ciclo lítico dos bacteriófagos, o que acontece ao final?",o:["A célula hospedeira sofre LISE (rompe) e novos vírions são liberados","A célula sobrevive e continua produzindo vírus indefinidamente","O DNA viral integra-se ao cromossomo bacteriano como prófago","O vírus é eliminado sem causar dano à bactéria"],a:0,e:"No ciclo lítico: adsorção → penetração → biossíntese → maturação → LISE da célula + liberação de novos vírions. No ciclo lisogênico, a célula sobrevive com o DNA viral integrado (prófago)."},
    {id:"a4q15",d:"moderado",q:"No ciclo LISOGÊNICO dos bacteriófagos, o DNA viral integrado ao cromossomo bacteriano denomina-se:",o:["Prófago","Provírus","Vírion","Capsômero"],a:0,e:"Prófago é o DNA do fago integrado ao cromossomo bacteriano (ciclo lisogênico). Provírus é o termo equivalente para retrovírus integrados ao genoma de células eucarióticas (ex.: HIV)."},
    {id:"a4q16",d:"moderado",q:"Vírus de DNA, como o Herpes vírus humano, realizam sua biossíntese em qual compartimento da célula hospedeira?",o:["No núcleo da célula hospedeira","No citoplasma","Na membrana plasmática","No retículo endoplasmático rugoso"],a:0,e:"Vírus de DNA usam a maquinaria nuclear para replicar seu DNA e transcrever mRNA → biossíntese ocorre no núcleo. Vírus de RNA (como o vírus da raiva) replicam no citoplasma."},
    {id:"a4q17",d:"dificil",q:"O HIV é um retrovírus que usa RNA como genoma. Qual o mecanismo pelo qual ele se integra permanentemente ao genoma da célula hospedeira?",o:["A transcriptase reversa converte RNA viral → DNA de dupla fita → integra-se como provírus ao cromossomo celular","O RNA viral substitui diretamente o DNA humano","O vírus injeta DNA diretamente no núcleo","O RNA viral é transcrito pelos ribossomos celulares sem passar por DNA"],a:0,e:"Retrovírus carregam transcriptase reversa: RNA viral → DNA de dupla fita complementar → integrase insere esse DNA (provírus) no cromossomo celular. Como provírus, o HIV fica protegido do sistema imune e dos antivirais."},
    {id:"a4q18",d:"moderado",q:"Vírus envelopados, como o HIV, são liberados das células hospedeiras por qual mecanismo, sem matar imediatamente a célula?",o:["Brotamento: o capsídeo viral envolve-se com a membrana plasmática ao sair, adquirindo o envelope","Lise celular explosiva","Exocitose pelo retículo endoplasmático","Injeção direta nas células vizinhas"],a:0,e:"No brotamento, o vírion empurra a membrana plasmática para fora, adquirindo o envelope lipídico derivado da célula hospedeira. Esse processo permite que a célula sobreviva e continue produzindo vírus por tempo prolongado."},
    {id:"a4q19",d:"facil",q:"O método ELISA (Ensaio Imunoabsorvente ligado à Enzima) utilizado no diagnóstico viral baseia-se em:",o:["Formação de complexo antígeno-anticorpo para detectar vírus ou anticorpos específicos no soro do paciente","Amplificação do ácido nucleico viral por PCR","Visualização direta do vírus por microscopia eletrônica","Cultivo do vírus em células em laboratório"],a:0,e:"O ELISA é um método sorológico: usa anticorpos específicos para detectar antígenos virais (ou anticorpos do paciente contra o vírus) — reação antígeno-anticorpo revelada por enzima cromogênica."},
    {id:"a4q20",d:"moderado",q:"A PCR (Reação em Cadeia da Polimerase) é um método molecular de diagnóstico viral que funciona por:",o:["Amplificação exponencial do ácido nucleico viral, detectando a presença do vírus mesmo em quantidades mínimas","Formação de anticorpos contra o vírus","Cultivo do vírus em ovos embrionados","Observação de efeitos citopáticos em cultivo celular"],a:0,e:"A PCR amplifica sequências específicas de DNA/RNA viral — pode detectar o vírus mesmo em amostras com carga viral muito baixa, antes de o sistema imune produzir anticorpos detectáveis (PCR quantitativo = carga viral)."},
    {id:"a4q21",d:"facil",q:"Qual antiviral é o tratamento de primeira escolha para o HERPESVÍRUS?",o:["Aciclovir","Oseltamivir (Tamiflu)","Sofosbuvir","Nirmatrelvir"],a:0,e:"Aciclovir (e derivados: valaciclovir, fanciclovir) é o antiviral padrão para infecções por herpesvírus. O oseltamivir trata influenza; sofosbuvir trata hepatite C; nirmatrelvir trata COVID-19."},
    {id:"a4q22",d:"moderado",q:"O papilomavírus humano (HPV) é associado ao desenvolvimento de qual tipo de câncer?",o:["Câncer cervical (colo do útero) e anal","Câncer de fígado","Linfoma e leucemia de células T","Câncer de pulmão"],a:0,e:"HPV é responsável por ~99% dos cânceres cervicais e pela maioria dos cânceres anais. O vírus da hepatite B (HBV) causa câncer de fígado. O vírus da leucemia de células T causa linfoma/leucemia."},
    {id:"a4q23",d:"moderado",q:"Os cânceres causados por vírus oncogênicos são:",o:["Não contagiosos — embora o vírus que o causa seja transmissível, o câncer em si não é contagioso","Sempre contagiosos da mesma forma que o vírus","Transmitidos apenas por transfusão sanguínea","Impossíveis de ocorrer em animais"],a:0,e:"Embora o vírus oncogênico seja transmissível, o câncer que ele eventualmente causa NÃO é contagioso. Além disso, o câncer pode se desenvolver muito tempo após a infecção viral — não toda infecção resulta em câncer."},
    {id:"a4q24",d:"moderado",q:"A infecção pelo Herpesvírus é um exemplo de infecção PERSISTENTE porque:",o:["O vírus entra em equilíbrio com o hospedeiro por anos, sem causar doença ativa na maioria do tempo, com reativações periódicas","Causa lise imediata das células infectadas","Sempre causa doença grave e progressiva","É eliminado completamente pelo sistema imune após a infecção primária"],a:0,e:"O Herpesvírus estabelece latência nos neurônios sensoriais — pode reativar em situações de imunossupressão, estresse ou febre. A infecção progressiva (como a HIV) desenvolve-se gradualmente e é em geral fatal sem tratamento."}
   ]},
  aula3:{ name:"Aula 3 — Resistência aos Antimicrobianos: Pandemia Silenciosa", doc:"AIP 2025 - Prof. Pedro Almeida da Silva",
   summary:`## Aula 3 — Resistência aos Antimicrobianos: Pandemia Silenciosa\n\n### A resistência é um processo evolutivo\nO uso de antibióticos exerce **pressão seletiva**: as bactérias sensíveis morrem, as resistentes sobrevivem e se reproduzem. A resistência surge rapidamente após a introdução de um novo antibiótico (ex: penicilina introduzida em 1942 → penicilinase descrita em 1940; sulfonamida 1935 → resistência 1942).\n\n### Mecanismos de resistência\n1. **Beta-lactamases (penicilinases):** enzimas que hidrolisam o anel beta-lactâmico. Codificadas em plasmídios (fácil disseminação).\n2. **Efluxo:** bombas de membrana que expulsam ativamente o antibiótico.\n3. **Mutações:** alteram o alvo do antibiótico (ex: ribossomo mutado não liga ao fármaco).\n4. **Alteração de permeabilidade:** redução de porinas impede entrada do antibiótico.\n\n### Resistoma, Mobiloma e Nichoma\n- **Resistoma:** coleção de TODOS os genes de resistência aos antimicrobianos (GRA) — incluindo genes crípticos.\n- **Mobiloma:** elementos genéticos móveis (plasmídios, transposons) que transferem GRAs entre microrganismos.\n- **Nichoma:** GRAs que se expressam somente em determinados ambientes (nichos).\nA AMR é antiga (centenas de milhões de anos) — os genes de resistência em bactérias ambientais compartilham sequências com resistência clínica.\n\n### Impacto global da RAM\n- Estimativa 2014: **~700.000 mortes/ano** diretamente por RAM.\n- Em 2025: **1,27 milhão** diretamente atribuíveis; **4,95 milhões** associadas à RAM.\n- Projeção 2050: **10 milhões de mortes/ano** — ultrapassando câncer (8,2M).\n- Maior mortalidade por RAM: Ásia (4,73M) e África (4,15M).\n- Impacto econômico: perda de **-1,1% a -3,8% do PIB global** em 2050 (comparável à crise financeira de 2008).\n\n### Resistência como contaminante ambiental\nCircuito: pecuária → esterco → solo → água superficial → aquífero → água potável; + hospitais + indústria farmacêutica.\n**70% dos antibióticos** importantes para humanos são consu
