   summary:`## Semiologia Dermatológica
A pele representa ~15% do peso corpóreo (epiderme, derme, hipoderme). Quando há lesões, o **exame físico costuma preceder** a anamnese completa, evitando interpretações distorcidas do paciente.

### Lesões elementares
- **Mácula**: alteração de cor, plana, **não palpável** (ex.: vitiligo, manchas café com leite).
- **Pápula**: lesão sólida elevada **< 0,5 cm**, palpável. **Placa**: elevação em platô (confluência de pápulas — ex.: psoríase).
- **Nódulo**: lesão sólida maior que a pápula, mais profunda.
- **Vesícula (< 0,5 cm) / Bolha (> 0,5 cm)**: cavidades com **líquido claro**. **Pústula**: conteúdo **purulento (turvo)**.
- **Crosta, escama, erosão, úlcera, cicatriz, atrofia, cisto**.
- **Erosão** (só epiderme → **cura sem cicatriz**) × **úlcera** (atinge derme/hipoderme → **sempre deixa cicatriz**).

### Sinais clínicos
- **Sinal de Nikolsky**: descolamento da epiderme à pressão lateral (pênfigo, NET, SPEE).
- **Sinal de Auspitz** ("orvalho sangrante"): pontos de sangramento ao raspar escama (psoríase).
- **Sinal de Darier**: lesão urtica ao ser friccionada (mastocitose).

### Neoplasias — regra ABCDE
**A**ssimetria · **B**ordas irregulares · **C**ores variadas · **D**iâmetro > 6 mm · **E**volução.

### Técnicas especiais
- **Diascopia**: diferencia **eritema** (empalidece) de **púrpura** (não empalidece).
- **Lâmpada de Wood**: diferencia tinea versicolor de vitiligo; eritrasma (vermelho-coral).
- **Dermatoscopia**: lesões pigmentadas (benigno × maligno).`,
   tips:"Para as lesões elementares, foque em palpável × não palpável e no conteúdo (claro × purulento) e tamanho (corte de 0,5 cm). Erosão × úlcera (cicatriz) e a regra ABCDE são campeões de prova.",
   questions:[
    {id:"de1",d:"facil",q:"A mácula é uma lesão que se caracteriza por:",o:["Ser elevada e palpável","Alteração de cor, plana e não palpável","Conter líquido claro","Conter pus"],a:1,e:"Mácula é alteração circunscrita da cor da pele, sem elevação ou depressão — não palpável (ex.: vitiligo)."},
    {id:"de2",d:"facil",q:"A pápula é definida como lesão sólida, elevada e palpável, com diâmetro:",o:["< 0,5 cm","Entre 1 e 2 cm","> 3 cm","Sempre profunda"],a:0,e:"Pápula: lesão superficial, sólida, elevada e palpável, geralmente < 0,5 cm."},
    {id:"de3",d:"moderado",q:"A diferença entre vesícula e bolha é:",o:["A cor","O tamanho: vesícula < 0,5 cm; bolha > 0,5 cm","A vesícula tem pus; a bolha não","A localização"],a:1,e:"Ambas são cavidades com líquido claro; a vesícula é < 0,5 cm e a bolha > 0,5 cm."},
    {id:"de4",d:"moderado",q:"A pústula diferencia-se da vesícula porque tem conteúdo:",o:["Claro e seroso","Purulento (turvo)","Hemorrágico sempre","Sólido"],a:1,e:"A pústula contém exsudato purulento (turvo), enquanto a vesícula tem conteúdo claro."},
    {id:"de5",d:"dificil",q:"Sobre erosão e úlcera, é correto afirmar:",o:["Ambas deixam cicatriz","Erosão (só epiderme) cura sem cicatriz; úlcera (atinge derme) sempre deixa cicatriz","Úlcera é mais superficial que erosão","Erosão atinge a hipoderme"],a:1,e:"Erosão envolve apenas a epiderme e cura sem cicatriz; a úlcera atinge a derme/hipoderme e sempre deixa cicatriz."},
    {id:"de6",d:"moderado",q:"A regra ABCDE para neoplasias de pele significa:",o:["Assimetria, Bordas irregulares, Cores variadas, Diâmetro >6mm, Evolução","Anemia, Bilirrubina, Cianose, Dor, Edema","Atrofia, Bolha, Crosta, Descamação, Eritema","Apenas características de cor"],a:0,e:"ABCDE: Assimetria, Bordas irregulares, Cores variadas, Diâmetro > 6 mm e Evolução (mudanças na lesão)."},
    {id:"de7",d:"dificil",q:"O sinal de Nikolsky (descolamento da epiderme à pressão lateral) é encontrado em:",o:["Psoríase","Pênfigo e necrólise epidérmica tóxica","Vitiligo","Melasma"],a:1,e:"O fenômeno de Nikolsky ocorre em distúrbios acantolíticos/bolhosos com necrose epidérmica: pênfigo, NET e síndrome da pele escaldada estafilocócica."},
    {id:"de8",d:"dificil",q:"A diascopia (compressão com lâmina de vidro) serve para diferenciar:",o:["Mácula de pápula","Eritema (empalidece) de púrpura (não empalidece)","Vesícula de bolha","Crosta de escama"],a:1,e:"Na diascopia, o eritema empalidece à pressão (lesão vascular) e a púrpura não empalidece (extravasamento de sangue)."},
    {id:"de9",d:"moderado",q:"A lâmpada de Wood é útil para:",o:["Medir pressão arterial","Diferenciar tinea versicolor de vitiligo e identificar eritrasma","Avaliar reflexos","Medir glicemia"],a:1,e:"A luz de Wood evidencia pigmentos fluorescentes: diferencia tinea versicolor de vitiligo e mostra o eritrasma em vermelho-coral."},
    {id:"de10",d:"facil",q:"A placa dermatológica é tipicamente formada por:",o:["Conteúdo líquido","Confluência de pápulas, em platô (ex.: psoríase)","Perda de pele","Depósito de pus"],a:1,e:"A placa é uma elevação em platô, frequentemente por confluência de pápulas, como na psoríase."},
    {id:"de11",d:"facil",q:"O nódulo difere da pápula por ser:",o:["Plano e não palpável","Maior e mais profundo","Cheio de líquido","Sempre purulento"],a:1,e:"O nódulo é sólido, maior que a pápula, e costuma envolver planos mais profundos (derme/subcutâneo)."},
    {id:"de12",d:"moderado",q:"A crosta forma-se quando:",o:["Há perda da epiderme","Soro, sangue ou exsudato secam sobre a pele","Há acúmulo de melanina","Há edema dérmico"],a:1,e:"A crosta resulta do ressecamento de soro, sangue ou exsudato purulento sobre a pele."},
    {id:"de13",d:"moderado",q:"Escama é:",o:["Flocos de estrato córneo","Cavidade com pus","Perda de pele até a derme","Mancha plana"],a:0,e:"Escamas são flocos de estrato córneo, finas ou espessas, aderentes ou soltas."},
    {id:"de14",d:"dificil",q:"O sinal de Auspitz ('orvalho sangrante') sugere:",o:["Psoríase","Pênfigo","Vitiligo","Melanoma"],a:0,e:"O sinal de Auspitz (pontos de sangramento ao raspar a escama) sugere psoríase, sem especificidade absoluta."},
    {id:"de15",d:"dificil",q:"O sinal de Darier (lesão urtica ao friccionar) sugere:",o:["Mastocitose (urticária pigmentosa)","Tinea","Carcinoma basocelular","Eczema"],a:0,e:"O sinal de Darier é a transformação de mácula/pápula em lesão urticada após fricção, típico da mastocitose."},
    {id:"de16",d:"moderado",q:"A lesão urticada (urtica) é caracteristicamente:",o:["Permanente e dura","Evanescente (some em 24-48h), por edema dérmico","Purulenta","Pigmentada"],a:1,e:"A urtica é uma pápula/placa eritematosa evanescente (24-48h), causada por edema do corpo papilar da derme."},
    {id:"de17",d:"facil",q:"A atrofia da pele caracteriza-se por:",o:["Espessamento da pele","Adelgaçamento / perda de camadas","Acúmulo de pus","Mancha hiperpigmentada"],a:1,e:"A atrofia é a redução de algumas ou de todas as camadas da pele (epiderme fina, enrugada como papel de cigarro)."},
    {id:"de18",d:"moderado",q:"A dermatoscopia é especialmente útil para:",o:["Medir pressão arterial","Avaliar lesões pigmentadas (benigno x maligno)","Avaliar reflexos","Medir glicemia"],a:1,e:"A dermatoscopia (epiluminescência) inspeciona camadas profundas da epiderme, distinguindo padrões benignos de malignos."},
    {id:"de19",d:"facil",q:"A pele representa aproximadamente, do peso corporal:",o:["1%","15%","40%","60%"],a:1,e:"A pele representa cerca de 15% do peso corpóreo."},
    {id:"de20",d:"moderado",q:"As três camadas da pele são:",o:["Epiderme, derme e hipoderme","Córtex, medula e cápsula","Mucosa, submucosa e serosa","Íntima, média e adventícia"],a:0,e:"Epiderme (externa), derme e hipoderme (tecido subcutâneo)."},
    {id:"de21",d:"moderado",q:"São fâneros (anexos cutâneos):",o:["Pelos, unhas e glândulas sebáceas/sudoríparas","Ossos","Dentes","Apenas os cílios"],a:0,e:"Fâneros: pelos/folículos pilosos, glândulas sebáceas e sudoríparas, e unhas."},
    {id:"de22",d:"dificil",q:"Havendo lesões na queixa, recomenda-se:",o:["Fazer o exame físico antes da anamnese completa","Nunca examinar a lesão","Confiar só no relato do paciente","Anamnese exaustiva primeiro"],a:0,e:"Com lesões, o exame costuma preceder a anamnese completa, pois o relato pode estar distorcido."},
    {id:"de23",d:"facil",q:"A liquenificação é:",o:["Placa espessada com sulcos acentuados","Perda da epiderme","Cavidade com pus","Mancha plana"],a:0,e:"Liquenificação é o espessamento da pele com acentuação dos sulcos (atrito crônico)."},
    {id:"de24",d:"moderado",q:"Na regra ABCDE, a letra 'E' significa:",o:["Eritema","Evolução (mudanças na lesão)","Espessura","Erosão"],a:1,e:"E = Evolução: mudanças de tamanho, forma ou cor ao longo do tempo."},
    {id:"de25",d:"dificil",q:"A preparação de Tzanck é útil para:",o:["Herpes (células gigantes multinucleadas) e pênfigo (acantolíticas)","Medir glicemia","Avaliar pressão","Tinea versicolor"],a:0,e:"O Tzanck revela células acantolíticas (pênfigo) e gigantes multinucleadas (herpes/varicela)."},
    {id:"de26",d:"moderado",q:"Crostas cor de mel (melicéricas) são típicas de:",o:["Impetigo","Psoríase","Vitiligo","Melanoma"],a:0,e:"Crostas melicéricas (cor de mel) são características do impetigo."},
    {id:"de27",d:"facil",q:"Vegetações são:",o:["Pápulas formadas por múltiplas pequenas elevações agrupadas","Manchas planas","Cavidades com líquido","Perda de pele"],a:0,e:"Vegetações são pápulas com múltiplas elevações projetadas e agrupadas."},
    {id:"de28",d:"dificil",q:"O acetobranqueamento (ácido acético a 5%) ajuda a detectar:",o:["Verrugas / HPV subclínico","Melanoma","Vitiligo","Psoríase"],a:0,e:"O ácido acético torna brancas as lesões por HPV subclínico (verrugas)."},
    {id:"de29",d:"moderado",q:"A biópsia de pele é indicada, entre outros, para:",o:["Toda suspeita de neoplasia","Apenas acne leve","Eritema transitório","Nunca"],a:0,e:"Indica-se biópsia em suspeitas de neoplasia, distúrbios bolhosos e quando o diagnóstico clínico não é possível."},
    {id:"de30",d:"moderado",q:"'Patch', em dermatologia, é:",o:["Uma placa muito pouco elevada (entre mácula e placa)","Uma bolha grande","Uma pústula","Uma crosta"],a:0,e:"Patch é uma lesão entre a mácula e a placa (placa muito pouco elevada)."}
   ]},

  otorrino:{ name:"Semiologia de Ouvidos, Nariz e Garganta", doc:"19. Semiologia ONG",
   summary:`## Semiologia de Ouvidos, Nariz e Garganta (ONG)
> Resumo de apoio baseado em semiologia clássica de cabeça e pescoço. Pode ser refinado conforme os pontos enfatizados no material da aula.

### Ouvido
- Sintomas: **otalgia, otorreia, hipoacusia, zumbido (tinnitus), vertigem**.
- **Otoscopia**: membrana timpânica normal é acinzentada/translúcida com triângulo luminoso; na otite média aguda fica **hiperemiada e abaulada**.
- **Provas com diapasão**:
  - **Weber**: lateraliza para o lado **afetado** na perda **condutiva**; para o lado **são** na perda **neurossensorial**.
  - **Rinne**: na perda condutiva, condução **óssea > aérea** (Rinne "negativo") no ouvido afetado.

### Nariz
- Sintomas: obstrução nasal, rinorreia, espirros, prurido, **epistaxe**, hiposmia.
- **Epistaxe anterior** (mais comum): origina-se na **área de Little** (plexo de Kiesselbach).

### Garganta / faringolaringe
- Sintomas: odinofagia, disfagia, **disfonia/rouquidão**, tosse, pigarro.
- **Rouquidão persistente** (> 2–3 semanas) exige investigação (cordas vocais/laringe, risco de neoplasia).

### Vertigem
- **Periférica** (ex.: VPPB): nistagmo horizonto-rotatório, fatigável, com latência. **Central**: nistagmo que muda de direção, sem latência, com sinais neurológicos.`,
   tips:"Decore as provas de Weber e Rinne em conjunto — elas só fazem sentido comparadas. E lembre que rouquidão persistente sempre pede investigação.",
   questions:[
    {id:"ot1",d:"facil",q:"São sintomas otológicos típicos:",o:["Otalgia, otorreia, hipoacusia, zumbido e vertigem","Pirose e disfagia","Disúria e polaciúria","Icterícia e colúria"],a:0,e:"Os sintomas do ouvido incluem otalgia (dor), otorreia (secreção), hipoacusia (perda auditiva), zumbido e vertigem."},
    {id:"ot2",d:"moderado",q:"No teste de Weber, a lateralização do som para o lado afetado indica perda:",o:["Neurossensorial","Condutiva","Mista sempre","Simulada"],a:1,e:"Na perda condutiva, o Weber lateraliza para o lado afetado; na neurossensorial, para o lado são."},
    {id:"ot3",d:"dificil",q:"Na perda auditiva condutiva, o teste de Rinne no ouvido afetado mostra:",o:["Condução aérea maior que a óssea","Condução óssea maior que a aérea (Rinne negativo)","Ausência total de condução","Resultado idêntico ao normal"],a:1,e:"Na perda condutiva, a condução óssea supera a aérea (Rinne negativo) no ouvido acometido."},
    {id:"ot4",d:"facil",q:"A epistaxe anterior, mais comum, origina-se geralmente:",o:["Na área de Little (plexo de Kiesselbach)","Na artéria esfenopalatina posterior","Na tuba auditiva","Na laringe"],a:0,e:"A maioria das epistaxes é anterior, originando-se na área de Little (plexo de Kiesselbach), no septo anterior."},
    {id:"ot5",d:"moderado",q:"À otoscopia, uma membrana timpânica hiperemiada e abaulada sugere:",o:["Otite média aguda","Membrana normal","Cerume impactado","Vertigem central"],a:0,e:"A membrana normal é acinzentada e translúcida; hiperemia com abaulamento indica infecção do ouvido médio (OMA)."},
    {id:"ot6",d:"moderado",q:"Rouquidão (disfonia) persistente por mais de 2–3 semanas deve:",o:["Ser ignorada","Ser investigada (laringe/cordas vocais)","Ser tratada apenas com repouso vocal indefinidamente","Indicar sempre alergia"],a:1,e:"Disfonia persistente exige investigação da laringe/cordas vocais pelo risco de lesões, inclusive neoplásicas."},
    {id:"ot7",d:"dificil",q:"A vertigem periférica (ex.: VPPB) tende a apresentar nistagmo:",o:["Que muda de direção, sem latência","Horizonto-rotatório, fatigável e com latência","Vertical puro persistente","Ausente"],a:1,e:"A vertigem periférica costuma ter nistagmo horizonto-rotatório, com latência e fatigável; a central muda de direção e vem com sinais neurológicos."},
    {id:"ot8",d:"facil",q:"Otorreia é:",o:["Dor de ouvido","Secreção/saída de líquido pelo ouvido","Zumbido","Tontura"],a:1,e:"Otorreia é a saída de secreção pelo conduto auditivo."},
    {id:"ot9",d:"moderado",q:"Na perda neurossensorial, o teste de Weber lateraliza para:",o:["O lado afetado","O lado são","Ambos igualmente","Não lateraliza nunca"],a:1,e:"Na perda neurossensorial o Weber lateraliza para o lado são; na condutiva, para o lado afetado."},
    {id:"ot10",d:"dificil",q:"Rinne positivo (condução aérea > óssea) ocorre em:",o:["Perda condutiva","Audição normal ou perda neurossensorial","Cerume impactado","Otite média"],a:1,e:"Rinne positivo ocorre na audição normal e na perda neurossensorial; na condutiva, óssea > aérea (Rinne negativo)."},
    {id:"ot11",d:"facil",q:"Zumbido (tinnitus) é:",o:["Dor de ouvido","Percepção de som sem fonte externa","Secreção","Perda de equilíbrio"],a:1,e:"Zumbido é a percepção de som na ausência de estímulo sonoro externo."},
    {id:"ot12",d:"moderado",q:"A epistaxe posterior, comparada à anterior, costuma ser:",o:["Mais leve e fácil de controlar","Mais grave e frequente em idosos/hipertensos","Sempre em crianças","Sem repercussão"],a:1,e:"A epistaxe posterior é menos comum, porém mais grave, típica de idosos e hipertensos."},
    {id:"ot13",d:"facil",q:"Otalgia é:",o:["Dor de ouvido","Secreção","Zumbido","Vertigem"],a:0,e:"Otalgia é a dor localizada no ouvido."},
    {id:"ot14",d:"dificil",q:"A vertigem central, diferentemente da periférica, costuma:",o:["Ser fatigável e com latência","Ter nistagmo que muda de direção e sinais neurológicos associados","Melhorar com manobras de reposicionamento","Ser sempre benigna"],a:1,e:"A vertigem central tende a ter nistagmo que muda de direção, sem latência, com sinais neurológicos; a periférica é fatigável e com latência."},
    {id:"ot15",d:"facil",q:"Hiposmia é:",o:["Redução do olfato","Redução da audição","Perda da voz","Dor de garganta"],a:0,e:"Hiposmia é a diminuição do olfato; anosmia é a perda total."},
    {id:"ot16",d:"moderado",q:"A disfagia alta (orofaríngea) manifesta-se por:",o:["Engasgo/dificuldade de iniciar a deglutição","Queimação retroesternal","Dor abdominal","Sangramento nasal"],a:0,e:"A disfagia orofaríngea cursa com engasgo e dificuldade para iniciar a deglutição."},
    {id:"ot17",d:"dificil",q:"A membrana timpânica normal apresenta:",o:["Aspecto hiperemiado e abaulado","Aspecto acinzentado/translúcido, com reflexo (triângulo) luminoso","Coloração amarela com pus","Perfuração central"],a:1,e:"A membrana normal é acinzentada e translúcida, com reflexo/triângulo luminoso; hiperemia + abaulamento sugere OMA."},
    {id:"ot18",d:"moderado",q:"Rinorreia clara, espirros e prurido nasal sugerem:",o:["Rinite alérgica","Sinusite bacteriana","Corpo estranho","Epistaxe posterior"],a:0,e:"Rinorreia clara com espirros e prurido é típica de rinite alérgica; secreção purulenta sugere sinusite."},
    {id:"ot19",d:"facil",q:"Hipoacusia é:",o:["Redução da audição","Dor de ouvido","Secreção","Zumbido"],a:0,e:"Hipoacusia é a redução da audição."},
    {id:"ot20",d:"moderado",q:"O teste de Weber é realizado colocando o diapasão:",o:["Na linha média do crânio (vértice/testa)","No pé","No tórax","No abdome"],a:0,e:"No Weber, o diapasão é posto na linha média; observa-se para qual lado o som lateraliza."},
    {id:"ot21",d:"moderado",q:"Vertigem com hipoacusia e zumbido sugere acometimento:",o:["Do labirinto / orelha interna","Do nariz","Da faringe","Do esôfago"],a:0,e:"Vertigem + hipoacusia + zumbido apontam para a orelha interna (labirinto)."},
    {id:"ot22",d:"dificil",q:"Na otite média aguda, à otoscopia espera-se a membrana:",o:["Acinzentada e translúcida","Hiperemiada e abaulada, com perda do triângulo luminoso","Sempre perfurada","Normal"],a:1,e:"Na OMA a membrana fica hiperemiada e abaulada, com perda do reflexo luminoso."},
    {id:"ot23",d:"facil",q:"Coriza / rinorreia é:",o:["Secreção nasal","Dor de garganta","Tosse","Rouquidão"],a:0,e:"Coriza/rinorreia é a secreção nasal."},
    {id:"ot24",d:"moderado",q:"Odinofagia refere-se a:",o:["Dor ao engolir","Dor de ouvido","Dor de cabeça","Dor nasal"],a:0,e:"Odinofagia é a dor à deglutição (ex.: faringite/amigdalite)."},
    {id:"ot25",d:"dificil",q:"Exsudato amigdaliano confluente e cremoso, com petéquias palatais e adenomegalia, sugere:",o:["Mononucleose infecciosa","Rinite alérgica","Otite externa","Cerume"],a:0,e:"Exsudato confluente + petéquias palatais + linfonodomegalia sugerem mononucleose."},
    {id:"ot26",d:"facil",q:"Epistaxe é:",o:["Sangramento nasal","Secreção purulenta","Espirro","Obstrução nasal"],a:0,e:"Epistaxe é o sangramento nasal."},
    {id:"ot27",d:"moderado",q:"Pólipos nasais podem estar associados a:",o:["Asma e fibrose cística","Otite externa","Cárie dentária","Vertigem central"],a:0,e:"Pólipos nasais associam-se a asma e fibrose cística."},
    {id:"ot28",d:"dificil",q:"No lactente, a obstrução nasal é especialmente importante porque:",o:["O recém-nascido respira preferencialmente pelo nariz","Não tem repercussão","Causa surdez","Causa icterícia"],a:0,e:"O RN é respirador nasal preferencial; a obstrução pode causar dificuldade respiratória e até apneia."},
    {id:"ot29",d:"moderado",q:"A amigdalite estreptocócica clássica produz:",o:["Exsudato folicular","Vesículas","Membrana acinzentada de difteria","Nenhum achado"],a:0,e:"A amigdalite estreptocócica produz exsudato folicular nas amígdalas."},
    {id:"ot30",d:"facil",q:"Disfonia é:",o:["Alteração da voz (rouquidão)","Dor de ouvido","Secreção nasal","Tontura"],a:0,e:"Disfonia é a alteração da voz; rouquidão persistente exige investigação."}
   ]},

  mon1:{ name:"Monitoria 1 — Prova EAC 2025", doc:"Monitorias 1",
   summary:`## Monitoria 1 — Prova de Semiologia Teórica (EAC 2025)
Banco de **55 questões** de prova elaboradas pela monitoria (Autor: Renato Nogueira), abrangendo toda a Semiologia: anamnese, sistema digestório, endocrinologia, exame psíquico, cardiovascular, renal, neurológico, respiratório, edema, febre, icterícia, anemias, dor abdominal/torácica, pediatria, aparelho genital, dermatologia, otorrinolaringologia e osteomuscular.

> As questões seguem o estilo de prova (incluindo formatos "assinale a INCORRETA", afirmativas I-II-III-IV e verdadeiro/falso). Use o gabarito comentado de cada questão para revisar.`,
   tips:"Atenção aos enunciados: muitas pedem a alternativa INCORRETA ou a combinação de afirmativas corretas. Leia o caso clínico inteiro antes de responder.",
   questions:[
    {id:"m1q1",d:"moderado",q:"Sobre anamnese, assinale a alternativa CORRETA:",o:["Na HDA deve-se detalhar somente o sintoma da queixa principal, deixando as manifestações associadas para a revisão de sistemas","Caso o paciente enumere diversos motivos, deve-se colocar o primeiro motivo enunciado na queixa principal","Ao questionar tabagismo e etilismo, o tipo de cigarro e de bebida alcoólica não precisa ser perguntado","Na lista de problemas devem constar hábitos de vida inadequados, comorbidades crônicas, alergias e cirurgias realizadas"],a:3,e:"A lista de problemas reúne hábitos inadequados, comorbidades, alergias e cirurgias. As manifestações associadas entram na HDA, registra-se o principal motivo na QP, e o tipo/quantidade/tempo de cigarro e álcool devem ser perguntados."},
    {id:"m1q2",d:"facil",q:"Dentre os sintomas abaixo, qual NÃO faz parte da revisão de sistema do trato gastrointestinal?",o:["Dispepsia","Afagia","Hematêmese","Metrorragia","Icterícia"],a:3,e:"Metrorragia é sangramento uterino fora do ciclo menstrual — pertence à revisão do sistema genital feminino, não ao gastrointestinal."},
    {id:"m1q3",d:"moderado",q:"Sobre o interrogatório do sistema digestório: I- A disfagia pode ser orofaríngea ou esofágica conforme a fase da deglutição; II- O infarto do miocárdio é causa extradigestiva de vômitos; III- Esteatorreia sugere alteração pancreática endócrina; IV- Em anêmicos, o aspecto e a constituição das fezes devem ser questionados. Assinale a alternativa com TODAS as corretas:",o:["I e II","II e IV","I, II e III","I, II e IV","Todas as afirmativas"],a:3,e:"III é incorreta: esteatorreia sugere alteração pancreática EXÓCRINA (falta de lipase na luz intestinal). I, II e IV estão corretas."},
    {id:"m1q4",d:"facil",q:"A dispepsia reúne sintomas do andar superior do abdome. Assinale a alternativa que NÃO contém um sintoma dispéptico:",o:["Plenitude pós-prandial","Epigastralgia","Saciedade diminuída","Queimação epigástrica"],a:2,e:"O correto seria saciedade PRECOCE (e não diminuída). Plenitude pós-prandial, epigastralgia e queimação epigástrica são dispépticos."},
    {id:"m1q5",d:"moderado",q:"Acerca da semiologia endocrinológica, assinale a INCORRETA:",o:["Os 4 P's do DM (poliúria, polidipsia, polifagia e perda de peso) sugerem descompensação","Sintomas de hipoglicemia incluem parestesia em luvas/botas e dano glomerular","Claudicação intermitente é comum no DM e sugere doença arterial periférica","Devem-se investigar lesões nas extremidades pelo comprometimento sensitivo"],a:1,e:"Parestesia em luvas/botas e dano glomerular são da HIPERglicemia crônica. A hipoglicemia cursa com tontura, fadiga, confusão, convulsões e até coma."},
    {id:"m1q6",d:"facil",q:"Qual a fácie típica da síndrome de Cushing?",o:["Fácie hipocrática","Fácie leonina","Fácie basedowiana","Fácie em lua cheia","Fácie mixedematosa"],a:3,e:"A fácie em lua cheia (arredondada, pletórica) é típica do Cushing. Hipocrática = doença grave/consumptiva; leonina = hanseníase; basedowiana = hipertireoidismo; mixedematosa = hipotireoidismo."},
    {id:"m1q7",d:"moderado",q:"Sobre a conduta na obesidade: I- Questionar tipo e padrão alimentar; II- Ciclos irregulares, queda capilar e pele oleosa sugerem SOP; III- No exame físico, peso, altura e IMC são parâmetros suficientes; IV- A associação com distúrbios psiquiátricos é alta e deve ser investigada. Assinale a CORRETA:",o:["Apenas I e II estão corretas","II e III são incorretas","Somente a I está correta","Somente a III está incorreta","Todas estão corretas"],a:3,e:"Só III é incorreta: além de peso/altura/IMC, deve-se medir circunferência abdominal, relação cintura-quadril e rastrear comorbidades (PA, ausculta). I, II e IV corretas."},
    {id:"m1q8",d:"dificil",q:"Acerca da semiologia endocrinológica, assinale a CORRETA:",o:["O sinal de Trousseau é a flexão do punho com extensão das interfalangeanas após insuflar o manguito e sugere hipoparatireoidismo","O sinal de Chvostek (contração facial à percussão do nervo facial) sugere hiperparatireoidismo","Labilidade da PA e palpitações sugerem síndrome de Cushing","Alteração da glicemia ocorre no DM e no Cushing, mas não na acromegalia"],a:0,e:"O sinal de Trousseau (espasmo carpopedal ao insuflar o manguito) indica hipocalcemia/hipoparatireoidismo. Chvostek também sugere HIPOparatireoidismo; labilidade de PA e palpitações sugerem feocromocitoma; a acromegalia também altera a glicemia."},
    {id:"m1q9",d:"dificil",q:"Mulher de 28 anos, cobre eletrodomésticos achando que a monitoram. Sabe quem é, mas não sabe onde está; desconfiada, atenta-se a vários sons mas não mantém a atenção na conversa. Qual o exame do estado mental?",o:["Desorientada auto e alopsiquicamente, hipervigilante e hipotenaz","Orientada alopsiquicamente e desorientada autopsiquicamente, hipervigilante e hipotenaz","Orientada auto e alopsiquicamente, normovigilante e hipertenaz","Desorientada alopsiquicamente e orientada autopsiquicamente, hipovigilante e hipertenaz","Desorientada alopsiquicamente e orientada autopsiquicamente, hipervigilante e hipotenaz"],a:4,e:"Sabe quem é (orientada autopsiquicamente) mas não sabe onde está (desorientada alopsiquicamente); atenta-se a estímulos (hipervigilante) mas não sustenta a atenção (hipotenaz)."},
    {id:"m1q10",d:"dificil",q:"Homem de 42 anos, há 6 meses triste, anedônico, cansado, com insônia e culpa. Fácies deprimida, discurso lentificado e atenção diminuída. Qual o exame do estado mental?",o:["Lúcido, hipotenaz, afeto embotado, humor hipotímico e com bradifasia","Lúcido, hipovigil, afeto expansivo, humor hipotímico e com bradifasia","Lúcido, hipotenaz, afeto embotado, humor hipotímico e com taquifasia","Lúcido, hipovigil, afeto embotado, humor hipotímico e com bradifasia","Lúcido, hipotenaz, afeto embotado, humor hipertímico e com taquifasia"],a:0,e:"Quadro depressivo: humor hipotímico, afeto embotado, atenção reduzida (hipotenaz) e discurso lentificado (bradifasia), com consciência preservada (lúcido)."},
    {id:"m1q11",d:"moderado",q:"Uma criança que acredita ouvir alguém sussurrando seu nome quando o ventilador está ligado está tendo uma:",o:["Alucinação, pois é percepção distorcida de estímulo real","Ilusão, pois é percepção distorcida de um estímulo real","Pseudoalucinação, pois o som deriva do vento","Ilusão, pois é percepção sem estímulo externo correspondente","Alucinação, pois é percepção sem estímulo externo correspondente"],a:1,e:"Ilusão = percepção DISTORCIDA de um estímulo real (o ruído do ventilador). Alucinação ocorre SEM estímulo externo correspondente."},
    {id:"m1q12",d:"dificil",q:"Sobre anamnese cardiovascular: I- Questionar faringites de repetição na infância (danos valvares); II- Não há comprovação de componente genético nas doenças CV; III- O tabagismo é fator de risco, mas o álcool não tem associação; IV- Condições socioeconômicas não têm relação comprovada. Assinale a alternativa com TODAS as INCORRETAS:",o:["I, II e IV","II, III e IV","III e IV","II e III","Todas estão incorretas"],a:1,e:"II, III e IV são incorretas: há forte componente genético (HAS, DM, miocardiopatias); o álcool associa-se a aterosclerose, HAS e miocardiopatia; fatores socioeconômicos influenciam (febre reumática, Chagas). I é correta."},
    {id:"m1q13",d:"moderado",q:"Assinale a alternativa que descreve a dor anginosa típica:",o:["Pré-cordial, intensidade baixa, sem irradiação, em aperto, súbita, com tosse seca e melhora no decúbito","Pré-cordial, sempre intensa, em aperto, irradiando para as costas, desencadeada por emoções, sem fatores de melhora","Pré-cordial, em pontada, irradiando para ombros, súbita e ventilatório-dependente","Pré-cordial, intensidade variável, em aperto, irradiando para o MSE, desencadeada por esforço, com náuseas/dispneia e melhora no repouso","Pré-cordial, em aperto, sem irradiação, desencadeada pela deglutição, com vômitos/pirose e melhora com analgésicos"],a:3,e:"A angina típica é pré-cordial, em aperto, irradia para o membro superior esquerdo, é desencadeada pelo esforço e alivia com o repouso."},
    {id:"m1q14",d:"moderado",q:"Acerca da semiologia renal, assinale a INCORRETA:",o:["Oligúria é diurese < 400 ml/dia ou < 20 ml/hora","Retenção urinária é a incapacidade de esvaziar a bexiga mesmo com produção adequada e pode gerar globo vesical","Incontinência é perda involuntária de urina; hesitação é a dificuldade para iniciar o jato","Noctúria é a necessidade de esvaziar a bexiga durante a noite","Hematúria é quando a urina tem tonalidade avermelhada"],a:4,e:"Hematúria é a PRESENÇA DE SANGUE na urina. A cor avermelhada pode vir de alimentos, fármacos, porfirinúria, hemoglobinúria ou mioglobinúria, sem haver hematúria."},
    {id:"m1q15",d:"dificil",q:"Sobre semiologia renal: I- O edema da DRC é periorbitário e matinal; II- Estrangúria é a sensação de esvaziamento incompleto com vontade contínua de urinar e sugere inflamação vesical; III- São diferenciais de dor lombar renal a espondiloartrose e o espasmo muscular lombar; IV- Alterações de cor/aspecto da urina são importantes, mas por si só não predizem doença. Assinale a CORRETA:",o:["Apenas a I está incorreta","Apenas I e II estão incorretas","I, III e IV estão corretas","II e IV estão incorretas apenas","Todas estão corretas"],a:2,e:"I, III e IV corretas. II está incorreta: essa descrição corresponde ao tenesmo vesical; estrangúria é a micção dolorosa, lenta e gota a gota."},
    {id:"m1q16",d:"moderado",q:"Sobre distúrbios da comunicação e semiologia neurológica, assinale a INCORRETA:",o:["A disfonia é alteração do timbre da voz e pode ocorrer por lesão das cordas vocais ou nervosa","Na disartria há alteração na articulação das palavras, mas a compreensão e a linguagem estão preservadas","Na afasia de Wernicke a compreensão está gravemente afetada","Na afasia de Broca o comprometimento é sensorial, com dificuldade de expressão pela fala e escrita"],a:3,e:"Na afasia de Broca o comprometimento é MOTOR (não sensorial); o paciente costuma ter consciência do déficit, o que gera irritabilidade."},
    {id:"m1q17",d:"dificil",q:"Sobre semiologia neurológica: I- Comprometimento agudo sugere lesão traumática/vascular e instalação lenta sugere tumor/degeneração; II- Vômito em jato é projetado à distância e sugere comprometimento neurológico; III- Ambliopia é perda total da visão e amaurose é redução da acuidade; IV- Convulsões associam-se a sialorreia, incontinência esfincteriana e mordedura lingual. Assinale a com TODAS as CORRETAS:",o:["II e IV","I e II","I e IV","I, II e IV","I, III e IV"],a:2,e:"I e IV corretas. II é incorreta (o vômito em jato é SEM náusea associada); III está invertida (amaurose = perda total; ambliopia = redução da acuidade)."},
    {id:"m1q18",d:"dificil",q:"Sobre semiologia respiratória, assinale a CORRETA:",o:["Trepopneia é típica de derrame pleural e piora se o paciente se deita sobre o lado acometido","Ortopneia é a dispneia em decúbito, típica da fibrose pulmonar","Na escala mMRC, dispneia grau 3 é a dos esforços intermediários (subir lances de escada)","A insuficiência cardíaca congestiva é exemplo de causa de cianose mista","Tosse produtiva e dispneia sugerem pneumonia viral"],a:3,e:"Na ICC há cianose mista (comprometimento da troca gasosa pela congestão + estase venosa pela falência de bomba). Trepopneia piora sobre o pulmão SÃO; ortopnea é típica de congestão/IC; tosse produtiva sugere pneumonia BACTERIANA."},
    {id:"m1q19",d:"dificil",q:"“A Dama das Camélias”: Marguerite, cada vez mais pálida, respiração curta, olhos grandes, lábios secos, tossia constantemente e cuspia sangue. Assinale o diagnóstico sindrômico, anatômico e etiológico mais provável:",o:["Pneumonia aguda, interstício pulmonar, infecção por M. tuberculosis","Edema pulmonar, leito capilar, TEP","Síndrome respiratória consumptiva, brônquios centrais, carcinoma epidermoide","Pneumonia aguda, interstício pulmonar, vírus influenza","Síndrome respiratória consumptiva, parênquima pulmonar, infecção por M. tuberculosis"],a:4,e:"Doença crônica consumptiva (astenia, perda ponderal, palidez) + tosse, dispneia e hemoptise = síndrome respiratória consumptiva; na época, tuberculose (M. tuberculosis) acometendo o parênquima."},
    {id:"m1q20",d:"facil",q:"Assinale a alternativa que NÃO contém um possível fator etiológico de tosse:",o:["Síndrome de Loeffler","Pneumonia viral","Pneumonia bacteriana","Fármacos bloqueadores dos receptores de angiotensina (BRA)","Bronquite crônica"],a:3,e:"A tosse seca é efeito dos IECA (não dos BRA). As demais são causas de tosse."},
    {id:"m1q21",d:"moderado",q:"Assinale a alternativa que NÃO associa corretamente a causa fisiopatológica e o fator etiológico da dispneia:",o:["Causa atmosférica — altas altitudes","Causa parenquimatosa — asma","Causa pleural — pneumotórax","Causa obstrutiva — neoplasias","Causa diafragmática — paralisia"],a:1,e:"A asma é causa OBSTRUTIVA (não parenquimatosa) de dispneia."},
    {id:"m1q22",d:"moderado",q:"Assinale a alternativa que contém todas as características semiológicas do edema a investigar:",o:["Localização, intensidade, coalescência, elasticidade, duração, alterações de pele, temperatura, evolução e sensibilidade","Localização, intensidade, consistência, aderência, mobilidade, duração, alterações de pele, evolução e sensibilidade","Localização, intensidade, coalescência, turgor, duração, alterações de pele, temperatura, evolução e sensibilidade","Localização, intensidade, consistência, elasticidade, duração, alterações de pele, temperatura, evolução e sensibilidade"],a:3,e:"As características do edema são: localização, intensidade, consistência, elasticidade, duração, alterações de pele, temperatura, evolução e sensibilidade."},
    {id:"m1q23",d:"moderado",q:"Sobre a fisiopatologia do edema: I- Cirróticos/desnutridos formam edema generalizado por queda da pressão coloidosmótica; II- O edema de MMII na IC direita decorre do aumento da pressão hidrostática; III- A filariose causa edema localizado por obstrução linfática; IV- O edema inflamatório ocorre por aumento da permeabilidade capilar mediada pela histamina. Assinale a com TODAS as corretas:",o:["I e III","II e IV","I, III e IV","II e IV","Todas estão corretas"],a:4,e:"Todas as afirmativas estão corretas: cada uma descreve corretamente um mecanismo de formação do edema."},
    {id:"m1q24",d:"dificil",q:"Acerca da semiologia do edema, assinale a INCORRETA:",o:["O edema da IC é mole, inelástico, indolor, vespertino e generalizado","A intensidade do edema é medida pelo sinal da fóvea/cacifo","Edema duro tem maior resistência à fóvea, sugerindo longa duração","Pele em casca de laranja é alteração típica de edemas em regressão","A elasticidade do edema é diretamente proporcional ao tempo de instalação da fóvea"],a:4,e:"É INVERSAMENTE proporcional: no edema elástico a fóvea desaparece rápido; no inelástico, a fóvea persiste mais tempo."},
    {id:"m1q25",d:"dificil",q:"Sobre febre e temperatura corporal: I- Febre é sinal de alerta exclusivamente para infecções; II- A febre decorre do ajuste do termostato hipotalâmico por pirógenos; III- Febre moderada tem temperatura axilar entre 38,6° e 39,5°C; IV- A membrana timpânica é local de eleição para temperatura central mas tem pouca aplicação prática. Assinale a CORRETA:",o:["Apenas a II está correta","Apenas a II e IV estão corretas","Apenas a I está incorreta","Todas estão corretas","Todas estão incorretas"],a:1,e:"II e IV corretas. I incorreta (febre também ocorre em neoplasias e doenças autoimunes); III incorreta (febre moderada fica entre 37,6° e 38,5°C)."},
    {id:"m1q26",d:"moderado",q:"Sobre hipertermia e febre, assinale a CORRETA:",o:["Pode haver alteração no set point hipotalâmico na hipertermia","Na hipertermia, a resposta a antitérmicos varia caso a caso","Ausência de sudorese e tremores eventuais é sugestivo de febre","Hipertermia e febre são tratadas da mesma forma"],a:2,e:"Na febre há ajuste do set point e calafrios/tremores com pouca sudorese inicialmente. Na hipertermia NÃO há mudança do set point nem resposta a antitérmicos, e o tratamento é distinto (resfriamento)."},
    {id:"m1q27",d:"dificil",q:"Homem de 58 anos, pós-craniotomia por hematoma subdural, no 3º dia PO apresenta leucocitose, taquicardia e Tax 38,5°C. Recebeu dipirona 1g VO e, em 20 min, a Tax era 38,6°C. Assinale a CORRETA:",o:["É hipertermia central pelo TCE e pela não resposta a antitérmicos","É febre, devendo-se dar antipirético parenteral pela não resposta à via oral","É hipertermia, devendo-se resfriar o ambiente e dar soro gelado IV","É febre, decorrente de provável infecção nosocomial precoce, sugerida pela leucocitose"],a:3,e:"O início de ação da dipirona oral é ~30 min, então reavaliar em 20 min não indica falha. Leucocitose + febre no PO sugerem infecção nosocomial; hipertermia central daria temperatura mais alta e outros sinais neurológicos."},
    {id:"m1q28",d:"dificil",q:"Sobre icterícia, assinale a INCORRETA:",o:["A gordura subconjuntival e a betacarotenemia são diferenciais de icterícia","O predomínio de bilirrubina indireta é mais nocivo pela afinidade pelo tecido nervoso","Medicamentos que competem o sítio de ligação com a albumina elevam a bilirrubina direta","A hiperbilirrubinemia por BI tende a não cursar com colúria (não há filtração renal)","A hiperbilirrubinemia conjugada divide-se em intra e extra-hepática"],a:2,e:"Eles elevam a bilirrubina INDIRETA: por ser lipossolúvel, a BI precisa ser carreada pela albumina até o fígado; fármacos que competem esse sítio aumentam a BI livre."},
    {id:"m1q29",d:"dificil",q:"Homem de 62 anos, tabagista, com icterícia, prurido, acolia fecal, colúria e perda de 10 kg em 2 meses; FA e gama-GT muito elevadas, USG com dilatação de vias biliares e massa na cabeça do pâncreas. I- Diagnóstico mais provável é colestase por cálculo biliar; II- Predomina o acúmulo de bilirrubina não conjugada; III- É hiperbilirrubinemia conjugada extra-hepática extrínseca; IV- A perda ponderal sugere cirrose. Assinale a com TODAS as INCORRETAS:",o:["I e II","I e IV","II e III","I, II e IV","Todas estão incorretas"],a:3,e:"I, II e IV incorretas: o quadro é de neoplasia pancreática (não cálculo), com acúmulo de bilirrubina DIRETA (obstrução pós-conjugação) e perda ponderal por neoplasia. III é correta (colestase extra-hepática extrínseca por compressão tumoral)."},
    {id:"m1q30",d:"moderado",q:"Marque a sequência correta (V/F): I- A síndrome de Gilbert afeta a conjugação hepática da bilirrubina; II- Padrão colestático é quando há maior elevação de transaminases que de fosfatase alcalina; III- Icterícia com circulação colateral portal, eritema palmar, telangiectasias e flapping sugere cirrose; IV- Icterícia no recém-nascido é sempre fisiológica.",o:["V, F, V, F","V, V, F, F","F, V, V, F","V, F, F, V"],a:0,e:"II é falsa (transaminases > fosfatase alcalina = padrão HEPATOCELULAR, não colestático); IV é falsa (pode ser patológica: atresia biliar, incompatibilidade ABO/Rh, infecções congênitas)."},
    {id:"m1q31",d:"dificil",q:"Idoso de 78 anos, com IAM prévio, em uso de AAS e rivaroxabana, com fadiga e dispneia aos esforços; anemia moderada, VCM 88 fl, CHCM normal, reticulócitos normais, ferro/B12/folato normais. Assinale a CORRETA:",o:["A anemia é microcítica e relacionada à idade","Apesar do ferro normal, é anemia ferropriva pelo VCM reduzido","É megaloblástica, por interação entre AAS e ácido fólico","A anemia é normocítica e deve-se provavelmente a sangramento crônico"],a:3,e:"VCM 88 fl = anemia normocítica; com estoques normais e uso de antiagregante + anticoagulante, a causa provável é sangramento crônico (perda de sangue), ainda sem repercussão no VCM."},
    {id:"m1q32",d:"dificil",q:"Selecione o achado de exame físico que direciona para anemia HIPERproliferativa:",o:["Oligúria","Coiloníquia","Queilite angular","Esplenomegalia","Glossite"],a:3,e:"A esplenomegalia associa-se à anemia hemolítica (hiperproliferativa). Coiloníquia, queilite e glossite sugerem carências (hipoproliferativas) e oligúria, doença renal crônica."},
    {id:"m1q33",d:"dificil",q:"Sobre anemia, assinale a CORRETA:",o:["Com VCM < 80 fl, a ferritina ajuda a diferenciar ferropriva (ferritina baixa) de doença crônica (ferritina normal/alta)","A anemia normocítica tem VCM entre 80 e 120 fl","A principal anemia normocítica é a carencial mista","A anemia ferropriva acomete mais homens","No exame físico predominam mucosas hipocoradas, palidez e bradicardia"],a:0,e:"A ferritina diferencia: baixa na ferropriva, normal/elevada na doença crônica. A normocítica tem VCM 80–100 fl; a principal é a de doença crônica; a ferropriva é mais comum em mulheres; e há TAQUIcardia (compensatória)."},
    {id:"m1q34",d:"moderado",q:"Homem de 23 anos com dor súbita lancinante em flanco esquerdo, tipo cólica, irradiando para fossa ilíaca e períneo, 9/10, com sudorese e vômito, sem febre. Causa mais provável?",o:["Pancreatite aguda","Cólica biliar","Apendicite","Nefrolitíase","Úlcera gástrica perfurada"],a:3,e:"Dor lombar/flanco em cólica, intensa, irradiando para fossa ilíaca e períneo é quadro típico de cólica renal por nefrolitíase (obstrução ureteral por cálculo)."},
    {id:"m1q35",d:"dificil",q:"Homem de 45 anos, etilista, com dor epigástrica intensa irradiando para o dorso, que piora ao comer e melhora ao inclinar-se para frente, com mancha azulada periumbilical. Diagnóstico e sinal clínico?",o:["Pancreatite aguda — Sinal de Cullen","Isquemia mesentérica — Sinal de Rovsing","Úlcera perfurada — Sinal de Grey-Turner","Pancreatite aguda — Sinal de Grey-Turner","Isquemia mesentérica — Sinal de Cullen"],a:0,e:"Quadro de pancreatite aguda; a mancha azulada PERIUMBILICAL é o sinal de Cullen (hemorragia retroperitoneal). O sinal de Grey-Turner é nos flancos."},
    {id:"m1q36",d:"dificil",q:"Mulher de 28 anos com dor que começou periumbilical e migrou para fossa ilíaca direita em 6h, com náuseas, vômito e febre de 38,4°C. I- Diagnóstico mais provável é cólica biliar com sinal de Murphy; II- É abdome agudo inflamatório; III- Blumberg e Rovsing tendem a estar positivos; IV- A dor aumenta ao elevar a coxa direita contra resistência. Assinale a com TODAS as corretas:",o:["I e II","II e IV","III e IV","I, II e III","II, III e IV"],a:4,e:"Quadro típico de apendicite aguda (abdome agudo inflamatório): Blumberg e Rovsing positivos e sinal do psoas (dor ao elevar a coxa). I é incorreta (não é cólica biliar/Murphy)."},
    {id:"m1q37",d:"moderado",q:"Assinale a alternativa que associa INADEQUADAMENTE a síndrome abdominal a um diagnóstico:",o:["Abdome agudo vascular — isquemia mesentérica","Abdome agudo perfurativo — complicação de úlcera gástrica","Abdome agudo hemorrágico — gravidez ectópica rota","Abdome agudo obstrutivo — colecistite aguda","Abdome agudo inflamatório — pancreatite aguda"],a:3,e:"A colecistite é abdome agudo INFLAMATÓRIO. O obstrutivo ocorre por obstrução intestinal (hérnia encarcerada, neoplasia, íleo paralítico)."},
    {id:"m1q38",d:"dificil",q:"Acerca da dor torácica, assinale a INCORRETA:",o:["Dor lancinante retroesternal súbita, com déficit de pulso e síncope, sugere dissecção aórtica","Dor localizada e não difusa direciona para doenças da parede torácica","A dor pericárdica é retroesternal, sem relação com exercício, e alivia com inclinação do tórax para frente","A dor do herpes-zóster é intensa, limita-se a um dermátomo e precede as vesículas","A angina estável dura episódios de 20 minutos ou mais"],a:4,e:"A angina estável dura cerca de 3 minutos, raramente ultrapassando 10. Episódios ≥ 20 min sugerem síndrome coronariana aguda."},
    {id:"m1q39",d:"moderado",q:"Sobre fisiopatologia respiratória: I- Áreas de shunt têm perfusão mas não ventilação; II- A atelectasia aumenta as áreas de shunt; III- Áreas de espaço morto são ventiladas mas não perfundidas; IV- O TEP aumenta o espaço morto. Assinale a correta:",o:["I e II apenas","III e IV apenas","I e III apenas","Todas são falsas","Todas são verdadeiras"],a:4,e:"Todas verdadeiras: shunt = perfusão sem ventilação (ex.: atelectasia); espaço morto = ventilação sem perfusão (ex.: TEP)."},
    {id:"m1q40",d:"facil",q:"Pela escala mMRC, qual o grau de dispneia de quem para algumas vezes para respirar ao caminhar no próprio passo?",o:["0","1","2","3","4"],a:2,e:"Parar para respirar ao andar no próprio passo (no plano) corresponde ao grau 2 da mMRC."},
    {id:"m1q41",d:"moderado",q:"Assinale a alternativa que contém corretamente os 3 componentes da Tríade de Charcot e o que ela indica:",o:["Estase sanguínea, hipercoagulabilidade e lesão endotelial — predisposição a trombose","Febre, icterícia e dor abdominal — colangite","Turbilhonamento, hipercoagulabilidade e alteração endotelial — predisposição a trombose","Icterícia, confusão mental e febre — pancreatite aguda","Febre, icterícia e dor abdominal — neoplasia pancreática"],a:1,e:"A Tríade de Charcot (febre, icterícia e dor abdominal) indica colangite. As opções A e C descrevem a Tríade de Virchow (trombose)."},
    {id:"m1q42",d:"moderado",q:"São sintomas característicos da síndrome de Cushing, EXCETO:",o:["Gibosidade","Hiperglicemia","Estrias violáceas < 1 cm","Hipertensão arterial","Miopatia proximal"],a:2,e:"As estrias do Cushing são largas, arroxeadas e geralmente MAIORES que 1 cm. Os demais são típicos."},
    {id:"m1q43",d:"moderado",q:"Sobre semiologia pediátrica: I- Deve-se dar ao adolescente um momento a sós com o médico, especialmente após a consulta; II- Crianças só participam com relatos a partir da puberdade; III- Todo procedimento deve ser explicado antes à criança; IV- Mesmo obtendo tudo dos pais, a criança deve ser indagada. Assinale a correta:",o:["Apenas I e II","Apenas III e IV","Apenas I, III e IV","Apenas II e III","Todas estão corretas"],a:2,e:"I, III e IV corretas. II é incorreta: crianças já podem participar a partir dos 2–3 anos de idade."},
    {id:"m1q44",d:"moderado",q:"Assinale a INCORRETA acerca da semiologia pediátrica:",o:["Os marcos do desenvolvimento avaliam o desenvolvimento neuropsicomotor e estão na caderneta da criança","O aumento do pulso na inspiração com desaceleração na expiração é patológico nas crianças","Um frêmito é um murmúrio palpável e seu reconhecimento é sempre significativo","Um fígado palpável a 2 cm do rebordo costal é normal em crianças até 3 anos"],a:1,e:"Essa variação do pulso com a respiração é a arritmia sinusal respiratória — FISIOLÓGICA e comum em crianças."},
    {id:"m1q45",d:"dificil",q:"Sobre o exame físico pediátrico: I- A PA varia com a idade, mas a FC segue a mesma faixa de normalidade; II- A língua é onde a cianose central é mais facilmente vista; III- Linfonodos cervicais aumentados sugerem leucemia como principal diagnóstico; IV- Barlow e Ortolani investigam lesões da coluna vertebral. Assinale a com TODAS as INCORRETAS:",o:["I e II","I e III","II e IV","I, III e IV","Todas estão incorretas"],a:3,e:"I, III e IV incorretas: a FC também varia com a idade; linfonodos cervicais sugerem mais infecções virais/bacterianas; Barlow e Ortolani avaliam o QUADRIL. II é correta."},
    {id:"m1q46",d:"moderado",q:"Sobre o aparelho genital masculino: I- Inspeção de pênis e testículos faz parte da rotina pediátrica; II- Óstio uretral no dorso = epispádia, no ventre = hipospádia; III- Falha no descimento testicular = criptorquidia; IV- Testículos não descidos são comuns em RN pós-termo. Assinale a correta:",o:["Apenas I e III estão corretas","Somente II está incorreta","Somente IV está incorreta","I, III e IV estão corretas apenas","Todas as afirmativas estão corretas"],a:2,e:"Só IV é incorreta: a criptorquidia é mais comum em RN PREMATUROS (não pós-termo). I, II e III estão corretas."},
    {id:"m1q47",d:"dificil",q:"Sobre o aparelho genital masculino, assinale a INCORRETA:",o:["Hematúria inicial sugere origem prostática ou uretral","A causa mais comum de retenção urinária é o adenocarcinoma de próstata","Priapismo é a ereção persistente e dolorosa sem desejo sexual, por enrijecimento dos corpos cavernosos","Duração, circunstância e forma de aparecimento ajudam a diferenciar disfunção erétil psicogênica da orgânica","A torção do cordão espermático é emergência cirúrgica pelo comprometimento da circulação"],a:1,e:"A causa mais comum de retenção urinária é a HIPERPLASIA PROSTÁTICA BENIGNA, não o adenocarcinoma."},
    {id:"m1q48",d:"dificil",q:"Marque a sequência correta (V/F) sobre o aparelho genital feminino: I- Amenorreia secundária é a suspensão por > 6 meses (ciclos regulares) ou > 12 meses (irregulares); II- O padrão menstrual é definido por menarca, duração do fluxo e intervalo; III- São causas não fisiológicas de amenorreia a SOP, a obesidade e disfunções hipotalâmicas; IV- Corrimento patológico é sempre relacionado a IST; V- O climatério cursa com fogachos, irritabilidade, alteração do sono e queda de libido/memória.",o:["F, V, V, F, V","V, V, F, F, V","F, F, V, V, F","V, V, V, F, F"],a:0,e:"I é falsa (amenorreia secundária: > 3 meses em ciclos regulares ou > 6 meses em irregulares); IV é falsa (vaginose bacteriana e candidíase não são IST). II, III e V verdadeiras."},
    {id:"m1q51",d:"dificil",q:"Menino de 5 anos com lesões na face que começaram como bolhas perorais/nasais que se romperam formando crostas espessas cor de mel; outras crianças da creche com quadro semelhante. Diagnóstico mais provável?",o:["Dermatite seborreica","Penfigoide bolhoso","Impetigo","Acne papular","Lesão psoriática"],a:2,e:"Crostas melicéricas (cor de mel) em criança, contagiosas, é o quadro clássico do impetigo."},
    {id:"m1q52",d:"dificil",q:"Menino de 8 anos com dor de garganta há 2 dias, febre de 38,5°C, tosse seca, sem coriza, com linfonodo cervical de 2,5 cm doloroso e SEM exsudato/edema amigdaliano. Escore de Centor e conduta?",o:["Escore 3; realizar teste rápido e aguardar resultado para iniciar antibiótico","Escore 4; solicitar teste rápido e iniciar tratamento empírico imediato","Escore 1; antibiótico não indicado, investigar outras causas","Escore 3; solicitar teste rápido e iniciar tratamento empírico imediato","Escore 4; realizar teste rápido e aguardar resultado para iniciar antibiótico"],a:0,e:"Febre > 38°C, linfonodo cervical aumentado e doloroso e idade 3–14 anos somam 3 pontos (a tosse e a ausência de exsudato não pontuam). Conduta: teste rápido/cultura e antibiótico só se positivo."},
    {id:"m1q53",d:"moderado",q:"Assinale a associação INADEQUADA entre causa e tipo de perda auditiva:",o:["Presbiacusia — perda neurossensorial","Otite externa — perda condutiva","Doença de Ménière — perda neurossensorial","Otite média — perda neurossensorial","Cerume — perda condutiva"],a:3,e:"A otite média causa perda CONDUTIVA (e não neurossensorial)."},
    {id:"m1q54",d:"moderado",q:"Sobre tontura e vertigem: I- A VPPB ocorre por desprendimento dos otólitos e trata-se com a manobra de Epley; II- Na doença de Ménière a vertigem é episódica com hipoacusia neurossensorial; III- Tontura com escurecimento visual e pré-síncope exige investigar causas cardiovasculares; IV- Tontura com desequilíbrio sugere neuropatia periférica ou Parkinson. Assinale a correta:",o:["I e III somente","II, III e IV somente","II e IV somente","III e IV somente","Todas as afirmativas estão corretas"],a:4,e:"Todas as afirmativas estão corretas."},
    {id:"m1q55",d:"dificil",q:"São possíveis efeitos iatrogênicos da tireoidectomia, EXCETO:",o:["Rouquidão","Hipocalcemia sérica","Bradicardia","Madarose","Dermopatia infiltrativa"],a:4,e:"A dermopatia infiltrativa é típica do HIPERtireoidismo (doença de Graves), não sendo efeito da tireoidectomia. Os demais decorrem de lesão do laríngeo recorrente, hipoparatireoidismo ou hipotireoidismo iatrogênicos."},
    {id:"m1q56",d:"dificil",q:"Sobre o sistema osteomuscular: I- Rigidez matinal sugere doença inflamatória (ex.: artrite reumatoide); II- Dor só na movimentação ativa (não na passiva) sugere comprometimento periarticular; III- Nódulos de Bouchard e Heberden acometem respectivamente as interfalangeanas distais e proximais; IV- Artralgia não inflamatória ocorre ao movimento e sem sinais flogísticos. Assinale a com TODAS as corretas:",o:["I e III","II e III","II e IV","I, II e IV","Todas estão corretas"],a:3,e:"I, II e IV corretas. III está invertida: Bouchard acomete as interfalangeanas PROXIMAIS e Heberden as DISTAIS."},
    {id:"m1q57",d:"dificil",q:"Sobre testes e manobras osteomusculares, assinale a INCORRETA:",o:["O teste de Schober avalia a mobilidade da coluna na flexão","O teste de Apley no ombro avalia a articulação glenoumeral na suspeita de lesão do manguito rotador","Phalen e Tinel avaliam compressão do nervo ulnar no túnel de Guyon","O teste da gaveta anterior positivo sugere ruptura do LCA","O sinal de Lasègue é positivo quando surge dor até 60° na elevação do membro estendido"],a:2,e:"Phalen e Tinel avaliam a compressão do nervo MEDIANO no túnel do carpo (síndrome do túnel do carpo)."}
   ]},

  mon3:{ name:"Monitoria 3 — Lista EAC", doc:"Monitorias 3",
   summary:`## Monitoria 3 — Lista de Questões de Semiologia (EAC)
Lista elaborada pela monitoria (Amanda R. Santana) com **45 questões** de múltipla escolha cobrindo: dermatologia, endocrinologia, exame do estado mental, pediatria, icterícia, febre, abdome agudo, otorrinolaringologia, aparelho reprodutor, respiratório e cardiovascular.

> Inclui questões de verdadeiro/falso (apresentadas como "assinale a sequência correta"). Referência: aulas e Porto — Semiologia Médica.`,
   tips:"Reveja a diferença entre úlcera e erosão, os sinais de hipocalcemia (Chvostek/Trousseau), a tríade de Charcot e a distinção entre febre e hipertermia.",
   questions:[
    {id:"m3q1",d:"moderado",q:"Sobre semiologia dermatológica, assinale a CORRETA:",o:["Uma pústula é uma elevação em platô que ocupa área grande em relação à altura que atinge","A diferença entre úlcera e erosão é que a erosão deixa cicatriz por sua profundidade","É necessária anamnese detalhada antes de examinar a lesão, pois é importante definir a causa","No exame físico deve-se observar tipo, cor, limites, forma, disposição, distribuição e consistência da lesão"],a:3,e:"A descrição de A é de placa; em B quem deixa cicatriz é a ÚLCERA (não a erosão); na queixa dermatológica o exame da lesão pode preceder a anamnese. D está correta."},
    {id:"m3q3",d:"facil",q:"Menino de 5 anos, no verão, com bolhas perorais e nasais que se rompem deixando crostas cor de mel com partículas brilhantes, que caem sem cicatriz. Diagnóstico mais provável?",o:["Herpes","Impetigo","Psoríase","Líquen"],a:1,e:"Crostas cor de mel (melicéricas) com partículas brilhantes em criança, em clima quente/úmido, é o quadro clássico de impetigo."},
    {id:"m3q4",d:"facil",q:"Lesão esférica, elástica à palpação, com cavidade de conteúdo semissólido. Qual lesão?",o:["Bolha","Nódulo","Cisto","Pápula"],a:2,e:"Cavidade com conteúdo semissólido e cápsula = cisto. A bolha contém líquido; o nódulo é sólido; a pápula é pequena, elevada e sólida."},
    {id:"m3q6",d:"moderado",q:"Sobre o ABCDE da malignidade de lesões de pele, assinale a alternativa que indica apenas respostas POSITIVAS para possível malignidade:",o:["Simetria, bordas regulares, cor única, diâmetro < 6 mm, sem evolução","Assimetria, bordas irregulares, mais de um tom, diâmetro < 6 mm, com evolução","Assimetria, bordas irregulares, mais de um tom, diâmetro > 6 mm, com evolução de tamanho e cor","Simetria, bordas irregulares, cor única, diâmetro < 6 mm, sem histórico de evolução"],a:2,e:"ABCDE: Assimetria, Bordas irregulares, Cores variadas, Diâmetro > 6 mm e Evolução — todos presentes na opção C."},
    {id:"m3q8",d:"moderado",q:"Paciente com diagnóstico de HIPERtireoidismo. O que é compatível com o quadro?",o:["Astenia, adinamia, queda capilar, humor deprimido, ganho de peso, fácies mixedematosa","Insônia, labilidade emocional, taquicardia/palpitações, perda de peso, intolerância ao calor, sudorese, tremores, hiperdefecação","Fácies em lua cheia, característica do hipertireoidismo","Não há sintomas compressivos cervicais, pois não há chance de bócio"],a:1,e:"O hipertireoidismo é hipermetabólico: insônia, taquicardia, perda de peso, intolerância ao calor e tremores. A descreve o hipotireoidismo; a fácies em lua cheia é do Cushing; pode haver bócio com compressão cervical."},
    {id:"m3q9",d:"moderado",q:"Mulher de 53 anos, sobrepeso, com perda de peso, poliúria, polifagia e polidipsia. Assinale a CORRETA:",o:["Pela polifagia, polidipsia, poliúria e perda de peso, provavelmente tem DM tipo I","Acantose nigricans e acrocórdons não têm relação com a hipótese diagnóstica","Dor em queimação em luva e/ou bota indica provável neuropatia diabética periférica","Problemas cardíacos, renais, vasculares e oftálmicos não precisam ser investigados"],a:2,e:"Quadro de provável DM tipo II; acantose nigricans/acrocórdons sugerem resistência à insulina. A dor em luva/bota indica neuropatia diabética. Sempre rastrear repercussões em outros órgãos."},
    {id:"m3q10",d:"moderado",q:"Assinale os achados que podem ocorrer na síndrome de Cushing:",o:["Estrias violáceas < 1 cm, fácies acromegálica, pletora facial e miopatia distal","Estrias violáceas > 1 cm, fácies em lua cheia, miopatia proximal e equimose de aparecimento fácil","Gibosidade, fácies em lua cheia, equimose fácil e mixedema pré-tibial","Alterações de glicemia e PA, estrias violáceas < 1 cm, miopatia distal"],a:1,e:"No Cushing: estrias violáceas > 1 cm, fácies em lua cheia, miopatia PROXIMAL e equimoses fáceis. O mixedema pré-tibial é do hipertireoidismo (Graves)."},
    {id:"m3q11",d:"facil",q:"Qual sinal verifica hipocalcemia por meio da percussão do nervo facial anteriormente ao pavilhão auricular?",o:["Sinal de Trousseau","Sinal de Rovsing","Sinal de Chvostek","Sinal de Grey-Turner"],a:2,e:"O sinal de Chvostek (contração facial à percussão do nervo facial) indica hipocalcemia. Rovsing = apendicite; Grey-Turner = hemorragia retroperitoneal."},
    {id:"m3q12",d:"moderado",q:"Sobre a semiologia do sistema endócrino, assinale a CORRETA:",o:["Em diabéticos não é necessário palpar pulsos em membros inferiores","O aparecimento de pelos terminais em locais incomuns em mulheres pode indicar hiperandrogenemia","A circunferência abdominal deve ser medida no rebordo costal inferior","O hipoparatireoidismo pode causar nefrolitíase"],a:1,e:"O hirsutismo indica hiperandrogenemia. Em diabéticos deve-se palpar pulsos; a circunferência abdominal mede-se na linha média entre o rebordo costal e a crista ilíaca; quem causa nefrolitíase é o HIPERparatireoidismo."},
    {id:"m3q13",d:"moderado",q:"Homem de 25 anos, agitado, sabe quem é mas acredita estar na academia; não mantém a conversa e começa a tirar a própria roupa. Como descrevê-lo?",o:["Orientado autopsiquicamente, desorientado alopsiquicamente, com conduta inadequada","Desorientado auto e alopsiquicamente, com conduta inadequada","Orientado auto e alopsiquicamente, com conduta adequada","Desorientado autopsiquicamente, orientado alopsiquicamente, com conduta inadequada"],a:0,e:"Reconhece-se (orientado autopsiquicamente) mas não se localiza (desorientado alopsiquicamente); tirar a roupa em local inadequado = conduta inadequada."},
    {id:"m3q14",d:"facil",q:"Assinale a alternativa que indica uma alteração de CONSCIÊNCIA:",o:["Hipovigilância","Hipotenacidade","Obnubilação","Taquilalia"],a:2,e:"A obnubilação é alteração da consciência. Hipovigilância e hipotenacidade são da atenção; taquilalia é da fala (acelerada)."},
    {id:"m3q15",d:"moderado",q:"Menino recebe benzetacil; à noite, com a luz apagada, chora ao ver uma figura parecida com a enfermeira no quarto, que some quando a luz acende. Qual a alteração?",o:["Sensopercepção – delírio","Sensopercepção – ilusão","Humor – diminuído","Afeto – amplificado"],a:1,e:"Percepção distorcida a partir de um estímulo ambíguo no escuro = ilusão (alteração da sensopercepção)."},
    {id:"m3q16",d:"moderado",q:"Assinale a alternativa que apresenta APENAS indicadores de risco ELEVADO para suicídio:",o:["Planejamento e tentativa prévia, método e providências para o ato, depressão grave","Depressão grave em tratamento, apoio familiar, abuso de álcool","Acesso à saúde e tratamento psiquiátrico, desesperança e tristeza","Desespero e grande sofrimento, apoio familiar, método e providências para o ato"],a:0,e:"Risco elevado: planejamento, método acessível, providências, depressão grave e tentativa prévia. Apoio familiar e acesso a tratamento são fatores PROTETORES."},
    {id:"m3q17",d:"moderado",q:"Sobre semiologia pediátrica, assinale a CORRETA:",o:["Crianças a partir de 6 anos podem e devem participar ativamente da consulta","Não se deve pedir à criança que aponte a dor; é melhor perguntar aos pais","No histórico é importante perguntar pré-natal, peso ao nascer, intercorrências, doenças, internações, alergias e medicamentos","No exame físico, a primeira abordagem da criança deve ser feita com as mãos"],a:2,e:"A anamnese pediátrica investiga pré-natal, peso ao nascer e intercorrências. Crianças participam a partir de 2-3 anos; deve-se pedir que apontem a dor; e a primeira abordagem é SEM as mãos (ganhar confiança)."},
    {id:"m3q18",d:"moderado",q:"Marque a sequência correta (V/F) sobre exame físico pediátrico: I- Adaptar-se à idade, mãos quentes/limpas, despir e observar o desenvolvimento; II- Em criança grave, avaliar rapidamente vias aéreas, respiração, circulação, FC/FR, cianose, TEC, consciência, temperatura e estridor/sibilo; III- Crescimento deficiente não deve ser visto como sinal de alerta; IV- Baqueteamento digital pode relacionar-se a doença pulmonar supurativa crônica (fibrose cística); V- O sulco de Harrison ocorre em asma mal controlada e raquitismo.",o:["V, V, F, V, V","V, V, V, F, V","F, V, F, V, V","V, F, F, V, F"],a:0,e:"Apenas o item III é falso: crescimento deficiente DEVE ser visto como sinal de alerta."},
    {id:"m3q19",d:"moderado",q:"Sobre o exame cardiovascular em crianças, assinale a INCORRETA:",o:["Cianose central prolongada pode dar aparência pletórica por policitemia","Taquicardia fixa, sem variação, pode ser sinal de febre reumática","Pulso de volume fraco indica pressão de pulso reduzida (hipotensão/choque iminente)","Sopros de ejeção são raros na infância e devem acender alerta de preocupação","A hepatomegalia é sinal importante de insuficiência cardíaca em bebês","Na coarctação da aorta, os pulsos femorais são difíceis de palpar e os dos MMSS, fáceis"],a:3,e:"Os sopros inocentes (de ejeção/funcionais) são MUITO comuns na infância (até 50% das crianças) e nem sempre são preocupantes."},
    {id:"m3q20",d:"moderado",q:"Sobre o exame físico em crianças, assinale a INCORRETA:",o:["Hiperexpansão pulmonar na bronquiolite/asma pode deslocar fígado e baço, mimetizando hepato/esplenomegalia","Nádegas atrofiadas podem ser sinal de desnutrição ou doença celíaca","Massas fecais podem ser sentidas no quadrante abdominal inferior esquerdo","O aumento dos ruídos hidroaéreos indica íleo paralítico"],a:3,e:"O AUMENTO dos ruídos hidroaéreos ocorre na obstrução intestinal e na diarreia aguda; a AUSÊNCIA/diminuição é que sugere íleo paralítico ou peritonite."},
    {id:"m3q21",d:"moderado",q:"Sobre o exame genital em crianças, assinale a INCORRETA:",o:["O aumento do escroto pode dever-se a testículo aumentado, hidrocele ou hérnia inguinal","Óstio uretral fora da posição normal: epispádia (dorsal) ou hipospádia (ventral)","Em meninas, é necessário fazer exame interno e separar os lábios em todas as consultas","Testículos não descidos são um achado comum em prematuros"],a:2,e:"Em meninas NÃO se realiza exame interno de rotina; a avaliação é externa."},
    {id:"m3q22",d:"moderado",q:"Sobre achados do exame físico em crianças, assinale a INCORRETA:",o:["Ausência do reflexo vermelho ocorre em turvação corneana, catarata e retinoblastoma","Aumento do volume das panturrilhas pode indicar Distrofia de Duchenne ou condições miotônicas","Reflexos rápidos podem refletir ansiedade ou distúrbio piramidal","O aumento generalizado dos linfonodos é um achado normal e comum em crianças"],a:3,e:"O aumento generalizado de linfonodos deve disparar busca por infecção, inflamação ou neoplasia — não é considerado normal."},
    {id:"m3q23",d:"dificil",q:"Homem de 49 anos, etilista, com hematêmese, telangiectasias, eritema palmar, ginecomastia, circulação colateral porta e esplenomegalia. Hipótese e outro achado possível?",o:["Neoplasia pancreática – vesícula palpável","Colangite complicada – icterícia","Cirrose hepática – icterícia","Cirrose hepática – sinal de Courvoisier-Terrier"],a:2,e:"O quadro é de cirrose hepática; pode-se encontrar também icterícia, flapping e fetor hepaticus. A hematêmese decorre de varizes esofágicas."},
    {id:"m3q24",d:"moderado",q:"Marque a sequência correta (V/F) sobre icterícia: I- É preciso diferenciar icterícia de betacarotenemia (consumo de alimentos com pigmento amarelo); II- A betacarotenemia também acomete conjuntiva e frênulo lingual; III- A produção excessiva extra-hepática (hemólise) eleva a bilirrubina não conjugada; IV- A bilirrubina conjugada tem afinidade pelo SNC e risco de impregnar os núcleos da base; V- A hiperbilirrubinemia não conjugada é responsável pela colúria.",o:["V, F, V, F, F","V, V, F, F, V","F, V, V, F, F","V, F, F, V, V"],a:0,e:"Falsas: a betacarotenemia NÃO atinge conjuntiva/frênulo; quem tem afinidade pelo SNC é a bilirrubina NÃO conjugada; e a colúria é causada pela bilirrubina CONJUGADA."},
    {id:"m3q25",d:"dificil",q:"Mulher de 46 anos, multípara, obesa, com colúria, dor em hipocôndrio direito, febre de 38°C e icterícia. Hipóteses e sinal possível?",o:["Colecistite e Colangite – Sinal de Murphy","Colangite e Coledocolitíase – Sinal de Rovsing","Colecistite e Apendicite – Sinal de Blumberg","Coledocolitíase e Colangite – Sinal de Jobert"],a:0,e:"Tríade de Charcot (febre, dor em HD e icterícia) → colecistite evoluindo para colangite; o sinal de Murphy pode estar presente. Rovsing/Blumberg = apendicite; Jobert = pneumoperitônio."},
    {id:"m3q26",d:"moderado",q:"Marque a sequência correta (V/F) sobre icterícia: I- A deficiência de enzimas de conjugação ocorre na síndrome de Gilbert e na icterícia fisiológica do RN; II- Defeito no transporte até o hepatócito é a causa de icterícia por hemólise; III- Uma causa intrínseca de hiperbilirrubinemia conjugada é a neoplasia da papila ou do colédoco; IV- A bilirrubina indireta também é chamada de conjugada; V- A bilirrubina direta também é chamada de não conjugada.",o:["V, F, V, F, F","V, V, F, F, V","F, V, V, F, F","V, F, F, V, V"],a:0,e:"Falsas: a icterícia por hemólise é por produção excessiva (não defeito de transporte); a bilirrubina indireta é a NÃO conjugada e a direta é a conjugada."},
    {id:"m3q27",d:"facil",q:"Assinale a alternativa que compõe corretamente a Tríade de Charcot:",o:["Icterícia, febre e acolia","Febre, colúria e dor em hipocôndrio direito","Colúria, febre e icterícia","Dor abdominal, febre e icterícia"],a:3,e:"A Tríade de Charcot (colangite) = febre + dor em hipocôndrio direito (dor abdominal) + icterícia."},
    {id:"m3q28",d:"moderado",q:"Assinale o que for correto em relação à febre:",o:["O resultado da aferição não muda com o local em que é medido","A temperatura oral é considerada padrão-ouro pela literatura","A temperatura retal é 0,4°C menor e a axilar 0,4-1°C maior que a oral","A temperatura axilar de 37,5°C é considerada febre"],a:1,e:"A temperatura oral é o padrão-ouro. O resultado MUDA com o local (retal ~0,4°C maior e axilar ~0,4-1°C menor que a oral); considera-se febre axilar acima de 37,5°C."},
    {id:"m3q29",d:"moderado",q:"Sobre a diferença entre hipertermia e febre, assinale a CORRETA:",o:["Na hipertermia, diferente da febre, há alteração do set point","Há evidência de que devemos sempre tratar a febre com antitérmico fixo","A hipertermia pode ser fatal, não responde a antipiréticos e precisa de tratamento vigoroso","A febre de origem obscura dura pelo menos 3 dias, com diagnóstico incerto após 1 semana"],a:2,e:"A hipertermia NÃO altera o set point, não responde a antipiréticos e pode ser fatal. A febre não exige antitérmico fixo; a febre de origem obscura dura pelo menos 3 SEMANAS."},
    {id:"m3q30",d:"dificil",q:"Mulher de 47 anos, 6h confinada costurando em dia de sensação térmica de 50°C, com sonolência e Tax 40°C; após retirada do local e dipirona EV, em 30 min a Tax era 38°C. Assinale a CORRETA:",o:["Febre por processo infeccioso, necessitando de mais exames","Hipertermia, melhorou por ter saído do confinamento, mas precisa de mais medidas (pode ser fatal)","Hipertermia, melhorou com o antipirético, mas precisa de mais medidas","Febre, podendo ter tremores/calafrios e extremidades frias, sem necessidade de intervenção"],a:1,e:"Exposição a calor extremo + sonolência + 40°C = hipertermia; a melhora veio de retirá-la do confinamento (o antipirético não atua eficazmente na hipertermia). Requer medidas vigorosas, pois pode ser fatal."},
    {id:"m3q35",d:"moderado",q:"Qual o sinal de hipertimpanismo na região hepática que indica pneumoperitônio?",o:["Sinal de Giordano","Sinal de Jobert","Sinal de Murphy","Sinal de Chilaiditi"],a:1,e:"O sinal de Jobert é o timpanismo (perda da macicez) na região hepática, indicando pneumoperitônio."},
    {id:"m3q36",d:"moderado",q:"Quais sinais podem estar positivos na apendicite?",o:["Murphy, Psoas, Obturador e Giordano","Psoas, Obturador, Rovsing e Blumberg","Murphy, Rovsing, Blumberg e Psoas","Courvoisier-Terrier, Psoas, Obturador e Rovsing"],a:1,e:"Na apendicite: Psoas, Obturador, Rovsing e Blumberg. Murphy = vesícula; Giordano = punho-percussão lombar; Courvoisier-Terrier = vesícula palpável indolor."},
    {id:"m3q39",d:"moderado",q:"Sobre a semiologia do aparelho auditivo, assinale a INCORRETA:",o:["Sensação de rotação ou falsa sensação de movimento sugere vertigem","Na vertigem periférica o nistagmo é frequente; na central é diminuído ou ausente","A manobra de Dix-Hallpike (rotação de 45° da cabeça e deitar o tronco bruscamente) é positiva se houver nistagmo com vertigem","A otite média geralmente não está associada a outras infecções respiratórias"],a:3,e:"A otite média costuma estar ASSOCIADA a infecções respiratórias (ex.: IVAS)."},
    {id:"m3q40",d:"moderado",q:"Sobre o nariz e os seios paranasais, assinale a INCORRETA:",o:["A rinossinusite aguda cursa com obstrução, rinorreia, dor/pressão facial e redução do olfato por 5 dias a 4 semanas","Pode haver dor à palpação dos seios, hiperemia da parede posterior e secreção no meato médio","São causas SISTÊMICAS de epistaxe: traumas, desvio de septo, inflamação, corpo estranho, miíase e fármacos","A rinite é inflamação da mucosa nasal com hiperirritabilidade, espirros, obstrução, prurido e hipersecreção"],a:2,e:"Traumas, desvio de septo, corpo estranho e miíase são causas LOCAIS de epistaxe; as sistêmicas incluem HAS, discrasias sanguíneas e anticoagulantes."},
    {id:"m3q41",d:"dificil",q:"Marque a sequência (V/F) sobre o aparelho reprodutor masculino: I- A gota matinal ocorre por prostatite e uretrite não gonocócica/traumática; II- Hemospermia é sangue no esperma, com causas variadas; III- Priapismo é a dificuldade de manter a ereção mesmo com desejo; IV- A causa mais comum de retenção urinária é a HPB; V- A impotência psicogênica é gradual, persistente e não circunstancial; VI- A dispareunia é dor durante ou após o ato sexual.",o:["V, V, F, V, F, V","V, F, V, F, V, F","F, V, V, F, V, V","V, V, V, F, F, V"],a:0,e:"Falsas: priapismo é ereção persistente e dolorosa SEM desejo (III); a impotência psicogênica é súbita e circunstancial, sendo a orgânica a gradual/persistente (V invertido)."},
    {id:"m3q43",d:"dificil",q:"Marque a sequência (V/F) sobre o aparelho reprodutor feminino: I- A menarca varia de 9 a 16 anos, intervalo de 24-32 dias e fluxo de 3-7 dias; II- A dismenorreia é a dor durante o ato sexual; III- A amenorreia tem como causas frequentes a fisiológica, SOP, hipotalâmicas e obesidade; IV- No sangramento uterino anormal é desnecessário afastar gravidez; V- O climatério cursa com fogachos, alterações de humor e do sono, queda de libido; VI- A vaginose bacteriana é uma IST.",o:["V, F, V, F, V, F","V, V, F, F, V, F","F, V, V, V, F, V","V, F, F, V, V, F"],a:0,e:"Falsas: dismenorreia é dor na MENSTRUAÇÃO (II); no sangramento uterino anormal É necessário afastar gravidez (IV); a vaginose bacteriana NÃO é IST (VI)."},
    {id:"m3q44",d:"moderado",q:"Assinale a alternativa INCORRETA:",o:["Gravidez, DM descompensado, obesidade, ACO de alta dosagem e imunossupressão predispõem à candidíase vaginal","A candidíase causa muito prurido e secreção branco-acinzentada leitosa, sendo causada por fungo ausente da nossa microbiota","A infecção por Trichomonas vaginalis (IST) causa aspecto de framboesa e corrimento amarelado abundante","A cervicite é assintomática na maioria dos casos; agentes: N. gonorrhoeae, C. trachomatis, Ureaplasma"],a:1,e:"A Candida FAZ PARTE da microbiota normal; a candidíase resulta de seu crescimento excessivo, não de infecção por fungo ausente."},
    {id:"m3q46",d:"moderado",q:"Sobre a dispneia, assinale a INCORRETA:",o:["A trepopneia é dispneia em decúbito lateral, com decúbito preferencial (ex.: derrame pleural)","A ortopneia é dispneia em posição ortostática (em pé)","A dispneia paroxística noturna ocorre na insuficiência cardíaca mais avançada","A bendopneia é a piora da dispneia ao inclinar o tronco para frente (ex.: amarrar o calçado)"],a:1,e:"A ortopneia é dispneia em DECÚBITO (deitado). A dispneia em pé/ortostática é a platipneia."},
    {id:"m3q47",d:"facil",q:"Paciente que sente dispneia após andar ~100 metros ou alguns minutos no plano e precisa parar para respirar enquadra-se em qual grau mMRC?",o:["1","2","3","4","0"],a:2,e:"Parar após ~100 metros ou poucos minutos no plano corresponde ao grau 3 da mMRC."},
    {id:"m3q48",d:"moderado",q:"Sobre a tosse, assinale a CORRETA:",o:["Sempre que possível, devemos sedar a tosse","A presença apenas de tosse seca descarta a possibilidade de asma","A doença do refluxo gastroesofágico pode cursar com tosse","O uso de BRA pode dar tosse e por isso devem ser substituídos por IECA"],a:2,e:"A DRGE pode causar tosse. Não se deve sedar a tosse (mecanismo de defesa); a tosse seca pode ser a única manifestação de asma; e quem causa tosse é o IECA (substituído por BRA)."},
    {id:"m3q49",d:"moderado",q:"Assinale a alternativa INCORRETA sobre hemoptise:",o:["O aspecto achocolatado é característico de expectoração causada por anaeróbios","Os diagnósticos diferenciais de hemoptise são a epistaxe e a hematêmese","Na hemoptise maciça (>600 ml em 24h) é preciso intubar, suplementar O2 e sedar a tosse","Infecções, bronquiectasias, neoplasias, vasculites e TEP podem causar hemoptise"],a:0,e:"A expectoração achocolatada é típica de bacilos gram-negativos; a de anaeróbios é pútrida e muito fétida."},
    {id:"m3q50",d:"dificil",q:"Marque a sequência (V/F) sobre perfusão x ventilação e cianose: I- A cianose central decorre da diminuição da saturação de O2 arterial; II- Um exemplo de cianose central é o shunt direito-esquerdo; III- A cianose periférica por estase venosa é percebida em mucosas e de forma generalizada; IV- A zona de espaço morto tem perfusão mas não ventilação, como no TEP; V- No shunt real há perfusão mas nenhuma ventilação, como na atelectasia; VI- A hipercapnia é causada pela diminuição do CO2 circulante.",o:["V, V, F, F, V, F","V, F, V, F, V, F","F, V, V, F, F, V","V, V, F, V, F, V"],a:0,e:"Falsas: a cianose periférica aparece em extremidades (III); o espaço morto tem VENTILAÇÃO sem perfusão — o TEP (IV); e a hipercapnia decorre do AUMENTO do CO2 (VI)."},
    {id:"m3q51",d:"moderado",q:"Homem de 58 anos com dor precordial em queimação, ~5 min, desencadeada por esforço e que melhora com repouso/nitrato sublingual. Provável diagnóstico?",o:["Angina instável","Angina estável","IAM sem supra de ST","Angina de Prinzmetal"],a:1,e:"Dor precordial breve, desencadeada por esforço e que melhora com repouso e nitrato = angina estável."},
    {id:"m3q52",d:"dificil",q:"Mulher de 60 anos com punho fechado sobre o esterno, dor em repouso irradiando para o braço esquerdo, em aperto, há 30 min, com vômitos e sudorese; ECG com supra de ST. Sinal, diagnóstico e lesão?",o:["Sinal de Homans, angina instável, lesão subendocárdica","Sinal de Levine, angina estável, lesão transmural","Sinal de Trousseau, IAM com supra de ST, lesão subendocárdica","Sinal de Levine, IAM com supra de ST, lesão transmural"],a:3,e:"Punho fechado sobre o esterno = sinal de Levine; dor em repouso com supra de ST = IAM com supradesnivelamento (oclusão total → lesão transmural)."},
    {id:"m3q53",d:"moderado",q:"Homem de 58 anos, agitado, com dor lancinante retroesternal súbita, muito intensa, irradiando para o dorso, e assimetria de pulsos. Hipótese principal?",o:["IAM com supra de ST","Dissecção aórtica – tipo A quando há a ascendente envolvida","Dissecção aórtica – tipo B quando há a ascendente envolvida","Pericardite"],a:1,e:"Dor lancinante retroesternal súbita, irradiando para o dorso, com assimetria de pulsos = dissecção aórtica. Stanford A = aorta ascendente envolvida; B = apenas descendente."},
    {id:"m3q54",d:"dificil",q:"Sobre diagnósticos diferenciais de dor torácica, assinale a CORRETA:",o:["Na pericardite o paciente melhora ao deitar em decúbito dorsal","O herpes-zóster é intenso, diferencial de infarto, mais prolongado e respeita um dermátomo","No TEP não faz parte da clínica a dor ventilatório-dependente associada a dispneia","A dor do pneumotórax é súbita, lateralizada, com macicez à percussão"],a:1,e:"O herpes-zóster respeita um dermátomo e é diferencial de IAM. Na pericardite a dor PIORA ao deitar; no TEP há dor ventilatório-dependente; no pneumotórax há HIPERtimpanismo (não macicez)."},
    {id:"m3q55",d:"moderado",q:"Sobre as formas de dor torácica, assinale a INCORRETA:",o:["A dor epigástrica em queimação ligada à alimentação aponta para origem gastroesofágica","A dor osteomuscular melhora com o movimento e é reprodutível à palpação","A dor psicogênica é variável e tem relação com patologias psiquiátricas","Dor em cólica no hipocôndrio direito e dor intensa em faixa indicam, respectivamente, doença biliar e pancreatite"],a:1,e:"A dor osteomuscular PIORA com o movimento e melhora com o repouso (ainda que seja reprodutível à palpação)."},
    {id:"m3q56",d:"moderado",q:"Mulher de 59 anos, diabética, hipertensa, com IAM prévio, refere edema vespertino de MMII, despertar noturno com falta de ar e fadiga aos esforços. Hipótese e achado provável?",o:["Insuficiência renal – edema periorbitário","Insuficiência hepática – sinal do cacifo","Insuficiência cardíaca – turgência de jugulares","Insuficiência pulmonar – baqueteamento digital"],a:2,e:"Edema vespertino de MMII + dispneia paroxística noturna + fadiga em pós-IAM/HAS = insuficiência cardíaca; a turgência jogular é achado clássico (represamento venoso)."}
   ]},

  mon2:{ name:"Monitoria 2 — Guia de Semiologia", doc:"Monitorias 2",
   summary:`## Monitoria 2 — Guia Completo de Semiologia\nGuia elaborado para revisão de **Semiologia** (2018, FAMED/FURG), cobrindo exame físico geral, aparelhos cardiovascular, respiratório, abdominal, renal e neurológico, além de síndromes clínicas essenciais.`,
   tips:"Memorize as tríades (Charcot, Beck, Reynolds) e diferenças entre edemas (cardíaco, renal, hepático). Revise sinais de irritação peritoneal e meníngea.",
   questions:[
