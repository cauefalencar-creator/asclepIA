<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#b14bf0" />
<title>asclepIA — Estudos em Medicina</title>
<link rel="icon" href="icone_app.png" type="image/png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="asclepIA" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="application-name" content="asclepIA" />
<link rel="apple-touch-icon" href="icone_app.png" />
<style>
  :root{
    --ink:#1c1c28; --muted:#5d5d70; --line:rgba(255,255,255,.35);
    --glass:rgba(255,255,255,.16); --glass-strong:rgba(255,255,255,.82);
    --card:rgba(255,255,255,.78); --radius:24px;
    --green:#28b463; --green-bg:#e8f8ee; --red:#e23b3b; --red-bg:#fdecec;
    --shadow:0 10px 34px rgba(40,20,60,.16); --shadow-sm:0 4px 16px rgba(40,20,60,.12);
    --grad:linear-gradient(120deg,#ff4d9d 0%,#b14bf0 38%,#36c6d8 70%,#ffb03a 100%);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);color:var(--ink);line-height:1.5;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:-2;background:
    radial-gradient(120% 120% at 0% 0%, #ff2d87 0%, rgba(255,45,135,0) 46%),
    radial-gradient(120% 120% at 100% 2%, #a64bf4 0%, rgba(166,75,244,0) 50%),
    radial-gradient(115% 120% at 100% 52%, #2bd1d6 0%, rgba(43,209,214,0) 55%),
    radial-gradient(130% 130% at 0% 100%, #ffd23f 0%, rgba(255,210,63,0) 56%),
    radial-gradient(120% 120% at 62% 105%, #ff8a3d 0%, rgba(255,138,61,0) 50%),
    linear-gradient(135deg,#ff4d9d 0%,#b14bf0 36%,#36c6d8 68%,#ffb03a 100%);
    background-size:cover}
  body::after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(140% 120% at 50% -10%,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
  h1,h2,h3,h4{margin:0 0 .4em;font-weight:700;letter-spacing:-.02em}
  a{color:inherit}
  button{font-family:inherit}
  ::selection{background:rgba(177,75,240,.3)}

  /* ---------- Layout ---------- */
  .app{display:grid;grid-template-columns:268px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;padding:22px 16px;display:flex;flex-direction:column;gap:6px;
    background:rgba(255,255,255,.12);backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);
    border-right:1px solid var(--line);overflow-y:auto}
  .brand{display:flex;align-items:center;gap:12px;padding:6px 10px 18px}
  .brand .logo{width:42px;height:42px;border-radius:13px;overflow:hidden;display:grid;place-items:center;box-shadow:var(--shadow-sm)}
  .brand .logo img{width:100%;height:100%;object-fit:cover}
  .brand .name{font-weight:800;font-size:22px;letter-spacing:-.03em;color:#fff;text-shadow:0 1px 10px rgba(80,20,90,.25)}
  .brand .name b{font-weight:800}
  .brand .tag{font-size:11px;color:rgba(255,255,255,.85);font-weight:600;letter-spacing:.02em}
  .navbtn{display:flex;align-items:center;gap:13px;width:100%;text-align:left;border:0;cursor:pointer;
    padding:12px 14px;border-radius:15px;background:transparent;color:#fff;font-size:15px;font-weight:600;transition:.18s;text-shadow:0 1px 6px rgba(70,20,80,.18)}
  .navbtn .ic{width:22px;height:22px;flex:0 0 22px;opacity:.95}
  .navbtn:hover{background:rgba(255,255,255,.16)}
  .navbtn.active{background:rgba(255,255,255,.92);color:#3a1d52;text-shadow:none;box-shadow:var(--shadow-sm)}
  .navbtn.active .ic{opacity:1}
  .side-foot{padding:12px 12px 4px;color:rgba(255,255,255,.78);font-size:11px;line-height:1.4}
  .scrim{position:fixed;inset:0;background:rgba(20,8,30,.4);z-index:55;display:none}
  .scrim.show{display:block}

  .main{min-width:0;padding:30px 34px 90px;max-width:1180px}
  .topbar{display:none}
  .view{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .page-head{margin-bottom:22px}
  .page-head h1{font-size:30px;color:#fff;text-shadow:0 2px 14px rgba(70,20,80,.22)}
  .page-head p{margin:0;color:rgba(255,255,255,.92);font-weight:500;max-width:70ch;text-shadow:0 1px 8px rgba(70,20,80,.18)}

  /* ---------- Cards / glass ---------- */
  .card{background:var(--card);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);
    border:1px solid rgba(255,255,255,.6);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
  .grid{display:grid;gap:18px}
  .g-2{grid-template-columns:repeat(2,1fr)}
  .g-3{grid-template-columns:repeat(3,1fr)}
  .g-4{grid-template-columns:repeat(4,1fr)}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .v{font-size:30px;font-weight:800;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat .l{font-size:13px;color:var(--muted);font-weight:600}
  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid transparent}
  .pill.facil{background:#e8f8ee;color:#1d8b4e;border-color:#bfe9cf}
  .pill.moderado{background:#fff3e0;color:#c97a12;border-color:#ffe1b0}
  .pill.dificil{background:#fdecec;color:#c0392b;border-color:#f7c9c4}
  .pill.ghost{background:rgba(255,255,255,.6);color:var(--muted);border-color:rgba(0,0,0,.06)}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;font-weight:700;font-size:15px;
    padding:13px 20px;border-radius:15px;background:rgba(255,255,255,.7);color:var(--ink);transition:.16s;box-shadow:var(--shadow-sm)}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:var(--grad);color:#fff}
  .btn.dark{background:#2a1840;color:#fff}
  .btn.ghost{background:rgba(255,255,255,.5);box-shadow:none;border:1px solid rgba(0,0,0,.07)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .btn.sm{padding:9px 14px;font-size:13.5px;border-radius:12px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .between{justify-content:space-between}

  /* ---------- Tree / browse ---------- */
  .crumbs{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;color:#fff;font-weight:600;text-shadow:0 1px 8px rgba(70,20,80,.2)}
  .crumbs button{background:rgba(255,255,255,.78);border:0;color:#3a1d52;padding:7px 13px;border-radius:11px;font-weight:700;cursor:pointer;font-size:13.5px}
  .crumbs span.sep{opacity:.8}
  .tilegrid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .tile{position:relative;text-align:left;cursor:pointer;border:1px solid rgba(255,255,255,.6);border-radius:20px;padding:20px;
    background:var(--card);box-shadow:var(--shadow-sm);transition:.18s;display:flex;flex-direction:column;gap:8px;min-height:120px}
  .tile:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .tile .ttl{font-weight:800;font-size:17px;letter-spacing:-.02em}
  .tile .sub{font-size:13px;color:var(--muted);font-weight:500}
  .tile .badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:800;color:#fff;background:var(--grad);padding:3px 9px;border-radius:999px}
  .tile .ico{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,rgba(177,75,240,.16),rgba(54,198,216,.16));display:grid;place-items:center;font-size:20px}
  .tile.add{align-items:center;justify-content:center;text-align:center;border-style:dashed;background:rgba(255,255,255,.45);color:#3a1d52}
  .tile.add .ico{background:rgba(255,255,255,.6)}
  .tile.locked{opacity:.6}
  .tile-wrap{position:relative;display:block}
  .tile-wrap .tile{width:100%;box-sizing:border-box}
  .tile-menu{position:absolute;top:12px;right:12px;z-index:10;width:30px;height:30px;display:grid;place-items:center;background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.08);border-radius:9px;font-size:17px;cursor:pointer;color:#3a1d52;padding:0;line-height:1}
  .tile-menu:hover{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  .tile.today{border-color:rgba(40,180,99,.55);background:linear-gradient(135deg,rgba(40,180,99,.14),rgba(255,255,255,.8))}
  .tile.today .badge{background:var(--green)}
  .empty{padding:40px;text-align:center;color:var(--muted)}

  /* ---------- Quiz ---------- */
  .quizwrap{max-width:780px;margin:0 auto}
  .qprog{height:10px;border-radius:999px;background:rgba(255,255,255,.45);overflow:hidden;margin-bottom:6px}
  .qprog>i{display:block;height:100%;background:var(--grad);width:0;transition:width .4s}
  .qmeta{display:flex;justify-content:space-between;color:#fff;font-weight:600;font-size:13px;margin-bottom:14px;text-shadow:0 1px 8px rgba(70,20,80,.2)}
  .qcard{padding:26px}
  .qtext{font-size:20px;font-weight:700;letter-spacing:-.02em;margin:6px 0 20px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;gap:13px;align-items:flex-start;text-align:left;cursor:pointer;border:1.5px solid rgba(0,0,0,.08);background:rgba(255,255,255,.66);
    border-radius:15px;padding:15px 16px;font-size:15.5px;font-weight:500;transition:.16s;width:100%}
  .opt:hover:not(.done){border-color:rgba(177,75,240,.5);background:#fff}
  .opt .key{flex:0 0 27px;height:27px;border-radius:8px;background:rgba(0,0,0,.06);display:grid;place-items:center;font-weight:800;font-size:14px;transition:.16s}
  .opt.correct{background:var(--green-bg);border-color:var(--green);color:#176b3a}
  .opt.correct .key{background:var(--green);color:#fff}
  .opt.wrong{background:var(--red-bg);border-color:var(--red);color:#a52121}
  .opt.wrong .key{background:var(--red);color:#fff}
  .opt.done{cursor:default}
  .opt.dim{opacity:.55}
  .explain{margin-top:18px;padding:15px 17px;border-radius:14px;background:linear-gradient(135deg,rgba(177,75,240,.1),rgba(54,198,216,.1));
    border:1px solid rgba(177,75,240,.18);font-size:14.5px;animation:fade .3s}
  .explain b{color:#7322a8}
  .qbar{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
  .qbar .spacer{flex:1}

  /* ---------- Report ---------- */
  .score-ring{display:grid;place-items:center;position:relative}
  .score-ring .pct{position:absolute;text-align:center}
  .score-ring .pct b{font-size:34px;font-weight:800;display:block;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .missed{border-left:3px solid var(--red);padding:12px 14px;border-radius:0 12px 12px 0;background:rgba(255,255,255,.55);margin-bottom:10px}
  .missed .q{font-weight:700;font-size:14.5px}
  .missed .a{font-size:13.5px;color:var(--muted);margin-top:4px}
  .missed .a b{color:#176b3a}

  /* ---------- Resumo ---------- */
  .summary{max-width:820px}
  .summary h2{font-size:22px;margin-top:26px}
  .summary h3{font-size:17px;margin-top:20px;color:#7322a8}
  .summary p{margin:.5em 0}
  .summary ul{margin:.4em 0;padding-left:22px}
  .summary li{margin:.28em 0}
  .summary .lead{font-size:16px;color:var(--muted)}

  /* ---------- Charts ---------- */
  .bar-row{display:flex;align-items:center;gap:12px;margin:9px 0}
  .bar-row .lab{flex:0 0 132px;font-size:13px;font-weight:600;text-align:right;color:var(--ink)}
  .bar-track{flex:1;height:22px;border-radius:999px;background:rgba(0,0,0,.06);overflow:hidden}
  .bar-fill{height:100%;border-radius:999px;background:var(--grad);transition:width .6s}
  .bar-val{flex:0 0 56px;font-size:12.5px;font-weight:700;color:var(--muted)}
  .week{display:flex;gap:10px;align-items:flex-end;height:160px;padding-top:10px}
  .week .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .week .col{width:100%;max-width:38px;border-radius:10px 10px 4px 4px;background:var(--grad);min-height:4px;transition:height .6s}
  .week .dl{font-size:11px;font-weight:700;color:var(--muted)}
  .week .dv{font-size:11px;font-weight:700;color:var(--ink)}

  /* ---------- Forms / modal ---------- */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:13px;font-weight:700;color:var(--ink)}
  .input,select.input{width:100%;padding:12px 14px;border-radius:13px;border:1.5px solid rgba(0,0,0,.1);background:rgba(255,255,255,.85);font-size:15px;font-family:inherit}
  .input:focus{outline:none;border-color:rgba(177,75,240,.6)}
  .modal-bg{position:fixed;inset:0;background:rgba(30,12,45,.45);backdrop-filter:blur(4px);display:none;place-items:center;z-index:50;padding:18px}
  .modal-bg.show{display:grid;animation:fade .2s}
  .modal{width:min(460px,100%);background:var(--glass-strong);backdrop-filter:blur(26px);border:1px solid rgba(255,255,255,.6);border-radius:24px;box-shadow:var(--shadow);padding:24px}
  .modal h3{font-size:20px}
  .drop{border:2px dashed rgba(177,75,240,.4);border-radius:18px;padding:30px;text-align:center;background:rgba(255,255,255,.5);cursor:pointer;transition:.16s}
  .drop:hover,.drop.over{background:rgba(255,255,255,.78);border-color:rgba(177,75,240,.8)}
  .doc-item{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:14px;background:rgba(255,255,255,.6);margin-bottom:9px}
  .doc-item .di{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,rgba(255,77,157,.16),rgba(54,198,216,.16));display:grid;place-items:center;font-size:18px}
  .doc-item .dn{font-weight:700;font-size:14.5px;word-break:break-word}
  .doc-item .dm{font-size:12px;color:var(--muted)}
  .info-banner{display:flex;gap:13px;padding:15px 17px;border-radius:16px;background:linear-gradient(135deg,rgba(54,198,216,.14),rgba(177,75,240,.12));border:1px solid rgba(177,75,240,.2);margin-bottom:18px;font-size:14px}
  .info-banner .ib{font-size:22px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#2a1840;color:#fff;padding:13px 22px;border-radius:14px;font-weight:600;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Perfil / Login ---------- */
  body.guest .sidebar, body.guest .mobnav, body.guest .topbar{display:none!important}
  body.guest .main{padding:0;max-width:100%}
  body.guest .app{grid-template-columns:1fr}
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{width:min(440px,100%);text-align:center}
  .login-logo{width:90px;height:90px;border-radius:24px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:var(--shadow-sm)}
  .login-logo img{width:100%;height:100%;object-fit:cover}
  .profile-chip{margin-top:auto;padding-top:10px}
  .pchip-btn{display:flex;align-items:center;gap:10px;width:100%;border:1px solid var(--line);cursor:pointer;background:rgba(255,255,255,.16);border-radius:14px;padding:8px 10px;color:#fff;text-align:left;transition:.16s}
  .pchip-btn:hover{background:rgba(255,255,255,.28)}
  .pavatar{width:34px;height:34px;border-radius:50%;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:800;flex:0 0 34px}
  .pinfo{display:flex;flex-direction:column;min-width:0;flex:1;overflow:hidden}
  .pname{font-weight:700;font-size:13px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pmail{font-size:11px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcog{opacity:.85;font-weight:800}

  /* ---------- Mobile ---------- */
  .mobnav{display:none}
  .hamb{display:none}
  @media(max-width:900px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;width:280px;z-index:60;transform:translateX(-104%);transition:transform .3s;box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .main{padding:16px 16px 96px;max-width:100%}
    .topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;margin:-16px -16px 14px;padding:12px 16px;
      background:rgba(255,255,255,.16);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
    .topbar .name{font-weight:800;font-size:19px;color:#fff;letter-spacing:-.03em;text-shadow:0 1px 8px rgba(70,20,80,.25)}
    .hamb{display:grid;place-items:center;width:42px;height:42px;border-radius:12px;border:0;background:rgba(255,255,255,.85);cursor:pointer}
    .page-head h1{font-size:24px}
    .g-2,.g-3,.g-4{grid-template-columns:1fr}
    .g-4.stats4{grid-template-columns:1fr 1fr}
    .bar-row .lab{flex-basis:96px}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:45;padding:8px 6px calc(8px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.7);backdrop-filter:blur(24px) saturate(150%);border-top:1px solid rgba(255,255,255,.5)}
    .mobnav button{flex:1;border:0;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:5px 2px;color:#6a4a82;font-size:10.5px;font-weight:700;border-radius:12px}
    .mobnav button.active{color:#b14bf0}
    .mobnav .ic{width:23px;height:23px}
    .qtext{font-size:18px}
    .quizwrap{max-width:100%}
  }
  @media(max-width:380px){ .g-4.stats4{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo"><img src="icone_app.png" alt="asclepIA"></div>
      <div>
        <img src="escrita.png" alt="asclepIA" style="height:61px;object-fit:contain;display:block;margin-bottom:2px">
        <div class="tag">ESTUDOS EM MEDICINA</div>
      </div>
    </div>
    <button class="navbtn active" data-nav="inicio">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      Início
    </button>
    <button class="navbtn" data-nav="quizzes">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M21 12a9 9 0 1 1-6-8.5"/></svg>
      Quizzes
    </button>
    <button class="navbtn" data-nav="resumos">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12l4 4v12H4z"/><path d="M8 9h7M8 13h8M8 17h5"/></svg>
      Resumos
    </button>
    <button class="navbtn" data-nav="documentos">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 16v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3"/></svg>
      Envio de documentos
    </button>
    <button class="navbtn" data-nav="desempenho">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      Desempenho
    </button>
    <button class="navbtn" data-nav="historico">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      Histórico
    </button>
    <div id="profileChip" class="profile-chip"></div>
    <div class="side-foot">
      Seus dados de estudo ficam salvos neste dispositivo. Os conteúdos (resumos e questões) acompanham o arquivo e podem ser abertos em qualquer computador ou celular.
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- Main -->

  anamnese:{ name:"Princípios de Anamnese", doc:"01. Princípios de Anamnese",
   summary:`## Princípios de Anamnese
**A anamnese é a base do raciocínio clínico:** orienta as hipóteses diagnósticas e direciona o exame físico. Deve ser adaptada ao contexto (ambulatório, hospital, urgência) e buscar um relato completo e cronológico.

### Estrutura da anamnese
- **Identificação** — nome, idade, sexo biológico/gênero, cor, estado civil, profissão, naturalidade, procedência, religião.
- **Queixa principal (QP)** — registrar com as palavras do paciente + tempo de evolução.
- **História da doença atual (HDA)** — relato cronológico a partir do sintoma principal.
- **História pregressa da doença atual (HPDA)**.
- **Antecedentes pessoais e familiares**.
- **Revisão de sistemas**, **lista de problemas** e **impressão/avaliação**.

### Caracterização do sintoma — os 8 dados
Localização · características · quantidade/intensidade · cronologia (início, duração, frequência) · situação em que ocorre · irradiação · fatores de alívio e agravo · manifestações associadas.

### Hábitos: tabagismo e etilismo
- **Carga tabágica (anos-maço)** = (nº de cigarros/dia ÷ 20) × anos de uso.
- **Etilismo de risco**: >20 g/dia (mulheres) e >30 g/dia (homens); ou >14 doses/sem (M) e >21 (H).
- **Binge drinking**: >4 doses (M) ou >5 doses (H) em ~2 horas.

### Impressão diagnóstica
Diagnóstico **sindrômico** (ex.: síndrome ictérica), **etiológico** (ex.: hepatite viral) e **topográfico** (ex.: úlcera duodenal).`,

    {id:"an15",d:"facil",q:"Na anamnese, o relato deve ser idealmente:",o:["Resumido a uma frase","Completo e cronológico","Apenas com hipóteses do médico","Baseado só em exames"],a:1,e:"Busca-se um relato completo e cronológico dos eventos."},
    {id:"an16",d:"moderado",q:"Ao registrar a queixa principal, é essencial incluir:",o:["O diagnóstico final","O sintoma principal e seu tempo de evolução","A lista de medicações","Os antecedentes familiares"],a:1,e:"A QP traz o sintoma (nas palavras do paciente) e o tempo de evolução."},

    {id:"an21",d:"moderado",q:"A história obstétrica é registrada:",o:["Em todos os pacientes","Nas mulheres","Apenas em crianças","Apenas em idosos"],a:1,e:"A história obstétrica faz parte dos antecedentes pessoais nas mulheres."},

  digestorio:{ name:"Anamnese do Sistema Digestório", doc:"04. Anamnese Sistema Digestório",
   summary:`## Interrogatório do Sistema Digestório
Avalia desde a região bucomaxilofacial até o ânus, incluindo fígado, vias biliares e pâncreas.

### Esôfago
- **Disfagia**: orofaríngea × esofágica; para sólidos × sólidos+líquidos; progressiva × intermitente. Disfagia **progressiva para sólidos** sugere causa **mecânica/obstrutiva**.
- **Pirose** (queimação retroesternal), **odinofagia**, **regurgitação** (DD com ruminação).

### Estômago
- **Dispepsia**: plenitude pós-prandial, saciedade precoce, epigastralgia, queimação. DD com litíase biliar, pancreatite, IAM.
- Náuseas/vômitos: avaliar horário, conteúdo e relação com refeições.

### Intestinos e cólon
- **Intestino delgado**: diarreia de grande volume, esteatorreia, dor difusa, distensão.
- **Cólon**: diarreia com elementos patológicos, **tenesmo** (vontade intensa de evacuar com esvaziamento incompleto), constipação, hematoquezia.
- **Escala de Bristol**: tipo 1 (cíbalos = constipação grave) → tipo 7 (líquido = diarreia grave); tipos 3–4 são normais.

### Fígado, vias biliares e pâncreas
- **Fígado/vias biliares**: dor em hipocôndrio direito, **icterícia, colúria e acolia fecal**.
- **Pâncreas**: dor epigástrica **com irradiação para o dorso**; esteatorreia (insuficiência exócrina); distúrbios da glicose (insuficiência endócrina).

### Hemorragia digestiva
- **Hematêmese** (vômito de sangue), **melena** (fezes enegrecidas — sangue digerido, hemorragia alta), **enterorragia/hematoquezia** (sangue vivo, baixa).`,
   tips:"Associe cada sintoma ao órgão: dor irradiada para o dorso → pâncreas; icterícia+colúria+acolia → vias biliares; melena → hemorragia digestiva alta.",

    {id:"di6",d:"facil",q:"A tríade icterícia + colúria + acolia fecal localiza o problema em:",o:["Estômago","Fígado e vias biliares","Intestino delgado","Apêndice"],a:1,e:"Esses sinais indicam alteração no metabolismo/excreção da bilirrubina — fígado e vias biliares."},

    {id:"di8",d:"dificil",q:"A halitose pode ter causas:",o:["Exclusivamente dentárias","Dentárias, digestivas, respiratórias e metabólicas","Apenas digestivas","Sempre psicológicas"],a:1,e:"As causas de halitose são variadas: dentárias, digestivas, respiratórias e metabólicas."},

    {id:"di10",d:"moderado",q:"A disfagia orofaríngea (alta) caracteriza-se por:",o:["Dificuldade de iniciar a deglutição, com engasgo","Sensação de parada do alimento no tórax","Queimação retroesternal","Dor abdominal difusa"],a:0,e:"A disfagia orofaríngea dificulta iniciar a deglutição (tosse/engasgo); a esofágica dá sensação de parada do alimento."},

    {id:"di15",d:"moderado",q:"Plenitude pós-prandial e saciedade precoce caracterizam:",o:["Dispepsia (estômago)","Disfagia esofágica","Tenesmo retal","Cólica biliar"],a:0,e:"São sintomas dispépticos relacionados ao estômago."},
    {id:"di16",d:"facil",q:"Colúria é:",o:["Fezes esbranquiçadas","Urina escura por bilirrubina","Sangue na urina","Urina espumosa"],a:1,e:"Colúria é a urina escura pela presença de bilirrubina direta."},
    {id:"di17",d:"dificil",q:"O tenesmo sugere acometimento de:",o:["Esôfago","Estômago","Reto / inflamação aguda","Pâncreas"],a:2,e:"O tenesmo relaciona-se a doenças do reto e à inflamação aguda."},
    {id:"di18",d:"moderado",q:"Na escala de Bristol, os tipos 3 e 4 indicam:",o:["Constipação grave","Fezes normais","Diarreia leve","Diarreia grave"],a:1,e:"Tipos 3 e 4 (em salsicha com fissuras / lisa e macia) representam fezes normais."},
    {id:"di19",d:"facil",q:"Disfagia é:",o:["Dor para evacuar","Dificuldade de deglutição","Queimação retroesternal","Vômito com sangue"],a:1,e:"Disfagia é a dificuldade de engolir."},
    {id:"di20",d:"moderado",q:"Afagia significa:",o:["Falta de apetite","Incapacidade total de deglutir","Excesso de fome","Dor de garganta"],a:1,e:"Afagia é a impossibilidade completa de deglutir."},
    {id:"di21",d:"moderado",q:"A dor esofágica tem como principal diagnóstico diferencial:",o:["Dor cardíaca","Cólica renal","Cefaleia","Dor articular"],a:0,e:"A dor esofágica pode mimetizar a dor cardíaca e deve ser diferenciada dela."},
    {id:"di22",d:"facil",q:"Eructação é:",o:["Arroto (eliminação de ar pela boca)","Vômito","Soluço","Diarreia"],a:0,e:"Eructação é o arroto, associado à aerofagia."},
    {id:"di23",d:"dificil",q:"Na diarreia do intestino delgado, espera-se:",o:["Pequeno volume e muitas evacuações","Grande volume e menor número de evacuações","Sempre sangue vivo","Tenesmo intenso"],a:1,e:"Diarreia do delgado: grande volume e menor número de evacuações; tenesmo e sangue vivo são mais do cólon/reto."},

  endocrino:{ name:"Anamnese do Sistema Endócrino", doc:"05. Anamnese do Sistema Endócrino",
   summary:`## Semiologia Endócrino-Metabólica
Avalia hábitos (atividade física, padrão alimentar) e história familiar (DM, doenças autoimunes, tireoide, NEM).

### Diabetes mellitus
- **Sintomas de descompensação (4 P's)**: poliúria, polidipsia, polifagia e emagrecimento.
- Complicações: parestesias "em luvas e botas", dor em queimação, claudicação, redução de sensibilidade, lesões em MMII, baixa acuidade visual.

### Tireoide
- **Hipotireoidismo**: astenia, queda capilar, humor deprimido, ganho de peso, edema, constipação, pele seca, sonolência, **intolerância ao frio**.
- **Hipertireoidismo**: insônia, labilidade emocional, **taquicardia/palpitações**, perda de peso, **intolerância ao calor**, sudorese, tremores, hiperdefecação.
- Idosos: forma **apatética** (astenia, prostração, sintomas depressivos).

### Hipófise
- **Acromegalia**: crescimento de extremidades, diastema, parestesias/dor nas mãos, hiperidrose.
- **Cushing**: estrias violáceas, equimoses fáceis, fraqueza muscular, alterações de glicemia e PA.
- **Prolactinoma**: galactorreia, alteração de libido, irregularidade menstrual, infertilidade.

### Adrenal
- **Feocromocitoma**: HAS de difícil controle, palpitações, flushing.
- **Hiperaldosteronismo**: HAS de difícil controle, paresia e astenia.
- **Hiperandrogenismo**: hirsutismo, acne, infertilidade.`,
   tips:"Monte duas colunas opostas para tireoide (hipo × hiper). Para causas adrenais, ancore tudo em 'HAS de difícil controle' e diferencie pelos sintomas associados.",
   questions:[
    {id:"en1",d:"facil",q:"Os sintomas clássicos de descompensação do diabetes (os '4 P's') são:",o:["Poliúria, polidipsia, polifagia e perda de peso","Palidez, prurido, paresia e palpitação","Poliúria, palidez, pirose e prurido","Polidipsia, pirose, ptose e parestesia"],a:0,e:"Os 4 P's: poliúria, polidipsia, polifagia e emagrecimento (perda de peso)."},
    {id:"en2",d:"moderado",q:"Qual conjunto de sintomas é típico do HIPERtireoidismo?",o:["Ganho de peso, constipação, intolerância ao frio","Perda de peso, taquicardia, intolerância ao calor","Sonolência, pele seca, bradicardia","Edema, humor deprimido, queda capilar"],a:1,e:"Hipertireoidismo: perda de peso, taquicardia/palpitações, intolerância ao calor, sudorese, tremores e hiperdefecação."},
    {id:"en3",d:"dificil",q:"Idoso com hipertireoidismo pode apresentar uma forma atípica chamada:",o:["Forma apatética","Crise tireotóxica clássica","Bócio mergulhante","Tireoidite de De Quervain"],a:0,e:"No idoso, o hipertireoidismo pode se manifestar de forma apatética: astenia, fraqueza, prostração e sintomas depressivos."},
    {id:"en4",d:"moderado",q:"Crescimento de extremidades, diastema, parestesias nas mãos e hiperidrose sugerem:",o:["Prolactinoma","Acromegalia","Doença de Addison","Hipotireoidismo"],a:1,e:"Esses são achados típicos da acromegalia (excesso de GH), geralmente por tumor hipofisário funcionante."},
    {id:"en5",d:"moderado",q:"Galactorreia, alteração da libido, ciclos irregulares e infertilidade são típicos de:",o:["Feocromocitoma","Prolactinoma","Cushing","Hiperaldosteronismo"],a:1,e:"O prolactinoma cursa com hiperprolactinemia: galactorreia, hipogonadismo, irregularidade menstrual e infertilidade."},
    {id:"en6",d:"dificil",q:"Estrias violáceas, equimoses de aparecimento fácil e fraqueza muscular sugerem:",o:["Síndrome de Cushing","Insuficiência adrenal","Hipotireoidismo","Deficiência de vasopressina"],a:0,e:"São manifestações da síndrome de Cushing (excesso de cortisol), junto a alterações de glicemia e pressão arterial."},
    {id:"en7",d:"facil",q:"Hipertensão de difícil controle com palpitações e flushing sugere:",o:["Feocromocitoma","Prolactinoma","Hipotireoidismo","Diabetes insipidus"],a:0,e:"O feocromocitoma libera catecolaminas, causando HAS de difícil controle, palpitações e flushing."},
    {id:"en8",d:"moderado",q:"HAS de difícil controle associada a paresia e astenia (por hipocalemia) sugere:",o:["Hiperaldosteronismo","Acromegalia","Hipotireoidismo","Síndrome de Gilbert"],a:0,e:"O hiperaldosteronismo causa retenção de sódio (HAS) e perda de potássio, levando a paresia e astenia."},
    {id:"en9",d:"facil",q:"Polidipsia significa:",o:["Fome excessiva","Sede excessiva","Urinar muito","Suar excessivamente"],a:1,e:"Polidipsia = sede excessiva; polifagia = fome excessiva; poliúria = urinar muito."},
    {id:"en10",d:"moderado",q:"Bócio refere-se a:",o:["Nódulo de mama","Aumento da glândula tireoide","Tumor hipofisário","Aumento da adrenal"],a:1,e:"Bócio é o aumento da tireoide, que pode causar sintomas compressivos cervicais."},
    {id:"en11",d:"moderado",q:"O hipotireoidismo cursa tipicamente com intolerância ao:",o:["Calor","Frio","Exercício","Jejum"],a:1,e:"Hipotireoidismo: intolerância ao frio, ganho de peso, constipação, sonolência e pele seca."},
    {id:"en12",d:"dificil",q:"A insuficiência adrenal (doença de Addison) manifesta-se por:",o:["Hipertensão e ganho de peso","Astenia, hipotensão e hiperpigmentação","Taquicardia e perda de peso isolada","Galactorreia"],a:1,e:"A deficiência de cortisol/aldosterona causa astenia, hipotensão e hiperpigmentação cutânea."},
    {id:"en13",d:"moderado",q:"São sintomas de hipoglicemia:",o:["Tremor, sudorese, palpitações e confusão","Poliúria e polidipsia","Constipação e bradicardia","Hirsutismo e acne"],a:0,e:"A hipoglicemia ativa o sistema adrenérgico (tremor, sudorese, palpitações) e causa neuroglicopenia (confusão)."},
    {id:"en14",d:"dificil",q:"Parestesias 'em luvas e botas' no diabético indicam:",o:["Neuropatia periférica","Insuficiência renal","Retinopatia","Hipoglicemia"],a:0,e:"A distribuição em luvas e botas é típica da polineuropatia periférica diabética."},
    {id:"en15",d:"facil",q:"Galactorreia é:",o:["Aumento da tireoide","Saída de leite fora da amamentação","Sede excessiva","Queda de cabelo"],a:1,e:"Galactorreia é a secreção láctea fora do período de lactação, comum no prolactinoma."},
    {id:"en16",d:"moderado",q:"Hirsutismo sugere:",o:["Excesso de androgênios","Deficiência de cortisol","Hipotireoidismo","Hipoglicemia"],a:0,e:"O hirsutismo (pelos em padrão masculino na mulher) sugere hiperandrogenismo."},
    {id:"en17",d:"moderado",q:"A deficiência de vasopressina (diabetes insipidus) cursa com:",o:["Oligúria","Poliúria e polidipsia importantes","Hipoglicemia","Ganho de peso"],a:1,e:"Há aumento significativo da diurese e polidipsia; deve-se excluir causa psiquiátrica (potomania)."},
    {id:"en18",d:"dificil",q:"A apresentação 'apatética', no idoso, é uma forma atípica de:",o:["Hipotireoidismo","Hipertireoidismo","Diabetes insipidus","Feocromocitoma"],a:1,e:"No idoso, o hipertireoidismo pode se apresentar de forma apatética (astenia, prostração, sintomas depressivos)."},
    {id:"en19",d:"facil",q:"Polifagia significa:",o:["Fome excessiva","Sede excessiva","Urinar muito","Suor excessivo"],a:0,e:"Polifagia é fome/apetite excessivo."},
    {id:"en20",d:"moderado",q:"São sintomas compressivos de um bócio volumoso:",o:["Disfagia, dispneia e rouquidão","Poliúria e polidipsia","Hirsutismo","Galactorreia"],a:0,e:"O bócio pode comprimir estruturas cervicais, causando disfagia, dispneia e rouquidão."},
    {id:"en21",d:"moderado",q:"Na avaliação da obesidade, investiga-se o padrão alimentar como:",o:["Hiperfágico, beliscador ou misto","Apenas o peso","Somente a altura","Só a idade"],a:0,e:"Avalia-se se é hiperfágico, beliscador ou misto, e os horários de maior ingestão."},
    {id:"en22",d:"dificil",q:"O hiperparatireoidismo associa-se classicamente a:",o:["Nefrolitíase e alterações cognitivas","Hipotensão","Ganho de peso e frio","Galactorreia"],a:0,e:"O excesso de PTH eleva o cálcio, causando nefrolitíase, alterações ósseas e cognitivas."},
    {id:"en23",d:"moderado",q:"Claudicação intermitente em diabético sugere:",o:["Doença arterial periférica","Hipoglicemia","Retinopatia","Tireoidite"],a:0,e:"Dor que surge ao caminhar e alivia no repouso sugere doença arterial periférica (complicação macrovascular do DM)."},
    {id:"en24",d:"facil",q:"O hipotireoidismo costuma cursar com humor:",o:["Eufórico","Deprimido","Sem alteração, sempre","Agitado"],a:1,e:"Humor deprimido, astenia e sonolência são comuns no hipotireoidismo."},

    {id:"en27",d:"moderado",q:"História familiar de NEM (neoplasia endócrina múltipla) é relevante porque:",o:["Indica predisposição a tumores endócrinos","Causa anemia","Contraindica exercício","Não tem importância"],a:0,e:"História de NEM sinaliza risco hereditário de tumores endócrinos."},

  urinario:{ name:"Anamnese do Sistema Urinário", doc:"08. Anamnese Sistema Urinário",
   summary:`## Interrogatório e Exame Físico Urinário
Muitas doenças renais são **assintomáticas**; sintomas renais podem se manifestar de forma inespecífica (dispneia, edema, paresia de MMII).

### Alterações do volume urinário
- **Anúria**: < 100 mL/24h · **Oligúria**: 100–400 mL/24h · **Poliúria**: > 2500 mL/24h.

### Alterações do ato miccional
- **Disúria**: dor/desconforto ao urinar.
- **Urgência**: necessidade imperiosa de urinar.
- **Polaciúria**: aumento da frequência (intervalo < 2h, pequenas quantidades).
- **Hesitação**: dificuldade para iniciar a micção.
- **Nictúria/noctúria**: urinar mais à noite que o habitual.
- **Retenção**: não esvaziamento → globo vesical (bexigoma).
- **Incontinência**: perda involuntária de urina.

### Cor e aspecto
- **Hematúria** (sangue na urina): micro/macroscópica; inicial, terminal ou total. DD: mioglobinúria, rifampicina, Pyridium, alimentos.
- Turva (infecção), espuma (proteína), mau cheiro (concentração/infecção).

### Dor
- O **parênquima renal não dói**. A dor surge por **distensão da cápsula renal** e irritação da pelve/ureter. Dor lombar/flanco; dor vesical em região suprapúbica.

### Falência renal (IRC)
Náuseas, anorexia, emagrecimento, cansaço (anemia), paresia de MMII, dispneia, edema e alterações de consciência.`,
   tips:"Decore os pontos de corte de volume (anúria <100, oligúria 100–400, poliúria >2500) e a lista de alterações miccionais — são definições objetivas muito cobradas.",

    {id:"ur2",d:"facil",q:"Disúria significa:",o:["Aumento do volume urinário","Dor ou desconforto ao urinar","Sangue na urina","Perda involuntária de urina"],a:1,e:"Disúria é dor/ardência/desconforto durante a micção."},
    {id:"ur3",d:"moderado",q:"Aumento da frequência urinária, com intervalos menores que 2h e pequenas quantidades, chama-se:",o:["Poliúria","Nictúria","Polaciúria","Urgência"],a:2,e:"Polaciúria é o aumento da frequência miccional com pequenos volumes; difere de poliúria (volume total elevado)."},
    {id:"ur4",d:"moderado",q:"Urinar mais à noite do que o habitual é denominado:",o:["Polaciúria","Nictúria (noctúria)","Hesitação","Estrangúria"],a:1,e:"Nictúria/noctúria é a mudança do hábito miccional com predomínio noturno."},
    {id:"ur5",d:"moderado",q:"A não eliminação de urina com formação de globo vesical (bexigoma) caracteriza:",o:["Anúria","Retenção urinária","Incontinência","Oligúria"],a:1,e:"Na retenção, a bexiga não esvazia e se distende, formando o globo vesical palpável (bexigoma). Na anúria, o rim não produz urina."},
    {id:"ur6",d:"dificil",q:"Sobre a dor de origem renal, é correto afirmar:",o:["O parênquima renal é a principal fonte de dor","A dor decorre da distensão da cápsula renal e irritação de pelve/ureter","A dor é sempre suprapúbica","A dor nunca irradia"],a:1,e:"O parênquima renal não dói; a dor surge pela distensão da cápsula renal e irritação da mucosa da pelve e do ureter, geralmente em lombar/flanco."},
    {id:"ur7",d:"moderado",q:"Qual NÃO é um diagnóstico diferencial de urina avermelhada (pseudo-hematúria)?",o:["Uso de rifampicina","Mioglobinúria","Ingestão de Pyridium","Glicosúria"],a:3,e:"Rifampicina, Pyridium, alimentos e mioglobinúria podem alterar a cor da urina. Glicosúria não a torna avermelhada."},
    {id:"ur8",d:"dificil",q:"Na insuficiência renal crônica, a paresia de membros inferiores e o cansaço relacionam-se principalmente a:",o:["Acúmulo de toxinas/anemia e distúrbios eletrolíticos","Infecção urinária baixa","Cálculo ureteral","Hiperidratação isolada"],a:0,e:"Na IRC há anemia (cansaço), distúrbios eletrolíticos e acúmulo de toxinas, podendo causar paresia de MMII, dispneia e alterações de consciência."},
    {id:"ur9",d:"facil",q:"Poliúria é diurese acima de:",o:["400 mL/24h","1000 mL/24h","2500 mL/24h","100 mL/24h"],a:2,e:"Poliúria: > 2500 mL/24h."},
    {id:"ur10",d:"moderado",q:"Urgência miccional é:",o:["Dor ao urinar","Necessidade imperiosa de urinar","Perda involuntária de urina","Dificuldade de iniciar a micção"],a:1,e:"Urgência é a vontade súbita e imperiosa de urinar."},
    {id:"ur11",d:"moderado",q:"Hesitação urinária é:",o:["Dificuldade/esforço para iniciar a micção","Perda involuntária","Sangue na urina","Aumento da frequência"],a:0,e:"Hesitação é a dificuldade para iniciar o jato urinário, necessitando esforço."},
    {id:"ur12",d:"dificil",q:"Estrangúria (tenesmo vesical) é:",o:["Ausência de diurese","Sensação de esvaziamento incompleto com vontade contínua de urinar","Urina avermelhada","Poliúria noturna"],a:1,e:"Estrangúria/tenesmo vesical é a sensação de esvaziamento incompleto com desejo miccional persistente."},
    {id:"ur13",d:"facil",q:"Hematúria é:",o:["Presença de sangue na urina","Dor lombar","Urina espumosa","Ausência de urina"],a:0,e:"Hematúria é a presença de sangue na urina (micro ou macroscópica)."},

    {id:"ur15",d:"dificil",q:"Sobre as doenças renais, é correto afirmar:",o:["São sempre sintomáticas","Muitas são assintomáticas","Sempre causam dor lombar","Nunca alteram a consciência"],a:1,e:"Muitas doenças renais são assintomáticas e o exame físico pode ser normal mesmo em doença avançada."},
    {id:"ur16",d:"moderado",q:"O globo vesical (bexigoma) é sinal de:",o:["Retenção urinária","Poliúria","Incontinência","Hematúria"],a:0,e:"O globo vesical é a bexiga distendida e palpável por retenção (não esvaziamento)."},
    {id:"ur17",d:"facil",q:"Incontinência urinária é:",o:["Perda involuntária de urina","Dor ao urinar","Necessidade urgente de urinar","Dificuldade de iniciar a micção"],a:0,e:"Incontinência é a perda involuntária de urina."},
    {id:"ur18",d:"dificil",q:"Urina com espuma persistente sugere:",o:["Hematúria","Proteinúria","Apenas infecção","Desidratação"],a:1,e:"A espuma na urina sugere proteinúria (perda de proteínas na urina)."},
    {id:"ur19",d:"facil",q:"Oligúria é diurese entre:",o:["< 100 mL/24h","100-400 mL/24h","400-2500 mL/24h","> 2500 mL/24h"],a:1,e:"Oligúria: 100-400 mL/24h."},
    {id:"ur20",d:"moderado",q:"A hematúria 'inicial' (no começo da micção) sugere origem:",o:["Uretral / prostática","Renal alta","Vesical difusa","Intestinal"],a:0,e:"Hematúria inicial sugere origem uretral/prostática; terminal, vesical; total, mais alta."},
    {id:"ur21",d:"moderado",q:"Piúria é:",o:["Sangue na urina","Excesso de leucócitos na urina","Espuma na urina","Urina escura"],a:1,e:"Piúria é o excesso de leucócitos na urina (sugere infecção)."},
    {id:"ur22",d:"dificil",q:"Na pielonefrite, espera-se classicamente:",o:["Dor lombar + febre/calafrios","Apenas disúria isolada","Constipação","Icterícia"],a:0,e:"A pielonefrite (infecção alta) cursa com dor lombar/flanco, febre e calafrios."},

    {id:"ur27",d:"facil",q:"Disúria + polaciúria + urgência formam um quadro de:",o:["Síndrome miccional (cistite)","Insuficiência hepática","Anemia","Hipertireoidismo"],a:0,e:"Esse conjunto sugere síndrome miccional irritativa, típica de cistite."},

    {id:"ur29",d:"dificil",q:"A dispneia na falência renal pode dever-se a:",o:["Hipervolemia ou acidose","Cálculo uretral","Cistite","Disúria"],a:0,e:"Na IRC, a dispneia pode resultar de hipervolemia (sobrecarga) ou de acidose metabólica."},

  edema:{ name:"Edema", doc:"09. Edema",
   summary:`## Edema
**Definição:** aumento de fluido no interstício, localizado ou generalizado (**anasarca**).

### Fisiopatologia (forças de Starling)
Desequilíbrio entre pressão **hidrostática**, pressão **oncótica** e **permeabilidade capilar**, somado à retenção de sódio e água (ativação do SRAA).

### Avaliação ao exame físico
- **Compressibilidade** (digitopressão por 5s → cacifo/godet). Edema **não compressível**: linfedema, mixedema, lipedema.
- **Intensidade**: escala de cruzes (+ a 4+). **Consistência**: mole (recente) × dura (crônico).

### Edema generalizado
- **Renal** — síndrome nefrótica (proteinúria, hipoalbuminemia, urina com espuma, edema periorbitário pior pela manhã); síndrome nefrítica (HAS + hematúria + proteinúria).
- **Cardíaco** — depressível em MMII, **piora ao longo do dia**, turgência jugular, estertores, hepatomegalia dolorosa.
- **Hepático** (cirrose) — predomínio de ascite + edema de MMII; sinais de hipertensão portal e de insuficiência hepática.
- **Desnutrição proteica** — hipoalbuminemia.

### Edema localizado
- **Insuficiência venosa crônica**: MMII, unilateral, piora em ortostase, dermatite ocre.
- **TVP**: edema unilateral, **mole, quente**, sinal de Homans (dor à dorsiflexão), empastamento de panturrilha.
- **Inflamatório** (celulite): sinais flogísticos. **Linfedema**: duro, não depressível, indolor. **Angioedema** (Quincke): alérgico, por histamina.`,
   tips:"Diferencie edema mole (recente/hídrico) de duro (crônico/fibrose) e depressível (cardíaco/renal) de não depressível (linfedema, mixedema, lipedema). O horário de piora ajuda: manhã→renal, fim do dia→cardíaco.",
   questions:[
    {id:"ed1",d:"facil",q:"O termo anasarca refere-se a:",o:["Edema apenas em MMII","Edema generalizado","Edema palpebral isolado","Ascite isolada"],a:1,e:"Anasarca é o edema generalizado, frequentemente com derrames cavitários."},
    {id:"ed2",d:"moderado",q:"As forças de Starling envolvidas na gênese do edema são:",o:["Pressão arterial e venosa apenas","Pressão hidrostática, pressão oncótica e permeabilidade capilar","Apenas a pressão oncótica","Temperatura e pH"],a:1,e:"O edema resulta do desequilíbrio entre pressão hidrostática, pressão oncótica e permeabilidade capilar (Lei de Starling)."},
    {id:"ed3",d:"moderado",q:"Edema periorbitário pior pela manhã, com urina espumosa, sugere causa:",o:["Cardíaca","Renal (síndrome nefrótica)","Venosa","Inflamatória"],a:1,e:"A síndrome nefrótica cursa com proteinúria/hipoalbuminemia, urina com espuma e edema periorbitário que piora pela manhã."},
    {id:"ed4",d:"dificil",q:"Edema depressível em MMII que piora ao longo do dia, com turgência jugular e estertores, sugere:",o:["Linfedema","Edema cardíaco (insuficiência cardíaca)","Lipedema","Angioedema"],a:1,e:"O edema cardíaco é depressível, vespertino (piora ao longo do dia) e acompanha sinais de IC: turgência jugular, estertores e hepatomegalia dolorosa."},
    {id:"ed5",d:"moderado",q:"Qual edema é caracteristicamente NÃO depressível (sem cacifo)?",o:["Edema cardíaco","Síndrome nefrótica","Linfedema","Edema da cirrose"],a:2,e:"Linfedema, mixedema e lipedema costumam ser não compressíveis (sem cacifo)."},
    {id:"ed6",d:"dificil",q:"Edema unilateral de MMII, mole, quente, com dor à dorsiflexão do pé (sinal de Homans), sugere:",o:["Trombose venosa profunda","Linfedema crônico","Síndrome nefrótica","Insuficiência cardíaca"],a:0,e:"A TVP cursa com edema unilateral, mole, quente, empastamento de panturrilha e sinal de Homans; confirma-se com US-Doppler venoso."},
    {id:"ed7",d:"moderado",q:"Na cirrose hepática, o quadro de retenção hídrica predominante é:",o:["Anasarca maciça desde o início","Ascite + edema de MMII, com sinais de hipertensão portal","Edema apenas palpebral","Edema duro e indolor"],a:1,e:"Na cirrose o edema generalizado é discreto, predominando ascite e edema de MMII, com achados de hipertensão portal e insuficiência hepática."},
    {id:"ed8",d:"facil",q:"O angioedema (edema de Quincke) é causado principalmente por:",o:["Obstrução linfática","Aumento da permeabilidade capilar por histamina","Hipoalbuminemia","Trombose venosa"],a:1,e:"O angioedema é alérgico, decorrente do aumento da permeabilidade capilar mediado por histamina."},
    {id:"ed9",d:"facil",q:"A escala de intensidade do edema é graduada de:",o:["0 a 10","+ a 4+","leve a grave apenas","A a E"],a:1,e:"O edema é graduado em cruzes, de + (1+) a 4+."},
    {id:"ed10",d:"moderado",q:"Edema mole (que forma cacifo facilmente) sugere:",o:["Retenção hídrica recente","Fibrose crônica","Linfedema","Lipedema"],a:0,e:"A consistência mole indica retenção hídrica recente; a dura indica processo mais prolongado."},
    {id:"ed11",d:"moderado",q:"Edema duro, não depressível e inelástico é típico de:",o:["Insuficiência cardíaca","Linfedema","Síndrome nefrótica","Angioedema"],a:1,e:"O linfedema é duro, não depressível, inelástico e indolor, com alterações francas de pele."},
    {id:"ed12",d:"dificil",q:"A tríade clássica da síndrome nefrítica é:",o:["HAS, hematúria e proteinúria","Febre, icterícia e dor","Edema, ascite e varizes","Tosse, dispneia e cianose"],a:0,e:"Síndrome nefrítica: hipertensão, hematúria (hemácias dismórficas) e proteinúria (< 3 g)."},
    {id:"ed13",d:"moderado",q:"Na insuficiência venosa crônica, um achado de pele típico é:",o:["Dermatite ocre e úlcera em maléolo medial","Vesículas agrupadas","Icterícia","Hiperpigmentação difusa generalizada"],a:0,e:"A IVC cursa com dermatite ocre (depósito de hemossiderina) e úlceras em maléolos mediais."},
    {id:"ed14",d:"facil",q:"A anasarca frequentemente associa-se a:",o:["Derrames cavitários (pleural, pericárdico, ascite)","Apenas edema palpebral","Hematúria","Icterícia"],a:0,e:"Na anasarca há edema generalizado, comumente acompanhado de derrames cavitários."},
    {id:"ed15",d:"dificil",q:"No edema da desnutrição proteica grave, o mecanismo principal é:",o:["Aumento da pressão hidrostática","Redução da pressão oncótica (hipoalbuminemia)","Obstrução linfática","Inflamação"],a:1,e:"A desnutrição reduz a albumina, diminuindo a pressão oncótica e favorecendo o edema."},
    {id:"ed16",d:"moderado",q:"O lipedema caracteriza-se por:",o:["Acúmulo patológico de tecido adiposo nos membros","Obstrução de vasos linfáticos","Trombo venoso","Reação alérgica"],a:0,e:"O lipedema é acúmulo patológico de tecido adiposo nos membros, com suscetibilidade genética."},
    {id:"ed17",d:"dificil",q:"O sinal de Homans consiste em:",o:["Dor à dorsiflexão do pé","Empastamento abdominal","Cacifo positivo","Turgência jugular"],a:0,e:"O sinal de Homans é a dor à dorsiflexão do pé, sugestiva de TVP, junto ao empastamento de panturrilha."},
    {id:"ed18",d:"moderado",q:"São fármacos que podem causar edema:",o:["AINEs, corticoides e anti-hipertensivos vasodilatadores","Apenas antibióticos","Apenas analgésicos simples","Nenhum medicamento causa edema"],a:0,e:"Edema medicamentoso ocorre por retenção de sódio/vasodilatação: AINEs, corticoides, hormônios e anti-hipertensivos."},
    {id:"ed19",d:"facil",q:"A água corporal total corresponde a aproximadamente, do peso:",o:["10-20%","50-60%","80-90%","100%"],a:1,e:"A ACT é cerca de 50-60% do peso corporal (menos em obesos e idosos)."},
    {id:"ed20",d:"moderado",q:"Do líquido extracelular, a maior parte está no:",o:["Interstício","Intravascular","Intracelular","Linfático"],a:0,e:"Do extracelular, ~60% é intersticial e ~40% intravascular."},
    {id:"ed21",d:"moderado",q:"Edema quente, vermelho e doloroso sugere causa:",o:["Inflamatória","Venosa crônica","Linfática","Nutricional"],a:0,e:"Calor, rubor e dor sugerem componente inflamatório (ex.: celulite/erisipela)."},
    {id:"ed22",d:"dificil",q:"O hiperaldosteronismo secundário contribui para o edema por:",o:["Retenção de sódio e água","Perda de proteínas","Vasoconstrição pulmonar","Hemólise"],a:0,e:"A ativação do SRAA causa retenção de sódio e água, aumentando a pressão hidrostática."},
    {id:"ed23",d:"moderado",q:"A cianose de um membro com edema agudo sugere:",o:["Comprometimento venoso (ex.: TVP)","Arterial puro","Linfedema crônico","Desnutrição"],a:0,e:"Cianose com edema sugere origem venosa (estase); palidez sugere origem arterial."},
    {id:"ed24",d:"facil",q:"Edema periorbitário pior pela manhã sugere causa:",o:["Renal","Cardíaca","Venosa","Hepática"],a:0,e:"O edema renal predomina em tecidos frouxos (periorbitário) e piora pela manhã."},
    {id:"ed25",d:"dificil",q:"Na síndrome nefrótica, a perda de proteína na urina leva a:",o:["Hipoalbuminemia e queda da pressão oncótica","Apenas hipertensão","Hemólise","Icterícia"],a:0,e:"A proteinúria causa hipoalbuminemia, reduzindo a pressão oncótica e favorecendo o edema."},
    {id:"ed26",d:"moderado",q:"Telangiectasias (aranhas vasculares), ginecomastia e eritema palmar indicam:",o:["Insuficiência hepática","Insuficiência renal","Insuficiência cardíaca","Linfedema"],a:0,e:"São estigmas de insuficiência hepática (ex.: cirrose)."},
    {id:"ed27",d:"moderado",q:"A elasticidade do edema avalia-se observando se, após a compressão, a pele:",o:["Retorna (elástico) ou mantém a depressão (inelástico)","Muda de cor","Esquenta","Descama"],a:0,e:"Se a pele retorna, é elástico; se mantém a depressão, é inelástico."},

  neuro:{ name:"Interrogatório Neurológico", doc:"10. Anamnese Sistema Nervoso",
   summary:`## Interrogatório Neurológico
A anamnese precisa e detalhada corresponde a "¾ do caminho" para o diagnóstico neurológico.

### Pontos-chave da entrevista
- **Idade × diagnóstico**: ex. lesão de tronco com evolução rápida aos 20 anos → doença desmielinizante; aos 60 anos → doença cerebrovascular.
- **Esclarecer os sintomas** com as palavras do paciente ("tontura", "blecaute", "adormecimento") e precisar natureza, posição e duração.
- **Modo de início e progressão**: abrupto, gradual, subagudo, crônico.

### Entrevistar familiares — obrigatório quando:
criança; episódios de perda de consciência; déficit mental/de memória; necessidade de checar dados de outros familiares.

### Glossário de sinais e sintomas
- **Motricidade**: paresia (força diminuída) × plegia (ausência de força).
- **Sensibilidade**: hipoestesia, hiperestesia, anestesia, **parestesia** (formigamento).
- **Visão**: amaurose, diplopia, hemianopsia. **Audição**: hipoacusia, acusia.
- **Consciência**: torpor, confusão, coma. **Linguagem/fala**: disartria, **afasia**, disfonia, dislalia.

### Objetivo
Chegar aos diagnósticos **sindrômico, topográfico e etiológico** e definir exames e tratamento.`,
   tips:"Construa um glossário pessoal de prefixos (hipo-, hiper-, a-, dis-) aplicado a cada função (estesia, fonia, fagia, fasia). A dupla paresia × plegia é clássica.",
   questions:[
    {id:"ne1",d:"facil",q:"Qual a diferença entre paresia e plegia?",o:["Paresia é ausência total de força; plegia é força reduzida","Paresia é força diminuída; plegia é ausência total de força","São sinônimos","Ambas se referem à sensibilidade"],a:1,e:"Paresia = redução parcial da força muscular; plegia = perda total da força (paralisia)."},
    {id:"ne2",d:"moderado",q:"Parestesia refere-se a:",o:["Ausência completa de sensibilidade","Sensação anormal, como formigamento","Aumento de força","Dificuldade de fala"],a:1,e:"Parestesia é uma sensação anormal (formigamento, dormência). Anestesia = ausência de sensibilidade."},
    {id:"ne3",d:"moderado",q:"Afasia é um distúrbio de:",o:["Visão","Linguagem","Equilíbrio","Deglutição"],a:1,e:"Afasia é distúrbio da linguagem (compreensão/expressão). Disfagia é da deglutição; disartria é da articulação da fala."},
    {id:"ne4",d:"dificil",q:"Lesão de tronco cerebral de evolução rápida em paciente de 20 anos sugere preferencialmente:",o:["Doença cerebrovascular","Doença desmielinizante","Meduloblastoma","Demência"],a:1,e:"A correlação idade/diagnóstico sugere desmielinizante no jovem; já aos 60 anos, a mesma apresentação aponta para doença cerebrovascular."},
    {id:"ne5",d:"moderado",q:"Os três diagnósticos buscados no raciocínio neurológico são:",o:["Clínico, laboratorial e de imagem","Sindrômico, topográfico e etiológico","Inicial, intermediário e final","Anatômico, fisiológico e psíquico"],a:1,e:"O objetivo é definir o diagnóstico sindrômico, topográfico e etiológico, orientando exames e tratamento."},
    {id:"ne6",d:"facil",q:"A entrevista com familiares torna-se obrigatória, EXCETO em qual situação?",o:["Paciente criança","Episódios de perda de consciência","Déficit de memória evidente","Adulto orientado com queixa de cefaleia leve"],a:3,e:"É obrigatória em crianças, perda de consciência, déficit mental/memória ou para checar dados familiares — não em um adulto plenamente orientado."},
    {id:"ne7",d:"moderado",q:"Diplopia, amaurose e hemianopsia são distúrbios de qual função?",o:["Audição","Visão","Olfação","Equilíbrio"],a:1,e:"São distúrbios visuais: diplopia (visão dupla), amaurose (cegueira), hemianopsia (perda de metade do campo visual)."},
    {id:"ne8",d:"facil",q:"Plegia significa:",o:["Força diminuída","Paralisia (ausência total de força)","Formigamento","Perda de sensibilidade"],a:1,e:"Plegia é a ausência total de força (paralisia); paresia é a redução parcial."},
    {id:"ne9",d:"moderado",q:"Disartria é:",o:["Distúrbio de linguagem","Dificuldade de articulação da fala (motora)","Perda da voz","Visão dupla"],a:1,e:"Disartria é a dificuldade motora de articular a fala; afasia é distúrbio da linguagem."},
    {id:"ne10",d:"moderado",q:"Em semiologia neurológica, anestesia significa:",o:["Sensação dolorosa","Ausência de sensibilidade","Aumento da sensibilidade","Formigamento"],a:1,e:"Anestesia é a ausência de sensibilidade; hipoestesia é redução; hiperestesia é aumento; parestesia é sensação anormal."},
    {id:"ne11",d:"dificil",q:"Tumor de cerebelo antes dos 12 anos sugere preferencialmente:",o:["Meduloblastoma","Astrocitoma do adulto","AVC","Doença desmielinizante"],a:0,e:"A correlação idade/diagnóstico aponta meduloblastoma no tumor de cerebelo antes dos 12 anos."},
    {id:"ne12",d:"facil",q:"A convulsão é um distúrbio da:",o:["Sensibilidade","Motricidade involuntária","Visão","Audição"],a:1,e:"Convulsões integram os distúrbios da motricidade involuntária (com tremores, mioclonias, tiques)."},
    {id:"ne13",d:"moderado",q:"Anosmia é:",o:["Perda do olfato","Perda da audição","Perda da visão","Perda do paladar"],a:0,e:"Anosmia é a perda do olfato; hiposmia é a redução."},
    {id:"ne14",d:"moderado",q:"Diplopia é:",o:["Visão dupla","Cegueira","Perda de metade do campo visual","Visão borrada por catarata"],a:0,e:"Diplopia é visão dupla; amaurose é cegueira; hemianopsia é perda de metade do campo visual."},
    {id:"ne15",d:"dificil",q:"A bexiga neurogênica é um distúrbio:",o:["Esfincteriano","Da motricidade voluntária","Da sensibilidade","Do sono"],a:0,e:"A bexiga neurogênica é um distúrbio esfincteriano de origem neurológica."},
    {id:"ne16",d:"facil",q:"O término de uma boa anamnese neurológica corresponde a:",o:["1/4 do diagnóstico","¾ do caminho para o diagnóstico","Apenas formalidade","O diagnóstico definitivo sempre"],a:1,e:"Diz-se que o término da anamnese equivale a três quartos do caminho para o diagnóstico."},
    {id:"ne17",d:"moderado",q:"Síncope é:",o:["Perda transitória da consciência","Dor de cabeça","Tremor de repouso","Rigidez muscular"],a:0,e:"Síncope é a perda transitória da consciência, ligada a distúrbios do equilíbrio/consciência."},
    {id:"ne18",d:"dificil",q:"Afasia difere de disfonia porque:",o:["Afasia afeta a linguagem; disfonia afeta a emissão da voz","São sinônimos","Afasia ocorre só na criança","Disfonia é perda de visão"],a:0,e:"Afasia é distúrbio da linguagem (função cerebral superior); disfonia é alteração da emissão da voz."},
    {id:"ne19",d:"facil",q:"Hipoacusia é:",o:["Redução da audição","Redução da visão","Perda do olfato","Tontura"],a:0,e:"Hipoacusia é a diminuição da audição; acusia é a perda total."},
    {id:"ne20",d:"moderado",q:"Vertigem difere de tontura inespecífica por apresentar:",o:["Sensação rotatória (de giro)","Ausência de causa","Ser sempre indolor","Ser visual"],a:0,e:"Vertigem é a sensação rotatória; 'tontura' é termo vago que deve ser esclarecido."},
    {id:"ne21",d:"moderado",q:"Disfagia, no contexto neurológico, pode indicar:",o:["Comprometimento dos nervos da deglutição","Problema renal","Doença de pele","Anemia"],a:0,e:"Disfagia pode refletir disfunção neuromuscular da deglutição (ex.: AVC de tronco)."},
    {id:"ne22",d:"dificil",q:"Lesão de tronco cerebral de evolução rápida aos 60 anos sugere:",o:["Doença desmielinizante","Doença cerebrovascular","Meduloblastoma","Enxaqueca"],a:1,e:"Na idade avançada, essa apresentação aponta para causa cerebrovascular."},
    {id:"ne23",d:"moderado",q:"Sonambulismo e sonilóquio são distúrbios:",o:["Do sono","Da visão","Da marcha","Esfincterianos"],a:0,e:"São parassonias (distúrbios do sono)."},
    {id:"ne24",d:"facil",q:"Tremores e mioclonias são distúrbios da:",o:["Motricidade involuntária","Sensibilidade","Audição","Linguagem"],a:0,e:"Integram os distúrbios da motricidade involuntária."},
    {id:"ne25",d:"dificil",q:"Dislexia e disgrafia referem-se a alterações:",o:["Das funções cerebrais superiores","Da força muscular","Do olfato","Do equilíbrio"],a:0,e:"São distúrbios das funções cerebrais superiores (leitura e escrita)."},
    {id:"ne26",d:"moderado",q:"Hemianopsia é:",o:["Perda de metade do campo visual","Visão dupla","Cegueira total","Perda auditiva"],a:0,e:"Hemianopsia é a perda de metade do campo visual."},

  febre:{ name:"Febre", doc:"11. Febre",
   summary:`## Febre
A compreensão da febre passa pela regulação da temperatura corporal pelo **hipotálamo** (normal oral: 36,4–37,2 °C).

### Onde medir
- **Oral (sublingual)**: padrão de referência. **Central** (esôfago/timpânica): ~0,8 °C acima da oral. **Axilar**: ~0,4 °C abaixo (menos acurada). **Retal**: ~0,4 °C acima.
- O mais importante é **acompanhar sempre no mesmo local**.

### Definições
- **Febre**: elevação da temperatura **acima de 37,5 °C (axilar)** com **aumento do set point** hipotalâmico.
- **Hiperpirexia**: febre alta (em geral > 41,5 °C).
- **Hipertermia**: elevação de temperatura **sem alteração do set point** (produção excessiva ou incapacidade de perder calor).

### Febre × hipertermia
- A **febre** é mecanismo de defesa, responde a antitérmicos.
- A **hipertermia** é patologia de alta mortalidade: **não** responde a antipiréticos, exige medidas físicas vigorosas e **pode ser fatal — tratar sempre**.

### Fisiopatologia
Pirógenos (exógenos/endógenos) → citocinas (IL, TNF, IFN) → **prostaglandinas** → elevação do set point.

### Febre de Origem Obscura (FOO)
Febre > 38,3 °C em várias medidas, por **≥ 3 semanas**, sem diagnóstico após 1 semana de investigação.`,

  "dor-abdominal":{ name:"Dor Abdominal Aguda", doc:"12. Dor abdominal",
   summary:`## Paciente com Dor Abdominal Aguda
Dor abdominal aguda = dor com menos de 24h de duração. Dores graves em paciente previamente sadio que durem **mais de 6 horas** são, em sua maioria, **cirúrgicas**.

### Tipos de dor
- **Visceral**: profunda, mal delimitada/difusa; por distensão, tração, isquemia, espasmo de musculatura lisa (fibras autonômicas, sobretudo simpáticas).
- **Parietal (somática)**: intensa, **bem localizada**, por irritação do peritônio parietal → contratura muscular (defesa).

### Síndromes de abdome agudo
Inflamatório · perfurativo · obstrutivo · vascular · hemorrágico.
- **Apendicite**: dor inicial periumbilical/epigástrica (visceral) que **migra para a FID** (parietal).
- **Úlcera perfurada**: dor epigástrica que se torna intensa e bem localizada (parietal).
- **Obstrução alta** (proximal): vômitos precoces e entéricos, menor distensão. **Baixa** (distal): vômitos fecaloides, maior distensão.
- **Vascular**: oclusão mesentérica (dor intensa e difusa); ruptura de aneurisma de aorta (dor irradiada para o dorso/lombar + hipovolemia).

### Análise da dor (início)
- **Súbito (segundos–minutos)**: úlcera perfurada, ruptura de aneurisma, infarto mesentérico, gravidez ectópica rota.
- **Gradual (horas–dias)**: colecistite, apendicite, pancreatite, diverticulite.

### Lembrete
A reação dolorosa à irritação peritoneal é **menos marcada nos extremos de idade** (idosos e crianças pequenas).`,
   tips:"Ancore o raciocínio em dois eixos: tipo de dor (visceral × parietal) e velocidade de início (súbito × gradual). A migração da dor na apendicite é o exemplo clássico de visceral→parietal.",

    {id:"da1",d:"facil",q:"A dor visceral caracteriza-se por ser:",o:["Bem localizada e intensa","Profunda, mal delimitada ou difusa","Sempre acompanhada de defesa abdominal","Restrita à parede abdominal"],a:1,e:"A dor visceral é profunda e mal localizada (distensão, isquemia, espasmo); a parietal é bem localizada e intensa."},
    {id:"da2",d:"moderado",q:"Na apendicite, o padrão clássico de migração da dor é:",o:["Inicia na FID e migra para o epigástrio","Inicia periumbilical/epigástrica e migra para a FID","Permanece difusa o tempo todo","Inicia no flanco esquerdo"],a:1,e:"A dor inicial é visceral (periumbilical/epigástrica) e, com a irritação peritoneal, torna-se parietal e localizada na fossa ilíaca direita (FID)."},
    {id:"da3",d:"moderado",q:"São síndromes de abdome agudo, EXCETO:",o:["Inflamatório","Perfurativo","Obstrutivo","Degenerativo"],a:3,e:"As síndromes são: inflamatório, perfurativo, obstrutivo, vascular e hemorrágico."},
    {id:"da4",d:"dificil",q:"Dor abdominal de início súbito (segundos a minutos) sugere, entre outras:",o:["Apendicite","Úlcera perfurada / ruptura de aneurisma / infarto mesentérico","Diverticulite","Hepatite crônica"],a:1,e:"Início súbito aponta para eventos catastróficos: úlcera perfurada, ruptura de aneurisma, infarto mesentérico e gravidez ectópica rota."},
    {id:"da5",d:"moderado",q:"Na obstrução intestinal ALTA (proximal), espera-se:",o:["Vômitos tardios e fecaloides, grande distensão","Vômitos precoces e entéricos, menor distensão","Ausência de vômitos","Constipação sem dor"],a:1,e:"Obstrução alta: vômitos precoces de aspecto entérico e menor distensão. Obstrução baixa: vômitos fecaloides e maior distensão."},
    {id:"da6",d:"dificil",q:"Dor abdominal intensa irradiada para a região lombar com sinais de hipovolemia (taquicardia, hipotensão) sugere:",o:["Apendicite","Ruptura de aneurisma de aorta abdominal","Gastrite","Constipação"],a:1,e:"A ruptura de aneurisma de aorta abdominal causa dor intensa irradiada para o dorso/lombar acompanhada de sinais de choque hipovolêmico."},
    {id:"da7",d:"moderado",q:"Dores abdominais graves, em paciente previamente sadio, com mais de 6 horas de duração:",o:["São quase sempre benignas","São, em sua maioria, cirúrgicas","Indicam sempre causa psicológica","Devem ser apenas observadas em casa"],a:1,e:"A premissa clássica: dor abdominal grave por mais de 6 horas em paciente previamente hígido tende a ser cirúrgica."},
    {id:"da8",d:"facil",q:"A reação dolorosa à irritação peritoneal é menos marcada em:",o:["Adultos jovens","Idosos e crianças pequenas","Gestantes","Atletas"],a:1,e:"Nos extremos de idade (idosos e crianças pequenas) a resposta peritoneal é atenuada, podendo mascarar quadros graves."},

    {id:"da14",d:"facil",q:"A dor visceral é conduzida principalmente por fibras:",o:["Do sistema nervoso autônomo (simpático)","Motoras","Do sistema cerebroespinhal","Sensitivas táteis"],a:0,e:"A dor visceral é conduzida por fibras autonômicas, sobretudo simpáticas, sendo mal localizada."},
    {id:"da15",d:"dificil",q:"Dor com vômitos e distensão abdominal, mas sem rigidez, sugere usualmente:",o:["Perfuração visceral","Obstrução intestinal","Pancreatite","Apendicite inicial"],a:1,e:"Dor + vômitos + distensão sem rigidez geralmente indica obstrução intestinal."},
    {id:"da16",d:"moderado",q:"O sinal de Cullen (equimose periumbilical) sugere:",o:["Hemorragia retroperitoneal/intra-abdominal (ex.: pancreatite grave)","Apendicite","Constipação","Gastrite"],a:0,e:"O sinal de Cullen indica sangramento retro/intraperitoneal, associado a quadros como pancreatite hemorrágica."},
    {id:"da17",d:"dificil",q:"Dor abdominal de desenvolvimento lento (dias a semanas) sugere:",o:["Úlcera perfurada","Neoplasias, doença inflamatória crônica ou apendicite mal diagnosticada","Ruptura de aneurisma","Embolia mesentérica"],a:1,e:"O início insidioso aponta para neoplasias viscerais, DII crônica, obstrução maligna ou apendicite arrastada."},
    {id:"da18",d:"moderado",q:"Na apendicite, a dor parietal localiza-se na:",o:["Fossa ilíaca esquerda","Fossa ilíaca direita","Região suprapúbica","Hipocôndrio esquerdo"],a:1,e:"Com a irritação peritoneal local, a dor migra e se localiza na fossa ilíaca direita (FID)."},
    {id:"da19",d:"facil",q:"A dor parietal piora caracteristicamente com:",o:["Movimento e tosse","Repouso absoluto","Alimentação leve","Sono"],a:0,e:"A dor por irritação peritoneal parietal piora com movimento, tosse e descompressão."},

    {id:"da21",d:"moderado",q:"Na obstrução intestinal baixa, os vômitos tendem a ser:",o:["Precoces e entéricos","Tardios e fecaloides","Ausentes","Com sangue vivo"],a:1,e:"Obstrução baixa: vômitos tardios e fecaloides, com maior distensão."},
    {id:"da22",d:"dificil",q:"Doenças extra-abdominais que simulam abdome agudo incluem:",o:["IAM, pneumonia e pleurite","Apenas apendicite","Somente cistite","Cefaleia tensional"],a:0,e:"IAM, pneumonia, pleurite e pericardite podem cursar com dor abdominal."},

  pediatrica:{ name:"Semiologia Pediátrica", doc:"14. Semiologia Pediátrica",
   summary:`## Semiologia Pediátrica
A anamnese e o exame clínico são a pedra angular da pediatria. Regra fundamental: **"a mãe está certa até que se prove o contrário"** — ela percebe quando algo está errado com a criança.

### Particularidades
- Perguntas e exame **ajustados à idade**. "Pare, ouça, olhe e depois examine".
- A criança a partir de 2–3 anos deve **participar** da consulta.
- A **avaliação do desenvolvimento** deve ser feita **antes** do exame físico (a cooperação pode se perder).
- Exame de lactentes é **oportunista** (auscultar antes de despir/chorar).

### Cardiovascular
- **Cianose central**: mais bem observada na **língua**.
- **Sopros**: classificados de 1 a 6; a partir do **grau 4** há **frêmito** palpável. **Sopro inocente** é muito comum (até 50%), sistólico, sem frêmito.
- **Coarctação da aorta**: pulsos femorais difíceis de palpar com pulsos de MMSS normais (atraso braquiofemoral).
- **Hepatomegalia**: sinal importante de insuficiência cardíaca no lactente.

### Respiratório
- **Estridor**: som inspiratório grave → obstrução de vias aéreas superiores. **Sibilo**: expiratório, obstrução distal.
- Sinais de esforço: batimento de asa de nariz, gemência, retrações, uso de musculatura acessória.

### Abdome
Fígado palpável 1–2 cm abaixo do rebordo costal direito pode ser **normal** até 2–3 anos. Hérnia umbilical pequena é achado frequente.`,
   tips:"Pense sempre 'idade primeiro': ela define a forma de examinar e os valores de referência (FC, FR, PA, fígado palpável). Para sopros, fixe o ponto de corte do frêmito (grau 4).",
   questions:[

  ictericia:{ name:"Icterícia", doc:"15. Icterícia",
   summary:`## Icterícia
**Definição:** aumento de pigmentos biliares no plasma, com coloração amarelada de pele e mucosas. Perceptível em escleras/mucosas quando **BT > 2–3 mg/dL**.
- Diferenciar de depósito de gordura subconjuntival e de **betacarotenemia** (que **não** acomete a conjuntiva).

### Hiperbilirrubinemia não conjugada (indireta)
- Lipossolúvel, **sem colúria** (não filtrada pelos rins), afinidade pelo tecido nervoso.
- Causas: **hemólise**, extravasamento (hematoma), defeitos de conjugação (**síndrome de Gilbert**, icterícia fisiológica do RN).

### Hiperbilirrubinemia conjugada (direta)
- Hidrossolúvel, **com colúria** (filtrada pelos rins).
- Causas: doença hepatocelular, prejuízo na excreção canalicular, **obstrução biliar** (coledocolitíase, neoplasias).
- **Acolia fecal**: obstrução biliar impede a chegada de BD ao duodeno (sem estercobilina).

### Exame físico
- **Sinal de Courvoisier**: vesícula palpável indolor → neoplasia de pâncreas/vias biliares.
- Estigmas de hepatopatia crônica: telangiectasias, eritema palmar, ginecomastia, ascite, **flapping** (encefalopatia), fetor hepaticus.

### Laboratório
- **Padrão colestático**: elevação predominante de **FA e GGT**.
- **Padrão hepatocelular**: elevação predominante de **transaminases (TGO/TGP)**.
- **Tríade de Charcot** (colangite): febre/calafrios + dor em HD + icterícia.`,
   tips:"O divisor de águas é conjugada (com colúria, solúvel) × não conjugada (sem colúria). No laboratório, FA/GGT↑ = colestático; transaminases↑ = hepatocelular.",
   questions:[
    {id:"ic1",d:"facil",q:"A icterícia torna-se perceptível em escleras/mucosas a partir de qual nível de bilirrubina total?",o:["> 0,5 mg/dL","> 1 mg/dL","> 2–3 mg/dL","> 10 mg/dL"],a:2,e:"A icterícia leve é percebida em escleras/mucosas quando a BT ultrapassa 2–3 mg/dL; acentuada, em toda a pele."},
    {id:"ic2",d:"moderado",q:"A colúria ocorre devido ao aumento de:",o:["Bilirrubina indireta (não conjugada)","Bilirrubina direta (conjugada), que é hidrossolúvel e filtrada pelos rins","Albumina urinária","Estercobilina"],a:1,e:"Apenas a bilirrubina direta (conjugada, hidrossolúvel) é filtrada pelos rins e causa colúria."},
    {id:"ic3",d:"dificil",q:"A hiperbilirrubinemia NÃO conjugada caracteriza-se por:",o:["Cursar com colúria intensa","Ser lipossolúvel, sem colúria, com afinidade pelo tecido nervoso","Sempre indicar obstrução biliar","Filtração renal aumentada"],a:1,e:"A bilirrubina indireta é lipossolúvel, não é filtrada pelos rins (sem colúria) e tem afinidade pelo tecido nervoso; causas incluem hemólise e síndrome de Gilbert."},
    {id:"ic4",d:"moderado",q:"O sinal de Courvoisier (vesícula palpável e indolor) sugere:",o:["Coledocolitíase simples","Neoplasia de pâncreas ou de vias biliares","Hepatite viral aguda","Síndrome de Gilbert"],a:1,e:"A vesícula palpável e indolor (Courvoisier) sugere obstrução maligna (neoplasia de pâncreas/vias biliares)."},
    {id:"ic5",d:"dificil",q:"No laboratório, o padrão COLESTÁTICO caracteriza-se por elevação predominante de:",o:["Transaminases (TGO/TGP)","Fosfatase alcalina (FA) e GGT","Albumina","Hemoglobina"],a:1,e:"Padrão colestático: elevação de FA e GGT em relação às transaminases. Padrão hepatocelular: elevação predominante de TGO/TGP."},
    {id:"ic6",d:"moderado",q:"A tríade de febre/calafrios + dor em hipocôndrio direito + icterícia caracteriza:",o:["Hepatite viral","Colangite","Síndrome de Gilbert","Cirrose compensada"],a:1,e:"É a tríade de Charcot, característica de colangite (infecção das vias biliares)."},
    {id:"ic7",d:"moderado",q:"A acolia fecal na icterícia indica:",o:["Excesso de produção de bile","Obstrução biliar (bilirrubina não chega ao intestino)","Hemólise intensa","Insuficiência renal"],a:1,e:"Na obstrução biliar completa, a BD não chega ao duodeno para formar estercobilina, deixando as fezes sem pigmentação (acolia)."},
    {id:"ic8",d:"dificil",q:"Icterícia leve que piora em períodos de estresse/jejum, com hiperbilirrubinemia indireta, sugere:",o:["Coledocolitíase","Síndrome de Gilbert","Colangite","Cirrose"],a:1,e:"A síndrome de Gilbert cursa com hiperbilirrubinemia indireta que se acentua em situações de estresse, jejum e infecções."},
    {id:"ic9",d:"facil",q:"A betacarotenemia diferencia-se da icterícia porque:",o:["Acomete intensamente as escleras","NÃO acomete a conjuntiva","Causa colúria","Eleva a fosfatase alcalina"],a:1,e:"A betacarotenemia (excesso de pigmento amarelo na dieta) não acomete a conjuntiva/escleras, ao contrário da icterícia."},
    {id:"ic10",d:"facil",q:"A icterícia decorre do acúmulo de qual pigmento?",o:["Hemoglobina","Bilirrubina","Melanina","Caroteno"],a:1,e:"A icterícia decorre do aumento de bilirrubina (pigmento biliar) no plasma."},
    {id:"ic11",d:"moderado",q:"A bilirrubina indireta circula no sangue ligada a:",o:["Albumina","Hemoglobina","Glicose","Ferro"],a:0,e:"A bilirrubina indireta (não conjugada) circula ligada à albumina e não é filtrada pelos rins (sem colúria)."},
    {id:"ic12",d:"dificil",q:"A hemólise causa hiperbilirrubinemia predominantemente:",o:["Direta (conjugada)","Indireta (não conjugada)","Sempre mista","Sem alteração"],a:1,e:"Na hemólise há produção excessiva de bilirrubina, predominando a fração indireta (não conjugada)."},
    {id:"ic13",d:"moderado",q:"O prurido, na icterícia, sugere:",o:["Doença colestática","Hemólise","Síndrome de Gilbert","Anemia ferropriva"],a:0,e:"O prurido sugere colestase (acúmulo de sais biliares); também pode ocorrer em linfomas."},
    {id:"ic14",d:"dificil",q:"Elevação predominante de TGO/TGP (transaminases) indica padrão:",o:["Colestático","Hepatocelular","Hemolítico","Obstrutivo extra-hepático"],a:1,e:"Transaminases elevadas em relação à FA caracterizam padrão hepatocelular; FA/GGT elevadas, padrão colestático."},
    {id:"ic15",d:"moderado",q:"O flapping (asterixis) associa-se a:",o:["Encefalopatia hepática","Colelitíase","Hemólise","Hepatite A leve"],a:0,e:"O flapping é um tremor (alteração do tônus) associado à encefalopatia hepática."},
    {id:"ic16",d:"facil",q:"A colúria deixa a urina:",o:["Clara e diluída","Escura/amarronzada","Esverdeada","Leitosa"],a:1,e:"A colúria é a urina escura pela presença de bilirrubina direta."},
    {id:"ic17",d:"dificil",q:"O sinal de Courvoisier (vesícula palpável e indolor) NÃO é típico de:",o:["Neoplasia de cabeça de pâncreas","Coledocolitíase (vesícula costuma ser dolorosa/contraída)","Neoplasia de vias biliares","Obstrução maligna"],a:1,e:"A coledocolitíase costuma cursar com vesícula contraída/dolorosa; a vesícula palpável e indolor sugere obstrução maligna."},
    {id:"ic18",d:"moderado",q:"Ascite, telangiectasias e esplenomegalia, em paciente ictérico, sugerem:",o:["Cirrose / hipertensão portal","Hemólise aguda","Síndrome de Gilbert","Colelitíase simples"],a:0,e:"Esses estigmas de hepatopatia crônica indicam cirrose com hipertensão portal."},
    {id:"ic19",d:"facil",q:"A icterícia é mais bem percebida em ambiente:",o:["Escuro","Bem iluminado (avaliando escleras/mucosas)","Com luz azul","Indiferente"],a:1,e:"Avalia-se em ambiente iluminado, observando escleras e mucosas."},
    {id:"ic20",d:"moderado",q:"A bilirrubina não conjugada tem afinidade por qual tecido (risco no RN)?",o:["Tecido nervoso (núcleos da base)","Tecido ósseo","Tecido muscular","Apenas a pele"],a:0,e:"A BI é lipossolúvel e tem afinidade pelo tecido nervoso (risco de kernicterus no RN)."},
    {id:"ic21",d:"moderado",q:"A icterícia fisiológica do recém-nascido é por hiperbilirrubinemia:",o:["Conjugada","Não conjugada (indireta)","Obstrutiva mista","Por hemólise, sempre"],a:1,e:"A icterícia fisiológica do RN decorre da imaturidade da conjugação → bilirrubina indireta."},
    {id:"ic22",d:"dificil",q:"Vesícula palpável e indolor + icterícia progressiva sugere fortemente:",o:["Cálculo de vesícula simples","Neoplasia periampular/pâncreas (Courvoisier)","Hepatite A","Síndrome de Gilbert"],a:1,e:"Courvoisier (vesícula palpável indolor) com icterícia progressiva sugere obstrução maligna."},
    {id:"ic23",d:"facil",q:"Acolia fecal é:",o:["Fezes muito escuras","Fezes esbranquiçadas (sem pigmento biliar)","Sangue nas fezes","Diarreia"],a:1,e:"Acolia fecal é a fezes claras/esbranquiçadas por ausência de pigmento biliar (obstrução)."},
    {id:"ic24",d:"moderado",q:"Fetor hepaticus é:",o:["Hálito adocicado/pútrido da insuficiência hepática","Dor no fígado","Aumento do baço","Cor da urina"],a:0,e:"Fetor hepaticus é o hálito característico (adocicado e fétido) da insuficiência hepática."},
    {id:"ic25",d:"dificil",q:"Anorexia, mialgia, astenia e febre que precedem a icterícia sugerem:",o:["Hepatite viral","Coledocolitíase","Anemia ferropriva","Cistite"],a:0,e:"O pródromo (anorexia, mialgia, astenia, febre) é típico da hepatite viral."},
    {id:"ic26",d:"moderado",q:"A GGT elevada acompanhando a fosfatase alcalina confirma origem:",o:["Hepatobiliar (colestase)","Óssea","Renal","Muscular"],a:0,e:"A GGT elevada junto à FA confirma origem hepatobiliar (a FA também sobe em doença óssea)."},
    {id:"ic27",d:"facil",q:"A bilirrubina direta é:",o:["Lipossolúvel, sem colúria","Hidrossolúvel, com colúria","Não filtrada pelos rins","Igual à indireta"],a:1,e:"A BD é hidrossolúvel, filtrada pelos rins, causando colúria."},
    {id:"ic28",d:"dificil",q:"Esfregaço periférico, LDH e haptoglobina são pedidos para investigar:",o:["Hemólise","Obstrução biliar","Cirrose","Hepatite medicamentosa"],a:0,e:"Para investigar hemólise: esfregaço, LDH (alto), haptoglobina (baixa) e Coombs."},
    {id:"ic29",d:"moderado",q:"Leucocitose em paciente ictérico, com dor em HD e febre, sugere:",o:["Colangite","Síndrome de Gilbert","Anemia","Hepatite A leve"],a:0,e:"Leucocitose somada à tríade de Charcot sugere colangite."},
    {id:"ic30",d:"moderado",q:"O exame de imagem inicial mais usado na icterícia obstrutiva é:",o:["Ultrassom de abdome","Radiografia de tórax","Eletrocardiograma","Endoscopia digestiva alta"],a:0,e:"O US de abdome é o exame inicial para avaliar dilatação de vias biliares/obstrução."}

  dermato:{ name:"Semiologia Dermatológica", doc:"16. Semiologia Dermatológica",
