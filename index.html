tips:"ITU: E. coli = 80-85% dos casos; bactérias intestinais predominam. Feminino: uretra mais curta + proximidade anus = mais ITU. Masculino: uretra mais longa + fluido prostatico bactericida. Faixa fertil: 50% mulheres vs 0,1% homens. Pre-escolar: 1:10 (1 homem para 10 mulheres). Cistite (baixa): disuria, polaciuria, hematuria; E. coli 75-95%; cefalosporina 2-3g por 3-5 dias. Pielonefrite (alta): febre, dor lombar, bacteremia; pode evoluir para sepse; 7-14 dias de tratamento. 25% cistite nao tratada → pielonefrite. 30% ITU baixa tem comprometimento alto oculto. ITU hospitalar: E. coli, Klebsiella, Serratia, P. aeruginosa alem dos comunitarios. E. coli uropatogenica: fimbrias P (adesao) → invasao → exfoliacao celular com bacterias para urina.",
questions:[{id:"a14q1",d:"facil",q:"Segundo o slide da aula, como a ITU e definida e quais sao seus sintomas tipicos?",o:["Presenca de microrganismos que se multiplicam e invadem tecidos das vias urinarias gerando resposta inflamatoria; sintomas: disuria (dor ao urinar), poliaciuria (urgencia), poliuria (miccao excessiva), urina escura com odor desagradavel","Presenca de hemácias na urina sem infeccao; sintomas: hematuria isolada sem dor","Infeccao exclusiva do rim; sintomas: apenas dor lombar intensa","Colonizacao bacteriana da bexiga sem resposta inflamatoria; sempre assintomatica"],a:0,e:"O slide \"Infeccao do Trato Urinario (ITU)\" define: \"Caracteriza-se pela presenca de microrganismos que se multiplicam e invadem tecidos das vias urinarias, gerando uma resposta inflamatoria.\" Sintomatologia: Disuria (dor ou ardor ao urinar); Poliaciuria (urgencia em miccao); Poliuria (miccao excessiva); Urina escura com odor desagradavel."},
{id:"a14q2",d:"moderado",q:"De acordo com o slide da aula, quais fatores anatomicos explicam a maior incidencia de ITU em mulheres em comparacao aos homens?",o:["Feminino: uretra MAIS CURTA e maior proximidade do anus com a uretra e vestibulo vaginal (enterobacterias); Masculino: uretra MAIS LONGA, distancia do anus e atividade bactericida do fluido prostatico","As mulheres tem sistema imune mais fraco que os homens, favorecendo ITU","O pH urinario das mulheres e mais alcalino, favorecendo o crescimento bacteriano","As mulheres tem menor producao de IgA secretora nas mucosas urinarias"],a:0,e:"O slide \"Influencia do Genero\" afirma: FEMININO maior incidencia: \"Uretra mais curta; Maior proximidade do anus com a uretra e o vestibulo vaginal: ENTEROBACTERIAS.\" MASCULINO menor incidencia: \"Uretra mais longa; Distancia do anus; Atividade bactericida do fluido prostatico.\""},
{id:"a14q3",d:"moderado",q:"Segundo a tabela do slide da aula, qual e a proporcao de ITU entre homens e mulheres na faixa etaria fertil?",o:["Faixa fertil: proporcao 1:50 (homem:mulher) - 50 mulheres para cada 1 homem com ITU; fatores: anatomicos, flutuacoes hormonais e vida sexual ativa","Faixa fertil: proporcao 1:2; ITU afeta igualmente ambos os sexos","Faixa fertil: proporcao 2:1 (homens mais afetados que mulheres)","Faixa fertil: proporcao 1:5; apenas ligeira diferenca entre os sexos"],a:0,e:"A tabela \"IDADE X GENERO\" no slide mostra: Faixa etaria Fertil = proporcao aproximada entre os sexos (homem:mulher) = 1:50. O grafico epidemiologico confirma: 50% das mulheres na faixa reprodutiva vs 0,1% dos homens. Fatores: anatomicos, flutuacoes hormonais e vida sexual ativa."},
{id:"a14q4",d:"moderado",q:"De acordo com o slide da aula, quais sao os fatores predisponentes para o desenvolvimento de ITU?",o:["Gravidez (progesterona → relaxamento bexiga → estase); Climaterio; Diabetes (neuropatia vesical); Habitos de higiene inadequados; ISTs; Obstrucao urinaria (prostata, calculos, tumores); Corpos estranhos (sondas); Doencas neurologicas (esvaziamento da bexiga)","Apenas imunossupressao e diabetes; outros fatores nao contribuem para ITU","Apenas mulheres podem desenvolver ITU; homens estao imunes pela uretra longa","Apenas infeccoes bacterianas preexistentes; doencas cronicas nao predispoem ITU"],a:0,e:"O slide \"Fatores que predispoe ITU\" lista: Gravidez (progesterona → relaxamento bexiga → estase urinaria); Climaterio (alteracoes favorecem ITU); Diabetes (neuropatia afeta sensibilidade vesical); Habitos de higiene inadequados; ISTs; Obstrucao urinaria (prostata, defeitos congenitos, calculos, tumores); Corpos estranhos (sondas - carregam bactérias → aderencia e proliferacao); Doencas neurologicas (mecanismos de esvaziamento da bexiga → estase de urina)."},
{id:"a14q5",d:"facil",q:"Segundo o slide da aula, qual e a classificacao anatomica das ITUs?",o:["ITU BAIXA: uretra (uretrite) e bexiga (cistite); ITU ALTA: ureteres e rins (pielonefrite e nefrite intersticial bacteriana - inflamacao dos tubulos e tecido intersticial do rim)","ITU baixa: rins (pielonefrite); ITU alta: bexiga (cistite)","ITU baixa: qualquer infeccao abaixo da cintura; ITU alta: qualquer infeccao acima","Nao existe classificacao anatomica; toda ITU e igual independente do local"],a:0,e:"O slide \"Classificacao Anatomica\" afirma: \"ITU baixa e Alta. ITU baixa: Uretra (uretrite) e Bexiga (cistite). ITU alta: Ureteres e Rins (pielonefrite, nefrite intersticial bacteriana).\" O diagrama anatomico mostra claramente: ITU ALTA = rins e ureteres (zona superior); ITU BAIXA = bexiga e uretra (zona inferior). A pielonefrite envolve \"Inflamacao dos tubulos e do tecido intersticial do rim.\""},
{id:"a14q6",d:"moderado",q:"De acordo com o slide da aula, quais sao as caracteristicas clinicas e o tratamento da cistite?",o:["Mais frequente; sintomas: disuria, polaciuria, possivel hematuria, tenesmo vesical, dor hipogastrica; agentes: E. coli (75-95%) e S. saprophyticus; 25% dos nao tratados progridem para pielonefrite; tratamento: cefalosporina 2a ou 3a geracao por 3-5 dias","Sintomas: apenas dor lombar e febre alta; agente: P. aeruginosa; tratamento: penicilina 14 dias","Cistite e sempre assintomatica; diagnostico so por urocultura; sem tratamento necessario","Sintomas: dor ao urinar e hematuria; agente: S. aureus em 80%; tratamento: vancomicina IV"],a:0,e:"O slide \"ITU Baixa - Cistite\" afirma: \"MAIS FREQUENTE. Clinicamente caracteriza-se por presenca de: Disuria (dor; ardor ao urinar); Polaciuria (urgencia de miccao); Possivel hematuria; Tenesmo vesical (sensacao de precisar urinar); Dor hipogastrica.\" Agentes: E. coli (75-95%) e S. saprophyticus (coagulase-negativo). \"Em 25% dos casos nao tratados, a cistite pode progredir para pielonefrite.\" Tratamento: cefalosporina 2a ou 3a geracao, por 3-5 dias."},
{id:"a14q7",d:"moderado",q:"Segundo o slide da aula, o que diferencia a pielonefrite da cistite clinicamente e em termos de gravidade?",o:["Pielonefrite = MAIS GRAVE (pode evoluir para sepse); bacteremia; pielonefrite cronica → cicatrizes nos rins; sintomas: dor em flanco, sensibilidade lombar (sinal de Giordano positivo), FEBRE, calafrios, nauseas, vomitos; tratamento 7-14 dias (pode exigir hospitalizacao e ATB IV)","Cistite e mais grave que pielonefrite; pielonefrite e sempre autolimitada","Nao ha diferenca clinica; ambas se apresentam identicamente","Pielonefrite e menos grave; nao requer tratamento; cistite pode causar sepse"],a:0,e:"O slide \"ITU Alta - Pielonefrite\" afirma: \"MAIS GRAVE → pode evoluir para sepse. Geralmente resulta em bacteremia. Pielonefrite cronica → cicatrizes nos rins. Clinicamente caracterizada por: Dor em flanco; Sensibilidade na regiao lombar (sinal de Giordano positivo); Febre, calafrios, nauseas e vomitos.\" Tratamento: cefalosporina 2a ou 3a geracao; em casos graves, pode exigir hospitalizacao e antibioticoterapia intravenosa; duracao 7-14 dias ou mais."},
{id:"a14q8",d:"moderado",q:"De acordo com o slide da aula, qual e a diferenca no tratamento entre cistite e pielonefrite?",o:["DIFERE NA DURACAO: cistite → tratamento mais curto (3-5 dias); pielonefrite → tratamento mais longo (7-14 dias ou mais); pielonefrite pode exigir hospitalizacao e ATB intravenoso devido a maior gravidade","Cistite e tratada com antibioticos mais potentes; pielonefrite com antibioticos mais fracos","Ambas sao tratadas com o mesmo esquema de 7 dias; nao ha diferenca","Cistite nao requer tratamento; pielonefrite e tratada com penicilina por 1 mes"],a:0,e:"O slide \"Tratamento Cistite X Pielonefrite\" afirma: \"DIFERE NA DURACAO. Em casos de pielonefrite, pode exigir hospitalizacao e antibioticoterapia intravenosa devido a maior gravidade da infeccao.\" Cistite: tratamento mais curto (3-5 dias). Pielonefrite: tratamento mais longo (7-14 dias ou mais). Ambas tratadas com antibiotico de amplo espectro, como cefalosporina de 2a ou 3a geracao."},
{id:"a14q9",d:"moderado",q:"Segundo o slide da aula, qual e o agente etiologico mais comum das ITUs e por que as bacterias intestinais predominam?",o:["E. coli = 80-85% dos casos; bacterias intestinais (enterobacterias) predominam porque a flora intestinal migra para a regiao periuretral, especialmente em mulheres (proxim idade anus-uretra), ascendendo pelo trato urinario","S. aureus = 80-85%; predomina por producao de toxinas que facilitam invasao urinaria","Candida albicans = 80-85%; fungos dominam devido a alta umidade da regiao perineal","Enterococcus faecalis = 80-85%; coloniza preferencialmente o epitelio vesical"],a:0,e:"O slide \"Bacterias Intestinais Predominam nas Infeccoes do Sistema Urinario\" (Tabela 83.1) mostra: E. coli = 80-85%; Klebsiella sp = 5%; Enterobacter sp = 1%; Proteus mirabilis = 3%; Enterococcus faecalis = 4%; S. saprophyticus = 5-10%. Destaque: \"ENTEROBACTERIAS\" como grupo dominante. O diagrama anatômico mostra E. coli migrando da regiao perirretal (1), para a regiao periuretral (2), ascendendo pela uretra (3) ate a bexiga."},
{id:"a14q10",d:"moderado",q:"De acordo com o slide da aula, quais bacterias causam ITU comunitaria nao complicada e quais causam ITU hospitalar complicada?",o:["Comunitaria nao complicada: E. coli, S. saprophyticus, Klebsiella, E. faecalis; Hospitalar complicada (alem dos comunitarios): Enterobacter cloacae, Serratia marcescens, Proteus mirabilis, P. aeruginosa, Streptococcus Grupo B","Mesmos agentes para ambas; a distincao e apenas clinica, nao microbiologica","ITU comunitaria: apenas S. aureus; ITU hospitalar: apenas Candida","ITU comunitaria: P. aeruginosa e Serratia; ITU hospitalar: E. coli e S. saprophyticus"],a:0,e:"O slide \"Etiologia das ITU: Comunitaria X Hospitalar\" mostra: Uncomplicated UTI Pathogens (comunitaria) = E. coli, S. saprophyticus, Klebsiella spp., E. faecalis. Complicated UTI Pathogens (hospitalar) = E. coli, Klebsiella spp., Enterobacter cloacae, Serratia marcescens, Proteus mirabilis, Pseudomonas aeruginosa, E. faecalis, Group B streptococci. ITU hospitalar tem espectro mais amplo e geralmente com agentes mais resistentes."},
{id:"a14q11",d:"moderado",q:"Segundo o slide da aula, quais sao os fatores de virulencia da E. coli uropatogenica?",o:["Fimbrias/adesinas (aderencia - fimbrias P ou pelos de tipo 1); Flagelo = antigeno H (motilidade); Capsula = antigeno K (resistencia a fagocitose); LPS = antigeno O (determinante antigenico); Hemolisina (libera Fe de eritrocitos, evita fagocitose, toxico para tecidos); Sistema Aerobactina (captacao de Fe)","Apenas a capsula polissacaridica; outros fatores nao sao relevantes para a virulencia urinaria","LPS e TSST-1 (superantigeno); coagulase; proteina A; hemolisina alfa","Apenas toxinas exotoxinas sem estruturas de adesao especificas"],a:0,e:"O slide \"Fatores de virulencia: E. coli uropatogenica\" mostra o diagrama com: Fimbrias = \"estruturas responsaveis pela aderencia da bacteria\"; Flagelo (antigeno H) = \"responsavel pela motilidade\"; Capsula (antigeno K) = \"confere resistencia a fagocitose\"; LPS (antigeno O) = \"determinante antigenico\"; Hemolisina = \"Liberacao de Fe dos eritrocitos, evita a funcao dos fagocitos e e toxico para tecidos do hospedeiro\"; Sistema Aerobactina = captacao de Fe."},
{id:"a14q12",d:"moderado",q:"De acordo com o slide da aula, qual e a sequencia da patogenese da E. coli uropatogenica?",o:["FIXACAO (fimbrias P/pelos tipo 1 se ligam ao urotellio) → INVASAO (toxinas/hemolisinas) → REPLICACAO → EXFOLIACAO (celulas epiteliais sofrem apoptose e exfoliacao carregando E. coli para a urina) + RESISTENCIA BACTERIANA intracelular","E. coli so causa ITU por via hematogenica; nao coloniza o urotellio por contiguidade","E. coli produz apenas endotoxinas sistemicas que causam ITU por efeito remoto","E. coli uropatogenica nao invade celulas; permanece apenas na luz urinaria"],a:0,e:"O slide \"Patogenese: E. coli uropatogenica\" mostra a sequencia: FIXACAO (Adesinas/Fimbrias P ou pelos de tipo 1 → Receptor no urotellio) → INVASAO (Toxinas/hemolisinas) → REPLICACAO → EXFOLIACAO (\"Celulas epiteliais sofrem apoptose e exfoliacao, carregando consigo a E. coli para a urina.\") + RESISTENCIA BACTERIANA (bacterias intracelulares sobrevivem aos antibioticos)."},
{id:"a14q13",d:"moderado",q:"Segundo o slide da aula, o que caracteriza uma ITU COMPLICADA em comparacao a uma NAO COMPLICADA?",o:["COMPLICADA: associada com condicao subjacente que eleva o risco de falha terapeutica (sexo masculino, obstrucao urinaria, alteracoes anatomicas/funcionais, microrganismo multirresistente, corpo estranho/cateteres, imunossupressao, calculos urinarios); NAO COMPLICADA: sexo feminino, nao gravida, sem alteracoes TU, sem cateter, sem alteracoes de imunidade, adquirida na comunidade","Complicada = qualquer ITU em idoso; nao complicada = qualquer ITU em jovem","Complicada = ITU com febre; nao complicada = ITU afebril","Complicada = ITU por P. aeruginosa; nao complicada = ITU por E. coli"],a:0,e:"O slide \"Classificacao por Gravidade/Origem\" mostra: COMPLICADA = \"associada com condicao subjacente que eleva o risco de falha terapeutica: Sexo masculino; Obstrucao urinaria; Alteracoes anatomicas do TU; Alteracoes funcionais do TU; Microrganismo multirresistente; Corpo estranho/cateteres urinarios; Imunossupressao; Calculos urinarios e/ou nefrocalcinose.\" NAO COMPLICADA = \"Sexo feminino, nao gravida; Ausencia de alteracoes anatomicas/funcionais do TU; Ausencia de cateteres urinarios; Ausencia de alteracoes da imunidade; Adquirida na comunidade.\""},
{id:"a14q14",d:"moderado",q:"De acordo com o slide da aula, qual e a proporcao de ITU entre homens e mulheres na faixa etaria neonatal e geriatrica?",o:["Neonatal: 1,5:1 (homens mais afetados); Geriatrica: 1:1,5 (mulheres ligeiramente mais afetadas mas proporcao se aproxima - aumento da prostata no homem idoso)","Neonatal: 1:50 (mulheres dominam); Geriatrica: 1:50 (mulheres dominam)","Em todas as faixas etarias a proporcao e constante de 1:50","Neonatal: 5:1 (homens dominam); Geriatrica: 50:1 (homens dominam)"],a:0,e:"A tabela \"IDADE X GENERO\" no slide mostra: Neonatal = 1,5:1 (homem:mulher - homens levemente mais afetados, possivelmente por anomalias congenitas mais frequentes); Pre-escolar = 1:10; Escolar = 1:30; Fertil = 1:50 (pico da diferenca entre os sexos); Geriatrica = 1:1,5 (proporcao se aproxima - homens idosos tem mais ITU pelo aumento da prostata e retencao urinaria)."},
{id:"a14q15",d:"moderado",q:"Segundo o slide da aula, o que pode ocorrer se 30% das ITU baixas apresentarem comprometimento alto oculto?",o:["Cerca de 30% das ITU baixas apresentam comprometimento alto oculto (pielonefrite subclínica); nestas situacoes o tratamento deve ser feito para ITU alta (maior duracao e possivelmente hospitalizacao)","Essas 30% regridem espontaneamente sem tratamento especifico","Essas 30% sempre evoluem para insuficiencia renal cronica sem possibilidade de cura","O comprometimento alto oculto nao tem implicacao clinica; o tratamento e igual a cistite simples"],a:0,e:"O slide mostra em caixa verde: \"Cerca de 30% das ITU baixas apresentam comprometimento alto oculto. Tratamento deve ser feito para ITU alta.\" Ou seja: mesmo uma paciente com sintomas de cistite (ITU baixa) pode ter pielonefrite subclínica. Os fatores que indicam maior risco de comprometimento alto incluem (em vermelho no slide): infeccao hospitalar, cateter urinario, diabetes mellitus, alteracoes anatomicas ou funcionais, sintomas por 7 dias ou mais, imunossupressao."},
{id:"a14e1",d:"moderado",q:"Segundo o slide da aula, quais sao os fatores de risco especificos associados ao uso de cateter vesical de demora que predispoem a ITU?",o:["Colonizacao do meato uretral (bactérias da regiao perineal migram para o cateter) e duracao da cateterizacao (quanto mais tempo, maior o risco de infeccao)","O material do cateter (latex vs silicone) e o unico determinante do risco de ITU","A ITU por cateter so ocorre em pacientes imunossuprimidos; pacientes imunocompetentes nao sao afetados","O calibre do cateter e o unico determinante do risco; materiais antibacterianos nao ajudam"],a:0,e:"O slide \"ITU relacionada ao cateter vesical de demora\" afirma: \"Fatores de risco associados a infeccao durante o uso do cateter vesical de demora: Colonizacao do meato uretral; Duracao da cateterizacao.\" O diagrama anatomico mostra claramente como o cateter cria uma via direta da regiao perineal (colonizada por enterobacterias) para a bexiga normalmente esteril."},
{id:"a14e2",d:"moderado",q:"De acordo com o slide da aula, por que a gravidez predispoe ao desenvolvimento de ITU?",o:["Aumento da progesterona durante a gravidez causa relaxamento maior da bexiga e favorece a estase urinaria; alem disso, ha diminuicao das defesas da mulher durante a gestacao","A gravidez so predispoe ITU porque a mulher bebe menos agua durante o primeiro trimestre","O feto comprime mecanicamente a bexiga impedindo a miccao completa e causando retencao","Gravidez nao e fator de risco para ITU; a hipersensibilidade urinaria normal da gravidez e confundida com disuria"],a:0,e:"O slide \"Fatores que predispoe ITU\" afirma sobre gravidez: \"Diminuicao das defesas da mulher.\" E tambem: \"Aumento da progesterona → relaxamento maior da bexiga e favorece a estase urinaria.\" A estase urinaria permite que bacterias colonizem e se multipliquem sem serem eliminadas pelo fluxo normal de urina, predispondo a ITU."},
{id:"a14e3",d:"moderado",q:"Segundo o slide da aula, qual e a diferenca anatomica que explica por que mulheres na faixa etaria fertil tem incidencia de ITU 50 vezes maior que homens?",o:["Feminino: uretra mais curta + proximidade do anus com a uretra e o vestibulo vaginal favorece colonizacao por enterobacterias; Masculino: uretra mais longa + distancia do anus + atividade bactericida do fluido prostatico","Mulheres tem pH urinario mais alcalino que favorece crescimento bacteriano","Mulheres produzem menos IgA secretora na mucosa urinaria que homens da mesma idade","O sistema imune das mulheres ferteis e cronicamente suprimido pelos hormonios sexuais"],a:0,e:"O slide \"Influencia do Genero\" afirma: FEMININO maior incidencia = \"Uretra mais curta; Maior proximidade do anus com a uretra e o vestibulo vaginal: ENTEROBACTERIAS.\" MASCULINO menor incidencia = \"Uretra mais longa; Distancia do anus; Atividade bactericida do fluido prostatico.\" O grafico epidemiologico confirma: faixa reprodutiva feminina = 50% vs 0,1% masculino (proporcao 1:50)."},
{id:"a14e4",d:"moderado",q:"De acordo com o slide da aula, quais sao as caracteristicas da patogenese da E. coli uropatogenica que culminam na exfoliacao do urotellio?",o:["FIXACAO por fimbrias P ou pelos de tipo 1 → INVASAO por toxinas e hemolisinas → REPLICACAO intracelular → EXFOLIACAO: celulas epiteliais sofrem apoptose e exfoliacao, carregando E. coli para a urina; celulas intracelulares sobrevivem aos antibioticos (RESISTENCIA BACTERIANA)","E. coli so causa ITU por producao de endotoxinas (LPS) que irritam o urotellio sem invasao celular","A E. coli uropatogenica nao invade celulas; apenas bloqueia a miccao causando retencao","A patogenese e identica a de outras E. coli; nao ha diferenca na virulencia"],a:0,e:"O slide \"Patogenese: E. coli uropatogenica\" mostra em sequencia: FIXACAO (Adesinas/Fimbrias P ou pelos de tipo 1 com Receptor no urotellio) → INVASAO (Toxinas - hemolisinas) → REPLICACAO → EXFOLIACAO (\"Celulas epiteliais sofrem apoptose e exfoliacao, carregando consigo a E. coli para a urina.\") + RESISTENCIA BACTERIANA (celulas que invadiram ficam intracelulares, escapando dos antibioticos)."},
{id:"a14e5",d:"moderado",q:"Segundo o slide da aula, qual e o significado clinico do sinal de Giordano na pielonefrite?",o:["Sinal de Giordano positivo = sensibilidade na regiao lombar (flancos) a percussao ou palpacao; e um sinal clinico de pielonefrite (ITU alta), indicando inflamacao renal","Sinal de Giordano e a presenca de bacteria na urina com mais de 10^5 UFC/mL","Sinal de Giordano e a visualizacao de bacterias no exame de urina a fresco","Sinal de Giordano e a febre superior a 38,5oC associada a disuria"],a:0,e:"O slide \"ITU Alta - Pielonefrite\" cita como sintoma clinico: \"Sensibilidade na regiao lombar (sinal de Giordano positivo).\" O sinal de Giordano e um teste clinico de percussao/palpacao na regiao lombossacra: quando positivo indica dor/sensibilidade, sugestivo de pielonefrite. Juntamente com dor em flanco, febre, calafrios, nauseas e vomitos, compoe a apresentacao tipica da pielonefrite."},
{id:"a14e6",d:"moderado",q:"De acordo com o slide da aula, qual e a importancia do S. saprophyticus na etiologia das ITUs e qual sua caracteristica microbiologica diferencial?",o:["S. saprophyticus: coagulase-negativo; causa ITU nao complicada em mulheres jovens sexualmente ativas (2a causa na ITU comunitaria nao complicada, com 5-10% dos casos); presente na tabela de etiologia comunitaria mas ausente na hospitalar","S. saprophyticus e a principal causa de ITU em todos os grupos demograficos (>80% dos casos)","S. saprophyticus causa apenas ITU hospitalar complicada em pacientes com cateter","S. saprophyticus e Gram-negativo e causa apenas pielonefrite grave em idosos"],a:0,e:"A tabela no slide \"Bacterias Intestinais Predominam nas ITU\" mostra S. saprophyticus = 5-10% dos casos. E apresentado como \"coagulase-negativo.\" Na tabela de etiologia comunitaria vs hospitalar, S. saprophyticus aparece apenas na coluna \"Uncomplicated UTI Pathogens\" (comunitaria nao complicada), ausente na hospitalar. E tipico de mulheres jovens sexualmente ativas (ja aprendemos na Aula 8 sobre Staphylococcus)."},
{id:"a14e7",d:"facil",q:"Segundo o slide da aula, quais sao os agentes de ITU HOSPITALAR (complicada) que NAO aparecem na ITU comunitaria?",o:["Enterobacter cloacae, Serratia marcescens, Pseudomonas aeruginosa e Streptococcus Grupo B aparecem apenas na ITU hospitalar complicada; S. saprophyticus aparece apenas na comunitaria","Os mesmos agentes comunitarios causam a ITU hospitalar; apenas a gravidade difere","P. aeruginosa causa ITU comunitaria frequente; E. coli so causa ITU hospitalar","Candida albicans e o principal agente de ITU hospitalar complicada, nao bacterias"],a:0,e:"O slide \"Etiologia das ITU: Comunitaria X Hospitalar\" mostra: Complicated UTI Pathogens (hospitalar) inclui, alem dos comunitarios: Enterobacter cloacae, Serratia marcescens, Proteus mirabilis, Pseudomonas aeruginosa e Group B streptococci. Staphylococcus saprophyticus aparece apenas no lado da comunitaria nao complicada. A maior diversidade de agentes na ITU hospitalar reflete o ambiente de maior seletividade antimicrobiana."}]},
  aula13:{name:"Aula 13 - IRAS",doc:"AIP 2025 - Prof. Daniela Ramos",
summary:`## Aula 13 - IRAS (Infeccoes Relacionadas a Assistencia a Saude)

### Definicoes
- INFECCAO COMUNITARIA: processo infeccioso presente em individuos da comunidade (ou incubacao a admissao) OU evidencia clinica/laboratorial de infeccao no ato da internacao hospitalar; desde que NAO possa ser relacionada com procedimento/internacao anterior ou instalacao de dispositivo medico invasivo. Infeccao em RN via transplacentaria com bolsa rota >24h = COMUNITARIA.
- IRAS (ANVISA 2021): infeccao adquirida apos o paciente ser submetido a procedimento de assistencia a saude ou internacao, que possa ser relacionada a esses eventos. Convenciona-se IRAS toda manifestacao clinica a partir do TERCEIRO DIA DE INTERNACAO (48-72h apos internacao) quando nao ha evidencia de infeccao na admissao.
- IRAS associada a dispositivo invasivo: uso de cateter central, cateter vesical de demora ou ventilador mecanico por >2 dias (D1 = dia de instalacao) e na data da infeccao o paciente estava em uso ou o dispositivo foi removido no dia anterior.

### Tipos de pneumonia hospitalar
- NOSOCOMIAL: ocorre apos 48h de hospitalizacao; agente principal: MRSA.
- ASSOCIADA A VENTILACAO MECANICA: subtipo nosocomial; apos 48h do uso de VM; agentes: P. aeruginosa e S. aureus.
- ADQUIRIDA NA COMUNIDADE: Tipica (S. pneumoniae, H. influenzae, S. aureus); Atipica (M. pneumoniae, Chlamydia, L. pneumophila).

### Fatores de risco por procedimento invasivo
- Ventilacao mecanica → PNEUMONIA; Sondagem vesical de demora → ITU; Cirurgia → INFECCAO DO SITIO CIRURGICO; Acesso venoso central → INFECCAO DA CORRENTE SANGUINEA.
- 'As infeccoes hospitalares podem ser causadas por falta de CUIDADOS DE HIGIENE - SEGURANCA DO PACIENTE!!!'

### Alcance das IRAS
- IRAS abrange: procedimentos hospitalares e ambulatoriais, servico de hemodialise, instituicao de longa permanencia para idosos, doentes cronicos, home care e clinicas odontologicas.

### Fontes de contaminacao no ambiente hospitalar
- Bactérias de: outros pacientes, profissionais de saude (uniforme), visitantes, equipamentos, ambiente externo, ductos de ventilacao, elevador, insetos.
- Locais com maior concentracao de bacterias: Registro medico, Computador, Macanetas, Celular, Carrinhos, Colchoes, Bancada de medicamentos, Monitor cardiaco.

### Cadeia das IRAS
- DESEQUILIBRIO DA MICROBIOTA NORMAL → PATOLOGIA/PROCEDIMENTOS/ECOLOGIA → INFECCAO.
- Tipos de infeccao hospitalar: ENDOGENA (do proprio paciente - secrecoes, excretas, sangue; transmitida por veiculos, medicamentos); EXOGENA; CRUZADA (entre pacientes - fomites, ambiente); INTERHOSPITALAR.

### Patogenese geral das IRAS
- Exposicao → Adesao (pele/mucosas) → Invasao (epitelio) → Colonizacao e crescimento → Toxicidade/Invasividade → Dano tecidual.
- Transmissao exogena: (1) transmissao de fonte externa ate a porta de entrada (mao, fomites); (2) Evasao das defesas primarias (capsula, enzimas, etc.).

### Areas criticas e reprocessamento de equipamentos
- UTI e Centro Cirurgico = AREAS CRITICAS (alta gravidade + longa permanencia).
- Reprocessamento: Material critico (vasos sanguineos/tecidos livres, ex: instrumental) → ESTERILIZACAO; Material semi-critico (mucosa/pele nao integra, ex: inaladores) → DESINFECCAO; Material nao critico (pele integra, ex: comadre) → LIMPEZA.`,
tips:"IRAS = infeccao apos assistencia a saude; manifestacao a partir do 3o dia de internacao (48-72h). Infeccao comunitaria: na admissao ou incubacao na admissao; NAO relacionada a internacao/dispositivo anterior. IRAS dispositivo invasivo: uso por >2 dias (D1 = instalacao). Pneumonia nosocomial: >48h internacao; MRSA. Ventilacao mecanica: >48h; P. aeruginosa + S. aureus. 4 IRAS por procedimento: pneumonia (VM), ITU (sondagem), sitio cirurgico (cirurgia), bacteremia (cateter central). Cadeia IRAS: endogena (proprio paciente), exogena, cruzada (entre pacientes), interhospitalar. Reprocessamento: critico = esterilizacao; semi-critico = desinfeccao; nao critico = limpeza. Locais de maior concentracao de bacterias: celular, macaneta, computador, teclado.",
questions:[{id:"a13q1",d:"facil",q:"Segundo o slide da aula, qual e a definicao de IRAS (ANVISA 2021)?",o:["E a infeccao adquirida apos o paciente ser submetido a um procedimento de assistencia a saude ou a uma internacao, que possa ser relacionada a esses eventos; convenciona-se como IRAS toda manifestacao clinica a partir do TERCEIRO DIA DE INTERNACAO (48-72h)","E qualquer infeccao que ocorre no hospital, independente de relacao com internacao anterior","Sao apenas as infeccoes em UTI adquiridas apos cirurgia cardiotoxica","E a infeccao diagnosticada ate 24h apos a admissao hospitalar"],a:0,e:"O slide \"Infeccao relacionada a assistencia a saude (IRAS)\" (ANVISA, 2021) define: \"E a infeccao adquirida apos o paciente ser submetido a um procedimento de assistencia a saude ou a uma internacao, que possa ser relacionada a estes eventos.\" E complementa: \"convenciona-se como IRAS toda manifestacao clinica de infeccao que se apresentar A PARTIR DO TERCEIRO DIA DE INTERNACAO (48-72 hs apos internacao)\" quando o periodo de incubacao e desconhecido e nao ha evidencia de infeccao na admissao."},
{id:"a13q2",d:"moderado",q:"De acordo com o slide da aula, qual e a definicao de INFECCAO COMUNITARIA e como ela se diferencia da IRAS?",o:["COMUNITARIA: processo infeccioso na comunidade (ou incubacao a admissao) OU evidencia clinica/laboratorial de infeccao no ato da internacao, DESDE QUE nao possa ser relacionada com procedimento/internacao anterior ou dispositivo medico invasivo. IRAS: adquirida APOS a admissao, relacionada ao procedimento ou internacao","Comunitaria: qualquer infeccao fora do hospital; IRAS: qualquer infeccao dentro do hospital, independente do momento","Comunitaria: infeccao em paciente com menos de 48h de internacao; IRAS: infeccao apos 48h","Sao identicas; o termo utilizado depende apenas do medico assistente"],a:0,e:"O slide mostra dois conceitos lado a lado: COMUNITARIA = \"Constatada ou incubada na admissao, nao relacionada a internacao anterior no mesmo hospital\" + \"Associada a complicacao ou extensao de infeccao presente na admissao, exceto se houver troca de microrganismos.\" IRAS = \"Adquiridas apos admissao do paciente e que se manifesta durante a internacao ou apos alta, quando puder ser relacionada a internacao ou procedimento.\""},
{id:"a13q3",d:"moderado",q:"Segundo o slide da aula, em que situacao uma infeccao em recem-nascido e classificada como COMUNITARIA?",o:["Infeccao em RN cuja via de aquisicao por via transplacentaria e conhecida OU associada com bolsa rota superior a 24h = COMUNITARIA (nao IRAS)","Toda infeccao em RN e automaticamente classificada como IRAS, pois o parto ocorre em ambiente hospitalar","Infeccao em RN apos 72h de vida em ambiente hospitalar = COMUNITARIA","Infeccao em RN por qualquer microrganismo diferente de S. aureus = COMUNITARIA"],a:0,e:"O slide \"Infeccao Comunitaria\" mostra em caixa laranja: \"Infeccao em recem-nascidos cuja via de aquisicao por via transplacentaria e conhecida ou associada com bolsa rota superior a 24h = COMUNITARIA!\" Isso diferencia das infeccoes neonatais adquiridas no ambiente hospitalar apos o nascimento, que seriam IRAS."},
{id:"a13q4",d:"moderado",q:"De acordo com o slide da aula, quando uma IRAS e considerada ASSOCIADA A DISPOSITIVO INVASIVO?",o:["O paciente usa cateter central, cateter vesical de demora ou ventilador mecanico por periodo maior que 2 dias consecutivos (D1 = dia de instalacao), e na data da infeccao o paciente estava em uso do dispositivo OU o dispositivo foi removido no dia anterior","Qualquer infeccao em paciente com dispositivo, mesmo que o dispositivo foi instalado ha menos de 12 horas","A infeccao so e associada ao dispositivo se o mesmo microrganismo for isolado do dispositivo e do paciente","Toda infeccao hospitalar e automaticamente associada ao dispositivo invasivo"],a:0,e:"O slide \"IRAS associada a dispositivo invasivo\" define: \"IRAS em pacientes em uso de dispositivo invasivo (cateter central, cateter vesical de demora, ventilador mecanico) por um periodo maior que dois dias de calendario, considerando o D1 o dia da instalacao do dispositivo invasivo. E na data da infeccao: O paciente esta em uso do dispositivo OU O dispositivo foi removido no dia anterior.\""},
{id:"a13q5",d:"facil",q:"Segundo o slide da aula, quais sao os 4 principais tipos de infeccao hospitalar relacionados a procedimentos invasivos especificos?",o:["Ventilacao mecanica → PNEUMONIA (MRSA, P. aeruginosa); Sondagem vesical de demora → ITU; Cirurgia → INFECCAO DO SITIO CIRURGICO; Acesso venoso central → INFECCAO DA CORRENTE SANGUINEA","Cirurgia → meningite; cateter central → pneumonia; sondagem → infeccao cutanea; VM → bacteremia","Apenas a pneumonia nosocomial e relevante; os outros tipos sao raros","Todos os procedimentos invasivos causam apenas bacteremia; as demais infeccoes sao comunitarias"],a:0,e:"O slide \"Fatores de Risco Relacionados aos Procedimentos Invasivos\" mostra ao centro: INFECCAO HOSPITALAR. Ao redor: Ventilacao mecanica → PNEUMONIA; Sondagem vesical de demora → ITU; Cirurgia → INFECCAO DO SITIO CIRURGICO; Acesso venoso central → INFECCAO DA CORRENTE SANGUINEA. E destaca: \"As infeccoes hospitalares podem ser causadas por falta de CUIDADOS DE HIGIENE - SEGURANCA DO PACIENTE!!!\""},
{id:"a13q6",d:"moderado",q:"De acordo com o slide da aula, quais sao os agentes causadores de pneumonia nosocomial e pneumonia associada a ventilacao mecanica?",o:["Pneumonia nosocomial (>48h de hospitalizacao): agente principal = MRSA; Pneumonia associada a ventilacao mecanica (>48h de VM): agentes = Pseudomonas aeruginosa e Staphylococcus aureus","Pneumonia nosocomial: S. pneumoniae; Pneumonia por VM: M. pneumoniae","Ambos os tipos sao causados principalmente por virus respiratorios, nao bacterias","Pneumonia nosocomial: E. coli; Pneumonia por VM: Candida albicans"],a:0,e:"O slide \"Pneumonia\" mostra tres caixas: NOSOCOMIAL = \"Ocorre apos 48h de hospitalizacao\" + \"Agente: Staphylococcus aureus resistente a meticilina (MRSA)\"; ASSOCIADA A VENTILACAO = \"Subtipo de pneumonia nosocomial\" + \"Ocorre apos 48h do uso de ventilacao mecanica\" + \"Agentes: Pseudomonas aeruginosa e Staphylococcus aureus\"; ADQUIRIDA NA COMUNIDADE = Tipica (S. pneumoniae, H. influenzae, S. aureus) e Atipica (M. pneumoniae, Chlamydia, L. pneumophila)."},
{id:"a13q7",d:"moderado",q:"Segundo o slide da aula, quais sao os tipos de transmissao da infeccao hospitalar na cadeia das IRAS?",o:["ENDOGENA (da propria microbiota do paciente - secrecoes, excretas, sangue; via veiculos e medicamentos); EXOGENA; CRUZADA (entre pacientes - fomites e ambiente); INTERHOSPITALAR","Apenas transmissao aerea por aerossois; nenhuma transmissao de contato existe em ambiente hospitalar","Apenas transmissao endogena; bacterias do proprio paciente causam todas as IRAS","Apenas transmissao por visitas; profissionais de saude nao transmitem infeccoes"],a:0,e:"O slide \"Cadeia das IRAS\" mostra: tipos de IRAS em caixa: Endogena, Exogena, Cruzada, Interhospitalar. O fluxograma: DESEQUILIBRIO MICROBIOTA NORMAL → PATOLOGIA/PROCEDIMENTOS/ECOLOGIA → INFECCAO → ENDOGENA (secrecoes, excretas, sangue → veiculos, medicamentos) ou CRUZADA (fomites, ambiente)."},
{id:"a13q8",d:"moderado",q:"De acordo com o slide da aula, quais locais do ambiente hospitalar apresentam maior concentracao de bacterias?",o:["Registro medico, Computador, Macanetas, Celular, Carrinhos, Colchoes, Bancada de medicamentos e Monitor cardiaco","Apenas circulacao de ar e sistemas de ventilacao; superficies nao apresentam contaminacao relevante","Apenas sala cirurgica; os demais ambientes sao seguros","Unicamente os leitos e camas; equipamentos eletronicos nao contaminam"],a:0,e:"O slide \"Ambiente e Equipamentos\" (Ribeiro et al., Frontiers in Public Health, 2019) mostra ilustracao do ambiente hospitalar com setas indicando os \"locais de maior concentracao de bacterias\": Registro medico, Computador, Macanetas, Celular, Carrinhos, Colchoes, Bancada de medicamentos e Monitor cardiaco. Isso evidencia a importancia da higienizacao de equipamentos e nao apenas das maos."},
{id:"a13q9",d:"facil",q:"Segundo o slide da aula, qual e o reprocessamento correto para cada tipo de material hospitalar?",o:["Material critico (contato com vasos/tecidos livres de microrganismos, ex: instrumental cirurgico) → ESTERILIZACAO; Material semi-critico (contato com mucosa/pele nao integra, ex: inaladores) → DESINFECCAO; Material nao critico (contato com pele integra, ex: comadre) → LIMPEZA","Todo material hospitalar requer apenas limpeza simples com agua e sabao","Material critico → desinfeccao; material semi-critico → limpeza; material nao critico → esterilizacao","Apenas material da UTI requer reprocessamento; outros locais nao precisam"],a:0,e:"O slide \"O Reprocessamento de Equipamentos\" mostra tres categorias: Material critico = \"entra em contato com vasos sanguineos ou tecidos livres de microrganismos. Ex: instrumental\" → ESTERILIZACAO; Material semi-critico = \"entra em contato com mucosa ou pele nao integra. Ex: inaladores\" → DESINFECCAO; Material nao critico = \"entra em contato com pele integra. Ex: comadre\" → LIMPEZA."},
{id:"a13q10",d:"moderado",q:"De acordo com o slide da aula, quais sao as areas classificadas como CRITICAS no ambiente hospitalar?",o:["UTI e Centro Cirurgico sao AREAS CRITICAS (alta gravidade de doenca + longa permanencia do paciente) com maior risco potencial para transmissao de infeccoes","Apenas o pronto-socorro e critico; UTI e centro cirurgico sao areas semanas","Lavanderia e banco de sangue sao areas criticas; UTI e semi-critica","Nenhuma area do hospital e classifica como critica; o risco e uniforme"],a:0,e:"O slide \"Risco potencial para a transmissao de infeccoes\" mostra grafico com quatro quadrantes: UTI e Centro Cirurgico no quadrante CRITICO (alta gravidade + longa permanencia). As fotos mostram: UTI, Lavanderia, Centro Cirurgico, Laboratorio, Banco de Sangue como \"AREA CRITICA.\" Semi-critica e nao-critica tem menor risco. Destaque: \"As infeccoes hospitalares podem ser causadas por falta de CUIDADOS DE HIGIENE - SEGURANCA DO PACIENTE!!!\""},
{id:"a13q11",d:"moderado",q:"Segundo o slide da aula, quais sao as fontes de contaminacao bacteriana no ambiente hospitalar?",o:["Bactérias de: outros pacientes (transferencia paciente-paciente), profissionais de saude (carga bacteriana no uniforme), visitantes (transferencia bidirecional), equipamentos contaminados, bactérias do exterior (via janelas/ductos), insetos carreadores","Apenas visitas externas sao fontes de contaminacao; profissionais de saude estao protegidos pelas luvas","Apenas o ar do hospital e fonte de contaminacao; superficies nao transmitem","Apenas pacientes com MRSA sao fontes de contaminacao; outros microrganismos nao se disseminam"],a:0,e:"O diagrama do hospital (slide) mostra multiplas fontes: \"Bacteria from other patients\" (teto/parede), \"Bacteria from outside\" (janela), \"Bacteria from infected patient\" (leito), \"Contamination from equipment\", \"Bacteria from visitors, hospital personnel\" (corredor), \"Bacteria carried by insects.\" O slide de transmissao mostra o ciclo: profissional de saude ↔ paciente ↔ visitante ↔ leito, com \"Microorganisms as a reservoir in the hospital environment.\""},
{id:"a13q12",d:"moderado",q:"De acordo com o slide da aula, qual caso clinico exemplifica uma IRAS associada a dispositivo invasivo?",o:["Crianca em VM com P. aeruginosa isolada inicialmente; uma semana depois, agravamento do quadro e novo isolamento de S. aureus = IRAS associada ao dispositivo invasivo (VM por >2 dias)","Paciente com febre na admissao hospitalar com uroculturas positivas = IRAS","Gestante com infeccao transplacentaria e bolsa rota >24h = IRAS associada a dispositivo","Profissional de saude com colonizacao nasal por MRSA = IRAS associada a dispositivo"],a:0,e:"O slide \"IRAS associada a dispositivo invasivo\" apresenta o caso: \"Crianca de 10 anos, transferida de hospital, com BCP em ventilacao mecanica por canula endotraqueal. No hospital de origem havia sido isolado em lavado broncoalveolar Pseudomonas aeruginosa como o agente causal. O paciente foi internado com terapia antimicrobiana, mas uma semana apos, houve agravamento do quadro (piora RX, febre, aumento de secrecao bronquica), sendo colhido novo material para cultura e isolado Staphylococcus aureus.\" O caso configura IRAS pois a nova infeccao ocorreu apos o D3 de uso do dispositivo."},
{id:"a13q13",d:"moderado",q:"Segundo o slide da aula, quais ambientes e servicos alem do hospital estao incluidos na definicao de IRAS?",o:["Procedimentos hospitalares e ambulatoriais, servico de hemodialise, instituicao de longa permanencia para idosos (ILP), doentes cronicos, assistencia domiciliar (home care) e clinicas odontologicas","Apenas hospitais e prontos-socorros; servicos ambulatoriais nao geram IRAS","Apenas hospitais universitarios; hospitais privados e clinicas nao estao incluidos","Apenas UTI e centro cirurgico; ambulatorios nao tem relevancia"],a:0,e:"O slide \"Ou seja...\" mostra que IRAS abrange: \"PROCEDIMENTOS HOSPITALARES E AMBULATORIAIS, SERVICO DE HEMODIALISE, INSTITUICAO DE LONGA PERMANENCIA PARA IDOSOS, PARA DOENTES CRONICOS, ASSISTENCIA DOMICILIAR (HOME CARE) E CLINICAS ODONTOLOGICAS.\" Isso amplia o conceito de infeccao hospitalar para qualquer local de prestacao de cuidados de saude."},
{id:"a13q14",d:"moderado",q:"De acordo com o slide da aula, qual e a patogenese geral de uma IRAS exogena?",o:["(1) Transmissao do agente de uma fonte externa ate a porta de entrada (maos dos profissionais, fomites); (2) Evasao das defesas primarias (capsula, enzimas, etc.); depois: Exposicao → Adesao → Invasao → Colonizacao → Toxicidade/Invasividade → Dano tecidual","O agente exogeno penetra diretamente na corrente sanguinea sem interacao com a pele","A patogenese e identica a de uma infeccao comunitaria; nao ha particularidades nas IRAS exogenas","O agente exogeno se replica na superficies dos equipamentos sem penetrar no organismo"],a:0,e:"O slide de patogenese das IRAS (diagrama da cadeia infecciosa) mostra para infeccao exogena: \"(1) Transmissao a partir de uma fonte externa ate a porta de entrada (mao, fomites); (2) Evasao das defesas primarias (capsula, enzimas, etc.).\" A cascata de patogenese mostrada: Exposicao → Adesao (pele ou mucosas) → Invasao (atraves do epitelio) → Colonizacao e Crescimento (producao de fatores de virulencia) → Toxicidade (efeitos locais ou sistemicos) / Invasividade → Dano Tecidual, Doenca."},
{id:"a13q15",d:"facil",q:"Segundo o slide da aula, para uma IRAS ser classificada como ASSOCIADA A DISPOSITIVO INVASIVO, quais dispositivos sao considerados?",o:["Cateter central, cateter vesical de demora e ventilador mecanico (usados por >2 dias, com D1 = dia de instalacao)","Apenas ventilador mecanico; outros dispositivos nao sao considerados","Qualquer material hospitalar em contato com o paciente, incluindo termometro e estetoscopio","Dispositivos so sao considerados se forem implantaveis (proteses, valvas, pinos)"],a:0,e:"O slide \"IRAS associada a dispositivo invasivo\" lista os dispositivos: \"Paciente em uso de dispositivo invasivo (cateter central, cateter vesical de demora, ventilador mecanico) por um periodo maior que 2 (dois) dias consecutivos, considerando o D1 o dia da instalacao do dispositivo invasivo.\" Esses tres dispositivos sao os mais associados as 3 principais IRAS: bacteremia (cateter central), ITU (cateter vesical), pneumonia (VM)."},
{id:"a13e1",d:"moderado",q:"Segundo o slide da aula, qual e a diferenca entre infeccao ENDOGENA e infeccao CRUZADA nas IRAS?",o:["ENDOGENA: originada da propria microbiota do paciente (secrecoes, excretas, sangue), transmitida por veiculos e medicamentos; CRUZADA: ocorre entre pacientes diferentes atraves de fomites e do ambiente hospitalar","Endogena: infeccao por bacterias do ambiente externo; Cruzada: infeccao da propria microbiota","Endogena: infeccao por bacterias Gram-positivas; Cruzada: infeccao por bacterias Gram-negativas","Sao sinonimas; a distincao e apenas terminologica sem implicacao pratica"],a:0,e:"O slide \"Cadeia das IRAS\" mostra: tipos de IRAS: Endogena, Exogena, Cruzada, Interhospitalar. No fluxograma: INFECCAO → ENDOGENA (SECRECOES, EXCRETAS, SANGUE → VEICULOS, MEDICAMENTOS) ou CRUZADA (FOMITES, AMBIENTE). Infeccao endogena = do proprio paciente; infeccao cruzada = de outro paciente ou do ambiente hospitalar."},
{id:"a13e2",d:"moderado",q:"De acordo com o slide da aula, como a infeccao de sitio cirurgico exemplifica uma IRAS?",o:["Paciente submetido a colecistectomia e herniorrafia inguinal por videolaparoscopia com uso de tela apresentou infeccao de sitio cirurgico superficial = IRAS por estar relacionada ao procedimento cirurgico realizado no hospital","Infeccao de sitio cirurgico nunca e IRAS; sempre e infeccao comunitaria por falta de higiene","Infeccao de sitio cirurgico so e IRAS se o patogeno isolado for MRSA","Infeccao de sitio cirurgico so e considerada IRAS se ocorrer na UTI"],a:0,e:"O slide \"Conceito IRAS\" (ANVISA 2021) mostra como exemplo: \"Paciente submetido a colecistectomia e herniorrafia inguinal por videolaparoscopia com uso de tela, apresentou infeccao de sitio cirurgico superficial.\" Esse e um caso classico de IRAS: a infeccao (sitio cirurgico) ocorreu apos procedimento de assistencia a saude (cirurgia), podendo ser relacionada a esse evento."},
{id:"a13e3",d:"moderado",q:"Segundo o slide da aula, o que caracteriza a IRAS no caso de procedimentos realizados com paciente NAO INTERNADO (ambulatorialmente)?",o:["A IRAS pode se manifestar a partir da realizacao do procedimento, estando o paciente internado ou nao, desde que o procedimento invasivo diagnostico ou terapeutico tenha sido realizado antes de 72 horas","Procedimentos ambulatoriais nunca geram IRAS; so procedimentos intra-hospitalares sao responsaveis","A infeccao so e IRAS se o paciente estava internado por mais de 7 dias no momento do procedimento","IRAS ambulatorial so e considerada quando o paciente retorna ao hospital com sepse"],a:0,e:"O slide IRAS afirma: \"...que se apresentar A PARTIR DA REALIZACAO DO PROCEDIMENTO, estando o paciente internado ou nao (procedimentos invasivos diagnostico e/ou terapeuticos → antes de 72hs).\" O caso exemplo mostra paciente que realizou cesariana no hospital (05/10/2023), teve alta no dia 07/10, e retornou no dia 15/10 com infeccao da ferida operatoria = IRAS, pois relacionada ao procedimento cirurgico."},
{id:"a13e4",d:"moderado",q:"De acordo com o slide da aula, como e classificada a infeccao em gestante com bolsa rota superior a 18-24 horas?",o:["Gestante em bolsa rota superior ou igual a 18/24h = VIGILANCIA EPIDEMIOLOGICA; essa situacao e especifica para classificacao de IRAS em origem materna, diferente da bolsa rota >24h em RN (que e comunitaria)","Bolsa rota >18h = automaticamente IRAS; o bebe e a mae sao considerados com infeccao hospitalar","Bolsa rota >18h = infeccao comunitaria; sem vigilancia epidemiologica necessaria","Bolsa rota nao tem relevancia para classificacao de IRAS; apenas procedimentos cirurgicos importam"],a:0,e:"O slide \"Ou seja...\" mostra: \"ORIGEM MATERNA - Gestante em bolsa rota > ou igual a 18/24hs = vigilancia epidemiologica\" e aponta para o CCIH (Comissao de Controle de Infeccao Hospitalar). Isso contrasta com o RN com bolsa rota >24h que e classificado como infeccao COMUNITARIA. A gestante em bolsa rota prolongada requer vigilancia especial pela CCIH."},
{id:"a13e5",d:"moderado",q:"Segundo o slide da aula, qual e o papel da higienizacao das maos na prevencao das IRAS e o que o diagrama de transmissao hospitalar mostra sobre os profissionais de saude?",o:["Profissionais de saude tem carga bacteriana no uniforme e podem transmitir infeccoes aos pacientes via contato; sao ao mesmo tempo fonte e vetor de transmissao; higienizacao adequada das maos e a principal medida de prevencao de IRAS","Profissionais de saude nao transmitem infeccoes; apenas visitantes e fontes de IRAS","A higienizacao das maos nao tem evidencia de eficacia na prevencao de IRAS","Os profissionais de saude so transmitem infeccoes quando usam equipamentos contaminados"],a:0,e:"O diagrama de transmissao no slide mostra: \"Bacterial load on the uniform of healthcare workers\" (carga bacteriana no uniforme); \"Transmission of infection from healthcare workers to patients via contact\"; \"Transfer of infection from doctor to visitor or vice versa\"; \"Transfer of infection from patient to patient.\" O ciclo completo mostra que profissionais de saude sao simultaneamente fonte e vetor de transmissao, justificando a higienizacao de maos como medida numero um."},
{id:"a13e6",d:"moderado",q:"De acordo com o slide da aula, o que e a pneumonia adquirida na comunidade do tipo ATIPICA e quais sao seus agentes?",o:["Pneumonia atipica (PAC atipica): Mycoplasma pneumoniae, Chlamydia (pneumoniae) e Legionella pneumophila; diferente da tipica (S. pneumoniae, H. influenzae, S. aureus); quadro clinico mais arrastado (subagudo)","Pneumonia atipica e causada por P. aeruginosa e MRSA em pacientes hospitalizados","Pneumonia atipica e causada exclusivamente por virus; nao ha agentes bacterianos","Pneumonia atipica tem os mesmos agentes da tipica; a diferenca e apenas clinica"],a:0,e:"O slide \"Pneumonia\" distingue na PAC: \"1-Pneumonia tipica: Streptococcus pneumoniae, Haemophilus influenzae, Staphylococcus aureus. 2-Pneumonia atipica: Mycoplasma pneumoniae, Chlamydia, Legionella pneumophila.\" A pneumonia atipica tem esse nome porque o quadro clinico e diferente (mais subagudo, tosse seca, sem consolidacao lobar tipica no RX) e os agentes nao crescem em meios convencionais ou sao intracelulares."},
{id:"a13e7",d:"moderado",q:"Segundo o slide da aula, qual e o conceito de CCIH e em quais situacoes ela deve ser acionada?",o:["CCIH (Comissao de Controle de Infeccao Hospitalar): deve ser acionada quando a infeccao for classificada como IRAS (relacionada a procedimento, internacao ou dispositivo); especialmente quando ha surto, procedimento invasivo, infeccao hospitalar ou gestante em bolsa rota ≥18/24h","CCIH e acionada apenas quando ha epidemia hospitalar com mais de 10 casos simultaneos","CCIH e o mesmo que SAMU - equipe de resposta a emergencias infecciosas","CCIH e consultada apenas para doencas de notificacao compulsoria como TB e sifilis"],a:0,e:"O slide \"Ou seja...\" mostra o fluxo: Procedimento + Data da infeccao + Local + Gestante → CCIH. Acima lista as situacoes: infeccao presente na admissao OU presente na internacao OU relacionada a assistencia a saude (IRAS). Especificamente: \"Gestante em bolsa rota > ou igual a 18/24hs = vigilancia epidemiologica\" → CCIH. A CCIH e a comissao hospitalar responsavel por monitorar, prevenir e controlar as IRAS."}]},
  aula12:{name:"Aula 12 - ISTs Bacterianas",doc:"AIP 2025 - Prof. Dra. Ana Julia Reis",
summary:`## Aula 12 - ISTs Bacterianas

### Terminologia e transmissao
- Decreto No 8.901/2016: muda DST para IST. Transmissao: sexual (vaginal/oral/anal), gravidez (transplacentaria/parto), sangue contaminado.
- Desafios: portadores assintomaticos, poucas vacinas, infeccao multipla possivel. PREVENIVEIS E CURAVEIS.

### Principais ISTs bacterianas
- T. pallidum (Sifilis), C. trachomatis (Clamidiase/LGV/Tracoma), N. gonorrhoeae (Gonorreia), H. ducreyi (Cancro Mole), M. genitalium (Uretrite).
- Epidemiologia OMS: >1 milhao de ISTs curaveis/dia; 374 milhoes de pessoas contrairam as 4 ISTs curaveis em 2020; 8 milhoes de sifilis em adultos 15-49 anos em 2022.

### Sifilis - Treponema pallidum
- Espiroqueta Gram-Negativa; dificil cultivo e coloracao. Transmissao: sexual, transplacentaria, transfusao sanguinea. Afeta 1 milhao gestantes/ano; 300 mil mortes fetais/neonatais. Notificacao compulsoria.
- Fatores de virulencia: Proteinas de Membrana Externa (aderencia); Fibronectina/adesina (protege da fagocitose); Filamentos flagelares; Capa Mucopolissacaridea (antifagocitaria); Hialuronidase (aumenta permeabilidade).
- Incapaz de atravessar pele integra; penetra por PEQUENAS ABRASOES durante relacao sexual.
- Estadios: PRIMARIA (cancro duro - unico, indolor, endurecido; incubacao 3 semanas; desaparece em 2 semanas); SECUNDARIA (lesoes cutaneo-mucosas, febre, linfadenopatia; surgem 6 sem-6 meses; INFECCIOSAS - ricas em T. pallidum); LATENTE; TERCIARIA (granulomas/gomas; SN e SCV; 30-40% dos nao tratados; 10-20+ anos).
- 25% cura espontanea; 25% cronica; 50% progressao para terciaria.
- Sifilis congenita: rastreio 2x no pre-natal; Brasil 2023 = 113,8/100.000 hab.
- Diagnostico: Campo Escuro (fase primaria/secundaria); PCR; VDRL (nao treponemico - Ac anti-cardiolipinicos); Teste Rapido (treponemico - Ac anti-T. pallidum). Treponemico mantem alta sensibilidade em todas as fases; VDRL diminui na fase latente/terciaria.
- Tratamento: PENICILINA G BENZATINA 2.400.000 UI/IM em 3 aplicacoes com intervalo de 7 dias; UNICA droga capaz de tratar mae e bebe.

### Gonorreia - Neisseria gonorrhoeae
- Diplococo Gram-negativo; intracelular; coloniza mucosa genital; maioria tem plasmideos; resistencia aos antimicrobianos. Descoberta por Albert Neisser em 1879.
- Virulencia: Fimbrias/Pili (adesao as celulas epiteliais); Protease IgA (decompose IgA - evasao imune); Proteina I PorB (movimento de moleculas no periplasma); Proteina II Opa (adesao a leucocitos, celulas epiteliais e endoteliais); LOS = Lipooligossacarideo (endotoxina - dano celular).
- Manifestacoes: Homens (60%): infeccao dolorosa do canal uretral; Mulheres (80%): assintomatica ou vaginite branda; RN: conjuntivite neonatal (oftalmia neonatal gonoccocica - 1881 Crede); gestacao: aborto, parto prematuro.
- Gonorreia nao tratada: DPI (Doenca Inflamatoria Pelvica) → utero, trompas, ovarios; faringe (5%) por sexo oral.
- Diagnostico: cultura em meio THAYER MARTIN MODIFICADO (padrao-ouro); Gram (diplococo Gram-negativo); Catalase positiva; amostras: canal endocervical, uretra, orofaringe, canal anal, conjuntiva, articulacoes, sangue.
- Tratamento: ceftriaxona 500mg IM em dose unica + azitromicina 1g oral em dose unica (MS Brasil); altas taxas de resistencia a quinolona, azitromicina e cefalosporinas de espectro estendido.

### Clamidiase - Chlamydia trachomatis
- Gram-Negativa; INTRACELULAR OBRIGATORIA; ASSINTOMATICA EM 80% DOS CASOS.
- Sorotipos: A/B/C (Tracoma - olhos), D-K (Infeccao Genital), L1/L2/L3 (LGV - linfogranuloma venereo).
- Ciclo de vida: EB (Elementary Body) = forma INFECTANTE, extracelular → entrada na celula → RB (Reticulate Body) = forma NAO INFECTANTE, intracelular, replica → RBs se reorganizam em EBs → lise ou extrusao (48-72h). Impedimento da fusao do fagolissossoma = mecanismo de sobrevivencia intracelular.
- Clamidiase (D-K): 30% homens sintomaticos (corrimento, disuria); 10% mulheres sintomaticas; DIT: uretrite, cervicite, salpingite, DIP, infertilidade.
- LGV (L1/L2/L3): infeccao cronica; orgaos genitais e ganglios da virilha.
- Tracoma (A/B/C): infeccao cronica recidivante dos olhos (cornea e conjuntiva).
- Diagnostico: PCR = metodo de escolha (sensibilidade 90%, especificidade 96-100%).
- COINFECCAO Clamydia + N. gonorrhoeae: 10-40% → DIP; infertilidade em >25%.`,
tips:"IST (nao DST) desde Decreto 8.901/2016. PREVENIVEIS E CURAVEIS. T. pallidum = espiroqueta GN; incapaz atravessar pele integra; cancro duro = unico, indolor, endurecido; incubacao 3 semanas. Secundaria = lesoes mucosas, infecciosa. Terciaria = granulomas, 30-40% nao tratados. VDRL = nao treponemico (anti-cardiolipina); Teste Rapido = treponemico (anti-T. pallidum). Penicilina G benzatina = unico tratamento sifilis; 2.400.000 UI/IM x 3 com intervalo 7 dias. N. gonorrhoeae = diplococo GN; Thayer Martin = padrao-ouro; ceftriaxona 500mg + azitromicina 1g. Clamydia = intracelular obrigatoria; EB (infectante) → RB (replica intracelular) → EB. 80% assintomatica. LGV = L1/L2/L3 (ganglios virilha); Tracoma = A/B/C (olhos); D-K = genital.",
questions:[{id:"a12q1",d:"facil",q:"Segundo o slide da aula, o que motivou a mudanca da nomenclatura de DST para IST no Brasil?",o:["O Decreto No 8.901/2016, publicado no D.O.U. em 11/11/2016, mudou a nomenclatura para reconhecer que portadores podem estar assintomaticos e transmitir sem desenvolver doenca manifesta","IST foi adotada pela OMS em 2020; o Brasil seguiu em 2021","DST foi considerado inadequado por razoes religiosas","A mudanca foi feita porque as doencas passaram a ser transmitidas apenas por via sexual"],a:0,e:"O slide mostra: \"Decreto de No 8.901/2016, publicado no D.O.U em 11/11/2016, que muda a nomenclatura do termo DST para IST.\" O conceito de IST (Infeccao) e mais amplo que DST (Doenca): portadores assintomaticos transmitem sem doenca manifesta - e um dos principais desafios citados no slide."},
{id:"a12q2",d:"moderado",q:"De acordo com os dados da OMS no slide da aula, quais sao os numeros globais das 4 ISTs curaveis em 2020 e de sifilis em 2022?",o:["374 milhoes de pessoas contrairam uma das 4 ISTs curaveis em 2020; Tricomoníase 156,3M (maior); Clamídia 128,5M; Gonorreia 82,3M; Sifilis 7,1M; 8 MILHOES de adultos com sifilis em 2022","Sifilis foi a IST mais comum com 500 milhoes em 2020","Gonorreia teve 500 milhoes de casos; sifilis praticamente eliminada","Clamídia teve 1 bilhao de casos em 2020; sifilis teve apenas 100 casos em 2022"],a:0,e:"O slide OMS: \"Cerca de 374 milhoes de pessoas contrairam clamidiose, gonorreia, sifilis ou tricomoníase em 2020.\" Tabela: Tricomoníase 156,3M; Clamídia 128,5M; Gonorreia 82,3M; Sifilis 7,1M. Destaque: \"Cerca de oito milhoes de adultos contrairam sifilis em 2022.\""},
{id:"a12q3",d:"facil",q:"Segundo o slide da aula, quais sao as caracteristicas microbiologicas do T. pallidum e por que e uma doenca de notificacao compulsoria?",o:["Espiroqueta GRAM-NEGATIVA; dificil cultivo e coloracao; transmissao sexual, transplacentaria e transfusao sanguinea; afeta 1 milhao gestantes/ano; 300 mil mortes fetais e neonatais; NOTIFICACAO COMPULSORIA (SINAN)","Bacilo Gram-positivo de facil cultivo; transmitido apenas por via sexual","Coco Gram-negativo encapsulado; cultivado facilmente em agar chocolate","BAAR que cresce em Lowenstein-Jensen; notificacao nao obrigatoria"],a:0,e:"O slide \"Sifilis\" afirma: \"Espiroqueta GN - Treponema pallidum. Bacteria Gram-Negativa. Dificil Cultivo e Coloracao. Transmitida por via sexual, transplacentaria, transfusao sanguinea. Quando nao tratada precocemente: enfermidade cronica com sequelas irreversiveis. Afeta 1 milhao gestantes por ano; 300 mil mortes fetais e neonatais; Doenca de Notificacao compulsoria (SINAN).\""},
{id:"a12q4",d:"moderado",q:"De acordo com o slide da aula, quais sao os 5 fatores de virulencia do T. pallidum?",o:["Proteinas de Membrana Externa (aderencia); Fibronectina/adesina (protege da fagocitose); Filamentos flagelares (dispersao em alta viscosidade); Capa Mucopolissacaridea (antifagocitaria); Hialuronidase (aumenta permeabilidade e facilita invasao)","Apenas toxinas exotoxinas e endotoxinas; sem estruturas de adesao especificas","Acido micolico; capsula polissacaridica; proteina M; Estreptolisina O","PVL (leucocidina); TSST-1 (superantigeno); coagulase; proteina A"],a:0,e:"O slide \"Fatores de Virulencia e Patogenese\" lista: Proteinas de Membrana Externa (facilitam aderencia); Fibronectina (adesina, protege da fagocitose); Filamentos flagelares (dispersao em alta viscosidade); Capa Mucopolissacaridea (antifagocitaria); Hialuronidase (aumenta permeabilidade e facilita invasao)."},
{id:"a12q5",d:"facil",q:"Segundo o slide da aula, qual e a lesao caracteristica da sifilis primaria e como se apresenta clinicamente?",o:["Cancro duro: lesao UNICA, INDOLOR e ENDURECIDA no local de entrada da bacteria; incubacao media de 3 SEMANAS; cancro desaparece espontaneamente em 2 semanas","Multiplas lesoes dolorosas pelo corpo com febre; incubacao de 6 meses","Erupcao cutanea generalizada com linfadenopatia; incubacao de 1 semana","Granulomas sistemicos afetando SN e SCV; ocorre imediatamente apos infeccao"],a:0,e:"O slide \"Sifilis Primaria\" afirma: \"Lesao unica, indolor e endurecida no local de entrada da bacteria = cancro duro. Periodo medio entre o contato infectante e o aparecimento do cancro: 3 semanas. Cancro desaparece espontaneamente num periodo de 2 semanas.\" O cancro duro e tipicamente genital, mas pode ser oral (10% das infeccoes sao extragenitais)."},
{id:"a12q6",d:"moderado",q:"De acordo com o slide da aula, o que caracteriza a sifilis secundaria e por que ela e epidemiologicamente importante?",o:["Lesoes cutaneo-mucosas pelo corpo + febre + linfadenopatia; surgem 6 semanas a 6 meses apos contato; duram 4-12 semanas; lesoes primarias e secundarias sao RICAS EM T. pallidum = extremamente INFECCIOSAS","Apenas lesao unica genital; nao e infecciosa; incubacao de 10 anos","Granulomas sistemicos; periodo assintomatico; nao infecciosa","Erupcao apenas nas palmas e plantas; nao causa sintomas sistemicos"],a:0,e:"O slide \"Sifilis Secundaria\" afirma: lesoes cutaneo-mucosas pelo corpo; febre, mal-estar, cefaleia e linfadenopatia generalizada; surgem 6 semanas a 6 meses apos o contato; duram 4-12 semanas (reaparecem por ate 2 anos). Destaque verde: \"Lesoes primarias e secundarias - ricas em T. pallidum - infecciosas.\" Alta transmissibilidade nessa fase."},
{id:"a12q7",d:"moderado",q:"Segundo o slide da aula, quais sao as caracteristicas da sifilis terciaria e em quantos pacientes nao tratados ela ocorre?",o:["Inflamacao e destruicao tecidual (SN e SCV); granulomas = gomas sifiliticas (pele, mucosas, ossos); ocorre em 30-40% dos infectados nao tratados; pode levar 10, 20 ou mais anos para se manifestar","Lesoes genitais ulceradas; ocorre em 100% dos pacientes apos 1 semana","Erupcao cutanea com febre alta; ocorre apos 3 semanas da infeccao","Apenas comprometimento do figado; ocorre em 5% dos pacientes apos 6 meses"],a:0,e:"O slide \"Sifilis Terciaria\" afirma: \"Inflamacao e destruicao tecidual → ocorre acometimento do SN e do SCV. Formacao de granulomas (gomas sifiliticas) na pele, mucosas, ossos. Ocorre em 30-40% das pessoas infectadas e nao tratadas (apos um periodo de latencia). Pode levar 10, 20 ou mais anos para se manifestar.\""},
{id:"a12q8",d:"moderado",q:"De acordo com o slide da aula, qual e a diferenca entre o teste VDRL e o Teste Rapido (treponemico) no diagnostico da sifilis?",o:["VDRL = teste NAO treponemico (detecta Ac anti-cardiolipinicos); Teste Rapido = teste TREPONEMICO (detecta Ac anti-T. pallidum); o treponemico mantem alta sensibilidade em todas as fases enquanto o VDRL diminui na sifilis latente/terciaria","VDRL detecta T. pallidum diretamente em campo escuro; Teste Rapido detecta anticorpos IgM","Ambos detectam o mesmo anticorpo; so diferem no tempo de resultado","VDRL e o padrao-ouro em todas as fases; Teste Rapido so e util na sifilis primaria"],a:0,e:"O slide \"Diagnostico Laboratorial da Sifilis\" mostra: Testes Imunologicos: Teste Nao Treponemico = VDRL (Venereal Disease Research Laboratory) → Deteccao Ac anti-cardiolipinicos; Teste Treponemico = Teste Rapido → Deteccao Ac anti-T. pallidum. O grafico \"Testes\" mostra que o Treponemico (vermelho superior) mantem alta sensibilidade em todas as fases, enquanto o VDRL cai na fase latente tardia e terciaria."},
{id:"a12q9",d:"facil",q:"Segundo o slide da aula, qual e o tratamento de escolha para a sifilis, incluindo a sifilis congenita?",o:["Penicilina G Benzatina 2.400.000 UI/IM em 3 aplicacoes com intervalo de 7 dias; e a UNICA droga capaz de tratar mae e bebe; casal deve tratar junto e usar preservativo durante o tratamento","Azitromicina oral 1g em dose unica; sem necessidade de tratar o parceiro","Ceftriaxona 500mg IM dose unica; igual ao tratamento da gonorreia","Vancomicina IV por 14 dias; unica opcao para sifilis congenita"],a:0,e:"O slide \"Tratamento\" afirma: \"Deve ser feito com penicilina, unica droga capaz de tratar a mae e o bebe.\" O esquema completo: \"Penicilina G Benzatina 2.400.000 UI/IM em 3 aplicacoes com intervalos de 7 dias (entre as aplicacoes).\" E ainda: \"O casal deve tratar junto e usar o preservativo durante o tratamento.\""},
{id:"a12q10",d:"facil",q:"De acordo com o slide da aula, quais sao as caracteristicas do N. gonorrhoeae (gonococo)?",o:["Diplococo Gram-negativo; intracelular; coloniza mucosa genital; maioria das cepas tem plasmideos; alto nivel de resistencia aos antimicrobianos; descoberto por Albert Neisser em 1879","Bacilo Gram-positivo formador de esporos; extracelular; sem resistencia aos antibioticos","Coco Gram-positivo catalase-negativo; comunitario; raramente tem plasmideos","Espiroqueta Gram-negativa; dificil cultivo; sem plasmideos"],a:0,e:"O slide \"Gonorreia\" afirma: \"Diplococo Gram-negativo; Intracelular; Coloniza a mucosa genital; A maioria tem plasmideos; Resistencia aos antimicrobianos.\" Significa \"fluxo de semen\" - 130 d.C. (gon=semen + rhea=fluxo). Inicialmente confundida com sifilis ate Albert Neisser em 1879 descobrir o agente."},
{id:"a12q11",d:"moderado",q:"Segundo o slide da aula, quais sao os principais fatores de virulencia do N. gonorrhoeae?",o:["Fimbrias/Pili (adesao as celulas epiteliais); Protease IgA (decompose anticorpos IgA - evasao imune); Proteina I PorB (movimento de moleculas no periplasma - poro); Proteina II Opa (adesao a leucocitos, celulas epiteliais e endoteliais); LOS (Lipooligossacarideo - endotoxina - dano celular)","Apenas toxinas alfa e beta; sem estruturas de adesao especificas","TSST-1 (superantigeno); coagulase; proteina A; hemolisinas alfa e beta","Capsula polissacaridica; LPS; toxina esfoliativa; proteina M"],a:0,e:"O slide \"Fatores de Virulencia e Patogenese\" da gonorreia lista: Protease IgA (decompoe os anticorpos IgA, ajudando a bacteria a escapar do sistema imunologico); Proteina I: PorB (como um poro permite movimento de moleculas no periplasma bacteriano); Proteina II: Opa (adesao, uniao com leucocitos, celulas epiteliais e endoteliais); LOS = Lipooligossacarideo (endotoxina, causa dano celular); Fimbrias ou Pili (adesao as celulas epiteliais)."},
{id:"a12q12",d:"moderado",q:"De acordo com o slide da aula, quais sao as manifestacoes clinicas da gonorreia em homens, mulheres e recem-nascidos?",o:["Homens (60%): infeccao dolorosa do canal uretral (uretrite); Mulheres (80%): assintomatica ou vaginite branda (cervicite); RN: conjuntivite neonatal (oftalmia neonatal gonococcica) e infeccao generalizada; Gestacao: aborto e parto prematuro","Homens e mulheres: sempre sintomaticos com febre alta e sepse; RN: sem envolvimento ocular","Mulheres: sempre sintomatic; homens: sempre assintomaticos","Apenas lesoes cutaneas em todos os grupos; sem comprometimento genital"],a:0,e:"O slide \"Manifestacoes Clinicas\" afirma: \"Homens (60%): infeccao dolorosa do canal uretral. Mulheres (80%): assintomatica ou causa vaginite branda.\" Para o RN: \"Conjuntivite neonatal, infeccao generalizada\" com foto de oftalmia neonatal gonococcica (1881 - Carls Sigmund Franz Crede). Na gestacao: risco de aborto e parto prematuro."},
{id:"a12q13",d:"moderado",q:"Segundo o slide da aula, qual e o tratamento recomendado para gonorreia pelo Ministerio da Saude e qual e o problema de resistencia?",o:["Ceftriaxona 500mg via intramuscular em dose unica + azitromicina 1g via oral em dose unica; altas taxas de resistencia a quinolona, azitromicina e cefalosporinas de espectro estendido (medicamentos de \"ultima linha\")","Penicilina G benzatina dose unica; sem resistencia documentada","Metronidazol oral por 7 dias; boa sensibilidade mantida","Vancomicina IV por 14 dias; sem problemas de resistencia"],a:0,e:"O slide \"Tratamento\" da gonorreia afirma: \"O Ministerio da Saude recomenda o tratamento com ceftriaxona 500mg via intramuscular em dose unica, associada a azitromicina 1g via oral em dose unica.\" E: \"Altas taxas de resistencia a muitos antibioticos, incluindo quinolona, azitromicina e cefalosporinas de espectro estendido, que sao os medicamentos de ultima linha.\""},
{id:"a12q14",d:"moderado",q:"De acordo com o slide da aula, qual e o ciclo de vida da Chlamydia trachomatis e como ela sobrevive intracelularmente?",o:["EB (Elementary Body = forma infectante, extracelular, adapta sobrevivencia extracelular) → entra na celula → transicao para RB (Reticulate Body = forma nao infectante, intracelular, replica) → RBs se reorganizam em EBs → lise ou extrusao (48-72h); sobrevivencia via IMPEDIMENTO DA FUSAO DO FAGOLISSOSSOMA","A Clamydia so sobrevive no meio extracelular; nao e realmente intracelular","EB e a forma intracelular; RB e a forma infectante extracelular (o contrario)","O ciclo dura apenas 2-3 horas; a bacteria se multiplica no espaco extracelular"],a:0,e:"O slide \"Chlamydia Life Cycle\" mostra: EB (Elementary Body) = \"Forma infectante - Adesao a celula epitelial - Adaptado a sobrevivencia extracelular.\" Apos entrada: transicao EB → RB (6-12h). RB = \"Forma Nao infectante - Forma intracelular.\" Replicacao (12-24h) → RBs reorganizam back to EBs (24-36h) → lise ou extrusao (48-72h). Sobrevivencia via \"impedimento da fusao do fagolissossoma.\""},
{id:"a12q15",d:"moderado",q:"Segundo o slide da aula, quais sorotipos da Chlamydia trachomatis causam cada doenca?",o:["Sorotipos A, B e C: Tracoma (olhos - cornea e conjuntiva, infeccao cronica recidivante); Sorotipos D-K: Infeccao Genital (clamidiase); Sorotipos L1, L2 e L3: Linfogranuloma Venereo (LGV - orgaos genitais e ganglios da virilha)","Todos os sorotipos causam a mesma doenca; a distincao e apenas laboratorial","L1/L2/L3 causam tracoma; A/B/C causam LGV; D-K causam infeccao pulmonar","So existe um sorotipo de C. trachomatis; as diferentes doencas dependem da imunidade do hospedeiro"],a:0,e:"O slide \"Clamidiase\" mostra a tabela: Sorotipos A, B e C = Tracoma; Sorotipos D-K = Infeccao Genital; Sorotipos L1, L2 e L3 = Linfogranuloma Venereo. O slide de manifestacoes clinicas confirma: LGV (L1-L3) = infeccao cronica, orgaos genitais e ganglios virilha; Tracoma (A/B/C) = infeccao cronica e recidivante dos olhos."},
{id:"a12q16",d:"moderado",q:"De acordo com o slide da aula, qual e o risco da coinfeccao por Chlamydia trachomatis e N. gonorrhoeae?",o:["Coinfeccao ocorre em 10-40% dos casos; pode causar DIP (Doenca Inflamatoria Pelvica) = infeccao nos orgaos reprodutivos femininos superiores (utero, trompas de Falopio, ovarios); infertilidade em mais de 25% dos casos","Coinfeccao rarissima; menos de 1% dos casos; sem impacto na fertilidade","Coinfeccao so acontece em imunossuprimidos; sem risco de DIP","Coinfeccao sempre resulta em sepse grave com mortalidade de 50%"],a:0,e:"O slide \"Coinfeccao\" mostra: \"Coinfeccao → 10 a 40% → Doenca inflamatoria pelvica - DIP.\" Mecanismo: infeccao nos orgaos reprodutivos femininos superiores, como o utero, as trompas de Falopio e os ovarios. Consequencia: \"Infertilidade: + de 25%.\" Isso justifica o tratamento combinado de ambas as ISTs quando uma e diagnosticada."},
{id:"a12e1",d:"moderado",q:"Segundo o slide da aula, qual e a historia da resistencia antimicrobiana ao longo do tempo na N. gonorrhoeae?",o:["Sulfonamida (1930s) → Penicilina (1940s, resistencia rapidamente desenvolvida) → Tetraciclina → Ciprofloxacino → Cefixime/Ceftriaxona (ainda ativas) + Azitromicina (resistencia crescente)","A N. gonorrhoeae nunca desenvolveu resistencia; penicilina ainda e eficaz","A resistencia so surgiu apos 2000 com o uso generalizado de cefalosporinas","A N. gonorrhoeae e naturalmente resistente a todos os antibioticos conhecidos"],a:0,e:"O slide mostra linha do tempo (Brazilian Journal of Microbiology, 2017): Sulfonamide (1930s) → Penicillin (1940s-1950s) → Tetracycline (1940s-1980s) → Ciprofloxacin (1980s-2000s) → Azithromycin (resistencia crescente) → Cefixime or Ceftriaxone (ainda ativos com seta continua). O padrao de resistencia crescente torna a gonorreia uma das ISTs mais dificeis de tratar."},
{id:"a12e2",d:"moderado",q:"De acordo com o slide da aula, qual e o metodo de cultura padrao-ouro para o diagnostico laboratorial da gonorreia e quais amostras podem ser coletadas?",o:["Cultura em meio THAYER MARTIN MODIFICADO (TMm): padrao-ouro; amostras: canal endocervical, uretra masculina e feminina, orofaringe, canal anal, conjuntiva, articulacoes, lesoes e sangue; identificacao por Gram (diplococo Gram-negativo) e prova da catalase positiva","PCR em tempo real e o padrao-ouro para cultura de N. gonorrhoeae","Apenas hemoculturas sao aceitas para diagnostico de gonorreia","Sorologia VDRL e o padrao-ouro; cultura nao e necessaria"],a:0,e:"O slide \"Diagnostico Laboratorial\" da gonorreia mostra: \"1. CULTURA em meio Thayer Martin modificado (TMm): padrao-ouro. 2. Colonias de Neisseria. 3. Com uma das colonias, realizar coloracao de Gram. 4. Bacterioscopia. 5. Realizar Prova da Catalase.\" Amostras: \"Secrecoes do canal endocervical, uretra masculina e feminina, orofaringe, canal anal, conjuntiva, articulacoes, lesoes e sangue.\" N. gonorrhoeae: Diplococo Gram-negativo; Catalase positiva."},
{id:"a12e3",d:"moderado",q:"Segundo o slide da aula, como a gonorreia nao tratada pode causar infertilidade feminina?",o:["Gonorreia nao tratada → DPI (Doenca Inflamatoria Pelvica): infeccao nos orgaos reprodutivos femininos superiores (utero, trompas de Falopio, ovarios) causando cicatrizes; coinfeccao com Clamydia aumenta o risco para 10-40% dos casos com infertilidade em >25%","A gonorreia causa infertilidade por dano direto aos ovulos nas trompas, sem inflamacao","A gonorreia nao causa infertilidade feminina; esse risco existe apenas para homens","A infertilidade ocorre somente por DPI causada por S. aureus associado a N. gonorrhoeae"],a:0,e:"O slide \"Gonorreia nao tratada\" afirma: \"pode levar a doenca inflamatoria pelvica (DPI) → infeccao nos orgaos reprodutivos femininos superiores, como o utero, as trompas de Falopio e os ovarios.\" O slide de coinfeccao mostra: \"Coinfeccao → 10 a 40% → DPI. Infertilidade: + de 25%.\" A coinfeccao Chlamydia + N. gonorrhoeae aumenta ainda mais o risco."},
{id:"a12e4",d:"moderado",q:"De acordo com o slide da aula, qual foi a contribuicao de Carls Sigmund Franz Crede em 1881 para a prevencao da oftalmia neonatal gonococcica?",o:["Crede descreveu a oftalmia neonatal gonococcica em 1881; sua contribuicao foi identificar que RN passando pelo canal de parto de maes infectadas com N. gonorrhoeae podiam desenvolver conjuntivite grave; hoje prevenida com nitrato de prata ou antibioticos oculares no RN","Crede desenvolveu a vacina contra a gonorreia em 1881","Crede descobriu o agente etiologico N. gonorrhoeae em 1881 (Albert Neisser fez isso)","Crede descreveu o tratamento com penicilina para gonorreia neonatal em 1881"],a:0,e:"O slide \"Manifestacoes Clinicas\" da gonorreia mostra foto de RN com oftalmia neonatal gonococcica (olhos com secrecao purulenta grave) e destaca: \"Oftalmia neonatal gonococcica (1881 - Carls Sigmund Franz Crede).\" O RN adquire a infeccao ao passar pelo canal de parto de mae com N. gonorrhoeae. Hoje e prevenida com profilaxia ocular no neonato (colírio de nitrato de prata ou antibiotico)."},
{id:"a12e5",d:"moderado",q:"Segundo o slide da aula, qual e o mecanismo pelo qual a Chlamydia trachomatis sobrevive dentro das celulas do hospedeiro?",o:["Impedimento da fusao do fagolissossoma: a bacteria inibe a fusao do fagosome com o lisossoma, criando um vacuolo (inclusao) onde sobrevive, se multiplica e completa o ciclo de desenvolvimento sem ser destruida","A Clamydia secreta toxinas que destroem diretamente o lisossoma celular","A Clamydia penetra no nucleo celular e usa o DNA do hospedeiro para se replicar","A Clamydia forma uma capsula que impede o reconhecimento por receptores de fagocitose"],a:0,e:"O slide \"Fatores de Virulencia e Patogenese\" da Clamydia afirma: \"A sobrevivencia dentro da celula do hospedeiro ocorre atraves do impedimento da fusao do fagolissossoma. A bacteria pode sobreviver, multiplicar e completar o ciclo de desenvolvimento no interior destas celulas.\" Esse mecanismo e fundamental para entender por que antibioticos beta-lactamicos (que nao penetram celulas) sao ineficazes contra Clamydia."},
{id:"a12e6",d:"facil",q:"De acordo com o slide da aula, qual e o diagnostico laboratorial de escolha para Chlamydia trachomatis?",o:["PCR (amplificacao de acidos nucleicos): metodo de escolha com sensibilidade de 90% e especificidade de 96-100%; o cultivo e dificil (demorado) e pouco usado; sorologia e util para confirmacao; amostras: END, URE, OC, URIm","Cultura em agar sangue: padrao-ouro com 100% de sensibilidade","Sorologia IgM: unico metodo confiavel em todas as fases","Coloracao de Gram: identifica facilmente a Clamydia por seu padrao caracteristico"],a:0,e:"O slide \"Diagnostico\" da Clamydia lista: Cultura, Citologia, Imunofluorescencia direta ou indireta, Enzimaimunoensaio, Amplificacao de acidos nucleicos - PCR. A tabela comparativa mostra que PCR tem sensibilidade de 90% e especificidade de 96-100% - superiores a todos os outros metodos. O cultivo e o padrao-ouro historico, mas tem sensibilidade de 70-85% e demora 48-72h."}]},
  aula11:{name:"Aula 11 - Micobacterias e Tuberculose",doc:"AIP 2025 - Prof. Pedro E. Almeida da Silva",
summary:`## Aula 11 - Micobacterias e Tuberculose

### Familia e genero
- Familia: Mycobacteriaceae. Genero: Mycobacterium. BAAR (Bacilos Alcool-Acido Resistentes).
- Especies: M. leprae/M. lepromatosis (Lepra); M. ulcerans (Ulcera de Buruli); M. tuberculosis (TB pulmonar e extra-pulmonar); Mycobacterium spp ambientais (MNT/MOTT).

### Historia da tuberculose
- TB existe desde o Periodo Neolitico. Mumia egipcia (1077-943 AEC) com TB da coluna.
- TB e Pre-colombiana: mumia peruana (1.000 anos EC) com lesoes vertebrais.
- Do seculo XVII ao XIX, a TB causou 20% de TODAS as mortes no mundo ocidental.
- Jean Villemin (1865): TB mais frequente em soldados nos quarteeis do que no campo; inoculou liquido tuberculoso em coelhos e gerou TB = evidencia em modelo animal de transmissibilidade.
- 24 Marco 1882: Robert Koch identificou M. tuberculosis; evento historico assistido por Paul Ehrlich e Rudolph Virchow. Koch: 'more awe-inspiring scientific event I have ever attended' (Paul Ehrlich).
- Sanatorios: Hermann Brehmer (1854) criou o primeiro sanatorio; Nova Friburgo (Brasil).
- 1944: Estreptomicina = A CURA DA TB. 1948: ja detectada resistencia a estreptomicina.
- Tratamento atual (RIPE): Rifampicina + Isoniazida + Pirazinamida + Etambutol.

### Hanseniase (M. leprae)
- 182.815 novos casos em 2023 (OMS). India, Brasil e Indonesia = 79,3% dos casos globais.
- M. leprae: duplicacao a cada 2-3 dias; NAO cresce em meio artificial; possivel ZOONOSE (tatus em rodovias brasileiras; esquilos vermelhos nas Ilhas Britanicas).

### MNT/MOTT - 190 especies
- Complexo MAC (M. avium e M. intracelulare); Complexo MAB (M. abscessus, M. malmoense, M. bolletti).
- Dificil diagnostico e tratamento; maior incidencia em IMUNODEPRIMIDOS.

### Complexo M. tuberculosis e BCG
- Linhagens 1-7 (humanas); M. africanum; M. bovis (bovinos) → origem da vacina BCG.
- BCG: Calmette e Guerin; M. bovis 1908-1921; 13 anos e 230 passagens subculturas; ATENUACAO DA BACTERIA COM PERDA DE CAPACIDADE IMUNOGENICA. Diversas cepas BCG (Russia, Japan, Sweden, Danish, Merieux, Pasteur, etc.).

### Caracteristicas do M. tuberculosis
- BAAR; Rico em G+C; Envoltorio Lipidico (acido micolico, arabinogalactana, LAM); Tempo de geracao de 18 HORAS; Localiza-se no interior dos macrofagos.
- Parede celular: RESISTENCIA A ANTIMICROBIANOS E BIOCIDAS; EVOLUCAO LENTA DA DOENCA; TRATAMENTO LONGO (6 MESES COM CEPAS SENSIVEIS).

### Infeccao e Doenca
- Exposicao → 5% infeccao ativa (primaria) ou 95% latencia. Latencia → 5% reativacao espontanea; 50% reativacao em HIV/TB. Infeccao ativa: 95%* cura com tratamento; 5% recidiva; 50%** morte sem tratamento.
- Exposicao (nao contagioso; testes negativos) → TB infeccao latente (nao contagioso; testes geralmente positivos; sem patologia macroscopica) → TB doenca ativa (pode ser contagioso; patologia pulmonar ou em outros orgaos).
- Infeccao/Doenca depende de: HOSPEDEIRO (imunogenetica, comorbidades - diabetes, cancer; extremos de idade <5 e >60 anos); PATOGENO (carga infecciosa, virulencia); IMUNIDADE ADQUIRIDA (infeccao previa, TB ativa anterior, TB latente, MNT, vacina BCG).

### Origem e evolucao
- Mycobacterium: origem ha mais de 150 milhoes de anos (Periodo Jurassico). Ancestral comum das cepas modernas: 70.000 anos (Periodo Paleolitico).
