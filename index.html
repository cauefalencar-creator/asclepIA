/* ---------- Sincronização na nuvem (Supabase) ----------
   Cole abaixo a URL do projeto e a chave anon public do Supabase.
   Enquanto estiver vazio, o app funciona normal só neste aparelho. */
const CLOUD = {
  url: "https://gdkpawetpsvwuvvpdmqc.supabase.co",
  key: "sb_publishable_ESfsw9A7lU5qi_4tgsKqnQ__X_SDmls"
};
let _cloudTimer = null;
function cloudEnabled(){ return !!(CLOUD.url && CLOUD.key); }
function cloudHeaders(){ return { "apikey":CLOUD.key, "Authorization":"Bearer "+CLOUD.key, "content-type":"application/json" }; }
async function cloudPull(email){
  if(!cloudEnabled()) return null;
  try{
    const r=await fetch(`${CLOUD.url}/rest/v1/profiles?email=eq.${encodeURIComponent(email)}&select=data,updated_ts`,{headers:cloudHeaders()});
    if(!r.ok) return null;
    const rows=await r.json();
    if(rows && rows[0]) return rows[0];
  }catch(e){}
  return null;
}
async function cloudPush(email, data, ts){
  if(!cloudEnabled()) return;
  try{
    await fetch(`${CLOUD.url}/rest/v1/profiles`,{method:"POST",
      headers:Object.assign(cloudHeaders(),{Prefer:"resolution=merge-duplicates,return=minimal"}),
      body:JSON.stringify({email:String(email).toLowerCase(), data, updated_ts:ts})});
  }catch(e){}
}
async function syncFromCloud(){
  const e=currentEmail(); if(!e||!cloudEnabled()) return;
  const row=await cloudPull(e);
  const localTs = (state && state._ts) ? state._ts : 0;
  if(row && row.data){
    const cloudTs = row.updated_ts || 0;
    if(cloudTs > localTs){
      state = migrate(row.data); state._ts = cloudTs;
      try{ localStorage.setItem(dataKey(e), JSON.stringify(state)); }catch(_){}
      render(); updateProfileChip();
      toast("Dados sincronizados ☁️");
    } else if(localTs > cloudTs){
      cloudPush(e, state, localTs);
    }
  } else if(state){
    cloudPush(e, state, localTs||Date.now());
  }
}

function dataKey(email){ return "asclepia_data_"+String(email).trim().toLowerCase(); }
function getProfiles(){ try{ return JSON.parse(localStorage.getItem(PKEY))||[]; }catch(e){ return []; } }
function saveProfiles(p){ try{ localStorage.setItem(PKEY, JSON.stringify(p)); }catch(e){} }
function currentEmail(){ return localStorage.getItem(CKEY); }
function setCurrent(email){ if(email) localStorage.setItem(CKEY, String(email).toLowerCase()); else localStorage.removeItem(CKEY); }
function currentProfile(){ const e=currentEmail(); return getProfiles().find(p=>p.email===e)||null; }
function freshState(){ return { tree:JSON.parse(JSON.stringify(DEFAULT_TREE)), custom:{disciplines:{},topics:{}}, attempts:[], sessions:[], seen:{}, documents:[], lastStudied:{}, resumeQ:null }; }

function load(){
  const e=currentEmail(); if(!e) return null;
  try{ const s=JSON.parse(localStorage.getItem(dataKey(e))); if(s && typeof s==="object") return migrate(s); }catch(err){}
  return freshState();
}
function migrate(s){
  s.tree = s.tree || JSON.parse(JSON.stringify(DEFAULT_TREE));
  s.custom = s.custom || {disciplines:{},topics:{}};
  s.attempts = s.attempts||[]; s.sessions = s.sessions||[]; s.seen = s.seen||{}; s.documents = s.documents||[];
  s.lastStudied = s.lastStudied||{}; s.resumeQ = s.resumeQ||null;
  s.sessions.forEach(se=>{ if(!se.id) se.id=uid("sess"); });
  return s;
}
function save(){ const e=currentEmail(); if(!e||!state) return; state._ts=Date.now(); try{ localStorage.setItem(dataKey(e), JSON.stringify(state)); }catch(err){ toast("Não foi possível salvar (armazenamento cheio)."); }
  if(cloudEnabled()){ clearTimeout(_cloudTimer); _cloudTimer=setTimeout(()=>cloudPush(e, state, state._ts), 1200); } }

/* --- Login / perfis (sem senha, sem servidor) --- */
function boot(){
  const e=currentEmail();
  if(!e){ document.body.classList.add("guest"); renderLogin(); return; }
  document.body.classList.remove("guest");
  state = load();
  let profs=getProfiles(); if(!profs.find(p=>p.email===e)){ profs.push({email:e, name:e.split("@")[0], createdTs:Date.now()}); saveProfiles(profs); }
  updateProfileChip();
  document.querySelectorAll("[data-nav]").forEach(b=> b.classList.toggle("active", b.dataset.nav===nav));
  if(cloudEnabled() && !(state && state._ts)){
    view.innerHTML=`<div class="view" style="display:flex;align-items:center;justify-content:center;min-height:60vh"><div style="text-align:center"><div style="font-size:36px;margin-bottom:12px">☁️</div><div style="font-weight:700;font-size:18px">Carregando seus dados da nuvem…</div></div></div>`;
    syncFromCloud().then(()=>{ if(!state){ state=freshState(); } render(); });
  } else {
    render();
    syncFromCloud();
  }
}
function renderLogin(){
  const profs=getProfiles();
  view.innerHTML = `<div class="login-wrap"><div class="card login-card">
    <div class="login-logo"><img src="icone_app.png" alt="asclepIA"></div>
    <img src="escrita_dark.png" alt="asclepIA" style="height:88px;object-fit:contain;margin:0 auto 10px;display:block">
    <p class="muted" style="margin-bottom:18px">${cloudEnabled()?"Entre com seu e-mail. Seu progresso é salvo na nuvem e segue você em qualquer aparelho.":"Entre com seu e-mail para acessar seus estudos. Cada perfil guarda o próprio progresso neste aparelho."}</p>
    ${profs.length?`<div class="field" style="text-align:left"><label>Perfis neste aparelho</label><div class="row">${profs.map(p=>`<button class="btn ghost sm" onclick="loginAs('${esc(p.email)}')">${esc(p.name||p.email)}</button>`).join("")}</div></div>`:""}
    <div class="field" style="text-align:left"><label>Nome (opcional)</label><input class="input" id="loginName" placeholder="Seu nome"></div>
    <div class="field" style="text-align:left"><label>E-mail</label><input class="input" id="loginEmail" type="email" inputmode="email" autocomplete="email" placeholder="voce@exemplo.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn primary" style="width:100%" onclick="doLogin()">Entrar / criar perfil</button>
    <button class="btn ghost sm" style="margin-top:10px" onclick="openImport()">Tenho um backup — importar dados</button>
    <p class="muted" style="font-size:11.5px;margin-top:16px">${cloudEnabled()?"Sem senha: qualquer pessoa com o e-mail acessa este perfil. Os dados sincronizam automaticamente entre os aparelhos.":"Sem senha e sem servidor: os dados ficam só neste aparelho. Para usar seu perfil em outro celular/PC, use Exportar e Importar dados."}</p>
  </div></div>`;
}
function doLogin(){
  const name=($("#loginName")&&$("#loginName").value)?$("#loginName").value.trim():"";
  const email=($("#loginEmail")&&$("#loginEmail").value)?$("#loginEmail").value.trim().toLowerCase():"";
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast("Digite um e-mail válido."); return; }
  loginAs(email, name);
}
function loginAs(email, name){
  email=String(email).toLowerCase();
  let profs=getProfiles(); let p=profs.find(x=>x.email===email);
  if(!p){
    p={email, name:name||email.split("@")[0], createdTs:Date.now()}; profs.push(p); saveProfiles(profs);
    if(!localStorage.getItem(dataKey(email)) && localStorage.getItem(OLD_KEY)){ try{ localStorage.setItem(dataKey(email), localStorage.getItem(OLD_KEY)); localStorage.removeItem(OLD_KEY); }catch(e){} }
  } else if(name && (!p.name || p.name===email.split("@")[0])){ p.name=name; saveProfiles(profs); }
  setCurrent(email); nav="inicio"; boot(); window.scrollTo(0,0);
}
function switchProfile(email){ closeModal(); setCurrent(email); nav="inicio"; boot(); window.scrollTo(0,0); }
function logout(){ closeModal(); setCurrent(null); state=null; nav="inicio"; document.body.classList.add("guest"); renderLogin(); window.scrollTo(0,0); }
function updateProfileChip(){
  const el=$("#profileChip"); if(!el) return; const p=currentProfile();
  if(!p){ el.innerHTML=""; return; }
  const ini=(p.name||p.email).trim()[0].toUpperCase();
  el.innerHTML = `<button class="pchip-btn" onclick="openProfileMenu()"><span class="pavatar">${esc(ini)}</span><span class="pinfo"><span class="pname">${esc(p.name||"Perfil")}</span><span class="pmail">${esc(p.email)}</span></span><span class="pcog">⋯</span></button>`;
}
function openProfileMenu(){
  closeDrawer();
  const p=currentProfile(); if(!p) return; const others=getProfiles().filter(x=>x.email!==p.email);
  openModal(`<h3>Meu perfil</h3>
    <div class="row" style="gap:12px;align-items:center;margin-bottom:14px"><span class="pavatar" style="width:48px;height:48px;font-size:21px">${esc((p.name||p.email).trim()[0].toUpperCase())}</span><div style="min-width:0"><div style="font-weight:800">${esc(p.name||"Perfil")}</div><div class="muted" style="font-size:13px">${esc(p.email)}</div></div></div>
    ${others.length?`<div class="field"><label>Trocar para outro perfil deste aparelho</label><div class="row">${others.map(o=>`<button class="btn ghost sm" onclick="switchProfile('${esc(o.email)}')">${esc(o.name||o.email)}</button>`).join("")}</div></div>`:""}
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:6px">
      <button class="btn ghost" onclick="exportProfile()">⬇ Exportar meus dados (backup / outro aparelho)</button>
      <button class="btn ghost" onclick="openImport()">⬆ Importar dados de um backup</button>
      <button class="btn ghost" onclick="logout()">↪ Sair / entrar com outro e-mail</button>
    </div>
    <div class="row" style="margin-top:14px"><button class="btn primary" onclick="closeModal()">Fechar</button></div>`);
}
function exportProfile(){
  const p=currentProfile(); if(!p) return;
  const payload={app:"asclepia", v:1, profile:{name:p.name, email:p.email}, data:state, exportedTs:Date.now()};
  const json=JSON.stringify(payload);
  try{ const blob=new Blob([json],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="asclepia-"+p.email.replace(/[^a-z0-9]/gi,"_")+".json"; a.click(); setTimeout(()=>URL.revokeObjectURL(url),5000); }catch(e){}
  let code=""; try{ code=btoa(unescape(encodeURIComponent(json))); }catch(e){ code=json; }
  openModal(`<h3>Backup criado ✅</h3><p class="muted">Salvamos um arquivo <b>.json</b> com todo o seu progresso. No outro aparelho, entre com seu e-mail e use <b>Importar dados</b> (pelo arquivo ou colando o código abaixo).</p>
    <div class="field"><label>Código do backup</label><textarea class="input" id="expCode" rows="4" readonly onclick="this.select()">${esc(code)}</textarea></div>
    <div class="row"><button class="btn primary" onclick="copyEl('#expCode')">Copiar código</button><button class="btn ghost" onclick="closeModal()">Fechar</button></div>`);
}
function copyEl(sel){ const el=$(sel); if(!el) return; el.focus(); el.select(); try{ navigator.clipboard.writeText(el.value); }catch(e){ try{document.execCommand("copy");}catch(_){} } toast("Copiado!"); }
function openImport(){
  openModal(`<h3>Importar dados</h3><p class="muted">Restaure um backup feito em outro aparelho (arquivo .json ou código). O perfil correspondente será criado/atualizado neste aparelho.</p>
    <div class="drop" id="impDrop" style="margin-bottom:12px"><div style="font-size:26px">📥</div><div style="font-weight:700;margin-top:4px">Escolher arquivo .json</div><input type="file" id="impFile" accept="application/json,.json" style="display:none"></div>
    <div class="field"><label>…ou cole o código do backup</label><textarea class="input" id="impCode" rows="4" placeholder="Cole aqui o código exportado"></textarea></div>
    <div class="row"><button class="btn primary" onclick="importFromCode()">Importar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`);
  const f=$("#impFile"), d=$("#impDrop");
  if(d&&f){ d.onclick=()=>f.click(); f.onchange=()=>{ const file=f.files[0]; if(!file)return; const r=new FileReader(); r.onload=()=>applyImport(r.result); r.readAsText(file); }; }
}
function importFromCode(){ const c=($("#impCode")&&$("#impCode").value)?$("#impCode").value.trim():""; if(!c){ toast("Cole o código ou escolha um arquivo."); return; } let json; try{ json=decodeURIComponent(escape(atob(c))); }catch(e){ json=c; } applyImport(json); }
function applyImport(text){
  let payload; try{ payload=JSON.parse(text); }catch(e){ toast("Arquivo/código inválido."); return; }
  if(!payload || payload.app!=="asclepia" || !payload.data || !payload.profile || !payload.profile.email){ toast("Backup não reconhecido."); return; }
  const email=String(payload.profile.email).toLowerCase();
  try{ localStorage.setItem(dataKey(email), JSON.stringify(payload.data)); }catch(e){ toast("Sem espaço para importar."); return; }
  let profs=getProfiles(); if(!profs.find(p=>p.email===email)){ profs.push({email, name:payload.profile.name||email.split("@")[0], createdTs:Date.now()}); saveProfiles(profs); }
  setCurrent(email); closeModal(); toast("Dados importados! 🎉"); nav="inicio"; boot(); window.scrollTo(0,0);
}

/* ---------- Helpers de conteúdo ---------- */
function discName(id){ return (DB[id] && DB[id].name) || (state.custom.disciplines[id] && state.custom.disciplines[id].name) || id; }
function getTopics(discId){
  const out = {};
  if(DB[discId] && DB[discId].topics) Object.assign(out, DB[discId].topics);
  const ct = state.custom.topics[discId]||{};
  for(const tid in ct){ out[tid] = Object.assign({questions:[]}, ct[tid]); }
  return out;
}
function getTopic(discId, topId){ return getTopics(discId)[topId]; }
function getQuizPool(disc, top){
  if(top==="__all__"){ const tops=getTopics(disc); let all=[]; for(const k in tops) all=all.concat(tops[k].questions||[]); return all; }
  const tp=getTopic(disc,top); return (tp&&tp.questions)||[];
}
function getQuizName(disc, top){ if(top==="__all__") return discName(disc)+" — matéria inteira"; const tp=getTopic(disc,top); return tp?tp.name:top; }
function getQuizTips(disc, top){ if(top==="__all__") return "Simulado geral: questões sorteadas de todas as aulas da matéria — ótimo para revisar antes da prova."; const tp=getTopic(disc,top); return tp?tp.tips:""; }
function isToday(ts){ return !!ts && new Date(ts).toDateString()===new Date().toDateString(); }
function fmtDate(ts){ return new Date(ts).toLocaleDateString("pt-BR"); }

/* ---------- Utilidades ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const esc = s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function uid(p){ return p+"-"+Math.random().toString(36).slice(2,8); }
function fmtBytes(b){ if(!b) return ""; const u=["B","KB","MB","GB"]; let i=0; while(b>=1024&&i<u.length-1){b/=1024;i++;} return b.toFixed(b<10&&i>0?1:0)+" "+u[i]; }
function pct(n,d){ return d? Math.round(100*n/d):0; }
let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2600); }

/* mini markdown → html (## h2, ### h3, **bold**, > nota, - lista) */
function md(src){
  const lines = src.split("\n"); let html="", inUl=false;
  const ib = t=>t.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");
  for(let raw of lines){
    const t = raw.trim();
    if(t.startsWith("- ")){ if(!inUl){html+="<ul>";inUl=true;} html+="<li>"+ib(esc(t.slice(2)))+"</li>"; continue; }
    if(inUl){ html+="</ul>"; inUl=false; }
    if(t==="") continue;
    if(t.startsWith("### ")) html+="<h3>"+ib(esc(t.slice(4)))+"</h3>";
    else if(t.startsWith("## ")) html+="<h2>"+ib(esc(t.slice(3)))+"</h2>";
    else if(t.startsWith("> ")) html+='<p class="lead">'+ib(esc(t.slice(2)))+"</p>";
    else html+="<p>"+ib(esc(t))+"</p>";
  }
  if(inUl) html+="</ul>";
  return html.replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>");
}

/* ============================================================
   IndexedDB para guardar arquivos enviados (opcional/persistente)
   ============================================================ */
let idb=null;
(function initDB(){
  try{
    const r = indexedDB.open("asclepia_files",1);
    r.onupgradeneeded = e=>{ const db=e.target.result; if(!db.objectStoreNames.contains("files")) db.createObjectStore("files",{keyPath:"id"}); };
    r.onsuccess = e=> idb=e.target.result;
  }catch(e){}
})();
function idbPut(id,blob){ return new Promise((res,rej)=>{ if(!idb)return rej(); const tx=idb.transaction("files","readwrite"); tx.objectStore("files").put({id,blob}); tx.oncomplete=res; tx.onerror=rej; }); }
function idbGet(id){ return new Promise((res)=>{ if(!idb)return res(null); const tx=idb.transaction("files","readonly"); const rq=tx.objectStore("files").get(id); rq.onsuccess=()=>res(rq.result?rq.result.blob:null); rq.onerror=()=>res(null); }); }
function idbDel(id){ try{ const tx=idb.transaction("files","readwrite"); tx.objectStore("files").delete(id);}catch(e){} }

function calcStreak(){
  if(!state.sessions.length) return 0;
  const days = new Set(state.sessions.map(s=> new Date(s.ts).toDateString()));

  for(;;){ if(days.has(d.toDateString())){streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}

/* ============================================================
   Motor do Quiz
   ============================================================ */
let Q = null; // sessão atual
function beginQuiz(){
  let pool = getQuizPool(route.disc, route.top).slice();
  if(route.level!=="todos") pool = pool.filter(q=>q.d===route.level);
  const n = parseInt(($("#qcount")||{}).value,10) || pool.length;
  // embaralha tudo, prioriza as menos vistas (empates ficam aleatórios) e sorteia n
  pool = shuffle(pool);
  pool.sort((a,b)=>(state.seen[a.id]||0)-(state.seen[b.id]||0));
  let chosen = shuffle(pool.slice(0, Math.min(n, pool.length)));
  Q = {
    sid:uid("sess"),
    disc:route.disc, top:route.top, level:route.level, cyc:route.cyc, year:route.year,
    items: chosen.map(q=>({q, order:shuffle(q.o.map((_,i)=>i)), picks:[], resolved:false, firstTry:null, skipped:false})),
    idx:0, started:Date.now()
  };
  route.mode="play";
  renderQuestion();
  window.scrollTo(0,0);
}
function renderQuestion(){
  const it = Q.items[Q.idx];
  const total = Q.items.length;
  const answeredCount = Q.items.filter(x=>x.resolved).length;
  const qname = getQuizName(Q.disc, Q.top);
  const opts = it.order.map(oi=>{
    const q=it.q; const isCorrect = oi===q.a; const picked = it.picks.includes(oi);
    let cls="opt", state="";
    if(it.resolved){
      cls+=" done";
      if(isCorrect){cls+=" correct"; state="✓";}
      else if(picked){cls+=" wrong"; state="✕";}
      else cls+=" dim";
    } else if(picked){ cls+=" wrong done"; state="✕"; }
    const key = isCorrect&&it.resolved ? "✓" : (picked&&!isCorrect ? "✕" : String.fromCharCode(65+it.order.indexOf(oi)));
    const dis = it.resolved||picked ? "" : "";
    return `<button class="${cls}" ${(it.resolved||picked)?'disabled':''} onclick="pick(${oi})">
      <span class="key">${key}</span><span>${esc(q.o[oi])}</span></button>`;
  }).join("");

  view.innerHTML = `<div class="view quizwrap">
    <div class="qmeta"><span>${esc(qname)}</span><span>Questão ${Q.idx+1} de ${total}</span></div>
    <div class="qprog"><i style="width:${pct(answeredCount,total)}%"></i></div>
    <div class="qmeta" style="margin-top:6px"><span class="pill ${it.q.d}">${({facil:"Fácil",moderado:"Moderado",dificil:"Difícil"})[it.q.d]}</span><span>${answeredCount} resolvida(s)</span></div>
    <div class="card qcard">
      <div class="qtext">${it.q.q.trimStart().startsWith('<') ? it.q.q : esc(it.q.q)}</div>
      <div class="opts">${opts}</div>
      ${it.resolved?`<div class="explain"><b>Explicação:</b> ${esc(it.q.e)}</div>`:""}
      <div class="qbar">
        <button class="btn ghost sm" onclick="nav='quizzes';route={cyc:Q.cyc,year:Q.year,disc:Q.disc};render()">← Aulas</button>
        <button class="btn ghost sm" onclick="prevQ()" ${Q.idx===0?'disabled':''}>← Anterior</button>
        <button class="btn ghost sm" onclick="skipQ()" ${it.resolved?'disabled':''}>↦ Pular</button>
        <div class="spacer"></div>
        <button class="btn ghost sm" onclick="confirmEnd()">■ Encerrar</button>
        <button class="btn primary sm" onclick="nextQ()" ${it.resolved?'':'disabled'}>${isLast()?'Ver relatório →':'Próxima →'}</button>
      </div>
    </div>
  </div>`;
  window.scrollTo(0,0);
}
function isLast(){ // última pendente?
  return Q.items.every((x,i)=> i===Q.idx ? true : x.resolved);
}
function saveResume(){
  if(!Q) return;
  state.resumeQ = {
    disc:Q.disc, top:Q.top, level:Q.level, idx:Q.idx, started:Q.started, sid:Q.sid,
    items:Q.items.map(it=>({qid:it.q.id, order:it.order, picks:it.picks.slice(), resolved:it.resolved, firstTry:it.firstTry, skipped:it.skipped}))
  };
  save();
}
function clearResume(){ state.resumeQ=null; save(); }
function restoreResume(){
  const s = state.resumeQ;
  if(!s) return false;
  const pool = getQuizPool(s.disc, s.top);
  const qmap = {};
  pool.forEach(q=>{ qmap[q.id]=q; });
  const items = s.items.map(it=>({q:qmap[it.qid], order:it.order, picks:it.picks, resolved:it.resolved, firstTry:it.firstTry, skipped:it.skipped})).filter(it=>it.q);
  if(!items.length) return false;
  Q = { sid:s.sid, disc:s.disc, top:s.top, level:s.level, items, idx:s.idx, started:s.started };
  route.mode="play";
  renderQuestion();
  window.scrollTo(0,0);
  return true;
}
function pick(oi){
  const it = Q.items[Q.idx];
  if(it.resolved) return;
  if(it.picks.includes(oi)) return;
  const correct = oi===it.q.a;
  if(it.firstTry===null) it.firstTry = correct;
  it.picks.push(oi);
  if(correct){
    it.resolved = true;
    state.attempts.push({ts:Date.now(), sid:Q.sid, disc:Q.disc, top:Q.top, qid:it.q.id, d:it.q.d, first:it.firstTry, tries:it.picks.length});
    state.seen[it.q.id] = (state.seen[it.q.id]||0)+1;
  }
  saveResume();
  renderQuestion();
}
function prevQ(){ if(Q.idx>0){ Q.idx--; saveResume(); renderQuestion(); } }
function nextQ(){
  // procura próxima não resolvida (inclui puladas) a partir do índice atual
  const it=Q.items[Q.idx];
  if(!it.resolved) return;
  let next=-1;
  for(let i=Q.idx+1;i<Q.items.length;i++){ if(!Q.items[i].resolved){next=i;break;} }
  if(next===-1){ for(let i=0;i<Q.items.length;i++){ if(!Q.items[i].resolved){next=i;break;} } }
  if(next===-1){ return endQuiz(); }
  Q.idx=next; renderQuestion();
}
function skipQ(){
  const it=Q.items[Q.idx]; it.skipped=true;
  let next=-1;
  for(let i=Q.idx+1;i<Q.items.length;i++){ if(!Q.items[i].resolved){next=i;break;} }
  if(next===-1){ for(let i=0;i<Q.idx;i++){ if(!Q.items[i].resolved){next=i;break;} } }
  if(next===-1){ toast("Não há outras questões para pular."); return; }
  Q.idx=next; renderQuestion();
}
function confirmEnd(){
  openModal(`<h3>Encerrar estudo?</h3><p class="muted">Você verá o relatório com o que respondeu até agora. As questões não respondidas não contarão.</p>
    <div class="row" style="margin-top:14px"><button class="btn primary" onclick="closeModal();endQuiz()">Encerrar e ver relatório</button><button class="btn ghost" onclick="closeModal()">Continuar estudando</button></div>`);
}
function endQuiz(){
  const resolved = Q.items.filter(x=>x.resolved);
  const correctFirst = resolved.filter(x=>x.firstTry).length;
  const durationMs = Date.now()-Q.started;
  const details = Q.items.map(x=>({qid:x.q.id, q:x.q.q, o:x.q.o.slice(), a:x.q.a, e:x.q.e, d:x.q.d, picks:x.picks.slice(), resolved:x.resolved, firstTry:x.firstTry, skipped:x.skipped}));
  state.sessions.push({id:Q.sid, ts:Date.now(), disc:Q.disc, top:Q.top, level:Q.level, total:Q.items.length, resolved:resolved.length, correctFirst, durationMs, details});
  state.lastStudied = state.lastStudied||{}; state.lastStudied[Q.disc+"|"+Q.top]=Date.now();
  clearResume();
  renderReport(correctFirst, resolved.length);
}
function renderReport(correctFirst, resolvedN){
  const qname = getQuizName(Q.disc, Q.top);
  const total = Q.items.length;
  const acc = pct(correctFirst, resolvedN||1);
  const mins = Math.max(1,Math.round((Date.now()-Q.started)/60000));
  // por dificuldade
  const byD = {facil:[0,0],moderado:[0,0],dificil:[0,0]};
  Q.items.forEach(x=>{ if(x.resolved){ byD[x.q.d][1]++; if(x.firstTry) byD[x.q.d][0]++; } });
  const missed = Q.items.filter(x=>x.resolved&&!x.firstTry);
  const ringColor = acc>=70? "var(--green)": acc>=50? "#e0a020":"var(--red)";
  const circ=2*Math.PI*52, off=circ*(1-acc/100);
  route.mode="report";
  view.innerHTML = `<div class="view quizwrap">
    <div class="page-head"><h1 style="font-size:26px">Relatório do estudo</h1><p>${esc(qname)} · nível ${({todos:"todos",facil:"fácil",moderado:"moderado",dificil:"difícil"})[Q.level]}</p></div>
    <div class="card">
      <div class="row between" style="align-items:center;gap:24px;flex-wrap:wrap">
        <div class="score-ring">
          <svg width="140" height="140" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="12"/>
            <circle cx="60" cy="60" r="52" fill="none" stroke="${ringColor}" stroke-width="12" stroke-linecap="round"
              stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s"/>
          </svg>
          <div class="pct"><b>${acc}%</b><span class="muted" style="font-size:12px">acerto 1ª tentativa</span></div>
        </div>
        <div style="flex:1;min-width:200px">
          <div class="grid g-2">
            ${stat(correctFirst+"/"+resolvedN, "Acertos diretos")}
            ${stat(total, "Questões na sessão")}
            ${stat(mins+" min", "Tempo de estudo")}
            ${stat((resolvedN-correctFirst), "Erraram antes de acertar")}
          </div>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <h3>Desempenho por nível</h3>
      ${["facil","moderado","dificil"].map(k=>{
        const [c,t]=byD[k]; if(!t) return "";
        return barRow(({facil:"Fácil",moderado:"Moderado",dificil:"Difícil"})[k], pct(c,t), c+"/"+t);
      }).join("") || '<p class="muted">Sem dados por nível.</p>'}
    </div>
    ${missed.length?`<div class="card" style="margin-top:16px">
      <h3>Revisar (${missed.length}) — questões que você errou antes de acertar</h3>
      ${missed.map(x=>`<div class="missed"><div class="q">${esc(x.q.q)}</div><div class="a"><b>Resposta: ${esc(x.q.o[x.q.a])}</b><br>${esc(x.q.e)}</div></div>`).join("")}
    </div>`:`<div class="card" style="margin-top:16px"><h3>🎉 Mandou bem!</h3><p class="muted">Você acertou todas na primeira tentativa.</p></div>`}
    <div class="row" style="margin-top:18px">
      <button class="btn primary" onclick="startSetup('${Q.disc}','${Q.top}')">↻ Estudar de novo</button>
      <button class="btn ghost" onclick="setNav('desempenho')">Ver meu desempenho geral</button>
      <button class="btn ghost" onclick="setNav('quizzes')">Outra aula</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

  view.innerHTML = `<div class="view">
    <div class="page-head"><h1>Meu desempenho</h1><p>Acompanhe sua evolução, identifique pontos fracos e receba sugestões do que estudar.</p></div>

        <h3>Prática por dia da semana</h3>
        <div class="week">
          ${week.map((v,i)=>`<div class="day"><div class="dv">${v||""}</div><div class="col" style="height:${v?Math.max(6,Math.round(100*v/weekMax)):2}%"></div><div class="dl">${DOW[i]}</div></div>`).join("")}
        </div>
        <p class="muted" style="font-size:13px;margin-top:10px">Barras = nº de questões respondidas em cada dia da semana.</p>
      </div>
      <div class="card">
        <h3>Desempenho por dificuldade</h3>
        ${["facil","moderado","dificil"].map(k=>{const[c,t]=byD[k]; return t?barRow(({facil:"Fácil",moderado:"Moderado",dificil:"Difícil"})[k],pct(c,t),pct(c,t)+"%"):"";}).join("")||'<p class="muted">Sem dados.</p>'}
        <p class="muted" style="font-size:13px;margin-top:10px">% de acerto na 1ª tentativa por nível.</p>
      </div>
    </div>
    <div class="card" style="margin-top:18px">
      <h3>Desempenho por conteúdo</h3>
      ${topRows.map(r=>barRow(r.name, r.acc, r.acc+"% ("+r.c+"/"+r.t+")")).join("")}
    </div>
    <div class="card" style="margin-top:18px">
      <h3>🎯 Suas fraquezas e o que estudar</h3>
      ${weak.length? weak.map(r=>{
        const tp=getTopic(r.disc,r.top);
        return `<div class="missed" style="border-left-color:#e0a020">
          <div class="q">${esc(r.name)} — ${r.acc}% de acerto</div>
          <div class="a">${esc(tp&&tp.tips?tp.tips:"Releia o resumo desta aula e refaça o quiz no nível em que errou mais.")}

    </div>
    <div class="row" style="margin-top:18px"><button class="btn ghost sm" onclick="resetProgress()">Apagar meu histórico</button></div>
  </div>`;
}
function barRow(lab,pctv,val){ return `<div class="bar-row"><div class="lab">${esc(lab)}</div><div class="bar-track"><div class="bar-fill" style="width:${pctv}%"></div></div><div class="bar-val">${esc(val)}</div></div>`; }

function renderHistorico(){

      ${open? `<div style="margin-top:4px">${(s.details||[]).map(renderReview).join("")||'<p class="muted">Este estudo foi feito numa versão anterior do app, que ainda não guardava as respostas. Os estudos feitos a partir de agora mostram tudo o que você marcou.</p>'}</div>`:""}
    </div>`;
  }).join("");
  view.innerHTML = `<div class="view"><div class="page-head"><h1>Histórico</h1><p>Todos os estudos que você já fez. Clique em <b>Ver respostas</b> para revisar o que marcou; <b>exclua</b> os que não quiser mais (eles também saem do Desempenho).</p></div>

    ${cards}</div>`;
  window.scrollTo(0,0);
}
function renderReview(det){
  const opts = det.o.map((txt,i)=>{
    let cls="opt done"; if(i===det.a) cls+=" correct"; else if((det.picks||[]).includes(i)) cls+=" wrong"; else cls+=" dim";
    const key = i===det.a?"✓":((det.picks||[]).includes(i)?"✕":String.fromCharCode(65+i));

  }).join("");
  const tag = det.resolved ? (det.firstTry?'<span class="pill facil">acertou de primeira</span>':'<span class="pill dificil">errou antes de acertar</span>') : '<span class="pill ghost">não respondida</span>';
  return `<div style="margin:16px 0;padding-top:16px;border-top:1px solid rgba(0,0,0,.07)">

    <div class="opts">${opts}</div>
    <div class="explain"><b>Explicação:</b> ${esc(det.e)}</div>
  </div>`;
}
function toggleSession(id){ route.openSession = route.openSession===id?null:id; renderHistorico(); }
function askDeleteSession(id){ openModal(`<h3>Excluir este estudo?</h3><p class="muted">Ele sairá do histórico e do seu Desempenho. Esta ação não pode ser desfeita.</p><div class="row" style="margin-top:14px"><button class="btn dark" onclick="doDeleteSession('${id}')">Excluir</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`); }
function doDeleteSession(id){
  const s = state.sessions.find(x=>x.id===id);
  if(s && s.details){ s.details.forEach(d=>{ if(d.resolved && state.seen[d.qid]) state.seen[d.qid]=Math.max(0,state.seen[d.qid]-1); }); }
  state.sessions = state.sessions.filter(x=>x.id!==id);
  state.attempts = state.attempts.filter(a=>a.sid!==id);
  save(); closeModal(); toast("Estudo excluído."); renderHistorico();
}

    <div class="card" style="margin-top:18px">
      <h3>Materiais já processados (Semiologia)</h3>
      <p class="muted" style="font-size:14px;margin-top:-4px">12 aulas com resumos e questões prontos:</p>
      <div class="row">${Object.values(DB.semiologia.topics).map(t=>`<span class="pill ghost">${esc(t.name)}</span>`).join("")}</div>
    </div>
  </div>`;
  fillUpDiscs(); fillUpTopics(); wireDrop(); updateAICfgBtn();
}
function renderDocGroups(groups){
  return Object.entries(groups).map(([k,items])=>{
    const [disc,top]=k.split("|");
    const tp = top? getTopic(disc,top):null;
    const head = discName(disc)+(tp?" · "+tp.name:"");
    return `<div style="margin-bottom:12px"><div class="muted" style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">${esc(head)}</div>
    ${items.map(d=>`<div class="doc-item"><div class="di">${docIcon(d.name)}</div>
      <div style="flex:1;min-width:0"><div class="dn">${esc(d.name)}</div><div class="dm">${fmtBytes(d.size)} · ${new Date(d.addedTs).toLocaleDateString('pt-BR')}</div></div>
      ${d.stored?`<button class="btn ghost sm" onclick="downloadDoc('${d.id}','${esc(d.name)}')">Baixar</button>`:""}
      <button class="btn ghost sm" onclick="removeDoc('${d.id}')">✕</button></div>`).join("")}</div>`;
  }).join("");
}
function docIcon(name){ const e=(name.split(".").pop()||"").toLowerCase(); if(e==="pdf")return "📕"; if(["doc","docx"].includes(e))return "📘"; if(["png","jpg","jpeg","gif","webp"].includes(e))return "🖼"; return "📄"; }
function fillUpDiscs(){
  const sel=$("#upDisc"); if(!sel)return; const ids=allDisciplineIds();
  sel.innerHTML = ids.map(id=>`<option value="${id}">${esc(discName(id))}</option>`).join("");
}
function fillUpTopics(){
  const sel=$("#upTop"); if(!sel)return; const disc=$("#upDisc").value;
  const tops=getTopics(disc); const ids=Object.keys(tops);
  sel.innerHTML = (ids.length? ids.map(id=>`<option value="${id}">${esc(tops[id].name)}</option>`).join("") : `<option value="">— (sem aulas; crie uma) —</option>`);
}
function allDisciplineIds(){
  const set=new Set();
  state.tree.forEach(c=>c.years.forEach(y=>y.disciplines.forEach(d=>set.add(d))));
  return [...set];
}
let _lastFile=null;
function wireDrop(){
  const drop=$("#drop"), inp=$("#fileInput"); if(!drop)return;
  drop.onclick=()=>inp.click();
  inp.onchange=()=>{ if(inp.files[0]) _lastFile=inp.files[0]; handleFiles(inp.files); };
  ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("over");}));
  drop.addEventListener("drop",e=>{ const files=e.dataTransfer.files; if(files[0]) _lastFile=files[0]; handleFiles(files); });
}
async function handleFiles(files){
  const disc=$("#upDisc").value, top=$("#upTop").value;
  if(!disc){ toast("Selecione uma disciplina."); return; }
  for(const f of files){
    const id=uid("doc"); let stored=false;
    if(f.size < 9*1024*1024){ try{ await idbPut(id,f); stored=true; }catch(e){} }
    state.documents.push({id, name:f.name, size:f.size, type:f.type, disc, top, addedTs:Date.now(), stored});
  }
  save(); toast(files.length+" arquivo(s) anexado(s)."); renderDocumentos();
}
async function downloadDoc(id,name){
  const blob=await idbGet(id); if(!blob){ toast("Arquivo não disponível neste dispositivo."); return; }
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),4000);
}
function removeDoc(id){ const d=state.documents.find(x=>x.id===id); if(d&&d.stored)idbDel(id); state.documents=state.documents.filter(x=>x.id!==id); save(); renderDocumentos(); }
function openCreateTopicForUpload(){ const disc=$("#upDisc").value; if(!disc){toast("Selecione uma disciplina.");return;} openCreate('topic',disc); }

/* ============================================================
   Geração automática com IA (API Anthropic, chave do próprio usuário)
   A chave fica só neste aparelho (localStorage) e NÃO é exportada.
   ============================================================ */
function getAI(){ try{ return JSON.parse(localStorage.getItem("asclepia_ai"))||{}; }catch(e){ return {}; } }
function setAI(o){ try{ localStorage.setItem("asclepia_ai", JSON.stringify(o)); }catch(e){} }
function fillAIDiscs(){ const sel=$("#aiDisc"); if(!sel)return; const ids=allDisciplineIds(); sel.innerHTML=ids.map(id=>`<option value="${id}">${esc(discName(id))}</option>`).join(""); }
function updateAICfgBtn(){ const b=$("#aiCfgBtn"); if(!b)return; b.textContent=getAI().key?"⚙️ IA configurada ✓":"⚙️ Configurar IA"; }
function openAIConfig(){
  const c=getAI();
  openModal(`<h3>Configurar IA</h3>
    <p class="muted" style="font-size:12.5px">A chave fica salva só neste aparelho. As requisições vão direto do seu navegador para a Anthropic. Crie/gerencie em console.anthropic.com → API Keys.</p>
    <div class="field"><label>Chave da API (sk-ant-…)</label><input class="input" id="aiKeyIn" type="password" placeholder="sk-ant-..." value="${esc(c.key||"")}"></div>
    <div class="field"><label>Modelo</label><select class="input" id="aiModelIn">
      <option value="claude-opus-4-8">Opus 4.8 — melhor qualidade (mais caro)</option>
      <option value="claude-sonnet-4-6">Sonnet 4.6 — equilíbrio</option>
      <option value="claude-haiku-4-5">Haiku 4.5 — mais barato e rápido</option>
    </select></div>
    <div class="field"><label>Questões geradas por documento</label><input class="input" type="number" id="aiNIn" min="5" max="50" value="${c.n||25}"></div>
    <div class="row" style="margin-top:6px"><button class="btn primary" onclick="saveAIConfig()">Salvar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`);
  const sel=$("#aiModelIn"); if(sel) sel.value=c.model||"claude-opus-4-8";
}
function saveAIConfig(){
  const key=(($("#aiKeyIn")||{}).value||"").trim();
  const model=($("#aiModelIn")||{}).value||"claude-opus-4-8";
  let n=parseInt(($("#aiNIn")||{}).value,10)||25; n=Math.max(5,Math.min(50,n));
  setAI({key,model,n}); closeModal(); updateAICfgBtn(); toast(key?"Configuração salva.":"Chave removida.");
}
function fileToB64(f){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(",")[1]); r.onerror=rej; r.readAsDataURL(f); }); }
async function generateWithAI(){
  const cfg=getAI();
  if(!cfg.key){ toast("Configure sua chave da API primeiro."); openAIConfig(); return; }
  const disc=$("#upDisc").value;
  const topId=$("#upTop").value;
  const topicName=topId ? (getTopic(disc,topId)||{}).name||topId : "";
  const f=_lastFile;
  if(!topicName){ toast("Selecione ou crie uma aula primeiro."); return; }
  if(!f){ toast("Anexe um arquivo PDF ou .txt primeiro."); return; }
  if(!["pdf","txt","md"].includes((f.name.split(".").pop()||"").toLowerCase())){ toast("Use um arquivo PDF ou .txt."); return; }
  const n=cfg.n||25, model=cfg.model||"claude-opus-4-8";
  const btn=$("#aiGenBtn"), st=$("#aiStatus");
  const busy=(t)=>{ if(btn)btn.disabled=!!t; if(st)st.textContent=t||""; };
  try{
    busy("Lendo o arquivo…");
    const ext=(f.name.split(".").pop()||"").toLowerCase();
    let docBlock;
    if(ext==="pdf"){
      if(f.size>12*1024*1024) throw new Error("PDF muito grande (máx ~12 MB). Use um arquivo menor ou um .txt.");
      docBlock={type:"document",source:{type:"base64",media_type:"application/pdf",data:await fileToB64(f)}};
    }else{
      const text=await f.text();
      if((text||"").trim().length<40) throw new Error("Não consegui ler texto desse arquivo. Tente um PDF ou cole o conteúdo em um .txt.");
      docBlock={type:"text",text:text.slice(0,150000)};
    }
    busy("Gerando com IA… (pode levar até 1 min)");
    const sys="Você é professor(a) de medicina criando material de estudo em português do Brasil a partir do documento de aula fornecido. Gere: summary (resumo objetivo e bem estruturado em markdown — use ##, ###, **negrito** e listas começando com '- '); tips (1 a 2 frases de dica de estudo); questions (questões de múltipla escolha FIÉIS ao conteúdo do documento, cada uma com 4 alternativas plausíveis e apenas 1 correta; 'a' = índice 0-3 da alternativa correta; 'd' = dificuldade entre facil/moderado/dificil, bem distribuídas; 'e' = explicação curta da resposta correta). Não invente fatos fora do documento.";
    const tool={ name:"salvar_material", description:"Salva o resumo e as questões geradas.", input_schema:{type:"object",required:["summary","tips","questions"],properties:{
      summary:{type:"string"}, tips:{type:"string"},
      questions:{type:"array",items:{type:"object",required:["q","o","a","d","e"],properties:{
        q:{type:"string"}, o:{type:"array",items:{type:"string"}}, a:{type:"integer",enum:[0,1,2,3]},
        d:{type:"string",enum:["facil","moderado","dificil"]}, e:{type:"string"} }}} }}};
    const body={ model, max_tokens:16000, system:sys,
      tools:[tool], tool_choice:{type:"tool",name:"salvar_material"},
      messages:[{role:"user",content:[docBlock,{type:"text",text:`Gere o resumo e ${n} questões a partir deste material.`}]}] };
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{
      "content-type":"application/json","x-api-key":cfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","anthropic-beta":"output-128k-2025-02-19"
    },body:JSON.stringify(body)});
    if(!res.ok){ let m=""; try{ const e=await res.json(); m=(e.error&&e.error.message)||""; }catch(_){}
      if(res.status===401) m="Chave da API inválida. Confira em Configurar IA.";
      else if(res.status===429) m="Limite de uso atingido. Tente novamente em alguns instantes.";
      else if(res.status===400 && /credit|balance|insufficient/i.test(m)) m="Créditos insuficientes na sua conta da API.";
      throw new Error(m||("Erro HTTP "+res.status)); }
    const data=await res.json();
    console.log("API response:", JSON.stringify(data).slice(0,2000));
    const toolUse=(data.content||[]).find(b=>b.type==="tool_use"&&b.name==="salvar_material");
    if(!toolUse) throw new Error("Resposta: "+JSON.stringify(data).slice(0,300));
    const parsed=toolUse.input;
    const qs=(parsed.questions||[]).filter(q=>q&&q.q&&Array.isArray(q.o)&&q.o.length>=2).map(q=>{
      const o=q.o.slice(0,4).map(x=>String(x)); let a=parseInt(q.a,10); if(isNaN(a)||a<0||a>=o.length)a=0;
      return {id:uid("ai"), q:String(q.q), o, a, d:["facil","moderado","dificil"].includes(q.d)?q.d:"moderado", e:String(q.e||"")};
    });
    if(!qs.length) throw new Error("Nenhuma questão foi gerada. Tente outro arquivo.");
    const tid=topId||uid("top");
    state.custom.topics[disc]=state.custom.topics[disc]||{};
    state.custom.topics[disc][tid]={ name:topicName, summary:parsed.summary||("## "+topicName), tips:parsed.tips||"", questions:qs };
    // remove documento que foi usado para gerar
    if(_lastFile){ const nm=_lastFile.name; const doc=state.documents.find(d=>d.name===nm); if(doc){ if(doc.stored)idbDel(doc.id); state.documents=state.documents.filter(d=>d.id!==doc.id); } }
    save(); busy(""); _lastFile=null;
    if($("#fileInput")) $("#fileInput").value="";
    openModal(`<h3>✨ Pronto!</h3><p class="muted">Gerei <b>${qs.length} questões</b> e um resumo para <b>${esc(topicName)}</b> em ${esc(discName(disc))}. Já estão disponíveis em Quizzes e Resumos.</p><div class="row" style="margin-top:14px"><button class="btn primary" onclick="closeModal();setNav('quizzes')">Ir para os Quizzes</button><button class="btn ghost" onclick="closeModal()">Fechar</button></div>`);
  }catch(err){
    busy("");
    openModal(`<h3>Não foi possível gerar</h3><p class="muted">${esc(err.message||String(err))}</p><div class="row" style="margin-top:14px"><button class="btn ghost" onclick="openAIConfig()">Configurar IA</button><button class="btn primary" onclick="closeModal()">Ok</button></div>`);
  }
}

/* ============================================================
   Criação de itens (ciclo/ano/disciplina/tópico)
   ============================================================ */
function askDelete(kind, ctx, name){
  openModal(`<h3>Apagar "${esc(name)}"?</h3><p class="muted">Esta ação não pode ser desfeita.</p><div class="row" style="margin-top:14px"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" style="background:#e53e3e" onclick="doDelete('${kind}','${ctx}')">Apagar</button></div>`);
}
function doDelete(kind, ctx){
  closeModal();
  if(kind==='topic'){
    const [disc,tid]=ctx.split('|');
    if(state.custom.topics[disc]) delete state.custom.topics[disc][tid];
    // remove from semiologia too if present
    if(DB.semiologia && DB.semiologia.topics) delete DB.semiologia.topics[tid];
  } else if(kind==='disc'){
    const [cycId,yearId,did]=ctx.split('|');
    const cyc=state.tree.find(x=>x.id===cycId); if(!cyc) return;
    const yr=cyc.years.find(x=>x.id===yearId); if(!yr) return;
    yr.disciplines=yr.disciplines.filter(x=>x!==did);
    if(state.custom.topics[did]) delete state.custom.topics[did];
    if(state.custom.discs) delete state.custom.discs[did];
  } else if(kind==='year'){
    const [cycId,yearId]=ctx.split('|');
    const cyc=state.tree.find(x=>x.id===cycId); if(!cyc) return;
    cyc.years=cyc.years.filter(x=>x.id!==yearId);
  } else if(kind==='cycle'){
    state.tree=state.tree.filter(x=>x.id!==ctx);
  }
  save(); render();
}
function openCreate(kind, ctx){
  let title, fields="";
  if(kind==="cycle"){ title="Novo ciclo"; fields=`<div class="field"><label>Nome do ciclo</label><input class="input" id="cName" placeholder="Ex.: Ciclo Clínico"></div>`; }
  if(kind==="year"){ title="Novo ano"; fields=`<div class="field"><label>Nome do ano</label><input class="input" id="cName" placeholder="Ex.: 3º ANO"></div>`; }
  if(kind==="disc"){ title="Nova disciplina"; fields=`<div class="field"><label>Nome da disciplina</label><input class="input" id="cName" placeholder="Ex.: Farmacologia II"></div>`; }
  if(kind==="topic"){ title="Nova aula / tópico"; fields=`<div class="field"><label>Nome da aula</label><input class="input" id="cName" placeholder="Ex.: Semiologia Cardiovascular"></div>
    <div class="field"><label>Resumo (opcional)</label><textarea class="input" id="cSummary" rows="4" placeholder="Cole aqui um resumo, se quiser."></textarea></div>`; }
  openModal(`<h3>${title}</h3>${fields}<div class="row" style="margin-top:14px"><button class="btn primary" onclick="doCreate('${kind}','${ctx||""}')">Criar</button><button class="btn ghost" onclick="closeModal()">Cancelar</button></div>`);
  setTimeout(()=>{const i=$("#cName"); if(i)i.focus();},50);
}
function doCreate(kind, ctx){
  const name=($("#cName")||{}).value.trim(); if(!name){ toast("Informe um nome."); return; }
  if(kind==="cycle"){ state.tree.push({id:uid("cyc"),name,years:[]}); }
  if(kind==="year"){ const c=state.tree.find(x=>x.id===ctx); c.years.push({id:uid("yr"),name,disciplines:[]}); }
  if(kind==="disc"){ const [cid,yid]=ctx.split("|"); const id=uid("disc"); state.custom.disciplines[id]={name}; const c=state.tree.find(x=>x.id===cid); const y=c.years.find(x=>x.id===yid); y.disciplines.push(id); }
  if(kind==="topic"){ const disc=ctx; const id=uid("top"); const summary=($("#cSummary")||{}).value.trim(); state.custom.topics[disc]=state.custom.topics[disc]||{}; state.custom.topics[disc][id]={name, summary:summary||"## "+name+"\nResumo ainda não disponível para esta aula.", tips:"", questions:[]}; }
  save(); closeModal(); toast(name+" criado."); render();
  if(nav==="documentos"){ fillUpDiscs(); fillUpTopics(); }
}

/* ---------- Modal ---------- */
function openModal(html){ $("#modalBox").innerHTML=html; $("#modalBg").classList.add("show"); }
function closeModal(){ $("#modalBg").classList.remove("show"); }
$("#modalBg").addEventListener("click",e=>{ if(e.target.id==="modalBg") closeModal(); });

/* ---------- expose for inline handlers ---------- */
Object.assign(window,{setNav,render,startSetup,beginQuiz,renderSetup,pick,prevQ,nextQ,skipQ,confirmEnd,endQuiz,openResumo,openResumoFrom,openCreate,doCreate,closeModal,fillUpTopics,handleFiles,downloadDoc,removeDoc,openCreateTopicForUpload,resetProgress,doReset,renderHistorico,toggleSession,askDeleteSession,doDeleteSession,askClearHistory,doClearHistory,boot,doLogin,loginAs,switchProfile,logout,openProfileMenu,exportProfile,copyEl,openImport,importFromCode,applyImport,openAIConfig,saveAIConfig,generateWithAI,askDelete,doDelete,route:null});
Object.defineProperty(window,"route",{get:()=>route,set:v=>{route=v;}});

/* ---------- boot ---------- */
boot();
</script>
