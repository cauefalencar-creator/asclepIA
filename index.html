midos por animais (EUA). Dos 41 ATBs aprovados para animais, 31 são considerados importantes para a saúde humana.\n\n### Estratégias para reduzir a RAM\n1. **Redução do uso na agropecuária** (animais consomem mais ATB que humanos).\n2. **Vacinas:** previnem infecções → menos uso de ATB → menos seleção de resistentes.\n3. **Diagnóstico rápido e qualificado:** 67,5% das prescrições de ATB para infecção respiratória nos EUA são desnecessárias. Testes rápidos permitem distinguir infecção bacteriana/viral e identificar o patógeno e seu perfil de sensibilidade.\n\n### Uso racional de antimicrobianos\nFluxo: **Coletar amostra ANTES de iniciar o tratamento** → identificar patógeno → teste de sensibilidade → escolher/ajustar ATB. Se não for possível esperar: tratamento EMPÍRICO baseado em evidências + biomarcadores (leucograma, procalcitonina).\n\n### Categorias EUCAST/SIR (redefinição 2019)\n- **S = Sensível, dosagem padrão:** alta probabilidade de sucesso com regime padrão.\n- **I = Sensível, aumentando exposição:** sucesso provável se aumentar dose ou concentração no local (antes era 'Intermediário').\n- **R = Resistente:** alta probabilidade de falha mesmo com aumento de exposição.\n\n### Causas de pneumonia comunitária (PAC)\n*S. pneumoniae* 42% | *Mycoplasma pneumoniae* 19% | *Chlamydophila* 10% | *H. influenzae* 9% | Gram-negativos 7% | *Legionella* 4%.`,
   tips:"RAM = processo evolutivo: seleção das resistentes pelo ATB. 4 mecanismos: beta-lactamases, efluxo, mutações, permeabilidade. Resistoma = todos os GRAs; Mobiloma = transfere GRAs entre MO; Nichoma = expressão ambiental. Mortes RAM 2025 = 1,27M diretas / 4,95M associadas. Projeção 2050 = 10M. 70% dos ATBs vão para animais. Coletar amostra ANTES de tratar. SIR 2019: S=dosagem padrão; I=aumentando exposição; R=resistente (falha mesmo com mais exposição). PAC: S. pneumoniae 42%, Mycoplasma 19%.",
   questions:[
    {id:"a3q1",d:"facil",q:"Por que o uso de antimicrobianos SELECIONA populações bacterianas resistentes?",o:["Bactérias sensíveis morrem e as resistentes (pré-existentes ou mutantes) sobrevivem e se multiplicam","O antibiótico induz mutações de resistência em todas as bactérias presentes","As bactérias trocam genes de resistência apenas após o contato com o antibiótico","O antibiótico destrói somente as bactérias que ainda não desenvolveram resistência"],a:0,e:"A resistência é um processo evolutivo de SELEÇÃO NATURAL: o antibiótico não cria resistência, mas elimina as sensíveis — as resistentes (mesmo que raras no início) sobrevivem, se reproduzem e dominam a população."},
    {id:"a3q2",d:"moderado",q:"Qual é o mecanismo de resistência das Beta-lactamases (penicilinases)?",o:["Enzimas que hidrolisam o anel beta-lactâmico, inativando penicilinas e cefalosporinas","Bombas que expulsam o antibiótico para fora da célula","Mutações no ribossomo que impedem a ligação do antibiótico","Redução do número de porinas na membrana externa"],a:0,e:"Beta-lactamases são enzimas que clivam o anel beta-lactâmico de penicilinas e cefalosporinas. Frequentemente codificadas em plasmídios, facilitam a disseminação horizontal entre bactérias."},
    {id:"a3q3",d:"moderado",q:"O mecanismo de EFLUXO confere resistência porque:",o:["Bombas de membrana expulsam ativamente o antibiótico, mantendo baixa concentração intracelular","Enzimas destroem o antibiótico dentro da célula bacteriana","O alvo ribossomal é modificado por mutação","A parede celular é reforçada impedindo a entrada do antibiótico"],a:0,e:"Bombas de efluxo são proteínas transportadoras que expulsam o antibiótico para fora da célula, mantendo sua concentração abaixo da concentração inibitória mínima (CIM)."},
    {id:"a3q4",d:"moderado",q:"Mutações que alteram a subunidade ribossomal 30S conferem resistência a qual classe de antibiótico?",o:["Aminoglicosídeos (ex: gentamicina, amicacina)","Macrolídeos (ex: eritromicina)","Beta-lactâmicos (ex: amoxicilina)","Quinolonas (ex: ciprofloxacino)"],a:0,e:"Mutações na subunidade 30S impedem a ligação de aminoglicosídeos e tetraciclinas ao ribossomo bacteriano, conferindo resistência."},
    {id:"a3q5",d:"moderado",q:"A redução do número de PORINAS na membrana externa das bactérias Gram-negativas é um mecanismo de resistência denominado:",o:["Alteração da permeabilidade","Efluxo","Produção de beta-lactamases","Modificação do alvo"],a:0,e:"As porinas são canais proteicos por onde os antibióticos entram nas bactérias Gram-negativas. Sua redução diminui a entrada do antibiótico, conferindo resistência."},
    {id:"a3q6",d:"facil",q:"O RESISTOMA é definido como:",o:["A coleção de todos os genes de resistência aos antimicrobianos (GRA) presentes num ambiente ou organismo","O conjunto de antibióticos disponíveis para tratamento","Os mecanismos de efluxo das bactérias","A taxa de mortalidade por bactérias resistentes"],a:0,e:"O resistoma (Wright, 2007) é a coleção de TODOS os genes de resistência a antimicrobianos (GRA), incluindo genes crípticos que não foram ainda ativados. É um reservatório enorme de resistência potencial."},
    {id:"a3q7",d:"moderado",q:"O MOBILOMA é importante para a disseminação da resistência porque:",o:["São elementos genéticos móveis (plasmídios, transposons) que transferem genes de resistência entre diferentes microrganismos","São enzimas que destroem os antibióticos","São genes que só se expressam dentro do hospedeiro humano","São proteínas de membrana que expulsam o antibiótico"],a:0,e:"O mobiloma inclui plasmídios, transposons e integrons — elementos que transferem horizontalmente genes de resistência (GRAs) entre bactérias de diferentes espécies, acelerando a disseminação da AMR."},
    {id:"a3q8",d:"facil",q:"Segundo os dados de 2025, quantas mortes por ano são DIRETAMENTE atribuíveis à resistência antimicrobiana (RAM)?",o:["1,27 milhão","700 mil","4,95 milhões","10 milhões"],a:0,e:"Em 2025: 1,27 milhão de mortes/ano diretamente atribuíveis à RAM + 4,95 milhões associadas à RAM. A projeção para 2050 é de 10 milhões de mortes diretas/ano."},
    {id:"a3q9",d:"facil",q:"A projeção de mortes por resistência antimicrobiana (AMR) para 2050 é de quantas mortes por ano?",o:["10 milhões","700 mil","1,27 milhão","8,2 milhões"],a:0,e:"A projeção é de 10 milhões de mortes/ano por AMR em 2050 — ultrapassando câncer (8,2 milhões) como principal causa de morte. Atualmente (2025): ~1,27 milhão de mortes diretas."},
    {id:"a3q10",d:"moderado",q:"Qual região do mundo apresenta a MAIOR mortalidade absoluta associada à resistência antimicrobiana?",o:["Ásia (4,73 milhões)","África (4,15 milhões)","Europa (390 mil)","América do Norte (317 mil)"],a:0,e:"A Ásia lidera com 4,73 milhões de mortes associadas à RAM, seguida pela África com 4,15 milhões — regiões com maior carga de doenças infecciosas e menor acesso a diagnóstico e ATBs de 2ª linha."},
    {id:"a3q11",d:"moderado",q:"No pior cenário de AMR, qual seria o impacto no PIB global até 2050?",o:["Perda de até -3,8% do PIB global — comparável à crise financeira de 2008","Ganho de 1% do PIB por redução de gastos hospitalares","Perda de 0,1% do PIB — impacto mínimo","Perda de 50% do PIB — colapso econômico total"],a:0,e:"No cenário pessimista (alto AMR), a perda projetada é de -3,8% do PIB global em 2050 — comparável à crise financeira global de 2008. No cenário otimista (baixo AMR): -1,1%."},
    {id:"a3q12",d:"moderado",q:"A resistência antimicrobiana como 'contaminante ambiental emergente' envolve qual ciclo de disseminação?",o:["Pecuária → esterco → solo/água → aquífero → água potável, além de hospitais e indústria farmacêutica","Apenas transmissão direta de pessoa para pessoa em hospitais","Somente através de alimentos importados de outros países","Exclusivamente por vetores artrópodes (mosquitos, carrapatos)"],a:0,e:"O ciclo ambiental da resistência envolve: pecuária (uso em animais) → esterco → solo → irrigação → água superficial → aquífero → água de consumo, além de efluentes hospitalares e farmacêuticos."},
    {id:"a3q13",d:"moderado",q:"Nos EUA, qual percentual dos antibióticos clinicamente importantes é consumido por animais na agropecuária?",o:["70% por animais, 30% por humanos","30% por animais, 70% por humanos","50% por animais e 50% por humanos","90% por animais, 10% por humanos"],a:0,e:"Nos EUA, 70% dos antibióticos medicamente importantes para humanos são consumidos por animais na produção agropecuária, favorecendo a seleção e disseminação de bactérias resistentes."},
    {id:"a3q14",d:"moderado",q:"Como as VACINAS contribuem para reduzir a resistência antimicrobiana?",o:["Previnem infecções → menos necessidade de ATB → menor pressão seletiva para resistência","Destroem diretamente as bactérias resistentes","Aumentam a eficácia dos antibióticos existentes","Inibem a transferência horizontal de genes de resistência"],a:0,e:"Ao prevenir infecções, as vacinas reduzem a necessidade de uso de antibióticos — diminuindo a pressão seletiva que favorece bactérias resistentes. Também reduzem a disseminação de cepas resistentes na comunidade (imunidade de rebanho)."},
    {id:"a3q15",d:"facil",q:"Segundo dados da aula, qual percentual das prescrições de antibióticos para infecções respiratórias nos EUA é DESNECESSÁRIO?",o:["67,5%","10%","33%","90%"],a:0,e:"Dos 40 milhões de pessoas que recebem ATB para problemas respiratórios anualmente nos EUA, 27 milhões (67,5%) recebem de forma desnecessária. Diagnóstico rápido (bacteriana x viral) poderia evitar a maioria dessas prescrições."},
    {id:"a3q16",d:"moderado",q:"No uso racional de antimicrobianos, quando deve ser coletada a amostra microbiológica?",o:["ANTES de iniciar o tratamento antibiótico","Após 48h de antibiótico para confirmar a eficácia","No momento em que os sintomas melhoram","Somente se o tratamento inicial falhar"],a:0,e:"A coleta ANTES do tratamento é fundamental: o antibiótico pode inibir o crescimento bacteriano e falsear o resultado do cultivo, impedindo identificação do patógeno e perfil de sensibilidade."},
    {id:"a3q17",d:"facil",q:"Quando NÃO é possível aguardar o resultado do laboratório para iniciar tratamento antibiótico, o que deve ser feito?",o:["Iniciar tratamento EMPÍRICO baseado em evidências e epidemiologia local, usando biomarcadores (leucograma, procalcitonina) como apoio","Aguardar sempre o resultado, mesmo em pacientes graves","Não tratar até ter o diagnóstico confirmado","Usar sempre carbapenems como cobertura ampla"],a:0,e:"O tratamento empírico é justificado quando o paciente não pode aguardar o resultado laboratorial (situações graves). Deve ser baseado em evidências, perfil epidemiológico local e biomarcadores inespecíficos de infecção bacteriana."},
    {id:"a3q18",d:"moderado",q:"Segundo a redefinição EUCAST 2019, o que significa a categoria 'I' nos testes de sensibilidade?",o:["Sensível, aumentando a exposição ao antimicrobiano (antes era 'Intermediário')","Intermediário — resultado inconclusivo sem significado clínico","Resistente com possibilidade de tratamento em altas doses","Insensível — equivalente à categoria R"],a:0,e:"Em 2019, o EUCAST redefiniu 'I' de 'Intermediário' para 'Sensível, aumentando exposição': há alta probabilidade de sucesso se a dose for aumentada ou a concentração no local de infecção for aumentada."},
    {id:"a3q19",d:"facil",q:"Um microrganismo classificado como 'R' nos testes de sensibilidade significa:",o:["Alta probabilidade de FALHA terapêutica mesmo com aumento de exposição ao antibiótico","Alta probabilidade de sucesso com regime padrão","Resultado indeterminado que requer repetição do teste","Resistência parcial que pode ser superada com dose padrão"],a:0,e:"R = Resistente: mesmo aumentando a dose ou a concentração do antibiótico no local da infecção, a probabilidade de sucesso terapêutico é baixa. O tratamento com esse antibiótico não é recomendado."},
    {id:"a3q20",d:"facil",q:"Qual é o principal agente etiológico da Pneumonia Adquirida na Comunidade (PAC)?",o:["Streptococcus pneumoniae (42%)","Mycoplasma pneumoniae (19%)","Chlamydophila pneumoniae (10%)","Legionella spp. (4%)"],a:0,e:"S. pneumoniae (pneumococo) é a causa mais comum de PAC, responsável por ~42% dos casos. O Mycoplasma pneumoniae aparece em segundo lugar com ~19%."},
    {id:"a3q21",d:"moderado",q:"Na pneumonia bacteriana PRECOCEMENTE adquirida no hospital, qual é o tratamento de primeira linha recomendado?",o:["Ceftriaxona, quinolona, ampicilina/sulbactam ou ertapenem","Vancomicina + piperacilina-tazobactam","Metronidazol + fluconazol","Amoxicilina oral isolada"],a:0,e:"Pneumonia hospitalar precoce (< 48-72h de internação) envolve agentes comunitários (S. aureus, H. influenzae, Enterobacteriaceae, S. pneumoniae) — tratados com ceftriaxona, quinolonas respiratórias, ampicilina/sulbactam ou ertapenem."},
    {id:"a3q22",d:"dificil",q:"A 'Tempestade Perfeita' (Perfect Storm) na resistência antimicrobiana refere-se à combinação de:",o:["Crescimento da resistência (MRSA, VRE, FQRP) enquanto o número de empresas pesquisando novos ATBs caiu de 18 para 4","Aumento simultâneo de resistência e desenvolvimento de novos antibióticos","Crise financeira global reduzindo acesso aos antibióticos existentes","Resistência apenas em países pobres sem acesso a tratamento adequado"],a:0,e:"'Perfect Storm': enquanto a resistência de MRSA, VRE e Pseudomonas resistente a fluoroquinolonas (FQRP) cresceu marcadamente entre 1980-2010, o número de grandes empresas pesquisando antibióticos caiu de 18 (1990) para apenas 4 (2010) — gap perigoso na pipeline de novos antimicrobianos."}
   ]},
  aula2:{ name:"Aula 2 — Controle: Biocidas, Métodos Físicos e Antimicrobianos", doc:"AIP 2025 - Prof. Pedro Almeida da Silva",
   summary:`## Aula 2 — Controle de Microrganismos: Biocidas, Métodos Físicos e Antimicrobianos\n\n### Por que controlar microrganismos?\nPromoção da saúde atuando na **profilaxia** e **tratamento** de infecções/doenças infecciosas. Ferramentas: biocidas (prevenção), métodos físicos (prevenção) e antimicrobianos (prevenção + terapêutica).\n\n### Métodos Químicos — Biocidas (Desinfetantes)\nCritérios de escolha (CCIH + higiene/limpeza): natureza da superfície, segurança, concentração eficaz, tempo de contato/fricção, luz/temperatura/pH, inativação por matéria orgânica, custo.\nFatores que influenciam eficiência: características do MO (micobactérias, esporos), presença de fluidos orgânicos, tempo de exposição.\n\n**Hierarquia de resistência (alta→baixa):** Prions > Esporos bacterianos (*C. difficile*, *B. subtilis*) > Micobactérias > Vírus não lipídicos > Fungos > Bactérias vegetativas > Vírus lipídicos.\n\n**Persistência em superfícies (exemplos):** *C. difficile* 5 meses; MRSA 7 dias-7 meses; *Klebsiella* 2h->30 meses; *M. tuberculosis* 1-4 meses; *Salmonella typhi* 6h-4 semanas.\nVírus: Parvovirus >1 ano; Adenovirus 7 dias-3 meses; SARS 72-96h; HAV 2h-60 dias; Influenza 1-2 dias; Coronavirus 3h.\n\n**Principais desinfetantes hospitalares:**\n- Álcool etílico **68-72%** (graduação ideal para desinfecção)\n- Sais quaternários de amônio (10 min de contato)\n- Oxidantes / **peróxido de hidrogênio** (eficaz na presença de matéria orgânica)\n- Compostos clorados / **hipoclorito de sódio** (áreas críticas)\n\n### Métodos Físicos\n**Calor úmido (autoclave):** 100°C inativa vegetativas; 121°C/1ATM (autoclave) → inativa esporos, vegetativas e vírus. Controle: fitas + *Bacillus stearothermophilus*.\n**Calor seco (forno):** 171°C/1h; 160°C/2h; 121°C/16h. Para metais e vidraria. Bico de bunsen (pipetas, alças).\n**Radiação UV:** 185 nm e 265 nm danificam DNA. Baixa penetração — só superfícies. Microrganismos protegidos em fissuras/sombras. Complemento, não substituto.\n\n### Antimicrobianos\n**Antibiótico:** substância de baixo PM produzida por microrganismo, inibe/mata outros MO sem dano ao hospedeiro.\n**Antimicrobiano:** qualquer substância (natural, semissintética ou sintética) que mata/inibe MO sem dano ao hospedeiro.\n\n**Origens:** Actinomycetes (maior grupo — aminoglicosídeos, tetraciclinas, glicopeptídeos, macrolídeos, carbapenens); Fungos (penicilinas, cefalosporinas); Sintéticos (quinolonas, sulfonamidas, nitroimidazóis).\n\n**Marcos históricos:** pão bolorento há 2000 anos; Parkinson 1640 (documentação científica); Ehrlich/Salvarsan 1909 (sífilis — bala mágica); Fleming 28/09/1928 (penicilina); Chain & Florey 1945 (Nobel de Medicina).\n\n**Mecanismos de ação:** parede celular (penicilinas, cefalosporinas, carbapenens, vancomicina); DNA gyrase (quinolonas); RNA polymerase (rifampicina); Proteína 50S (macrolídeos, cloranfenicol); Proteína 30S (tetraciclinas, aminoglicosídeos); Membrana citoplasmática (polimixinas); Ácido fólico (sulfonamidas, trimetoprim).\n\n### Resistência aos Antimicrobianos (AMR)\nMecanismos: produção de **beta-lactamases** (penicilinases); **efluxo** (expulsão do antibiótico); **mutações** (alvo alterado); **alteração da permeabilidade** (diminuição da entrada).\nAMR: ~700.000 mortes/ano (2014). Projeção 2050: **10 milhões** de mortes/ano — ultrapassando câncer.`,
   tips:"Hierarquia resistência (decorar): Prions > Esporos > Micobactérias > Vírus não lipídicos > Fungos > Bact. vegetativas > Vírus lipídicos. Álcool eficaz: 68-72% (não 100%!). Autoclave: 121°C/1ATM mata esporos. Antibiótico vs Antimicrobiano: ATB é produzido por MO; AMB inclui substâncias sintéticas. Fleming = penicilina (28/09/1928); Ehrlich = Salvarsan (sífilis). Mecanismos de resistência: beta-lactamases, efluxo, mutações, permeabilidade. AMR 2050 = 10 milhões de mortes/ano.",
   questions:[
    {id:"a2q1",d:"facil",q:"Segundo a aula, o controle de microrganismos para fins TERAPÊUTICOS (tratamento de infecções) utiliza principalmente:",o:["Antimicrobianos","Biocidas","Métodos físicos (calor)","Radiação ultravioleta"],a:0,e:"Biocidas e métodos físicos atuam na profilaxia (prevenção). Os antimicrobianos são usados tanto na prevenção quanto, especialmente, no tratamento das doenças infecciosas."},
    {id:"a2q2",d:"moderado",q:"Na escolha de um desinfetante hospitalar, qual órgão deve ser envolvido na decisão, junto com o serviço de higiene e limpeza?",o:["CCIH (Comissão de Controle de Infecção Hospitalar)","Vigilância Sanitária Estadual","CFM (Conselho Federal de Medicina)","Ministério da Saúde diretamente"],a:0,e:"A escolha, seleção e aquisição de desinfetantes deve ser feita pela CCIH em conjunto com o serviço de higiene e limpeza, considerando critérios técnicos e de segurança."},
    {id:"a2q3",d:"moderado",q:"Qual propriedade de um desinfetante indica que ele MANTÉM a atividade antimicrobiana mesmo na presença de sangue ou pus?",o:["Não inativação por matéria orgânica","Alta concentração inibitória mínima","Baixo tempo de contato necessário","Resistência à variação de temperatura"],a:0,e:"A presença de fluidos orgânicos (sangue, pus) pode inativar muitos desinfetantes. Um biocida ideal mantém eficácia mesmo nessa situação — importante critério de escolha hospitalar."},
    {id:"a2q4",d:"moderado",q:"Na hierarquia de resistência aos biocidas, qual grupo é o MAIS difícil de eliminar?",o:["Prions","Esporos bacterianos","Micobactérias","Vírus não lipídicos"],a:0,e:"Prions (ex: doença de Creutzfeldt-Jakob) têm a maior resistência aos biocidas. Abaixo: esporos > micobactérias > vírus não lipídicos > fungos > bactérias vegetativas > vírus lipídicos."},
    {id:"a2q5",d:"facil",q:"Na hierarquia de resistência aos biocidas, qual grupo tem a MENOR resistência (mais fácil de eliminar)?",o:["Vírus lipídicos (ex: HIV, HBV, Herpes)","Fungos","Bactérias vegetativas","Vírus não lipídicos (ex: Poliovírus)"],a:0,e:"Vírus lipídicos (HIV, HBV, Herpes, Citomegalovírus) têm a menor resistência — são facilmente eliminados com desinfetantes de nível baixo."},
    {id:"a2q6",d:"moderado",q:"Qual é a CONCENTRAÇÃO IDEAL do álcool etílico para desinfecção de superfícies hospitalares?",o:["68-72%","99-100%","50-55%","80-85%"],a:0,e:"O álcool a 68-72% é o ideal — a água presente facilita a penetração na célula bacteriana. O álcool 100% (anidro) é menos eficaz pois não penetra tão bem."},
    {id:"a2q7",d:"moderado",q:"Os sais quaternários de amônio são desinfetantes hospitalares que exigem, para sua eficácia, um tempo mínimo de contato de:",o:["10 minutos","30 segundos","1 hora","5 minutos"],a:0,e:"Os sais quaternários de amônio precisam de 10 minutos de contato para garantir a atividade antimicrobiana adequada."},
    {id:"a2q8",d:"moderado",q:"Qual classe de desinfetante hospitalar tem como principal composto o peróxido de hidrogênio e é eficaz mesmo na presença de matéria orgânica?",o:["Oxidantes","Compostos clorados","Sais quaternários de amônio","Álcool etílico"],a:0,e:"Os oxidantes (ex: peróxido de hidrogênio, como o Peroxy 4D) são eficazes em toda a área hospitalar e mantêm eficácia na presença de matéria orgânica."},
    {id:"a2q9",d:"facil",q:"O hipoclorito de sódio é um composto clorado usado principalmente em:",o:["Áreas críticas e desinfecção de superfícies em áreas de alto risco","Higiene das mãos do cirurgião","Esterilização de instrumentos cirúrgicos delicados","Desinfecção de equipamentos eletrônicos"],a:0,e:"Compostos clorados (hipoclorito de sódio) são amplamente usados para desinfecção de superfícies em áreas críticas hospitalares."},
    {id:"a2q10",d:"moderado",q:"Qual bactéria, presente em superfícies por até 5 meses, é um exemplo clássico de persistência ambiental relevante para infecções hospitalares?",o:["Clostridium difficile","Neisseria gonorrhoeae","Haemophilus influenzae","Campylobacter jejuni"],a:0,e:"C. difficile (esporos) pode persistir em superfícies por 5 meses, sendo um patógeno de grande preocupação em infecções associadas à assistência à saúde."},
    {id:"a2q11",d:"moderado",q:"Segundo os dados da aula, qual vírus tem a MAIOR persistência em superfícies inanimadas secas?",o:["Parvovirus (>1 ano)","Adenovirus (7 dias - 3 meses)","HIV (>7 dias)","Influenza (1-2 dias)"],a:0,e:"O Parvovirus pode persistir por mais de 1 ano em superfícies secas — a maior persistência entre os vírus clinicamente relevantes listados."},
    {id:"a2q12",d:"facil",q:"O Coronavirus (incluindo SARS-CoV-2 em formas originais) tinha uma persistência em superfícies de aproximadamente:",o:["3 horas (Coronavirus) / 72-96 horas (SARS)","7-30 dias","1-2 anos","Menos de 1 minuto"],a:0,e:"Coronavirus comum persiste ~3 horas; o vírus associado ao SARS persiste 72-96 horas em superfícies inanimadas secas."},
    {id:"a2q13",d:"facil",q:"O calor úmido (autoclave) funciona matando os microrganismos por:",o:["Coagulação das proteínas, rompendo as pontes de hidrogênio","Oxidação de moléculas celulares","Dano ao DNA por radiação","Desidratação celular"],a:0,e:"O calor úmido mata pela coagulação das proteínas (rompimento de pontes de hidrogênio). É mais eficiente que o calor seco para penetrar materiais espessos."},
    {id:"a2q14",d:"moderado",q:"A autoclave opera a 121°C porque a água sob pressão de 1 ATM ferve a essa temperatura. Qual microrganismo é usado como CONTROLE biológico de eficácia da autoclave?",o:["Bacillus stearothermophilus","Clostridium botulinum","Mycobacterium tuberculosis","Bacillus anthracis"],a:0,e:"Esporos de Bacillus stearothermophilus são usados como indicador biológico — se não crescerem após a autoclavação, o ciclo foi eficaz."},
    {id:"a2q15",d:"moderado",q:"A água fervente (100°C) é SUFICIENTE para eliminar esporos bacterianos?",o:["Não — esporos resistem a 100°C; é necessário 121°C (autoclave/1ATM) para eliminá-los","Sim — 100°C mata qualquer forma de vida","Sim — esporos são eliminados em 30 min a 100°C","Não — é preciso apenas radiação UV"],a:0,e:"100°C inativa a maioria das formas vegetativas, fungos e alguns vírus, mas NÃO é esporicida. Apenas a autoclave (121°C/1ATM) elimina esporos."},
    {id:"a2q16",d:"moderado",q:"O calor seco (forno) a 171°C por quanto tempo é equivalente à autoclave para esterilização?",o:["1 hora","30 minutos","5 horas","15 minutos"],a:0,e:"Protocolos de calor seco: 171°C/1h; 160°C/2h; 121°C/16h. O calor seco penetra mais lentamente — portanto exige temperaturas mais altas ou tempos maiores."},
    {id:"a2q17",d:"facil",q:"A radiação UV germicida nos comprimentos de onda 185 nm e 265 nm causa dano ao microrganismo por:",o:["Dano ao DNA, inibindo a replicação","Desnaturação das proteínas da membrana","Oxidação dos lipídios de membrana","Rompimento da parede celular"],a:0,e:"A radiação UV nos comprimentos germicidas (185 nm e 265 nm) causa dano direto ao DNA, inibindo sua replicação e eliminando o microrganismo."},
    {id:"a2q18",d:"moderado",q:"Uma limitação importante da radiação UV é que:",o:["Tem baixa penetração — microrganismos em fissuras e áreas sombreadas são protegidos","Causa dano ao DNA de células humanas imediatamente","É inefficaz contra vírus","Destrói instrumentos metálicos"],a:0,e:"A UV tem baixa penetração e não alcança microrganismos em fissuras, rachaduras ou áreas sombreadas. Deve ser usada como complemento a outras técnicas."},
    {id:"a2q19",d:"facil",q:"Qual a diferença entre ANTIBIÓTICO e ANTIMICROBIANO?",o:["Antibiótico é produzido por microrganismo; antimicrobiano inclui substâncias naturais, semissintéticas e sintéticas","Antibiótico é sintético; antimicrobiano é natural","São termos sinônimos sem nenhuma distinção","Antimicrobiano só atua em bactérias; antibiótico em qualquer MO"],a:0,e:"Antibiótico: substância produzida por MO (baixo PM) que inibe/mata outros MO. Antimicrobiano: qualquer substância (natural, semissintética ou sintética) com essa função — conceito mais amplo."},
    {id:"a2q20",d:"moderado",q:"Paul Ehrlich (1854-1915) ficou famoso pelo desenvolvimento do Salvarsan (arsphenamina), que tratava a sífilis e foi chamado de 'Bala Mágica'. Qual a origem desta substância?",o:["Síntese química — molécula inteiramente produzida artificialmente","Extrato de fungo do pão","Produto de Actinomycetes do solo","Extrato de planta medicinal"],a:0,e:"O Salvarsan foi desenvolvido por síntese química por Ehrlich — um pioneiro da química medicinal. A metáfora 'Bala Mágica' (Zauberkugel) expressava a ideia de tratar especificamente o agente causador."},
    {id:"a2q21",d:"facil",q:"Alexander Fleming descobriu a penicilina em qual data, ao observar um fungo inibindo bactérias numa placa de cultura?",o:["28 de setembro de 1928","15 de março de 1935","4 de julho de 1945","1 de janeiro de 1900"],a:0,e:"Na sexta-feira, 28/09/1928, Fleming observou que uma placa de Staphylococcus contaminada por Penicillium notatum apresentava halo de inibição ao redor do fungo."},
    {id:"a2q22",d:"moderado",q:"55% dos antibióticos descobertos entre 1945 e 1978 vieram do gênero:",o:["Streptomyces","Penicillium","Bacillus","Candida"],a:0,e:"Streptomyces (Actinomycetes filamentosos do solo) foi a fonte de 55% dos antibióticos descobertos nesse período — incluindo tetraciclinas, aminoglicosídeos e macrolídeos."},
    {id:"a2q23",d:"moderado",q:"Qual mecanismo de ação explica a eficácia das quinolonas (ex: ciprofloxacino)?",o:["Inibição da DNA gyrase (topoisomerase II), impedindo a replicação do DNA bacteriano","Inibição da síntese da parede celular","Bloqueio da subunidade 50S do ribossomo","Interferência no metabolismo do ácido fólico"],a:0,e:"Quinolonas inibem a DNA gyrase (e topoisomerase IV), enzimas essenciais para enrolar/desenrolar o DNA bacteriano — impedindo replicação e transcrição."},
    {id:"a2q24",d:"moderado",q:"Rifampicina e estreptovaricinás atuam inibindo qual enzima?",o:["RNA polimerase dirigida pelo DNA (transcrição)","DNA gyrase","Subunidade 50S do ribossomo","Enzimas do metabolismo do ácido fólico"],a:0,e:"Rifampicina inibe especificamente a RNA polimerase dirigida pelo DNA, bloqueando a transcrição — mecanismo fundamental no tratamento da tuberculose."},
    {id:"a2q25",d:"dificil",q:"Qual mecanismo de resistência bacteriana consiste na produção de enzimas que clivam o anel beta-lactâmico dos antibióticos penicilínicos?",o:["Produção de beta-lactamases (penicilinases)","Mecanismo de efluxo","Mutação no alvo ribossomal","Diminuição da permeabilidade da membrana externa"],a:0,e:"Beta-lactamases (penicilinases) são enzimas que hidrolisam o anel beta-lactâmico de penicilinas e cefalosporinas, inativando-os. São codificadas frequentemente em plasmídios, facilitando sua disseminação."},
    {id:"a2q26",d:"dificil",q:"O mecanismo de EFLUXO confere resistência aos antimicrobianos porque:",o:["Bombas de membrana expulsam ativamente o antibiótico para fora da célula, mantendo baixa concentração intracelular","Enzimas destroem o antibiótico dentro da célula","Mutações alteram o ribossomo impedindo a ligação do antibiótico","A bactéria não produz a parede celular alvo do antibiótico"],a:0,e:"Bombas de efluxo são proteínas de membrana que expulsam ativamente o antibiótico, mantendo sua concentração intracelular abaixo da concentração inibitória mínima — resistência sem destruir o fármaco."},
    {id:"a2q27",d:"facil",q:"Projeções de 2014 estimam que, em 2050, a resistência antimicrobiana (AMR) poderá causar quantas mortes por ano?",o:["10 milhões","700.000","1,5 milhão","8,2 milhões"],a:0,e:"Em 2014, a AMR causava ~700.000 mortes/ano. A projeção para 2050 é de 10 milhões de mortes/ano — superando câncer e diabetes como causa de morte global."}
   ]},
  aula1:{ name:"Aula 1 — Introdução à Bacteriologia (História)", doc:"AIP 2025 - Prof. Pedro Almeida da Silva",
   summary:`## Aula 1 — Introdução à Bacteriologia / História da Microbiologia\n\n### Pioneiros da observação\n- **Hans e Zacharias Janssen** (~1600): primeiros microscópios compostos (2 lentes), ampliação de 20-30x.\n- **Robert Hooke** (1665): obra *Micrographia*; descreveu estruturas microscópicas.\n- **Antonie van Leeuwenhoek** (1632-1723): carta à Sociedade Real (1683) descrevendo 'animálculos' — primeiras bactérias observadas.\n- **Girolamo Fracastoro** (séc. XVI): *seminaria morbi* ('sementes da doença'), obra *De contagione* (1546).\n\n### Geração espontânea\n- **Aristóteles**: propôs a geração espontânea.\n- **Redi** (1626-1697): refutou para moscas/larvas.\n- **Needham**: defendeu a geração espontânea (caldo turvo).\n- **Spallanzani**: fervendo 1-2h, nada crescia.\n- **Pasteur** (1864): frasco de **pescoço de cisne** refutou definitivamente.\n\n### Etiologia e antissepsia\n- **Semmelweis** (1847): lavagem das mãos com solução clorada reduziu febre puerperal.\n- **Koch** (1843-1910): provou que uma doença = um microrganismo específico (*Bacillus anthracis*).\n- **Hesse**: introduziram o ágar; surgem a placa de Petri e cultivo em cultura pura.\n\n### Postulados de Koch\n1. Presente nos doentes, ausente nos sadios.\n2. Isolado em cultura pura.\n3. Causa doença em animal sadio.\n4. Reisolado idêntico ao original.\n\n**Limitações:** bactérias não cultiváveis (*T. pallidum*, *M. leprae*), portadores sadios (*S. pneumoniae*, *N. meningitidis*).\n\n### Importância das doenças infecciosas\nDALYs 2021: infecções respiratórias + TB ~12% global; no Brasil ~17,8%. TB = maior causa de mortes na história (~1 bilhão).`,
   tips:"Sequência geração espontânea: Aristóteles → Redi (moscas) → Needham (defendeu) → Spallanzani (refutou) → Pasteur (pescoço de cisne). Leeuwenhoek = animálculos; Hooke = Micrographia (1665). Postulados: presente/ausente → cultura pura → causa doença → reisolamento. Limitações: T. pallidum e M. leprae não crescem em meio artificial; portadores sadios.",
   questions:[
    {id:"a1q1",d:"facil",q:"Quem, em carta à Sociedade Real em 1683, descreveu pela primeira vez 'animálculos' (pequenos animais vivos), sendo considerado o observador das primeiras bactérias?",o:["Antonie van Leeuwenhoek","Robert Hooke","Louis Pasteur","Robert Koch"],a:0,e:"Leeuwenhoek (1632-1723) usou microscópios simples de alta qualidade para observar 'animálculos' e descrevê-los em sua carta de 1683 — primeiras observações de bactérias."},
    {id:"a1q2",d:"facil",q:"A obra Micrographia (1665), com descrições de estruturas microscópicas, foi publicada por:",o:["Robert Hooke","Zacharias Janssen","Girolamo Fracastoro","Lazzaro Spallanzani"],a:0,e:"Robert Hooke publicou Micrographia em 1665. Os Janssen são creditados pelo primeiro microscópio composto (~1600)."},
    {id:"a1q3",d:"facil",q:"Os primeiros microscópios compostos (duas lentes, ampliação 20-30x, ~1600) são atribuídos a:",o:["Hans e Zacharias Janssen","Antonie van Leeuwenhoek","Louis Pasteur","Francesco Redi"],a:0,e:"Hans e Zacharias Janssen, fabricantes de óculos holandeses, criaram um dos primeiros microscópios compostos (~1600)."},
    {id:"a1q4",d:"moderado",q:"Girolamo Fracastoro, na obra De contagione (1546), propôs que as doenças seriam transmitidas por:",o:["'Seminaria morbi' (sementes da doença)","Miasmas do ar pútrido","Desequilíbrio dos humores","Castigo divino"],a:0,e:"Fracastoro propôs os 'seminaria morbi' — teoria precursora da transmissão por agentes contagiosos."},
    {id:"a1q5",d:"facil",q:"A teoria da geração espontânea foi proposta originalmente por:",o:["Aristóteles","Louis Pasteur","Robert Koch","Francesco Redi"],a:0,e:"Aristóteles (384-322 a.C.) propôs que a vida surgiria de matéria simples (geração espontânea)."},
    {id:"a1q6",d:"moderado",q:"Francesco Redi refutou a geração espontânea para organismos macroscópicos ao demonstrar que:",o:["Larvas não surgiam em carne protegida com gaze","O caldo fervido permanecia estéril","Bactérias resistiam à fervura prolongada","O ar continha esporos e fungos"],a:0,e:"Redi cobriu frascos de carne: sem acesso de moscas não surgiam larvas — refutando a geração espontânea para organismos visíveis."},
    {id:"a1q7",d:"moderado",q:"John Needham defendeu a geração espontânea porque, após ferver brevemente um caldo e selá-lo:",o:["O caldo ficou turvo de microrganismos","Nada crescia por semanas","As bactérias resistiram ao calor","O frasco explodiu pela pressão"],a:0,e:"Needham ferveu brevemente e selou: o caldo ficou turvo. Concluiu (erroneamente) geração espontânea — a fervura breve não matou todos os microrganismos."},
    {id:"a1q8",d:"moderado",q:"Spallanzani contestou Needham ao demonstrar que, fervendo por tempo longo (1-2h) e selando:",o:["Nada crescia — refutando a geração espontânea","O caldo permanecia turvo","As moscas não surgiam","A higiene das mãos reduzia infecções"],a:0,e:"Spallanzani mostrou que fervura prolongada e selagem impediam o crescimento — os organismos de Needham vinham de microrganismos resistentes ao calor breve."},
    {id:"a1q9",d:"facil",q:"Quem refutou definitivamente a geração espontânea (1864) usando o frasco de 'pescoço de cisne'?",o:["Louis Pasteur","Robert Koch","Ignaz Semmelweis","Antonie van Leeuwenhoek"],a:0,e:"Pasteur (1822-1895) construiu o frasco de pescoço de cisne: o caldo ficava estéril pois o pescoço curvo retinha microrganismos do ar. Consolidou que a vida origina-se de vida."},
    {id:"a1q10",d:"dificil",q:"Por que o caldo no frasco de pescoço de cisne de Pasteur permanecia estéril, mesmo em contato com o ar?",o:["A curvatura retinha as partículas e microrganismos do ar antes de alcançar o caldo","O caldo era continuamente reaquecido","O frasco estava hermeticamente selado","O ar era filtrado por algodão"],a:0,e:"A curvatura em pescoço de cisne permitia entrada de ar mas retinha a poeira e microrganismos na curva. Se inclinado ou com o pescoço quebrado, ocorria contaminação."},
    {id:"a1q11",d:"moderado",q:"Semmelweis (1847) reduziu a febre puerperal ao introduzir:",o:["Lavagem das mãos com solução clorada antes de atender parturientes","Antibióticos profiláticos","Isolamento dos infectados","Esterilização por calor"],a:0,e:"Semmelweis observou alta mortalidade materna e instituiu lavagem das mãos com solução de cloro — mortalidade caiu drasticamente."},
    {id:"a1q12",d:"facil",q:"Robert Koch estabeleceu o paradigma de que:",o:["Uma doença infecciosa é causada por um microrganismo específico","Todos os microrganismos causam doença","A vida surge espontaneamente","As doenças são causadas por miasmas"],a:0,e:"Koch demonstrou a relação 'um microrganismo = uma doença', base da etiologia microbiana."},
    {id:"a1q13",d:"moderado",q:"Koch demonstrou seu paradigma estudando qual doença e agente?",o:["Antraz, causado pelo Bacillus anthracis","Tuberculose, causada pelo Treponema","Cólera, causada por vírus","Sífilis, causada por fungo"],a:0,e:"Koch mostrou que todo animal com antraz tinha Bacillus anthracis no sangue, ausente nos sadios."},
    {id:"a1q14",d:"dificil",q:"A sequência CORRETA dos Postulados de Koch é:",o:["Presente nos doentes/ausente nos sadios → cultura pura → causa doença em animal → reisolado idêntico","Cultura pura → presente nos sadios → causa doença → não pode ser reisolado","Causa doença → ausente nos doentes → cultura pura → reisolamento","Presente em sadios e doentes → cultura mista → não causa doença → reisolamento"],a:0,e:"Postulados: (1) presente em todos os doentes/ausente nos sadios; (2) isolado em cultura pura; (3) causa doença em animal sadio; (4) reisolado idêntico ao original."},
    {id:"a1q15",d:"moderado",q:"A introdução do ágar como base para meios de cultura sólidos é atribuída a:",o:["Fanny e Walther Hesse (laboratório de Koch)","Louis Pasteur","Antonie van Leeuwenhoek","Aristóteles"],a:0,e:"Fanny Hesse sugeriu o ágar (usado na cozinha) como agente solidificante no laboratório de Koch, permitindo cultivo de colônias isoladas."},
    {id:"a1q16",d:"dificil",q:"Qual é uma LIMITAÇÃO clássica dos Postulados de Koch?",o:["Treponema pallidum e Mycobacterium leprae não crescem em meios artificiais","Todo microrganismo isolado sempre causa doença","Não existem portadores sadios de patógenos","Todas as bactérias crescem facilmente em cultura"],a:0,e:"Limitações: bactérias não cultiváveis (T. pallidum, M. leprae), portadores sadios (S. pneumoniae, N. meningitidis), oportunistas, doenças que cursam após eliminação do agente."},
    {id:"a1q17",d:"moderado",q:"Portadores sadios de S. pneumoniae e N. meningitidis são uma limitação dos postulados de Koch porque:",o:["O microrganismo pode estar presente sem que o indivíduo apresente doença","O microrganismo nunca causa doença","O agente não pode ser cultivado","A doença ocorre sem microrganismo"],a:0,e:"Os postulados pressupõem ausência nos sadios. Portadores assintomáticos contradizem esse postulado."},
    {id:"a1q18",d:"facil",q:"Segundo os dados de DALYs (2021), no Brasil o grupo com maior participação foi:",o:["Infecções respiratórias e tuberculose (~17,8%)","Doenças cardiovasculares","Cânceres","Transtornos mentais"],a:0,e:"No Brasil (2021), infecções respiratórias e TB lideraram com ~17,8%, seguidas por COVID-19 (~15%)."},
    {id:"a1q19",d:"moderado",q:"Qual doença infecciosa é apontada como a maior causa de mortes na história da humanidade (≈1 bilhão)?",o:["Tuberculose","Varíola","Cólera","AIDS"],a:0,e:"A tuberculose é apontada como a doença que mais matou na história (~1 bilhão de mortes)."},
    {id:"a1q20",d:"facil",q:"A capacidade humana de controlar doenças infecciosas (vacinas, antibióticos) é, historicamente:",o:["Um desenvolvimento recente (a partir do séc. XIX-XX)","Tão antigo quanto a humanidade","Anterior ao microscópio","Existente desde a Antiguidade"],a:0,e:"Apesar das epidemias existirem há milênios, o controle efetivo com microscopia, vacinas e antibióticos é um desenvolvimento muito recente na escala histórica."}
   ]},
} },
  "farmacologia-1":{ name:"Farmacologia I", topics:{
prova1:{name:"Prova - Parte 1",doc:"4a Prova de Farmacologia 2026",
summary:`## Prova - Parte 1 (4a prova de Farmacologia)

### Penicilinas
- Primeiro grupo: Penicilina G (via PARENTERAL, instavel em acido gastrico) e Penicilina V (via ORAL, estavel em acido gastrico) - atencao, a relacao costuma ser invertida em pegadinhas de prova.
- Resistentes a beta-lactamases: Oxacilina (usada em S. aureus sensivel a meticilina).
- Aminopenicilinas (ampicilina, amoxicilina): NAO sao resistentes a beta-lactamases, mas podem ser combinadas com inibidores (Amoxicilina+Ac.Clavulanico; Ampicilina+Sulbactam).
- Amplo espectro contra Gram-negativas: Carboxipenicilinas (carbenicilina, ticarcilina) e Ureidopenicilinas (piperacilina, mezlocilina).

### Cefalosporinas, Monobactamicos e Carbapenemicos
- Anel beta-lactamico comum; classificadas por geracoes; espectro mais amplo que penicilinas.
- 2a geracao: MENOR atividade Gram+ que 1a geracao, MAIOR atividade Gram- que 1a geracao (mas menos que 3a geracao).
- Aztreonam (Monobactamicos): atua contra Gram-NEGATIVAS, sem atividade Gram+ ou anaerobios.
- Carbapenemicos (Imipenem, Ertapenem, Meropenem): espectro muito amplo, resistentes a muitas beta-lactamases, cobrem Gram+, Gram- e anaerobios.

### Antivirais
- Foscarnet: análogo do pirofosfato inorgânico; inibe DNA polimerase e transcriptase reversa; usado em infeccoes GRAVES/RESISTENTES por CMV/HSV (nao 'brandas').
- Zidovudina: análogo nucleosídeo, fosforilada, incorpora-se à transcriptase reversa, interrompe alongamento do DNA proviral.
- Amantadina/Rimantadina: inibidores do canal M2; so funcionam contra Influenza A (nao 'todos os tipos').
- Aciclovir trifosforilado: inibe DNA polimerase por competicao com substratos trifosforilados naturais; bloqueia extensao da cadeia de DNA.
- Oseltamivir: análogo do acido sialico, inibe neuraminidase.
- Maraviroque: antagonista do receptor CCR5 (quimiocina); SO funciona contra HIV com tropismo CCR5 - requer teste de tropismo, NAO e sem restricao.
- Remdesivir e Molnupiravir: análogos nucleosideos que interferem na RNA polimerase do SARS-CoV-2.
- Enfuvirtida (T-20): bloqueia fusao do HIV; usada em pacientes ja em tratamento com falha terapeutica.

### Inibidores da sintese proteica - efeitos adversos
- Tetraciclinas: deposito em ossos/dentes (quelantes de Ca+2) - coloracao marrom, deformidade ossea.
- Aminoglicosideos: ototoxicidade (acumulo em perilinfa/endolinfa) - zumbido agudo exige interrupcao do tratamento.
- Cloranfenicol: sindrome do bebe cinzento em neonatos prematuros (figado imaturo).

### Antineoplasicos
- Agentes alquilantes: formam ligacoes covalentes com DNA via ions carbono reativos.
- Compostos de Platina (Cisplatina): ligacoes intra-helice no DNA.
- Antimetabolicos (Metotrexato): analogos do acido folico, bloqueiam sintese de DNA/RNA.
- Alcaloides da vinca (Vincristina): origem NATURAL (nao sintetica); atuam na Fase M (mitose, fuso mitotico), nao na Fase S.
- Ciclofosfamida: pro-farmaco (mostarda nitrogenada) ativado no figado por CYP450; MESNA neutraliza a acroleina toxica (previne cistite hemorragica).

### Conceitos gerais de antimicrobianos
- Toxicidade seletiva: inibir vias criticas do patogeno em concentracoes ABAIXO das toxicas para o hospedeiro (nao acima).
- Antibioticos = origem natural (de outros microrganismos); Quimioterapicos = origem sintetica.
- Tratamento DEFINITIVO baseia-se em identificacao laboratorial do agente (cultura/sensibilidade); tratamento EMPIRICO baseia-se na apresentacao clinica.
- Profilaxia: tratar pacientes que ainda nao estao infectados ou nao desenvolveram a doenca.

### Quinolonas
- 1a geracao: Ac. nalidixico (espectro limitado, ITU por Gram-).
- 2a geracao: Norfloxacino, Levofloxacino, Ciprofloxacino - boa atividade Gram-, acao moderada Gram+; Ciprofloxacino tem o espectro mais AMPLO (nao reduzido) entre os de 2a geracao.
- 3a geracao: amplo espectro, melhor atividade Gram+.

### Mecanismos de resistencia e transferencia genica
- Vertical: passagem do traco mutante para celulas filhas apos replicacao.
- Transducao: transferencia via virus bacteriofago.
- Transformacao: captacao de DNA desnudo do ambiente.
- Conjugacao: transferencia de genes via plasmideos.

### Alvos enzimaticos
- Sulfonamidas: inibem di-hidropteroato-sintase (incorporacao do PABA).
- Trimetoprima: inibe di-hidrofolato redutase (DHFR).
- Quinolonas: inibem DNA girase (Gram-) e topoisomerase IV (Gram+).

### Beta-lactamicos e Glicopeptideos
- Beta-lactamicos INIBEM (nao ativam) a sintese da parede celular de peptidoglicanos.
- Vancomicina (Glicopeptideo): eficaz contra Gram-POSITIVAS (nao Gram-negativas); liga-se a extremidade terminal da cadeia peptidica, inibindo ligacoes cruzadas.

### Classes de antibioticos por mecanismo/origem
- Cloranfenicol: produzido por Streptomyces venezuelae; liga-se a subunidade 50S (sitio peptidiltransferase).
- Gentamicina: aminoglicosideo mais usado, baixo custo, ativo contra Gram-negativas.
- Tetraciclinas: estrutura de 4 aneis, bacteriostaticas, amplo espectro Gram+/Gram-.
- Macrolideos (Eritromicina, Azitromicina, Claritromicina): anel de lactona com acucares ligados.`,
tips:"Penicilina G = parenteral/instavel acido; Penicilina V = oral/estavel acido (cuidado com pegadinha invertida). Cefalosporinas 2a geracao: menos Gram+ e mais Gram- que 1a geracao. Aztreonam = so Gram-negativas. Amantadina/Rimantadina = so Influenza A. Maraviroque = so CCR5-tropico, requer teste de tropismo. Vinca alcaloides = origem NATURAL, atuam na Fase M (nao S). Toxicidade seletiva = concentracoes ABAIXO do toxico para hospedeiro. Tratamento definitivo = identificacao laboratorial; empirico = clinica. Ciprofloxacino = espectro mais AMPLO entre quinolonas de 2a geracao. Beta-lactamicos INIBEM sintese de parede. Vancomicina = so Gram-POSITIVAS. Vertical=celulas filhas; Transducao=bacteriofago; Transformacao=DNA ambiente; Conjugacao=plasmideo. Sulfonamida-PABA; Trimetoprima-DHFR; Quinolona-DNA girase/topoisomerase IV.",
questions:[{id:"fp1q1",d:"moderado",q:"Com relacao as penicilinas, considere as afirmativas: I- O primeiro grupo de penicilinas inclui a penicilina V, administrada por via parenteral, e a penicilina G, administrada por via oral, porque a penicilina G e mais estavel que a penicilina V em acido gastrico. II- Dentre as penicilinas resistentes as beta-lactamases podemos citar a Oxacilina, utilizada em infeccao por S. aureus sensivel a meticilina. III- As Aminopenicilinas nao sao resistentes as beta-lactamases, mas podem ser administradas em combinacao com inibidores destas enzimas, como Amoxicilina+Ac.Clavulanico e Ampicilina+Sulbactam. IV- As penicilinas de amplo espectro (Carboxipenicilinas e Ureidopenicilinas) apresentam espectro maior contra bacterias Gram- que outras classes de penicilinas. Assinale a alternativa correta:",o:["Somente I e II estao corretas.","Somente I, II e III estao corretas.","Somente II e IV estao corretas.","Somente II, III e IV estao corretas.","Todas estao corretas."],a:3,e:"A afirmativa I esta INVERTIDA: na realidade a Penicilina G e administrada por via PARENTERAL (e instavel em acido gastrico) e a Penicilina V e administrada por via ORAL (e estavel em acido gastrico) - exatamente o contrario do que a afirmativa diz. As afirmativas II, III e IV estao corretas: Oxacilina e resistente a beta-lactamases (usada em MSSA); Aminopenicilinas precisam de inibidores de beta-lactamase combinados; Carboxi/Ureidopenicilinas tem espectro ampliado contra Gram-negativas."},
{id:"fp1q2",d:"moderado",q:"Marque V (verdadeiro) ou F (falso) para as afirmativas sobre beta-lactamicos: (1) As Cefalosporinas apresentam anel beta-lactamico, sao classificadas por geracoes com base na susceptibilidade bacteriana e resistencia a beta-lactamases, e tem espectro mais amplo que as penicilinas. (2) As cefalosporinas de 2a geracao tem atividade MAIOR contra Gram-positivas que as de 1a geracao, e atividade MENOR contra Gram-negativas, embora sejam menos ativas que os farmacos de 3a geracao. (3) O Aztreonam pertence a classe dos Monobactamicos e apresenta espectro de acao principalmente contra bacterias Gram-POSITIVAS, carecendo de atividade contra Gram-negativas e anaerobios. (4) Os Carbapenemicos (Imipenem, Ertapenem, Meropenem) sao estruturalmente relacionados a outros beta-lactamicos, com espectro muito amplo (resistentes a muitas beta-lactamases), incluindo Gram+, Gram- e anaerobios. A sequencia correta e:",o:["V, V, V, F.","F, V, F, V.","V, V, F, F.","F, V, V, V.","V, F, F, V."],a:4,e:"(1) VERDADEIRO: cefalosporinas tem anel beta-lactamico, sao classificadas por geracoes e tem espectro mais amplo que penicilinas. (2) FALSO: a afirmativa esta invertida - cefalosporinas de 2a geracao tem atividade MENOR contra Gram-positivas e MAIOR contra Gram-negativas em relacao a 1a geracao. (3) FALSO: Aztreonam atua principalmente contra bacterias Gram-NEGATIVAS (nao Gram-positivas), carecendo de atividade contra Gram-positivas e anaerobios. (4) VERDADEIRO: descricao correta dos Carbapenemicos. Sequencia: V, F, F, V."},
{id:"fp1q3",d:"moderado",q:"O desenvolvimento de farmacos antivirais e complexo pois os virus utilizam a maquinaria celular do hospedeiro. Considere: I- O Foscarnet e um analogo do pirofosfato inorganico que inibe DNA polimerase e transcriptase reversa, usado no tratamento de infeccoes BRANDAS por CMV ou HSV suscetiveis a outros anti-herpesvirus como ganciclovir/aciclovir. II- A Zidovudina e um analogo nucleosideo que, apos fosforilada, se incorpora a transcriptase reversa e interrompe o alongamento pro-viral. III- Amantadina e Rimantadina sao inibidores de canais M2 do virus influenza, inibindo o desnudamento viral, administrados por via oral, com ampla atividade contra TODOS os tipos de virus influenza conhecidos. IV- A forma trifosforilada do Aciclovir (ACV) inibe a DNA polimerase por competicao com substratos trifosforilados naturais, e sua adicao a cadeia de DNA em extensao bloqueia o crescimento. Assinale a alternativa correta:",o:["Somente as afirmativas I, II e III sao verdadeiras.","Somente as afirmativas I e II sao verdadeiras.","Somente as afirmativas II e IV sao verdadeiras.","Somente as afirmativas II, III e IV sao verdadeiras.","Todas as afirmativas estao corretas."],a:2,e:"A afirmativa I esta ERRADA: o Foscarnet e reservado para infeccoes GRAVES ou RESISTENTES por CMV/HSV (nao \"brandas\"), justamente quando ha resistencia a ganciclovir/aciclovir. A afirmativa III esta ERRADA: Amantadina e Rimantadina atuam SOMENTE contra Influenza A (o canal M2 e exclusivo desse tipo), nao contra \"todos os tipos\" de influenza conhecidos. As afirmativas II e IV estao corretas: descrevem corretamente o mecanismo da Zidovudina e do Aciclovir trifosforilado."},
{id:"fp1q4",d:"facil",q:"Os Inibidores da Sintese Proteica atuam sobre ribossomos bacterianos nas subunidades 30S ou 50S. Com relacao aos efeitos adversos: I- As tetraciclinas podem se depositar em ossos e dentes em crescimento (ligacao ao Ca+2, caracteristica quelante), causando coloracao marrom permanente nos dentes e, em casos raros porem graves, deformidade ossea e inibicao do crescimento. II- Os Aminoglicosideos podem causar ototoxicidade devido ao acumulo na perilinfa e endolinfa (principalmente em altas concentracoes), com perda auditiva progressiva; em caso de zumbido agudo, o tratamento deve ser interrompido. III- O cloranfenicol pode causar a sindrome do bebe cinzento devido ao acumulo do farmaco, especialmente em neonatos prematuros com figado imaturo. Assinale a alternativa correta:",o:["Somente I e II estao corretas.","Somente I e III estao corretas.","Somente II e III estao corretas.","Somente I esta correta.","Todas estao corretas."],a:4,e:"Todas as tres afirmativas descrevem corretamente efeitos adversos classicos: tetraciclinas (deposito em ossos/dentes por quelacao de calcio), aminoglicosideos (ototoxicidade por acumulo em perilinfa/endolinfa, exigindo interrupcao se houver zumbido agudo) e cloranfenicol (sindrome do bebe cinzento em neonatos prematuros com metabolismo hepatico imaturo)."},
{id:"fp1q5",d:"moderado",q:"O objetivo da terapia com Antineoplasicos e a cura ou controle da doenca, causando evento citotoxico letal ou apoptose nas celulas cancerosas. Considere: I- Os Agentes alquilantes formam ligacoes covalentes (via ions carbono reativos) com o DNA, impedindo replicacao, transcricao e reparo, levando a apoptose. II- Compostos de Platina (ex: Cisplatina) formam ligacoes covalentes com grupamentos de DNA, causando ligacoes intra-helice e impedindo replicacao/transcricao/reparacao. III- Os antimetabolicos sao estruturalmente similares a compostos normais da celula e bloqueiam vias metabolicas da sintese de DNA/RNA; o Metotrexato e um analogo do acido folico. IV- Os alcaloides da vinca (ex: vincristina) sao compostos de ORIGEM SINTETICA que afetam a formacao do fuso mitotico na FASE S, tendo efeito citotoxico. Assinale a alternativa correta:",o:["Somente I e II estao corretas.","Somente I, II e III estao corretas.","Somente II, III e IV estao corretas.","Somente I esta correta.","Todas estao corretas."],a:1,e:"A afirmativa IV contem DOIS erros: os alcaloides da vinca sao de ORIGEM NATURAL (extraidos da planta Vinca, nao sinteticos) e atuam na FASE M (mitose), nao na Fase S - eles bloqueiam a formacao do fuso mitotico durante a mitose, impedindo a separacao cromossomica. As afirmativas I, II e III descrevem corretamente alquilantes, compostos de platina e antimetabolicos respectivamente."},
{id:"fp1q6",d:"facil",q:"Avalie a seguinte afirmacao: \"A toxicidade seletiva objetiva a inibicao de vias ou alvos que sao criticos para sobrevida e replicacao de um determinado agente infeccioso, em concentracoes do farmaco ACIMA das necessarias para afetar o hospedeiro.\" Essa afirmacao e verdadeira ou falsa?",o:["Verdadeiro.","Falso."],a:1,e:"FALSO. O conceito correto de toxicidade seletiva e o inverso do que a afirmativa descreve: o farmaco deve inibir vias criticas do patogeno em concentracoes ABAIXO daquelas necessarias para causar dano ao hospedeiro - e exatamente essa margem de seguranca (indice terapeutico) que permite tratar a infeccao sem intoxicar o paciente. Se a concentracao necessaria para afetar o patogeno estivesse ACIMA da que afeta o hospedeiro, o farmaco seria toxico antes de ser eficaz."},
{id:"fp1q7",d:"moderado",q:"Os Antimicrobianos sao substancias produzidas por diversas especies de microrganismos ou produzidas de forma sintetica, suprimindo o crescimento de outros microrganismos. Com relacao a Terapia Antimicrobiana, assinale a alternativa INCORRETA:",o:["Antibioticos sao farmacos de origem natural, sintetizados por outros microrganismos como por exemplo fungos.","Quimioterapicos sao farmacos de origem sintetica.","O tratamento definitivo baseia-se na apresentacao clinica do paciente, que pode sugerir um determinado microrganismo (microrganismo que mais provavelmente causa uma infeccao especifica).","A profilaxia consiste em tratar pacientes que ainda nao estao infectados ou nao desenvolveram a doenca."],a:2,e:"A alternativa INCORRETA e a (c): o que se baseia na apresentacao clinica do paciente (sugerindo o microrganismo mais provavel) e o tratamento EMPIRICO, nao o tratamento DEFINITIVO. O tratamento definitivo e aquele guiado pela identificacao laboratorial precisa do agente causador (cultura, antibiograma), permitindo a escolha do antimicrobiano mais especifico e eficaz - diferente do empirico, que e iniciado antes da confirmacao laboratorial."},
{id:"fp1q8",d:"moderado",q:"Com relacao as Quinolonas, assinale a alternativa INCORRETA:",o:["As quinolonas de 3a geracao tem amplo espectro, apresentando melhor atividade contra microrganismos Gram+, em comparacao as outras classes de quinolonas.","Como farmacos de 2a geracao podemos citar o Norfloxacino, Levofloxacino e Ciprofloxacino. Estes apresentam boa atividade contra bacterias Gram-, mas acao moderada contra Gram+.","A primeira classe e representada pelo Ac. nalidixico, que apresenta espectro limitado a infeccoes do trato urinario por bacterias Gram-.","O Ciprofloxacino e o agente de 2a geracao com o espectro mais reduzido da classe."],a:3,e:"A alternativa INCORRETA e a (d): o Ciprofloxacino e justamente um dos agentes de 2a geracao com espectro mais AMPLO e atividade mais potente contra Gram-negativas (nao o mais reduzido). As demais alternativas descrevem corretamente as caracteristicas das geracoes de quinolonas: 1a geracao (Ac. nalidixico, espectro limitado a ITU), 2a geracao (boa atividade Gram-, moderada Gram+) e 3a geracao (amplo espectro, melhor atividade Gram+)."},
{id:"fp1q9",d:"moderado",q:"A disseminacao das mutacoes que causam resistencia bacteriana pode ocorrer de varias maneiras. Correlacione: I- Resistencia adquirida com a passagem do traco mutante apos a replicacao das bacterias (para as celulas filhas). II- Transferencia de material genetico atraves de virus bacteriofago. III- Captacao de DNA desnudo no ambiente. IV- Transferencia de genes relacionados com a resistencia por plasmideos. Assinale a sequencia correta:",o:["I-Vertical, II-Transformacao, III-Transducao, IV-Conjugacao.","I-Vertical, II-Transducao, III-Transformacao, IV-Conjugacao.","I-Conjugacao, II-Transformacao, III-Transducao, IV-Vertical.","I-Transducao, II-Vertical, III-Conjugacao, IV-Transformacao.","I-Transformacao, II-Transducao, III-Vertical, IV-Conjugacao."],a:1,e:"A correlacao correta e: I = Transferencia VERTICAL (heranca do traco mutante para as celulas filhas durante a replicacao); II = TRANSDUCAO (transferencia de material genetico mediada por bacteriofagos); III = TRANSFORMACAO (captacao direta de DNA livre/desnudo do ambiente); IV = CONJUGACAO (transferencia de plasmideos atraves de contato celula-celula via pilus sexual)."},
{id:"fp1q10",d:"moderado",q:"Assinale a alternativa que apresenta a correlacao correta entre os mecanismos de acao e seus respectivos farmacos/classes: I- Inibidores competitivos da di-hidropteroato-sintase, enzima bacteriana responsavel pela incorporacao do PABA ao acido di-hidropteroico, precursor imediato do acido folico. II- Inibidores competitivos da di-hidrofolato redutase (DHFR), enzima que reduz di-hidrofolato (DHF) a tetraidrofolato (THF) para o metabolismo do folato. III- Em bacterias Gram-negativas inibe a DNA girase, impedindo o relaxamento do DNA superespiralado; em bacterias Gram-positivas inibe a topoisomerase IV, impedindo a separacao do DNA replicado entre as celulas filhas.",o:["I-Quinolonas, II-Sulfonamidas, III-Trimetoprima.","I-Quinolonas, II-Trimetoprima, III-Sulfonamidas.","I-Trimetoprima, II-Quinolonas, III-Sulfonamidas.","I-Sulfonamidas, II-Trimetoprima, III-Quinolonas.","I-Sulfonamidas, II-Quinolonas, III-Trimetoprima."],a:3,e:"A correlacao correta e: I = SULFONAMIDAS (inibem a di-hidropteroato-sintase, bloqueando a incorporacao do PABA na via de sintese do folato bacteriano); II = TRIMETOPRIMA (inibe a DHFR, bloqueando a conversao de DHF em THF); III = QUINOLONAS (inibem DNA girase em Gram-negativas e topoisomerase IV em Gram-positivas, ambas enzimas essenciais para a topologia do DNA bacteriano)."},
{id:"fp1q11",d:"facil",q:"Com relacao aos antimicrobianos beta-lactamicos, assinale a alternativa INCORRETA:",o:["Sao antimicrobianos frequentemente prescritos na clinica.","Apresentam como estrutura quimica comum a presenca de anel beta-lactamico.","Ativam a sintese da parede celular bacteriana de peptidoglicanos.","O espectro de acao esta relacionado ao grau de penetracao do farmaco no espaco periplasmatico e a capacidade e forca de ligacao a transpeptidases especificas."],a:2,e:"A alternativa INCORRETA e a (c): os beta-lactamicos NAO ativam, e sim INIBEM a sintese da parede celular bacteriana de peptidoglicanos. Eles atuam ligando-se as transpeptidases (PBPs - penicillin-binding proteins), bloqueando a formacao das ligacoes cruzadas entre as cadeias de peptidoglicano, o que leva a fragilizacao e lise da parede celular bacteriana."},
{id:"fp1q12",d:"facil",q:"Avalie a seguinte afirmacao: \"A Vancomicina faz parte da classe de Glicopeptideos. Estes antimicrobianos ligam-se a uma extremidade terminal da cadeia peptidica das bacterias e inibem a formacao das ligacoes cruzadas da parede celular. E eficaz apenas contra bacterias Gram-negativas.\" Essa afirmacao e verdadeira ou falsa?",o:["Verdadeiro.","Falso."],a:1,e:"FALSO. A primeira parte da afirmativa esta correta (Vancomicina e um Glicopeptideo que se liga a extremidade terminal D-Ala-D-Ala da cadeia peptidica, inibindo as ligacoes cruzadas do peptidoglicano). Porem, a Vancomicina e eficaz APENAS contra bacterias Gram-POSITIVAS (nao Gram-negativas), pois sua grande molecula nao consegue atravessar a membrana externa das bacterias Gram-negativas para alcancar o peptidoglicano na parede celular."},
{id:"fp1q13",d:"moderado",q:"Correlacione as sentencas com seu farmaco/classe de farmaco correto: I- E um antibiotico produzido pelo Streptomyces venezuelae, que inibe a sintese das proteinas bacterianas ao se ligar a subunidade 50S do ribossomo bacteriano no sitio da peptidiltransferase; pode inibir em menor grau a sintese de proteinas em celulas eucarioticas. II- E o aminoglicosideo mais utilizado (baixo custo e atividade confiavel contra bacterias Gram-negativas, exceto as mais resistentes); dispoe-se de preparacoes para administracao parenteral, oftalmica e topica. III- Sao antibioticos constituidos de uma estrutura quimica basica de quatro aneis, com efeito bacteriostatico e atividade contra uma ampla variedade de bacterias aerobicas e anaerobicas Gram+ e Gram-. IV- Sao formados por um grupo de antimicrobianos que apresentam na sua estrutura um anel de lactona ao qual se ligam um ou mais acucares; como exemplo: Eritromicina, Azitromicina e Claritromicina.",o:["I-Cloranfenicol, II-Gentamicina, III-Tetraciclina, IV-Macrolideo.","I-Gentamicina, II-Cloranfenicol, III-Tetraciclina, IV-Macrolideo.","I-Gentamicina, II-Cloranfenicol, III-Macrolideo, IV-Tetraciclina.","I-Cloranfenicol, II-Macrolideo, III-Tetraciclina, IV-Gentamicina."],a:0,e:"A correlacao correta e: I = CLORANFENICOL (produzido por Streptomyces venezuelae, liga-se a subunidade 50S no sitio da peptidiltransferase, com toxicidade mitocondrial em eucariotos); II = GENTAMICINA (aminoglicosideo mais usado, baixo custo, ativo contra Gram-negativas, multiplas vias de administracao); III = TETRACICLINA (estrutura de 4 aneis, bacteriostatica, amplo espectro); IV = MACROLIDEO (anel de lactona com acucares ligados - eritromicina, azitromicina, claritromicina)."},
{id:"fp1q14",d:"moderado",q:"Avalie a seguinte afirmacao: \"A Ciclofosfamida, que faz parte do grupo de mostardas nitrogenadas, e o alquilante mais utilizado deste grupo. Ela e um Pro-farmaco ativado no figado pelo sistema citocromo P450 para produzir mostarda de fosforamida (molecula citotoxica) e acroleina. A toxicidade da acroleina pode ser minimizada pela administracao de MESNA (2-mercaptoetano sulfonato sodico) que neutraliza metabolitos toxicos (acroleina).\" Essa afirmacao e verdadeira ou falsa?",o:["Verdadeira.","Falsa."],a:0,e:"VERDADEIRA. A Ciclofosfamida e de fato uma mostarda nitrogenada amplamente utilizada que funciona como pro-farmaco, sendo ativada no figado via citocromo P450 em mostarda de fosforamida (citotoxica) e acroleina (subproduto toxico responsavel pela cistite hemorragica). O MESNA e administrado justamente para neutralizar a acroleina na bexiga, prevenindo essa toxicidade urotelial - e uma medida de protecao classica usada na pratica clinica com altas doses de ciclofosfamida."},
{id:"fp1q15",d:"moderado",q:"Com relacao aos antivirais, assinale a alternativa INCORRETA:",o:["Recomenda-se o uso de combinacoes de antirretrovirais para o tratamento das infeccoes por HIV desde o momento do diagnostico. A terapia inicial padrao e composta por 3 antirretrovirais (2 analogos nucleosideos + uma outra classe de antirretroviral).","A Enfuvirtida (T-20) bloqueia a fusao do HIV com a celula hospedeira. E administrada em pacientes positivos para o HIV que ja estao em tratamento, mas que ainda apresentam evidencias de replicacao viral, causadas por resistencia ou intolerancia a algum outro farmaco antirretroviral.","O Oseltamivir e um analogo do acido sialico. Este farmaco se liga em locais proximos ao sitio ativo da neuraminidase, uma enzima envolvida na liberacao viral.","Remdesivir e Molnupiravir sao analogos nucleosideos que interferem na acao da RNA polimerase, inibindo a replicacao do SARS-CoV-2.","O Maraviroque (MVQ) e um Antagonista do receptor de quimiocina, que impede a entrada do HIV na celula do hospedeiro. Ele pode ser administrado, sem restricao, para pacientes virgens de tratamento e que apresentam qualquer tipo de infeccao por HIV."],a:4,e:"A alternativa INCORRETA e a (e): o Maraviroque e de fato um antagonista do correceptor CCR5 que bloqueia a entrada do HIV, mas ele NAO pode ser administrado \"sem restricao\" para \"qualquer tipo de infeccao por HIV\" - o farmaco so e eficaz contra cepas de HIV com tropismo CCR5 (R5-tropicas), sendo OBRIGATORIO realizar um teste de tropismo viral antes do uso. Cepas com tropismo CXCR4 ou duplo/misto nao respondem ao Maraviroque."}]}
} },

const OLD_KEY = "asclepia_state_v1";   // chave antiga (versão sem perfil)

const CKEY = "asclepia_current_v1";    // e-mail do perfil ativo
const DOW = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
